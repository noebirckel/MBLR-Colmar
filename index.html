                          </div>
                        ))}
                        {(ch.photos||[]).length>6&&<div onClick={()=>setPhotosModal(ch)} style={{borderRadius:8,background:"#0F172A",border:"1px solid #334155",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",aspectRatio:"1"}}>
                          <span style={{fontSize:12,color:"#64748B",fontWeight:700}}>+{(ch.photos||[]).length-6}</span>
                        </div>}
                      </div>}
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>setPhotosModal(ch)} style={{flex:1,background:"#33415540",border:"1px solid #334155",borderRadius:8,color:"#94A3B8",padding:"7px",cursor:"pointer",fontSize:12,fontWeight:700}}>
                          📸 {(ch.photos||[]).length>0?`${(ch.photos||[]).length} photo(s)`:"Ajouter photos"}
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
                {hist.length>0&&<>{[...new Set(hist.map(h=>h.chantier))].slice(0,10).map(ch=>{const items=hist.filter(h=>h.chantier===ch);return<div key={ch} style={{background:"#1E293B",borderRadius:10,padding:"11px 14px",marginBottom:6,border:"1px solid #334155"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontWeight:700,fontSize:12}}>🔧 {ch}</span><span style={{fontSize:11,color:"#64748B"}}>{items[0].date}</span></div>{items.map((it,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#64748B"}}><span>{it.article}</span><span style={{color:"#F59E0B"}}>-{it.qty} {it.unite}</span></div>)}</div>;})} </>}
              </>
            }
          </div>}
        </div>
      );
    }


    // APPLICATION PRINCIPALE
    // ══════════════════════════════════════
    function App(){
      const isMobile=useIsMobile();
      // Auth
      const[authUser,setAuthUser]=useState(null);
      const[profile,setProfile]=useState(null);
      const[authLoading,setAuthLoading]=useState(true);
      // Data
      const[stock,setStock]=useState(INIT);
      const[orders,setOrders]=useState([]);
      const[hist,setHist]=useState([]);
      const[chantiersPipeline,setChantiersPipeline]=useState([]);
      const[acomptes,setAcomptes]=useState([]);
      const[sync,setSync]=useState("loading");
      const[ventes,setVentes]=useState([]);
      // UI
      const[view,setView]=useState(()=>{try{return localStorage.getItem("app_view")||"accueil";}catch(e){return "accueil";}});
      const goTo=v=>{try{localStorage.setItem("app_view",v);}catch(e){}setView(v);};
      const[fCat,setFCat]=useState("Toutes");
      const[cNom,setCNom]=useState("");
      const[cItems,setCItems]=useState([]);
      const[aItem,setAItem]=useState({id:"",qty:""});
      const[oModal,setOModal]=useState(null);
      const[oForm,setOForm]=useState({qty:"",desc:""});
      const[eComp,setEComp]=useState(null);
      const[cForm,setCForm]=useState(EC);
      const[eSId,setESId]=useState(null);
      const[eSVal,setESVal]=useState("");
      const[pSearch,setPSearch]=useState("");
      const[pCat,setPCat]=useState("Toutes");
      const[delConf,setDelConf]=useState(null);
      const[oDelConf,setODelConf]=useState(null);
      const[oEditModal,setOEditModal]=useState(null);
      const[oEditForm,setOEditForm]=useState({qty:"",desc:""});
      const timer=useRef(null);
      const firstLoad=useRef(true);

      // ── Auth ──
      useEffect(()=>{
        sb.auth.getSession().then(({data:{session}})=>{
          if(session){setAuthUser(session.user);loadProfile(session.user.id);}
          else setAuthLoading(false);
        });
        const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
          if(session){setAuthUser(session.user);loadProfile(session.user.id);}
          else{setAuthUser(null);setProfile(null);setAuthLoading(false);}
        });
        return()=>subscription.unsubscribe();
      },[]);

      const loadProfile=async(uid)=>{
        const{data}=await sb.from("profiles").select("*").eq("id",uid).single();
        if(data){
          setProfile(data);
          if(!data.actif){await sb.auth.signOut();return;}
          const tabs=ROLE_TABS[data.role]||["accueil"];
          const savedView=localStorage.getItem("app_view");
          const targetView=savedView&&tabs.includes(savedView)?savedView:tabs[0];
          try{localStorage.setItem("app_view",targetView);}catch(e){}
          setView(targetView);
        }
        setAuthLoading(false);
      };

      const logout=()=>sb.auth.signOut();

      // ── Data sync ──
      useEffect(()=>{
        if(!authUser)return;
        async function load(){
          setSyncState("loading");
          try{
            const{data,error}=await sb.from("app_data").select("*").eq("id","main").single();
            if(error)throw error;
            if(data){
              if(data.stock&&data.stock.length>0)setStock(data.stock);
              if(data.orders)setOrders(data.orders);
              if(data.hist)setHist(data.hist);
              if(data.ventes)setVentes(data.ventes);
              if(data.chantiersPipeline)setChantiersPipeline(data.chantiersPipeline);
              if(data.acomptes)setAcomptes(data.acomptes);
            }
            setSyncState("saved");
          }catch(e){setSyncState("error");}
          firstLoad.current=false;
        }
        load();
        const ch=sb.channel("realtime_app").on("postgres_changes",{event:"UPDATE",schema:"public",table:"app_data"},p=>{
          const d=p.new;
          if(d.stock&&d.stock.length>0)setStock(d.stock);
          if(d.orders)setOrders(d.orders);
          if(d.hist)setHist(d.hist);
          if(d.ventes)setVentes(d.ventes);
          if(d.chantiersPipeline)setChantiersPipeline(d.chantiersPipeline);
          if(d.acomptes)setAcomptes(d.acomptes);
          setSyncState("saved");
        }).subscribe();
        return()=>sb.removeChannel(ch);
      },[authUser]);

      const setSyncState=v=>setSync(v);

      const SV=v=>{const n=typeof v==="function"?v(ventes):v;setVentes(n);saveDB(stock,orders,hist,n,chantiersPipeline,acomptes);};
      const SC2=v=>{const n=typeof v==="function"?v(chantiersPipeline):v;setChantiersPipeline(n);saveDB(stock,orders,hist,ventes,n);};
      const SA=v=>{const n=typeof v==="function"?v(acomptes):v;setAcomptes(n);saveDB(stock,orders,hist,ventes,chantiersPipeline,n);};
      const saveDB=useCallback((ns,no,nh,nv,nc,na)=>{
        if(firstLoad.current)return;
        if(timer.current)clearTimeout(timer.current);
        setSync("saving");
        timer.current=setTimeout(async()=>{
          try{
            const nv2=nv!==undefined?nv:ventes;
            const nc2=nc!==undefined?nc:chantiersPipeline;
            const na2=na!==undefined?na:acomptes;
            const{error}=await sb.from("app_data").upsert({id:"main",stock:ns,orders:no,hist:nh,ventes:nv2,chantiersPipeline:nc2,acomptes:na2,updated_at:new Date().toISOString()});
            if(error)throw error;
            setSync("saved");
          }catch(e){setSync("error");}
        },800);
      },[]);

      const SS=v=>{const n=typeof v==="function"?v(stock):v;setStock(n);saveDB(n,orders,hist,ventes,chantiersPipeline,acomptes);};
      // expose finishChantier for ChantierTab
      useEffect(()=>{
        window._appState={
          finishChantier:(ns,newHistItems,updatedChantiers)=>{
            const nh=[...newHistItems,...hist];
            setStock(ns);setHist(nh);setChantiersPipeline(updatedChantiers);
            saveDB(ns,orders,nh,ventes,updatedChantiers,acomptes);
          }
        };
      });
      const SO=v=>{const n=typeof v==="function"?v(orders):v;setOrders(n);saveDB(stock,n,hist,ventes,chantiersPipeline,acomptes);};

      const role=profile?.role||"installateur";
      const allowedTabs=ROLE_TABS[role]||["dashboard"];
      const uCats=[...new Set(stock.map(s=>s.cat))];
      const cats=["Toutes",...uCats];
      const aOIds=useMemo(()=>new Set(orders.filter(o=>o.statut==="en_cours").map(o=>o.articleId)),[orders]);
      const aOByA=useMemo(()=>{const m={};orders.filter(o=>o.statut==="en_cours").forEach(o=>{if(!m[o.articleId])m[o.articleId]=[];m[o.articleId].push(o);});return m;},[orders]);
      const fil=useMemo(()=>stock.filter(s=>fCat==="Toutes"||s.cat===fCat),[stock,fCat]);
      const alerts=stock.filter(s=>gS(s.stock,s.seuil,s.rupture,aOIds.has(s.id))==="alert");
      const ordered=stock.filter(s=>gS(s.stock,s.seuil,s.rupture,aOIds.has(s.id))==="ordered");
      const warns=stock.filter(s=>gS(s.stock,s.seuil,s.rupture,aOIds.has(s.id))==="warn");
      const rupts=stock.filter(s=>s.rupture);
      const totalCmd=alerts.reduce((a,s)=>a+(s.seuil-s.stock)*(s.prix||0),0);
      const pFil=useMemo(()=>stock.filter(s=>(pCat==="Toutes"||s.cat===pCat)&&(!pSearch||s.article.toLowerCase().includes(pSearch.toLowerCase())||s.cat.toLowerCase().includes(pSearch.toLowerCase()))),[stock,pCat,pSearch]);

      const INP=(e={})=>({background:"#0F172A",border:"1px solid #334155",borderRadius:10,color:"#E2E8F0",padding:"11px 13px",fontSize:15,width:"100%",outline:"none",boxSizing:"border-box",...e});
      const BTN=(bg="#3B82F6",e={})=>({background:bg,border:"none",borderRadius:10,color:"#FFF",padding:"11px 16px",cursor:"pointer",fontWeight:700,fontSize:13,...e});
      const BDG=cat=>{const c=CC[cat]||"#94A3B8";return{background:c+"25",color:c,padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:700,display:"inline-block",whiteSpace:"nowrap"};};
      const OVL={position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"};
      const MBX=isMobile?{background:"#1E293B",borderRadius:"20px 20px 0 0",padding:"8px 16px 32px",width:"100%",border:"1px solid #334155",maxHeight:"92vh",overflowY:"auto"}:{background:"#1E293B",borderRadius:16,padding:24,width:440,maxWidth:"95vw",border:"1px solid #334155",maxHeight:"90vh",overflowY:"auto"};
      const L=({c})=><label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:5,letterSpacing:"0.05em"}}>{c}</label>;
      const Handle=()=>isMobile?<div style={{width:36,height:4,background:"#334155",borderRadius:2,margin:"8px auto 16px"}}/>:null;

      const upd=(id,f,v)=>SS(p=>p.map(s=>s.id===id?{...s,[f]:v}:s));
      const addCI=()=>{if(!aItem.id||!aItem.qty)return;setCItems(p=>[...p.filter(i=>i.id!==aItem.id),{...aItem}]);setAItem({id:"",qty:""});};
      const subC=()=>{
        if(!cNom||cItems.length===0)return;
        const d=new Date().toLocaleDateString("fr-FR");
        const nh=[...cItems.map(i=>{const a=stock.find(s=>s.id===Number(i.id));return{date:d,chantier:cNom,article:a?.article,cat:a?.cat,unite:a?.unite,qty:Number(i.qty),par:profile?.nom||""};}), ...hist];
        const ns=stock.map(s=>{const u=cItems.find(i=>Number(i.id)===s.id);return u?{...s,stock:Math.max(0,s.stock-Number(u.qty))}:s;});
        setStock(ns);setHist(nh);saveDB(ns,orders,nh,ventes,chantiersPipeline,acomptes);setCNom("");setCItems([]);
      };
      const openO=id=>{const a=stock.find(s=>s.id===id);setOModal(id);setOForm({qty:String(a.seuil>a.stock?a.seuil-a.stock:1),desc:""});};
      const subO=()=>{
        if(!oModal||!oForm.qty)return;
        const a=stock.find(s=>s.id===oModal);
        SO(p=>[{id:Date.now(),date:new Date().toLocaleDateString("fr-FR"),articleId:oModal,article:a.article,cat:a.cat,unite:a.unite,qty:Number(oForm.qty),prix_unit:a.prix,total:Number(oForm.qty)*a.prix,description:oForm.desc,statut:"en_cours",livraison_date:null,par:profile?.nom||""},...p]);
        setOModal(null);
      };
      const markD=oid=>{
        const o=orders.find(x=>x.id===oid);if(!o)return;
        const no=orders.map(x=>x.id===oid?{...x,statut:"livré",livraison_date:new Date().toLocaleDateString("fr-FR")}:x);
        const ns=stock.map(s=>s.id===o.articleId?{...s,stock:s.stock+o.qty}:s);
        setOrders(no);setStock(ns);saveDB(ns,no,hist,ventes,chantiersPipeline,acomptes);
      };
      const saveC=()=>{
        if(!cForm.article||!cForm.cat)return;
        const p={...cForm,stock:Number(cForm.stock),seuil:Number(cForm.seuil),prix:Number(cForm.prix)};
        if(eComp===-1)SS(prev=>[...prev,{...p,id:Math.max(...prev.map(s=>s.id))+1}]);
        else SS(prev=>prev.map(s=>s.id===eComp?{...p,id:s.id}:s));
        setEComp(null);
      };
      const openOEdit=o=>{setOEditModal(o);setOEditForm({qty:String(o.qty),desc:o.description||""});};
      const saveOEdit=()=>{
        if(!oEditModal)return;
        const newQty=Math.max(1,Number(oEditForm.qty));
        SO(p=>p.map(x=>x.id===oEditModal.id?{...x,qty:newQty,total:newQty*x.prix_unit,description:oEditForm.desc}:x));
        setOEditModal(null);
      };
      const deleteOrder=oid=>{
        const o=orders.find(x=>x.id===oid);
        // If en_cours, nothing to revert in stock. Just remove.
        SO(p=>p.filter(x=>x.id!==oid));
        setODelConf(null);
      };
      const oArt=oModal?stock.find(s=>s.id===oModal):null;

      const syncCfg={loading:{c:"#64748B",t:"Connexion…",spin:true},saving:{c:"#F59E0B",t:"Sync…",spin:true},saved:{c:"#10B981",t:"✅ Sync",spin:false},error:{c:"#EF4444",t:"⚠️ Offline",spin:false}};
      const sc2=syncCfg[sync]||syncCfg.saved;

      const ALL_TABS=[
        ["accueil","🏠","Accueil"],
        ["stock","📦","Stock"],
        ["chantier","🔧","Chantier"],
        ["commandes","📦","Commandes"],
        ["ventes","💰","Ventes"],
        ["administratif","📄","Administratif"],
        ["cartes","🗺️","Cartes"],
        ["parametres","⚙️","Paramètres"],
        ["equipe","👥","Équipe"],
      ];
      const TABS=ALL_TABS.filter(([v])=>allowedTabs.includes(v));
      const rCfg=ROLES[role]||ROLES.installateur;

      if(authLoading) return <div style={{background:"#0F172A",height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><div style={{fontSize:48}}>⚡</div><div style={{color:"#64748B",fontSize:14}}>Chargement…</div></div>;
      if(!authUser) return <LoginScreen/>;
      if(!profile) return <div style={{background:"#0F172A",height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:20,textAlign:"center"}}><div style={{fontSize:48}}>⚠️</div><h2 style={{fontWeight:800}}>Accès non configuré</h2><p style={{color:"#64748B",maxWidth:360}}>Votre compte n'a pas encore de profil. Contactez votre administrateur.</p><button onClick={logout} style={BTN("#334155",{marginTop:8})}>Se déconnecter</button></div>;

      // ── Article card mobile ──
      const ArtCard=({item})=>{
        const hasO=aOIds.has(item.id);
        const st=gS(item.stock,item.seuil,item.rupture,hasO);
        const s=SC[st];
        const aCmd=item.seuil>0&&item.stock<item.seuil?item.seuil-item.stock:0;
        return(
          <div style={{background:item.rupture?"#1A0A2A":hasO&&aCmd>0?"#0A1628":"#1E293B",borderRadius:14,border:`1px solid ${item.rupture?"#A855F740":st==="alert"&&!hasO?"#EF444440":hasO&&aCmd>0?"#1D4ED860":"#334155"}`,padding:"14px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div style={{flex:1,paddingRight:8}}>
                <span style={BDG(item.cat)}>{item.cat}</span>
                <div style={{fontWeight:800,fontSize:16,color:"#F1F5F9",marginTop:5}}>{item.article}</div>
                {hasO&&<div style={{fontSize:11,color:"#3B82F6",fontWeight:600,marginTop:3}}>🚚 {aOByA[item.id]?.reduce((x,o)=>x+o.qty,0)} {item.unite} en transit</div>}
              </div>
              <span style={{background:s.bg,color:s.color,padding:"4px 9px",borderRadius:8,fontSize:10,fontWeight:700,flexShrink:0}}>{s.icon} {s.label}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
              {[["STOCK",`${item.stock}`,st==="alert"&&!hasO?"#EF4444":st==="warn"?"#F59E0B":"#E2E8F0"],["SEUIL",`${item.seuil}`,"#94A3B8"],["PRIX",fmt(item.prix),"#10B981"],["À CMD",aCmd>0?"+"+aCmd:"—",aCmd>0?(hasO?"#3B82F6":"#EF4444"):"#475569"]].map(([l,v,c])=>(
                <div key={l} style={{background:"#0F172A",borderRadius:8,padding:"8px 4px",textAlign:"center"}}>
                  <div style={{fontSize:13,fontWeight:800,color:c,lineHeight:1}}>{v}</div>
                  <div style={{fontSize:9,color:"#64748B",fontWeight:600,marginTop:3}}>{l}</div>
                </div>
              ))}
            </div>
            {eSId===item.id&&(
              <div style={{display:"flex",gap:6,marginBottom:8}}>
                <input type="number" value={eSVal} onChange={e=>setESVal(e.target.value)} style={INP({flex:1})} autoFocus/>
                <button onClick={()=>{upd(item.id,"stock",Math.max(0,Number(eSVal)));setESId(null);}} style={BTN("#10B981",{padding:"11px 18px"})}>✓</button>
                <button onClick={()=>setESId(null)} style={BTN("#334155",{padding:"11px 14px"})}>✕</button>
              </div>
            )}
            <div style={{display:"flex",gap:6}}>
              {canRupture(role)&&<button onClick={()=>upd(item.id,"rupture",!item.rupture)} style={{flex:1,background:item.rupture?"#A855F720":"#1E293B",border:`1px solid ${item.rupture?"#A855F7":"#334155"}`,borderRadius:10,color:item.rupture?"#A855F7":"#64748B",padding:"10px 4px",cursor:"pointer",fontSize:11,fontWeight:700}}>{item.rupture?"⛔":"Rupture"}</button>}
              {canEditStock(role)&&<button onClick={()=>{setESId(item.id);setESVal(String(item.stock));}} style={BTN("#334155",{flex:1,padding:"10px 4px",fontSize:12})}>✏️ Stock</button>}
              {canOrder(role)&&<button onClick={()=>openO(item.id)} style={BTN("#1D4ED8",{flex:1,padding:"10px 4px",fontSize:12})}>📦 Cmd</button>}
            </div>
          </div>
        );
      };

      return(
        <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#0F172A",minHeight:"100vh",color:"#E2E8F0",fontSize:14,paddingBottom:isMobile?72:0}}>

          {/* MODAL ÉDITION COMMANDE */}
          {oEditModal&&<div style={OVL} onClick={()=>setOEditModal(null)}><div style={MBX} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:17}}>✏️ Modifier la commande</h3>
            <div style={{background:"#0F172A",borderRadius:10,padding:"11px 14px",marginBottom:14}}>
              <span style={BDG(oEditModal.cat)}>{oEditModal.cat}</span>
              <div style={{fontWeight:800,fontSize:15,marginTop:4}}>{oEditModal.article}</div>
              <div style={{fontSize:12,color:"#64748B",marginTop:3}}>Prix unit. : <strong style={{color:"#3B82F6"}}>{fmt(oEditModal.prix_unit)}</strong> / {oEditModal.unite}</div>
            </div>
            <L c="QUANTITÉ"/>
            <input type="number" min="1" value={oEditForm.qty} onChange={e=>setOEditForm(p=>({...p,qty:e.target.value}))} style={{...INP(),marginBottom:8}}/>
            {Number(oEditForm.qty)>0&&<div style={{background:"#10B98118",border:"1px solid #10B98140",borderRadius:10,padding:"10px 14px",marginBottom:12,fontWeight:700,color:"#10B981",fontSize:15}}>💶 Nouveau total : {fmt(Number(oEditForm.qty)*oEditModal.prix_unit)}</div>}
            <L c="NOTE"/>
            <textarea value={oEditForm.desc} onChange={e=>setOEditForm(p=>({...p,desc:e.target.value}))} style={{...INP(),height:70,resize:"none",lineHeight:1.6}}/>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={()=>setOEditModal(null)} style={BTN("#334155",{flex:1})}>Annuler</button>
              <button onClick={saveOEdit} style={BTN("#3B82F6",{flex:2,padding:"13px"})}>💾 Enregistrer</button>
            </div>
          </div></div>}

          {/* MODAL SUPPRESSION COMMANDE */}
          {oDelConf&&<div style={OVL} onClick={()=>setODelConf(null)}><div style={{...MBX,maxWidth:360,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <div style={{fontSize:44,marginBottom:10}}>🗑️</div>
            <h3 style={{margin:"0 0 8px",fontWeight:800,fontSize:17}}>Supprimer cette commande ?</h3>
            <p style={{color:"#64748B",fontSize:13,margin:"0 0 6px"}}><strong style={{color:"#E2E8F0"}}>{oDelConf.article}</strong></p>
            <p style={{color:"#64748B",fontSize:12,margin:"0 0 20px"}}>{oDelConf.qty} {oDelConf.unite} · {fmt(oDelConf.total)}</p>
            {oDelConf.statut==="livré"&&<div style={{background:"#F59E0B18",border:"1px solid #F59E0B40",borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:11,color:"#F59E0B"}}>⚠️ Cette commande est déjà livrée. Le stock ne sera pas recalculé.</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setODelConf(null)} style={BTN("#334155",{flex:1})}>Annuler</button>
              <button onClick={()=>deleteOrder(oDelConf.id)} style={BTN("#EF4444",{flex:1})}>Supprimer</button>
            </div>
          </div></div>}

          {/* MODAL COMMANDE */}
          {oModal&&oArt&&<div style={OVL} onClick={()=>setOModal(null)}><div style={MBX} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:17}}>📦 Passer une commande</h3>
            <div style={{background:"#0F172A",borderRadius:12,padding:"13px 14px",marginBottom:14}}>
              <span style={BDG(oArt.cat)}>{oArt.cat}</span>
              <div style={{fontWeight:800,fontSize:16,marginTop:5}}>{oArt.article}</div>

                    })
                  }
                </div>}

              </div>
            </>}

            {/* ── STOCK ── */}
            {view==="stock"&&<>
              <div style={{display:"flex",gap:5,marginBottom:12,overflowX:"auto",paddingBottom:2,WebkitOverflowScrolling:"touch"}}>
                {cats.map(cat=><button key={cat} onClick={()=>setFCat(cat)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${fCat===cat?(CC[cat]||"#3B82F6"):"#334155"}`,background:fCat===cat?(CC[cat]||"#3B82F6")+"25":"transparent",color:fCat===cat?(CC[cat]||"#93C5FD"):"#94A3B8",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{cat}</button>)}
              </div>
              {isMobile
                ?<div>{fil.map(item=><ArtCard key={item.id} item={item}/>)}</div>
                :<div style={{background:"#1E293B",borderRadius:14,border:"1px solid #334155",overflow:"hidden"}}>
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead><tr>{["Catégorie","Article","Stock","Seuil","Prix","Statut","À cmd","Valeur","Rupture","Actions"].map((h,i)=>{
                        const TH={padding:"10px 12px",textAlign:i>=2&&i<=7?"center":"left",fontSize:10,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:"0.05em",borderBottom:"1px solid #334155",background:"#0F172A",whiteSpace:"nowrap"};
                        return <th key={h} style={TH}>{h}</th>;
                      })}</tr></thead>
                      <tbody>{fil.map((item,idx)=>{
                        const hasO=aOIds.has(item.id);
                        const st=gS(item.stock,item.seuil,item.rupture,hasO);
                        const s=SC[st];
                        const aCmd=item.seuil>0&&item.stock<item.seuil?item.seuil-item.stock:0;
                        const TD={padding:"9px 12px",borderBottom:"1px solid #1E293B44",verticalAlign:"middle"};
                        return(
                          <tr key={item.id} style={{background:item.rupture?"#1A0A2A":hasO&&aCmd>0?"#0A1628":idx%2===0?"#1E293B":"#182030"}}>
                            <td style={TD}><span style={BDG(item.cat)}>{item.cat}</span></td>
                            <td style={{...TD,fontWeight:600}}>{item.article}</td>
                            <td style={{...TD,textAlign:"center"}}>
                              {eSId===item.id&&canEditStock(role)
                                ?<input type="number" value={eSVal} onChange={e=>setESVal(e.target.value)} onBlur={()=>{upd(item.id,"stock",Math.max(0,Number(eSVal)));setESId(null);}} onKeyDown={e=>e.key==="Enter"&&(upd(item.id,"stock",Math.max(0,Number(eSVal))),setESId(null))} style={{width:55,background:"#0F172A",border:"1px solid #3B82F6",borderRadius:6,color:"#E2E8F0",textAlign:"center",padding:"3px",fontSize:13,fontWeight:700}} autoFocus/>
                                :<span onClick={()=>canEditStock(role)&&(setESId(item.id),setESVal(String(item.stock)))} style={{fontWeight:800,cursor:canEditStock(role)?"pointer":"default",color:st==="alert"&&!hasO?"#EF4444":st==="warn"?"#F59E0B":"#E2E8F0"}}>{item.stock} <span style={{fontSize:9,color:"#475569"}}>{item.unite}</span></span>
                              }
                            </td>
                            <td style={{...TD,textAlign:"center",color:"#64748B"}}>{item.seuil}</td>
                            <td style={{...TD,textAlign:"center",color:"#94A3B8",fontSize:12}}>{fmt(item.prix)}</td>
                            <td style={{...TD,textAlign:"center"}}>
                              <span style={{background:s.bg,color:s.color,padding:"3px 7px",borderRadius:7,fontSize:10,fontWeight:700}}>{s.icon} {s.label}</span>
                              {hasO&&aOByA[item.id]&&<div style={{marginTop:3}}><span style={{background:"#0F1F3D",color:"#3B82F6",padding:"1px 6px",borderRadius:5,fontSize:9,fontWeight:700}}>🚚 {aOByA[item.id].reduce((x,o)=>x+o.qty,0)} en transit</span></div>}
                            </td>
                            <td style={{...TD,textAlign:"center",fontWeight:700,color:aCmd>0?(hasO?"#3B82F6":"#EF4444"):"#334155"}}>{aCmd>0?"+"+aCmd:"—"}</td>
                            <td style={{...TD,textAlign:"center",fontSize:12,color:aCmd>0?(hasO?"#3B82F6":"#EF4444"):"#334155"}}>{aCmd>0?fmt(aCmd*item.prix):"—"}</td>
                            <td style={{...TD,textAlign:"center"}}>
                              {canRupture(role)&&<button onClick={()=>upd(item.id,"rupture",!item.rupture)} style={{background:item.rupture?"#A855F720":"transparent",border:`1px solid ${item.rupture?"#A855F7":"#334155"}`,borderRadius:6,color:item.rupture?"#A855F7":"#475569",padding:"3px 8px",cursor:"pointer",fontSize:10,fontWeight:700}}>{item.rupture?"⛔":"Signaler"}</button>}
                            </td>
                            <td style={{...TD,textAlign:"center"}}>
                              <div style={{display:"flex",gap:4,justifyContent:"center"}}>
                                {canEditStock(role)&&<button onClick={()=>{setESId(item.id);setESVal(String(item.stock));}} style={{...BTN("#334155"),padding:"4px 8px",fontSize:12}}>✏️</button>}
                                {canOrder(role)&&<button onClick={()=>openO(item.id)} style={{...BTN("#1D4ED8"),padding:"4px 8px",fontSize:12}}>📦</button>}
                              </div>
                            </td>
                          </tr>
                        );
                      })}</tbody>
                    </table>
                  </div>
                </div>
              }
            </>}

            {/* ── CHANTIER ── */}
            {view==="chantier"&&<ChantierTab
              isMobile={isMobile}
              chantiers={chantiersPipeline}
              setChantiers={SC2}
              stock={stock}
              hist={hist}
              profile={profile}
              fmt={fmt}
              role={role}
              goTo={goTo}
              BTN={BTN}
              INP={INP}
              BDG={BDG}
            />}

            {/* ── COMMANDES ── */}
            {view==="commandes"&&<>
              <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"2fr 1fr",gap:14,marginBottom:14}}>
                <div style={{background:"#1E293B",borderRadius:14,border:"1px solid #334155",padding:16}}>
                  <h2 style={{margin:"0 0 12px",fontSize:15,fontWeight:800,color:"#EF4444"}}>🔴 Articles à commander</h2>
                  {alerts.length===0?<p style={{color:"#475569",fontSize:13}}>✅ Tous commandés ou en ordre.</p>
                    :<>{alerts.map(item=>(
                      <div key={item.id} style={{background:"#0F172A",borderRadius:10,padding:"11px 13px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div><span style={BDG(item.cat)}>{item.cat}</span><div style={{fontWeight:700,fontSize:14,marginTop:4}}>{item.article}</div><div style={{fontSize:11,color:"#64748B",marginTop:2}}>{item.stock} stock · seuil {item.seuil}</div></div>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                          <span style={{fontWeight:800,color:"#EF4444",fontSize:17}}>+{item.seuil-item.stock}</span>
                          <span style={{fontSize:11,color:"#64748B"}}>{fmt((item.seuil-item.stock)*item.prix)}</span>
                          {canOrder(role)&&<button onClick={()=>openO(item.id)} style={BTN("#1D4ED8",{padding:"6px 12px",fontSize:12})}>📦 Commander</button>}
                        </div>
                      </div>
                    ))}
                    <div style={{background:"#0F172A",borderRadius:10,padding:"11px 13px",marginTop:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontWeight:700,color:"#94A3B8"}}>Total estimé</span>
                      <span style={{fontWeight:800,color:"#10B981",fontSize:17}}>{fmt(totalCmd)}</span>
                    </div></>
                  }
                </div>
                <div style={{background:"#1E293B",borderRadius:14,border:"1px solid #334155",padding:"12px 14px"}}>
                  <h2 style={{margin:"0 0 8px",fontSize:12,fontWeight:800,color:"#A855F7",textTransform:"uppercase",letterSpacing:"0.05em"}}>⛔ Ruptures centrale</h2>
                  {rupts.length===0
                    ?<p style={{color:"#475569",fontSize:11,fontStyle:"italic"}}>Aucune rupture signalée.</p>
                    :<div style={{display:"flex",flexDirection:"column",gap:4}}>
                      {rupts.map(item=>(
                        <div key={item.id} style={{background:"#1A0A2A",border:"1px solid #A855F730",borderRadius:7,padding:"6px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}><span style={BDG(item.cat)}>{item.cat}</span><span style={{fontWeight:600,fontSize:12}}>{item.article}</span></div>
                          <span style={{background:"#A855F720",color:"#A855F7",padding:"1px 7px",borderRadius:6,fontSize:9,fontWeight:700,flexShrink:0}}>⛔ RUPTURE</span>
                        </div>
                      ))}
                    </div>
                  }
                </div>
              </div>
              <div style={{background:"#1E293B",borderRadius:14,border:"1px solid #334155",overflow:"hidden"}}>
                <div style={{padding:"14px 16px",borderBottom:"1px solid #334155"}}><h2 style={{margin:0,fontSize:15,fontWeight:800}}>📋 Historique des commandes</h2></div>
                {orders.length===0?<p style={{color:"#475569",fontSize:13,textAlign:"center",padding:24}}>Aucune commande passée.</p>
                  :isMobile
                    ?<div style={{padding:"10px 12px",display:"flex",flexDirection:"column",gap:8}}>
                      {orders.map(o=>(
                        <div key={o.id} style={{background:"#0F172A",borderRadius:12,padding:"13px 14px",border:`1px solid ${o.statut==="livré"?"#10B98130":"#1D4ED840"}`}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                            <div>
                              <span style={BDG(o.cat)}>{o.cat}</span>
                              <div style={{fontWeight:700,fontSize:15,marginTop:4}}>{o.article}</div>
                              <div style={{fontSize:11,color:"#64748B",marginTop:2}}>{o.date} · {o.qty} {o.unite} · <span style={{color:"#10B981",fontWeight:700}}>{fmt(o.total)}</span></div>
                              {o.par&&<div style={{fontSize:10,color:"#475569",marginTop:1}}>Par : {o.par}</div>}
                            </div>
                            {o.statut==="livré"
                              ?<div style={{textAlign:"right",flexShrink:0,marginLeft:8}}><span style={{background:"#0A2218",color:"#10B981",padding:"3px 9px",borderRadius:8,fontSize:10,fontWeight:700}}>✅ LIVRÉ</span><div style={{fontSize:10,color:"#64748B",marginTop:3}}>{o.livraison_date}</div></div>
                              :<span style={{background:"#0F1F3D",color:"#3B82F6",padding:"3px 9px",borderRadius:8,fontSize:10,fontWeight:700,flexShrink:0,marginLeft:8}}>🚚 EN COURS</span>
                            }
                          </div>
                          <input value={o.description} onChange={e=>SO(p=>p.map(x=>x.id===o.id?{...x,description:e.target.value}:x))} placeholder="Ajouter une note…" style={{...INP(),marginBottom:o.statut!=="livré"&&canDeliver(role)?8:0,fontSize:13}}/>
                          {o.statut!=="livré"&&canDeliver(role)&&<button onClick={()=>markD(o.id)} style={BTN("#10B981",{width:"100%",padding:"11px",marginBottom:6})}>✅ Marquer comme livré</button>}
                          {canOrder(role)&&<div style={{display:"flex",gap:6}}>
                            <button onClick={()=>openOEdit(o)} style={BTN("#334155",{flex:1,padding:"8px",fontSize:12})}>✏️ Modifier</button>
                            <button onClick={()=>setODelConf(o)} style={{background:"#EF444415",border:"1px solid #EF444430",borderRadius:9,color:"#EF4444",padding:"8px 12px",cursor:"pointer",fontSize:12,fontWeight:700,flex:1}}>🗑️ Supprimer</button>
                          </div>}
                        </div>
                      ))}
                    </div>
                    :<div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse"}}>
                        <thead><tr>{["Date","Par","Article","Qté","Total","Description","Statut",""].map((h,i)=><th key={i} style={{padding:"10px 12px",textAlign:"left",fontSize:10,fontWeight:700,color:"#64748B",textTransform:"uppercase",borderBottom:"1px solid #334155",background:"#0F172A",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                        <tbody>{orders.map((o,idx)=>{
                          const TD={padding:"9px 12px",borderBottom:"1px solid #1E293B44",verticalAlign:"middle"};
                          return(
                            <tr key={o.id} style={{background:idx%2===0?"#1E293B":"#182030"}}>
                              <td style={{...TD,fontSize:11,color:"#64748B",whiteSpace:"nowrap"}}>{o.date}</td>
                              <td style={{...TD,fontSize:11,color:"#94A3B8"}}>{o.par||"—"}</td>
                              <td style={TD}><span style={BDG(o.cat)}>{o.cat}</span><span style={{marginLeft:7,fontWeight:600}}>{o.article}</span></td>
                              <td style={{...TD,fontWeight:700}}>{o.qty} {o.unite}</td>
                              <td style={{...TD,fontWeight:700,color:"#10B981"}}>{fmt(o.total)}</td>
                              <td style={{...TD,minWidth:150}}><input value={o.description} onChange={e=>SO(p=>p.map(x=>x.id===o.id?{...x,description:e.target.value}:x))} placeholder="Note…" style={{background:"transparent",border:"1px solid #334155",borderRadius:6,color:"#94A3B8",padding:"4px 8px",fontSize:12,width:"100%"}}/></td>
                              <td style={{...TD,textAlign:"center",whiteSpace:"nowrap"}}>
                                {o.statut==="livré"?<div><span style={{background:"#0A2218",color:"#10B981",padding:"2px 8px",borderRadius:7,fontSize:10,fontWeight:700}}>✅ LIVRÉ</span><div style={{fontSize:10,color:"#64748B",marginTop:2}}>{o.livraison_date}</div></div>:<span style={{background:"#0F1F3D",color:"#3B82F6",padding:"2px 8px",borderRadius:7,fontSize:10,fontWeight:700}}>🚚 EN COURS</span>}
                              </td>
                              <td style={{...TD,textAlign:"center"}}>
                                <div style={{display:"flex",gap:4,justifyContent:"center",flexWrap:"wrap"}}>
                                  {o.statut!=="livré"&&canDeliver(role)&&<button onClick={()=>markD(o.id)} style={BTN("#10B981",{padding:"4px 8px",fontSize:11})}>✅ Livré</button>}
                                  {canOrder(role)&&<button onClick={()=>openOEdit(o)} style={BTN("#334155",{padding:"4px 8px",fontSize:11})}>✏️</button>}
                                  {canOrder(role)&&<button onClick={()=>setODelConf(o)} style={{background:"#EF444415",border:"1px solid #EF444430",borderRadius:7,color:"#EF4444",padding:"4px 8px",cursor:"pointer",fontSize:11,fontWeight:700}}>🗑️</button>}
                                </div>
                              </td>
                            </tr>
                          );
                        })}</tbody>
                      </table>
                    </div>
                }
              </div>
            </>}

            {/* ── PARAMÈTRES ── */}
            {view==="parametres"&&<>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div><h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>⚙️ Paramètres</h2><p style={{margin:0,fontSize:12,color:"#64748B"}}>{stock.length} composants · {uCats.length} catégories</p></div>
                <button onClick={()=>{setEComp(-1);setCForm({...EC});}} style={BTN("#10B981",{padding:"10px 14px",fontSize:13})}>➕ Nouveau</button>
              </div>
              <input value={pSearch} onChange={e=>setPSearch(e.target.value)} placeholder="🔍 Rechercher…" style={{...INP(),marginBottom:10}}/>
              <div style={{display:"flex",gap:5,marginBottom:14,overflowX:"auto",paddingBottom:2,WebkitOverflowScrolling:"touch"}}>
                {cats.map(cat=><button key={cat} onClick={()=>setPCat(cat)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${pCat===cat?(CC[cat]||"#3B82F6"):"#334155"}`,background:pCat===cat?(CC[cat]||"#3B82F6")+"25":"transparent",color:pCat===cat?(CC[cat]||"#93C5FD"):"#94A3B8",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{cat}</button>)}
              </div>
              {uCats.filter(cat=>pCat==="Toutes"||cat===pCat).map(cat=>{
                const ci=pFil.filter(s=>s.cat===cat);
                if(ci.length===0)return null;
                const cc=CC[cat]||"#94A3B8";
                return(<div key={cat} style={{marginBottom:20}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <div style={{width:4,height:18,borderRadius:2,background:cc}}/>
                    <span style={{fontWeight:800,fontSize:14,color:cc}}>{cat}</span>
                    <span style={{fontSize:11,color:"#475569"}}>{ci.length} article{ci.length>1?"s":""}</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(280px,1fr))",gap:8}}>
                    {ci.map(item=>{
                      const hasO=aOIds.has(item.id);
                      const st=gS(item.stock,item.seuil,item.rupture,hasO);
                      const s=SC[st];
                      return(<div key={item.id} style={{background:item.rupture?"#1A0A2A":hasO&&item.stock<item.seuil?"#0A1628":"#1E293B",borderRadius:12,border:`1px solid ${item.rupture?"#A855F740":hasO&&item.stock<item.seuil?"#1D4ED840":st==="alert"?"#EF444430":"#334155"}`,padding:"13px 14px",position:"relative"}}>
                        <div style={{position:"absolute",top:12,right:12}}><span style={{background:s.bg,color:s.color,padding:"2px 8px",borderRadius:20,fontSize:9,fontWeight:700}}>{s.icon} {s.label}</span></div>
                        <div style={{fontWeight:800,fontSize:14,color:"#F1F5F9",marginBottom:4,paddingRight:80}}>{item.article}</div>
                        {hasO&&<div style={{fontSize:10,color:"#3B82F6",marginBottom:6,fontWeight:600}}>🚚 {aOByA[item.id]?.reduce((x,o)=>x+o.qty,0)} {item.unite} en transit</div>}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
                          {[["STOCK",item.stock,st==="alert"?"#EF4444":st==="warn"?"#F59E0B":"#E2E8F0"],["SEUIL",item.seuil,"#94A3B8"],["PRIX",fmt(item.prix),"#10B981"]].map(([l,v,c])=>(
                            <div key={l} style={{background:"#0F172A",borderRadius:8,padding:"7px 4px",textAlign:"center"}}>
                              <div style={{fontSize:12,fontWeight:800,color:c}}>{v}</div>
                              <div style={{fontSize:9,color:"#64748B",fontWeight:600,marginTop:1}}>{l}</div>
                            </div>
                          ))}
                        </div>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,background:"#0F172A",borderRadius:8,padding:"9px 12px"}}>
                          <span style={{fontSize:12,color:"#94A3B8",fontWeight:600}}>⛔ Rupture centrale</span>
                          <button onClick={()=>upd(item.id,"rupture",!item.rupture)} style={{background:item.rupture?"#A855F7":"#334155",border:"none",borderRadius:14,color:"#FFF",padding:"6px 14px",cursor:"pointer",fontWeight:700,fontSize:12}}>{item.rupture?"Oui ✓":"Non"}</button>
                        </div>
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={()=>{setEComp(item.id);setCForm({...item});}} style={{...BTN("#334155"),flex:1,fontSize:12,padding:"9px 0"}}>✏️ Modifier</button>
                          <button onClick={()=>openO(item.id)} style={BTN("#1D4ED8",{fontSize:12,padding:"9px 12px"})}>📦</button>
                          <button onClick={()=>setDelConf(item)} style={{background:"#EF444415",border:"1px solid #EF444430",borderRadius:8,color:"#EF4444",padding:"9px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>🗑️</button>
                        </div>
                      </div>);
                    })}
                  </div>
                </div>);
              })}
              {pFil.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:"#475569"}}><div style={{fontSize:36,marginBottom:8}}>🔍</div><div style={{fontWeight:700}}>Aucun composant trouvé</div></div>}
            </>}
          </div>

          {/* NAVIGATION BAS (mobile) */}
          {isMobile&&(
            <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#1E293B",borderTop:"1px solid #334155",display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom,8px)"}}>
              {TABS.map(([v,icon,label])=>(
                <button key={v} onClick={()=>goTo(v)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"10px 4px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <span style={{fontSize:20,lineHeight:1}}>{icon}</span>
                  <span style={{fontSize:9,fontWeight:700,color:view===v?"#3B82F6":"#64748B",lineHeight:1}}>{label}</span>
                  {view===v&&<div style={{width:22,height:2,background:"#3B82F6",borderRadius:1,marginTop:2}}/>}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
