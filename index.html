      const[selectedPoint,setSelectedPoint]=useState(null);
      const[lightbox,setLightbox]=useState(null);
      const[filter,setFilter]=useState("tous");
      const[addModal,setAddModal]=useState(false);
      const[addForm,setAddForm]=useState({client:"",adresse:"",date:new Date().toLocaleDateString("fr-FR"),technicien:"",description:"",montant:"",photos:[]});
      const[addPhotoPreviews,setAddPhotoPreviews]=useState([]);
      const[addLoading,setAddLoading]=useState(false);
      const[addErr,setAddErr]=useState("");
      // Recherche village sur carte
      const[villageSearch,setVillageSearch]=useState("");
      const[villageLoading,setVillageLoading]=useState(false);
      // Pin manuel : vente sans coordonnées
      const[pinMode,setPinMode]=useState(false); // true = clic sur carte pour placer
      const[pinVente,setPinVente]=useState(null); // vente à géolocaliser manuellement
      const[pinModalOpen,setPinModalOpen]=useState(false); // choix de la vente à pinner
      // Autocomplete adresse dans le modal addModal
      const[addAddrSugg,setAddAddrSugg]=useState([]);
      const addAddrTimer=useRef(null);

      const INP=(e={})=>({background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,color:"#E8F0FF",padding:"11px 13px",fontSize:14,width:"100%",outline:"none",boxSizing:"border-box",fontFamily:'"Outfit",sans-serif',...e});
      const BTN=(bg,e={})=>({background:bg,border:"none",borderRadius:10,color:"#FFF",padding:"10px 14px",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:'"Outfit",sans-serif',...e});

      const handleAddPhotos=e=>{
        const files=Array.from(e.target.files);
        files.forEach(file=>{
          const reader=new FileReader();
          reader.onload=ev=>{
            setAddForm(p=>({...p,photos:[...(p.photos||[]),ev.target.result]}));
            setAddPhotoPreviews(p=>[...p,ev.target.result]);
          };
          reader.readAsDataURL(file);
        });
        e.target.value="";
      };

      const saveManualChantier=async()=>{
        if(!addForm.client||!addForm.adresse){setAddErr("Client et adresse requis");return;}
        setAddLoading(true);setAddErr("");
        try{
          const q=encodeURIComponent(addForm.adresse);
          const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=1`,{headers:{"Accept-Language":"fr"}});
          const data=await res.json();
          const coords=data.length>0?{lat:parseFloat(data[0].lat),lng:parseFloat(data[0].lon)}:null;
          if(!coords){setAddErr("Adresse introuvable — vérifiez l'adresse saisie");setAddLoading(false);return;}
          const entry={
            id:Date.now(),
            client:addForm.client,
            adresse:addForm.adresse,
            date:addForm.date,
            technicien:addForm.technicien,
            description:addForm.description,
            prix_ht:Number(addForm.montant)||0,
            coords,
            materiels:[],cables:[],
            par:"",
            photos:addForm.photos||[],
            _historique:true,
          };
          setVentes(p=>[entry,...p]);
          setAddModal(false);
          setAddPhotoPreviews([]);
          setAddForm({client:"",adresse:"",date:new Date().toLocaleDateString("fr-FR"),technicien:"",description:"",montant:"",photos:[]});
        }catch(e){setAddErr("Erreur de géocodage : "+e.message);}
        setAddLoading(false);
      };

      // Points : ventes avec coords + chantiers terminés liés
      const points = useMemo(()=>{
        return ventes
          .filter(v=>v.coords)
          .map(v=>{
            // find linked chantier
            const ch=chantiers.find(c=>c.vente_id===v.id);
            const photos=ch?.photos||[];
            return {
              id:v.id, client:v.client, adresse:v.adresse, coords:v.coords,
              date:v.date, montant:v.prix_ht, par:v.par||"",
              description:v.description||"",
              statut_chantier:ch?.statut||null,
              technicien:ch?.technicien||"",
              photos,
              materiels:v.materiels||[],
            };
          });
      },[ventes,chantiers]);

      const filtered = filter==="avec_photos"?points.filter(p=>p.photos.length>0):points;
      const sansCoords = ventes.filter(v=>v.adresse&&!v.coords).length;

      // Init Leaflet map
      useEffect(()=>{
        if(!mapRef.current||mapInstanceRef.current)return;
        // Centre Grand Est
        const map=L.map(mapRef.current,{zoomControl:true}).setView([48.5,6.5],7);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
          attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',
          maxZoom:19
        }).addTo(map);
        mapInstanceRef.current=map;
        return()=>{map.remove();mapInstanceRef.current=null;};
      },[]);

      // Village search → fly to
      const searchVillage=async()=>{
        if(!villageSearch.trim())return;
        setVillageLoading(true);
        try{
          const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(villageSearch)}&limit=1&countrycodes=fr`,{headers:{"Accept-Language":"fr"}});
          const d=await r.json();
          if(d[0]&&mapInstanceRef.current){
            mapInstanceRef.current.flyTo([parseFloat(d[0].lat),parseFloat(d[0].lon)],13,{duration:1});
          }
        }catch(e){}
        setVillageLoading(false);
      };

      // Pin mode: on click on map, place coords on selected vente
      useEffect(()=>{
        const map=mapInstanceRef.current;
        if(!map)return;
        if(!pinMode||!pinVente){
          map.getContainer().style.cursor="";
          return;
        }
        map.getContainer().style.cursor="crosshair";
        const onClick=e=>{
          const{lat,lng}=e.latlng;
          // Reverse geocode to get address
          fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`,{headers:{"Accept-Language":"fr"}})
            .then(r=>r.json())
            .then(d=>{
              const adresse=d.display_name||`${lat.toFixed(5)}, ${lng.toFixed(5)}`;
              setVentes(p=>p.map(v=>v.id===pinVente.id?{...v,coords:{lat,lng},adresse:v.adresse||adresse}:v));
              setPinMode(false);
              setPinVente(null);
              map.getContainer().style.cursor="";
            })
            .catch(()=>{
              setVentes(p=>p.map(v=>v.id===pinVente.id?{...v,coords:{lat,lng}}:v));
              setPinMode(false);
              setPinVente(null);
              map.getContainer().style.cursor="";
            });
        };
        map.on("click",onClick);
        return()=>map.off("click",onClick);
      },[pinMode,pinVente]);

      // Autocomplete adresse addForm
      const onAddAddrChange=v=>{
        setAddForm(p=>({...p,adresse:v}));
        clearTimeout(addAddrTimer.current);
        if(v.length<3){setAddAddrSugg([]);return;}
        addAddrTimer.current=setTimeout(async()=>{
          try{
            const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(v)}&limit=5&countrycodes=fr`,{headers:{"Accept-Language":"fr"}});
            const d=await r.json();
            setAddAddrSugg(d.map(x=>x.display_name));
          }catch(e){}
        },400);
      };
      useEffect(()=>{
        const map=mapInstanceRef.current;
        if(!map)return;

        // Clear old markers
        markersRef.current.forEach(m=>m.remove());
        markersRef.current=[];

        filtered.forEach(pt=>{
          const hasPhotos=pt.photos.length>0;
          const STATUT_COLORS={a_planifier:"#F59E0B",planifie:"#3B82F6",en_cours:"#A855F7",termine:"#10B981"};
          const color=pt.statut_chantier?STATUT_COLORS[pt.statut_chantier]||"#10B981":"#3B82F6";

          const icon=L.divIcon({
            className:"",
            html:`<div style="
              width:${hasPhotos?38:32}px;height:${hasPhotos?38:32}px;
              background:${color};
              border:3px solid white;
              border-radius:50%;
              display:flex;align-items:center;justify-content:center;
              font-size:${hasPhotos?16:13}px;
              box-shadow:0 2px 8px #0006;
              cursor:pointer;
            ">${hasPhotos?"📸":"⚡"}</div>`,
            iconSize:[hasPhotos?38:32,hasPhotos?38:32],
            iconAnchor:[hasPhotos?19:16,hasPhotos?19:16],
          });

          const marker=L.marker([pt.coords.lat,pt.coords.lng],{icon}).addTo(map);
          marker.on("click",()=>{
            setSelectedPoint(pt);
          });
          markersRef.current.push(marker);
        });

        // Fit bounds if points exist
        if(filtered.length>0){
          const bounds=L.latLngBounds(filtered.map(p=>[p.coords.lat,p.coords.lng]));
          map.fitBounds(bounds,{padding:[40,40],maxZoom:12});
        }
      },[filtered]);

      const STATUT_CH={
        a_planifier:{label:"À planifier",color:"#F59E0B"},
        planifie:{label:"Planifié",color:"#3B82F6"},
        en_cours:{label:"En cours",color:"#A855F7"},
        termine:{label:"Terminé",color:"#10B981"},
      };

      return(
        <div>
          {/* MODAL AJOUT CHANTIER HISTORIQUE */}
          {addModal&&<div style={{position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"}} onClick={()=>setAddModal(false)}>
            <div style={{background:"#0D1828",borderRadius:isMobile?"20px 20px 0 0":16,padding:"24px",width:isMobile?"100%":"100%",maxWidth:480,border:"1px solid #1B2D4F",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
              {isMobile&&<div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"0 auto 16px"}}/>}
              <h3 style={{margin:"0 0 18px",fontWeight:800,fontSize:17,color:"#F0F6FF"}}>📍 Ajouter un chantier historique</h3>

              <div style={{marginBottom:12}}>
                <label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>CLIENT *</label>
                <input value={addForm.client} onChange={e=>setAddForm(p=>({...p,client:e.target.value}))} placeholder="Nom du client" style={INP()}/>
              </div>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>ADRESSE D'INSTALLATION *</label>
                <div style={{position:"relative"}}>
                  <input value={addForm.adresse} onChange={e=>onAddAddrChange(e.target.value)} placeholder="12 rue des Lilas, 67000 Strasbourg" style={INP()}/>
                  {addAddrSugg.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"#0D1828",border:"1px solid #1B2D4F",borderRadius:"0 0 10px 10px",zIndex:100,boxShadow:"0 8px 24px #0008"}}>
                    {addAddrSugg.map((s,i)=>(
                      <div key={i} onClick={()=>{setAddForm(p=>({...p,adresse:s}));setAddAddrSugg([]);}}
                        style={{padding:"9px 13px",fontSize:12,color:"#C8D8F0",cursor:"pointer",borderBottom:i<addAddrSugg.length-1?"1px solid #1B2D4F":"none"}}
                        onMouseOver={e=>e.currentTarget.style.background="#1B2D4F"}
                        onMouseOut={e=>e.currentTarget.style.background="transparent"}>
                        📍 {s}
                      </div>
                    ))}
                  </div>}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <div>
                  <label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>DATE</label>
                  <input value={addForm.date} onChange={e=>setAddForm(p=>({...p,date:e.target.value}))} placeholder="JJ/MM/AAAA" style={INP()}/>
                </div>
                <div>
                  <label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>MONTANT HT (€)</label>
                  <input type="number" value={addForm.montant} onChange={e=>setAddForm(p=>({...p,montant:e.target.value}))} placeholder="0" style={INP()}/>
                </div>
              </div>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>TECHNICIEN</label>
                <select value={addForm.technicien} onChange={e=>setAddForm(p=>({...p,technicien:e.target.value}))} style={{...INP(),appearance:"none"}}>
                  <option value="">— Choisir un installateur —</option>
                  {[...new Set([...((allProfiles||[]).filter(p=>p.role==="installateur"||p.role==="administrateur").map(p=>p.nom)),...chantiers.map(c=>c.technicien)].filter(Boolean))].sort().map(n=><option key={n} value={n}>{n}</option>)}
                </select>
              </div>
              <div style={{marginBottom:16}}>
                <label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>DESCRIPTION</label>
                <textarea value={addForm.description} onChange={e=>setAddForm(p=>({...p,description:e.target.value}))} placeholder="Type de borne, observations…" style={{...INP(),height:70,resize:"none",lineHeight:1.5}}/>
              </div>

              <div style={{marginBottom:16}}>
                <label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>PHOTOS DU CHANTIER</label>
                <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"#070D1A",border:"2px dashed #1B2D4F",borderRadius:10,padding:"14px",cursor:"pointer",color:"#4A6A9E",fontSize:13,fontWeight:600,transition:"border-color 0.2s"}}
                  onMouseOver={e=>e.currentTarget.style.borderColor="#3B82F6"}
                  onMouseOut={e=>e.currentTarget.style.borderColor="#1B2D4F"}>
                  <span style={{fontSize:20}}>📸</span> Ajouter des photos
                  <input type="file" accept="image/*" multiple onChange={handleAddPhotos} style={{display:"none"}}/>
                </label>
                {addPhotoPreviews.length>0&&(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginTop:8}}>
                    {addPhotoPreviews.map((url,i)=>(
                      <div key={i} style={{position:"relative",borderRadius:8,overflow:"hidden",aspectRatio:"1"}}>
                        <img src={url} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                        <button onClick={()=>{
                          setAddPhotoPreviews(p=>p.filter((_,j)=>j!==i));
                          setAddForm(p=>({...p,photos:(p.photos||[]).filter((_,j)=>j!==i)}));
                        }} style={{position:"absolute",top:3,right:3,background:"rgba(0,0,0,0.7)",border:"none",borderRadius:"50%",color:"white",width:20,height:20,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:'"Outfit",sans-serif'}}>✕</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {addErr&&<div style={{background:"#EF444415",border:"1px solid #EF444440",borderRadius:8,padding:"9px 12px",fontSize:12,color:"#EF4444",fontWeight:600,marginBottom:12}}>⚠️ {addErr}</div>}
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setAddModal(false);setAddPhotoPreviews([]);setAddForm({client:"",adresse:"",date:new Date().toLocaleDateString("fr-FR"),technicien:"",description:"",montant:"",photos:[]});}} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
                <button onClick={saveManualChantier} disabled={addLoading||!addForm.client||!addForm.adresse}
                  style={BTN(addLoading||!addForm.client||!addForm.adresse?"#0D1828":"linear-gradient(135deg,#10B981,#059669)",{flex:2,padding:"12px",opacity:addLoading?0.7:1})}>
                  {addLoading?"⏳ Géocodage en cours…":"📍 Ajouter sur la carte"}
                </button>
              </div>
            </div>
          </div>}

          {/* MODAL SÉLECTION VENTE À PINNER */}
          {pinModalOpen&&<div style={{position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"}} onClick={()=>setPinModalOpen(false)}>
            <div style={{background:"#0D1828",borderRadius:isMobile?"20px 20px 0 0":16,padding:"20px",width:isMobile?"100%":"100%",maxWidth:420,border:"1px solid #1B2D4F",maxHeight:"80vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
              {isMobile&&<div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"0 auto 14px"}}/>}
              <h3 style={{margin:"0 0 6px",fontWeight:800,fontSize:15,color:"#F0F6FF"}}>📍 Placer une vente sur la carte</h3>
              <p style={{margin:"0 0 14px",fontSize:12,color:"#4A6A9E"}}>Sélectionnez la vente à géolocaliser, puis cliquez sur la carte.</p>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {ventes.filter(v=>v.adresse&&!v.coords).map(v=>(
                  <button key={v.id} onClick={()=>{setPinVente(v);setPinMode(true);setPinModalOpen(false);}}
                    style={{background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"left",display:"flex",flexDirection:"column",gap:3,fontFamily:'"Outfit",sans-serif'}}>
                    <span style={{fontWeight:700,fontSize:13,color:"#E8F0FF"}}>{v.client}</span>
                    <span style={{fontSize:11,color:"#4A6A9E"}}>📍 {v.adresse}</span>
                  </button>
                ))}
                {ventes.filter(v=>!v.coords&&!v.adresse).map(v=>(
                  <button key={v.id} onClick={()=>{setPinVente(v);setPinMode(true);setPinModalOpen(false);}}
                    style={{background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"left",display:"flex",flexDirection:"column",gap:3,fontFamily:'"Outfit",sans-serif'}}>
                    <span style={{fontWeight:700,fontSize:13,color:"#E8F0FF"}}>{v.client}</span>
                    <span style={{fontSize:11,color:"#2E4D82"}}>Pas d'adresse enregistrée</span>
                  </button>
                ))}
              </div>
              <button onClick={()=>setPinModalOpen(false)} style={{width:"100%",background:"#1B2D4F",border:"none",borderRadius:8,color:"#7B96C8",padding:"10px",cursor:"pointer",fontWeight:700,fontSize:13,marginTop:14,fontFamily:'"Outfit",sans-serif'}}>Annuler</button>
            </div>
          </div>}

          {/* LIGHTBOX */}
          {lightbox&&<div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"#000000EE",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}}>
            <img src={lightbox} style={{maxWidth:"95vw",maxHeight:"92vh",borderRadius:12,objectFit:"contain"}}/>
            <button onClick={()=>setLightbox(null)} style={{position:"fixed",top:16,right:20,background:"#0D1828",border:"1px solid #1B2D4F",borderRadius:8,color:"#E8F0FF",padding:"8px 14px",cursor:"pointer",fontSize:16,fontWeight:700,zIndex:3001}}>✕</button>
          </div>}

          {/* HEADER */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>🗺️ Carte des chantiers</h2>
              <p style={{margin:0,fontSize:12,color:"#4A6A9E"}}>{points.length} chantier(s) géolocalisé(s) sur {ventes.length} vente(s)</p>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              {role==="administrateur"&&(
                <button onClick={()=>setAddModal(true)} style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{padding:"8px 14px",fontSize:12,display:"flex",alignItems:"center",gap:5})}>
                  ➕ Ajout chantier manuel
                </button>
              )}
              {[["tous","Tous","#7B96C8"],["avec_photos","📸 Avec photos","#3B82F6"]].map(([k,l,col])=>(
                <button key={k} onClick={()=>setFilter(k)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${filter===k?col:"#1B2D4F"}`,background:filter===k?col+"25":"transparent",color:filter===k?col:"#4A6A9E",fontSize:12,fontWeight:700,cursor:"pointer"}}>{l}</button>
              ))}
            </div>
          </div>

          {/* Alerte adresses non géocodées */}
          {sansCoords>0&&<div style={{background:"#F59E0B15",border:"1px solid #F59E0B40",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#F59E0B",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:16}}>⚠️</span>
            <span style={{flex:1}}><strong>{sansCoords} vente(s)</strong> ont une adresse non encore géocodée.</span>
            <button onClick={()=>setPinModalOpen(true)} style={{background:"#F59E0B20",border:"1px solid #F59E0B60",borderRadius:8,color:"#F59E0B",padding:"5px 12px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>📍 Placer manuellement</button>
          </div>}

          {/* Barre recherche village */}
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <div style={{flex:1,position:"relative"}}>
              <input value={villageSearch} onChange={e=>setVillageSearch(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&searchVillage()}
                placeholder="🔍 Rechercher un village, une ville…"
                style={{...INP(),padding:"10px 14px",fontSize:13,width:"100%",boxSizing:"border-box"}}/>
            </div>
            <button onClick={searchVillage} disabled={villageLoading}
              style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{padding:"10px 16px",fontSize:13,opacity:villageLoading?0.7:1,flexShrink:0})}>
              {villageLoading?"…":"🔍"}
            </button>
          </div>

          {/* Banner mode pin actif */}
          {pinMode&&pinVente&&<div style={{background:"#3B82F615",border:"2px solid #3B82F6",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#60A5FA",display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:16}}>📍</span>
            <span style={{flex:1}}>Cliquez sur la carte pour placer <strong>{pinVente.client}</strong></span>
            <button onClick={()=>{setPinMode(false);setPinVente(null);}} style={{background:"transparent",border:"1px solid #3B82F6",borderRadius:6,color:"#60A5FA",padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>Annuler</button>
          </div>}

          {/* LÉGENDE */}
          <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
            {Object.entries(STATUT_CH).map(([k,s])=>(
              <div key={k} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#7B96C8"}}>
                <div style={{width:12,height:12,borderRadius:"50%",background:s.color,border:"2px solid white",boxShadow:"0 1px 3px #0004"}}/>
                {s.label}
              </div>
            ))}
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#7B96C8"}}>
              <span style={{fontSize:14}}>📸</span> Avec photos
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#7B96C8"}}>
              <span style={{fontSize:14}}>⚡</span> Sans photos
            </div>
          </div>

          {/* LAYOUT : carte + panneau latéral */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":selectedPoint?"1fr 360px":"1fr",gap:14,alignItems:"start"}}>

            {/* CARTE */}
            <div style={{borderRadius:14,overflow:"hidden",border:"1px solid #1B2D4F",position:"relative"}}>
              <div ref={mapRef} style={{height:isMobile?"65vh":"72vh",width:"100%"}}/>
              {filtered.length===0&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
                <div style={{background:"#0D1828",borderRadius:12,padding:"20px 28px",textAlign:"center",border:"1px solid #1B2D4F"}}>
                  <div style={{fontSize:40,marginBottom:8}}>📍</div>
                  <div style={{fontWeight:800,color:"#F0F6FF",marginBottom:4}}>Aucun point à afficher</div>
                  <div style={{fontSize:12,color:"#4A6A9E"}}>Ajoutez des adresses à vos ventes</div>
                </div>
              </div>}
            </div>

            {/* PANNEAU DÉTAIL */}
            {selectedPoint&&<div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"16px",maxHeight:isMobile?"auto":"72vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div>
                  <div style={{fontWeight:800,fontSize:16,color:"#F0F6FF",marginBottom:3}}>{selectedPoint.client}</div>
                  {selectedPoint.statut_chantier&&<span style={{background:STATUT_CH[selectedPoint.statut_chantier]?.color+"20",color:STATUT_CH[selectedPoint.statut_chantier]?.color,padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700}}>{STATUT_CH[selectedPoint.statut_chantier]?.label}</span>}
                </div>
                <button onClick={()=>setSelectedPoint(null)} style={{background:"#1B2D4F",border:"none",borderRadius:7,color:"#7B96C8",width:28,height:28,cursor:"pointer",fontSize:14,fontWeight:700,flexShrink:0}}>✕</button>
              </div>

              <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:14}}>
                {selectedPoint.adresse&&<div style={{fontSize:12,color:"#4A6A9E"}}>📍 {selectedPoint.adresse}</div>}
                <div style={{fontSize:12,color:"#4A6A9E"}}>📅 {selectedPoint.date}</div>
                {selectedPoint.par&&<div style={{fontSize:12,color:"#4A6A9E"}}>👤 {selectedPoint.par}</div>}
                {selectedPoint.technicien&&<div style={{fontSize:12,color:"#4A6A9E"}}>🔧 {selectedPoint.technicien}</div>}
                <div style={{fontSize:15,fontWeight:800,color:"#10B981"}}>💶 {fmt(selectedPoint.montant)}</div>
              </div>

              {selectedPoint.materiels.length>0&&<div style={{marginBottom:14}}>
                <div style={{fontSize:10,fontWeight:700,color:"#4A6A9E",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Matériel installé</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {selectedPoint.materiels.map((m,i)=><span key={i} style={{background:"#070D1A",borderRadius:6,padding:"3px 8px",fontSize:11,color:"#7B96C8"}}>{m.qty}× {m.article}</span>)}
                </div>
              </div>}

              {selectedPoint.description&&<div style={{fontSize:12,color:"#4A6A9E",fontStyle:"italic",marginBottom:14,padding:"8px 10px",background:"#070D1A",borderRadius:8}}>"{selectedPoint.description}"</div>}

              {/* Photos */}
              <div style={{marginBottom:4}}>
                <div style={{fontSize:10,fontWeight:700,color:"#4A6A9E",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>
                  📸 Photos {selectedPoint.photos.length>0?`(${selectedPoint.photos.length})`:""}
                </div>
                {selectedPoint.photos.length===0
                  ?<div style={{textAlign:"center",padding:"20px 0",color:"#2E4D82",background:"#070D1A",borderRadius:10,fontSize:12}}>Aucune photo pour ce chantier</div>
                  :<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                    {selectedPoint.photos.map((url,i)=>(
                      <div key={i} style={{borderRadius:8,overflow:"hidden",aspectRatio:"1"}}>
                        <img src={url} onClick={()=>setLightbox(url)} style={{width:"100%",height:"100%",objectFit:"cover",cursor:"zoom-in",display:"block"}}/>
                      </div>
                    ))}
                  </div>
                }
              </div>
            </div>}
          </div>

          {/* Liste des ventes sans coords */}
          {ventes.filter(v=>!v.coords&&!v.adresse).length>0&&<div style={{marginTop:14,background:"#0D1828",borderRadius:12,border:"1px solid #1B2D4F",padding:"12px 14px"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#4A6A9E",marginBottom:8}}>Ventes sans adresse ({ventes.filter(v=>!v.coords&&!v.adresse).length})</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {ventes.filter(v=>!v.coords&&!v.adresse).map(v=>(
                <span key={v.id} style={{background:"#070D1A",borderRadius:7,padding:"4px 10px",fontSize:11,color:"#4A6A9E"}}>{v.client}</span>
              ))}
            </div>
          </div>}
        </div>
      );
    }

    // ══════════════════════════════════════
    // ONGLET ADMINISTRATIF — Acomptes
    // ══════════════════════════════════════
    function AdminTab({isMobile, acomptes, setAcomptes, ventes, profile, fmt, role, acompteDefPct=50, saveAcomptePct}) {
      const canEdit = r => ["administrateur","secretaire"].includes(r);

      const STATUTS = {
        a_envoyer:  {label:"À envoyer",   color:"#F59E0B", bg:"#2D2008", icon:"📤"},
        envoye:     {label:"Envoyé",      color:"#3B82F6", bg:"#0F1F3D", icon:"📨"},
        paye:       {label:"Payé",        color:"#10B981", bg:"#0A2218", icon:"✅"},
        annule:     {label:"Annulé",      color:"#EF4444", bg:"#3B1212", icon:"❌"},
      };

      const[filter,setFilter]=useState("tous");
      const[search,setSearch]=useState("");
      const[editModal,setEditModal]=useState(null);
      const[delConf,setDelConf]=useState(null);
      const[newModal,setNewModal]=useState(false);
      const[payAcompteModal,setPayAcompteModal]=useState(null); // acompte id
      const MODES_PAY=["Virement","Carte","Chèque","Espèces","Financement"];
      const[editPct,setEditPct]=useState("");
      const[newPct,setNewPct]=useState("");
      const[newForm,setNewForm]=useState({client:"",montant_vente:"",montant_acompte:"",date_creation:new Date().toLocaleDateString("fr-FR"),statut:"a_envoyer",notes:"",par:profile?.nom||""});

      const INP=(e={})=>({background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,color:"#E8F0FF",padding:"10px 12px",fontSize:14,width:"100%",outline:"none",boxSizing:"border-box",...e});
      const BTN=(bg,e={})=>({background:bg,border:"none",borderRadius:10,color:"#FFF",padding:"10px 14px",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:'"Outfit",sans-serif',transition:"all 0.15s",...e});
      const L=({c})=><label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,letterSpacing:"0.08em",textTransform:"uppercase"}}>{c}</label>;
      const OVL={position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"};
      const MBX=isMobile?{background:"#0D1828",borderRadius:"20px 20px 0 0",padding:"8px 16px 32px",width:"100%",border:"1px solid #1B2D4F",maxHeight:"92vh",overflowY:"auto"}:{background:"#0D1828",borderRadius:16,padding:24,width:500,maxWidth:"96vw",border:"1px solid #1B2D4F",maxHeight:"90vh",overflowY:"auto"};
      const Handle=()=>isMobile?<div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"8px auto 16px"}}/>:null;

      const totalAcomptes = acomptes.reduce((s,a)=>s+Number(a.montant_acompte||0),0);
      const totalPaye     = acomptes.filter(a=>a.statut==="paye").reduce((s,a)=>s+Number(a.montant_acompte||0),0);
      const totalEnAttente= acomptes.filter(a=>["a_envoyer","envoye"].includes(a.statut)).reduce((s,a)=>s+Number(a.montant_acompte||0),0);

      const filtered = acomptes.filter(a=>{
        if(filter!=="tous"&&a.statut!==filter) return false;
        if(search&&!(a.client||"").toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      });

      const updateAcompte=(id,patch)=>setAcomptes(p=>p.map(a=>a.id===id?{...a,...patch}:a));

      return (
        <div>
          {/* MODAL ÉDITION */}
          {editModal&&<div style={OVL} onClick={()=>setEditModal(null)}><div style={MBX} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{margin:0,fontWeight:800,fontSize:17}}>✏️ Modifier l'acompte</h3>
              {editModal.vente_id&&<span style={{fontSize:10,color:"#4A6A9E",background:"#070D1A",padding:"3px 8px",borderRadius:6}}>🔗 Depuis vente</span>}
            </div>

            <div style={{marginBottom:12}}><L c="CLIENT"/><input value={editModal.client} onChange={e=>setEditModal(p=>({...p,client:e.target.value}))} style={INP()}/></div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div><L c="MONTANT VENTE HT (€)"/>
                <input type="number" value={editModal.montant_vente||""} onChange={e=>{const mv=Number(e.target.value);setEditModal(p=>({...p,montant_vente:mv,montant_acompte:Math.round(mv*(acompteDefPct/100)*100)/100}));}} style={INP()}/>
              </div>
              <div><L c="ACOMPTE (€)"/>
                <input type="number" value={editModal.montant_acompte||""} onChange={e=>setEditModal(p=>({...p,montant_acompte:Number(e.target.value)}))} style={INP()}/>
              </div>
            </div>
            {editModal.montant_vente>0&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <span style={{fontSize:12,color:"#4A6A9E",minWidth:60}}>ou en %</span>
              <input type="number" min="0" max="100"
                value={editPct}
                onFocus={()=>setEditPct(editModal.montant_vente>0?String(Math.round((editModal.montant_acompte/editModal.montant_vente)*100)):"")}
                onChange={e=>{setEditPct(e.target.value);const pct=Number(e.target.value);if(e.target.value!==""&&!isNaN(pct))setEditModal(p=>({...p,montant_acompte:Math.round(p.montant_vente*(pct/100)*100)/100}));}}
                onBlur={()=>setEditPct(editModal.montant_vente>0?String(Math.round((editModal.montant_acompte/editModal.montant_vente)*100)):"")}
                style={{...INP(),width:70,textAlign:"center"}}/>
              <span style={{fontSize:13,color:"#F0F6FF",fontWeight:700}}>%</span>
              <span style={{fontSize:11,color:"#3B82F6",marginLeft:4}}>= {editModal.montant_acompte>0?Number(editModal.montant_acompte).toLocaleString("fr-FR",{minimumFractionDigits:2}):"0,00"} €</span>
            </div>}

            <div style={{marginBottom:12}}>
              <L c="STATUT"/>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {Object.entries(STATUTS).map(([k,s])=>(
                  <button key={k} onClick={()=>setEditModal(p=>({...p,statut:k}))} style={{padding:"6px 12px",borderRadius:20,border:`2px solid ${editModal.statut===k?s.color:"#1B2D4F"}`,background:editModal.statut===k?s.bg:"transparent",color:editModal.statut===k?s.color:"#4A6A9E",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                    {s.icon} {s.label}
                  </button>
                ))}
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div><L c="DATE ENVOI"/><input value={editModal.date_envoi||""} onChange={e=>setEditModal(p=>({...p,date_envoi:e.target.value}))} placeholder="JJ/MM/AAAA" style={INP()}/></div>
              <div><L c="DATE PAIEMENT"/><input value={editModal.date_paiement||""} onChange={e=>setEditModal(p=>({...p,date_paiement:e.target.value}))} placeholder="JJ/MM/AAAA" style={INP()}/></div>
            </div>

            <div style={{marginBottom:16}}><L c="NOTES"/><textarea value={editModal.notes||""} onChange={e=>setEditModal(p=>({...p,notes:e.target.value}))} placeholder="Informations complémentaires…" style={{...INP(),height:70,resize:"none"}}/></div>

            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setEditModal(null)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={()=>{updateAcompte(editModal.id,editModal);setEditModal(null);}} style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{flex:2,padding:"12px"})}>💾 Enregistrer</button>
            </div>
          </div></div>}

          {/* MODAL PAIEMENT ACOMPTE */}
          {payAcompteModal&&(()=>{
            const pa=acomptes.find(a=>a.id===payAcompteModal);
            return pa?(
              <div style={OVL} onClick={()=>setPayAcompteModal(null)}><div style={{...MBX,maxWidth:380}} onClick={e=>e.stopPropagation()}>
                <Handle/>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
                  <div style={{width:40,height:40,borderRadius:12,background:"#10B98115",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>💳</div>
                  <div>
                    <div style={{fontWeight:800,fontSize:15,color:"#F0F6FF"}}>Mode de paiement</div>
                    <div style={{fontSize:11,color:"#4A6A9E",marginTop:2}}>{pa.client} — {fmt(pa.montant_acompte)}</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  {MODES_PAY.map(m=>(
                    <button key={m} onClick={()=>{
                      updateAcompte(payAcompteModal,{statut:"paye",mode_paiement:m,date_paiement:new Date().toLocaleDateString("fr-FR")});
                      setPayAcompteModal(null);
                    }} style={{background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,color:"#E8F0FF",padding:"12px",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:'"Outfit",sans-serif',textAlign:"center"}}
                      onMouseOver={e=>{e.currentTarget.style.borderColor="#10B981";e.currentTarget.style.background="#10B98110";}}
                      onMouseOut={e=>{e.currentTarget.style.borderColor="#1B2D4F";e.currentTarget.style.background="#070D1A";}}>
                      {m==="Virement"?"🏦":m==="Carte"?"💳":m==="Chèque"?"📝":m==="Espèces"?"💵":"🏛️"} {m}
                    </button>
                  ))}
                </div>
                <button onClick={()=>setPayAcompteModal(null)} style={{width:"100%",background:"transparent",border:"1px solid #1B2D4F",borderRadius:10,color:"#4A6A9E",padding:"10px",cursor:"pointer",fontSize:13,fontWeight:600,marginTop:4,fontFamily:'"Outfit",sans-serif'}}>Annuler</button>
              </div></div>
            ):null;
          })()}

          {/* MODAL NOUVEL ACOMPTE MANUEL */}
          {newModal&&<div style={OVL} onClick={()=>setNewModal(false)}><div style={MBX} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <h3 style={{margin:"0 0 16px",fontWeight:800,fontSize:17}}>📄 Nouvel acompte</h3>

            <div style={{marginBottom:12}}><L c="CLIENT"/><input value={newForm.client} onChange={e=>setNewForm(p=>({...p,client:e.target.value}))} placeholder="Nom du client" style={INP()}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div><L c="MONTANT VENTE HT (€)"/><input type="number" value={newForm.montant_vente} onChange={e=>{const mv=Number(e.target.value);setNewForm(p=>({...p,montant_vente:mv,montant_acompte:Math.round(mv*(acompteDefPct/100)*100)/100}));}} style={INP()}/></div>
              <div><L c="ACOMPTE (€)"/><input type="number" value={newForm.montant_acompte} onChange={e=>setNewForm(p=>({...p,montant_acompte:Number(e.target.value)}))} style={INP()}/></div>
            </div>
            {newForm.montant_vente>0&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <span style={{fontSize:12,color:"#4A6A9E",minWidth:60}}>ou en %</span>
              <input type="number" min="0" max="100"
                value={newPct}
                onFocus={()=>setNewPct(newForm.montant_vente>0?String(Math.round((newForm.montant_acompte/newForm.montant_vente)*100)):"")}
                onChange={e=>{setNewPct(e.target.value);const pct=Number(e.target.value);if(e.target.value!==""&&!isNaN(pct))setNewForm(p=>({...p,montant_acompte:Math.round(p.montant_vente*(pct/100)*100)/100}));}}
                onBlur={()=>setNewPct(newForm.montant_vente>0?String(Math.round((newForm.montant_acompte/newForm.montant_vente)*100)):"")}
                style={{...INP(),width:70,textAlign:"center"}}/>
              <span style={{fontSize:13,color:"#F0F6FF",fontWeight:700}}>%</span>
              <span style={{fontSize:11,color:"#3B82F6",marginLeft:4}}>= {newForm.montant_acompte>0?Number(newForm.montant_acompte).toLocaleString("fr-FR",{minimumFractionDigits:2}):"0,00"} €</span>
            </div>}
            <div style={{marginBottom:12}}><L c="NOTES"/><textarea value={newForm.notes} onChange={e=>setNewForm(p=>({...p,notes:e.target.value}))} placeholder="Informations…" style={{...INP(),height:60,resize:"none"}}/></div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setNewModal(false)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button disabled={!newForm.client||!newForm.montant_acompte} onClick={()=>{setAcomptes(p=>[{...newForm,id:Date.now()},...p]);setNewModal(false);setNewForm({client:"",montant_vente:"",montant_acompte:"",date_creation:new Date().toLocaleDateString("fr-FR"),statut:"a_envoyer",notes:"",par:profile?.nom||""});}} style={BTN(!newForm.client||!newForm.montant_acompte?"#0D1828":"linear-gradient(135deg,#10B981,#059669)",{flex:2,padding:"12px"})}>✅ Créer</button>
            </div>
          </div></div>}

          {/* MODAL SUPPRESSION */}
          {delConf&&<div style={OVL} onClick={()=>setDelConf(null)}><div style={{...MBX,maxWidth:360,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <div style={{fontSize:44,marginBottom:10}}>🗑️</div>
            <h3 style={{margin:"0 0 8px",fontWeight:800}}>Supprimer cet acompte ?</h3>
            <p style={{color:"#4A6A9E",fontSize:13,margin:"0 0 20px"}}><strong style={{color:"#E8F0FF"}}>{delConf.client}</strong> — {fmt(delConf.montant_acompte)}</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setDelConf(null)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={()=>{const id=delConf.id;setAcomptes(p=>p.filter(a=>a.id!==id));sb.from("acomptes").delete().eq("id",id).then(({error})=>{if(error)console.error("delete acomptes:",error.message);});setDelConf(null);}} style={BTN("#EF4444",{flex:1})}>Supprimer</button>
            </div>
          </div></div>}

          {/* HEADER */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>📄 Administratif — Acomptes</h2>
              <p style={{margin:0,fontSize:12,color:"#4A6A9E"}}>{acomptes.length} demande{acomptes.length>1?"s":""}</p>
            </div>
            {canEdit(role)&&<button onClick={()=>setNewModal(true)} style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{padding:"10px 16px",fontSize:13})}>➕ Nouvel acompte</button>}
          </div>

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:8,marginBottom:16}}>
            {[
              {l:"Total acomptes",v:fmt(totalAcomptes),c:"#3B82F6",i:"💶",sub:`${acomptes.length} demande(s)`},
              {l:"Encaissé",v:fmt(totalPaye),c:"#10B981",i:"✅",sub:`${acomptes.filter(a=>a.statut==="paye").length} payé(s)`},
              {l:"En attente",v:fmt(totalEnAttente),c:"#F59E0B",i:"⏳",sub:`${acomptes.filter(a=>["a_envoyer","envoye"].includes(a.statut)).length} en cours`},
              {l:"Taux encaissement",v:totalAcomptes>0?Math.round((totalPaye/totalAcomptes)*100)+"%":"—",c:"#A855F7",i:"📊",sub:"du total acomptes"},
            ].map(({l,v,c,i,sub})=>(
              <div key={l} style={{background:"#0D1828",borderRadius:12,padding:"13px 15px",border:`1px solid ${c}30`}}>
                <div style={{fontSize:18,marginBottom:4}}>{i}</div>
                <div style={{fontSize:isMobile?14:17,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:11,color:"#4A6A9E",marginTop:3}}>{l}</div>
                <div style={{fontSize:10,color:"#2E4D82",marginTop:1}}>{sub}</div>
              </div>
            ))}
          </div>

          {/* Alerte acomptes à envoyer */}
          {acomptes.filter(a=>a.statut==="a_envoyer").length>0&&<div style={{background:"#F59E0B15",border:"1px solid #F59E0B40",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>⚠️</span>
            <div>
              <span style={{fontWeight:700,color:"#F59E0B",fontSize:13}}>{acomptes.filter(a=>a.statut==="a_envoyer").length} demande{acomptes.filter(a=>a.statut==="a_envoyer").length>1?"s":""} d'acompte à envoyer</span>
              <div style={{fontSize:11,color:"#92400E",marginTop:2}}>{acomptes.filter(a=>a.statut==="a_envoyer").map(a=>a.client).join(", ")}</div>
            </div>
          </div>}

          {/* Filtres */}
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher client…" style={{...INP(),maxWidth:220,fontSize:13}}/>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {[["tous","Tous","#7B96C8"],...Object.entries(STATUTS).map(([k,s])=>[k,s.label,s.color])].map(([k,l,col])=>(
                <button key={k} onClick={()=>setFilter(k)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${filter===k?col:"#1B2D4F"}`,background:filter===k?col+"25":"transparent",color:filter===k?col:"#4A6A9E",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                  {l} {k!=="tous"&&<span style={{fontSize:10,opacity:0.8}}>({acomptes.filter(a=>a.statut===k).length})</span>}
                </button>
              ))}
            </div>
          </div>

          {/* Liste */}
          {filtered.length===0
            ?<div style={{textAlign:"center",padding:"50px 0",color:"#2E4D82"}}><div style={{fontSize:40,marginBottom:8}}>📄</div><div style={{fontWeight:700}}>Aucun acompte trouvé</div></div>
            :<div style={{display:"flex",flexDirection:"column",gap:10}}>
              {filtered.map(a=>{
                const S=STATUTS[a.statut]||STATUTS.a_envoyer;
                const pct=a.montant_vente>0?Math.round((a.montant_acompte/a.montant_vente)*100):null;
                // Link to vente
                const vente=a.vente_id?ventes.find(v=>v.id===a.vente_id):null;
                return(
                  <div key={a.id} style={{background:"#0D1828",borderRadius:14,border:`1px solid ${S.color}30`,padding:"14px 16px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                          <span style={{fontWeight:800,fontSize:16,color:"#F0F6FF"}}>{a.client}</span>
                          <span style={{background:S.bg,color:S.color,padding:"3px 8px",borderRadius:20,fontSize:10,fontWeight:700}}>{S.icon} {S.label}</span>
                          {a.vente_id&&<span style={{fontSize:10,color:"#4A6A9E",background:"#070D1A",padding:"2px 7px",borderRadius:5}}>🔗 Vente liée</span>}
                        </div>
                        <div style={{fontSize:11,color:"#4A6A9E"}}>
                          Créé le {a.date_creation} · {a.par||""}
                          {a.date_envoi&&<span> · 📤 Envoyé le {a.date_envoi}</span>}
                          {a.date_paiement&&<span> · ✅ Payé le {a.date_paiement}</span>}
                        </div>
                        {a.notes&&<div style={{fontSize:12,color:"#7B96C8",fontStyle:"italic",marginTop:4}}>"{a.notes}"</div>}
                      </div>
                      <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                        <div style={{fontSize:20,fontWeight:800,color:S.color}}>{fmt(a.montant_acompte)}</div>
                        {a.montant_vente>0&&<div style={{fontSize:11,color:"#4A6A9E",marginTop:2}}>{pct}% de {fmt(a.montant_vente)}</div>}
                      </div>
                    </div>

                    {/* Avancement statut — même style que Factures */}
                    {(()=>{
                      const steps=["a_envoyer","envoye","paye"];
                      const idx=steps.indexOf(a.statut);
                      const nextKey=steps[idx+1]||null;
                      const cfg={
                        a_envoyer:{label:"Marquer Envoyé", icon:"📨", color:"#3B82F6", grad:"linear-gradient(135deg,#3B82F6,#1D4ED8)"},
                        envoye:   {label:"Marquer Payé",   icon:"✅", color:"#10B981", grad:"linear-gradient(135deg,#10B981,#059669)"},
                      }[a.statut];

                      return(
                        <>
                          {/* Steps visuels */}
                          <div style={{display:"flex",alignItems:"center",gap:0,marginBottom:10}}>
                            {steps.map((s,i)=>{
                              const SF=STATUTS[s]||STATUTS.a_envoyer;
                              const done=i<idx; const active=i===idx;
                              return(
                                <React.Fragment key={s}>
                                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>
                                    <div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,
                                      background:done?"#10B981":active?SF.color+"30":"#0D1828",
                                      border:`2px solid ${done?"#10B981":active?SF.color:"#1B2D4F"}`,
                                      color:done?"#10B981":active?SF.color:"#2E4D82",transition:"all 0.3s"}}>
                                      {done?"✓":SF.icon}
                                    </div>
                                    <div style={{fontSize:9,fontWeight:700,color:active?SF.color:done?"#10B981":"#2E4D82",marginTop:3,textAlign:"center",whiteSpace:"nowrap"}}>{SF.label}</div>
                                  </div>
                                  {i<steps.length-1&&<div style={{height:2,flex:0.5,background:i<idx?"#10B981":"#1B2D4F",marginBottom:14,transition:"background 0.3s"}}/>}
                                </React.Fragment>
                              );
                            })}
                          </div>

                          {/* Bouton avancer / état final */}
                          <div style={{display:"flex",gap:6}}>
                            {nextKey&&cfg&&canEdit(role)
                              ? <button onClick={()=>{
                                    if(nextKey==="paye"){setPayAcompteModal(a.id);}
                                    else{updateAcompte(a.id,{
                                      statut:nextKey,
                                      ...(nextKey==="envoye"?{date_envoi:new Date().toLocaleDateString("fr-FR")}:{}),
                                    });}
                                  }}
                                  style={{flex:1,background:cfg.grad,border:"none",borderRadius:9,color:"#FFF",
                                    padding:"9px 14px",cursor:"pointer",fontWeight:800,fontSize:13,
                                    fontFamily:'"Outfit",sans-serif',boxShadow:`0 3px 12px ${cfg.color}40`,
                                    display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                                  {cfg.icon} {cfg.label} →
                                </button>
                              : a.statut==="paye"
                                ? <div style={{flex:1,background:"#10B98115",border:"1px solid #10B98140",borderRadius:9,padding:"9px 12px",textAlign:"center",fontSize:13,color:"#10B981",fontWeight:700}}>
                                    ✅ Encaissé le {a.date_paiement}{a.mode_paiement?` — ${a.mode_paiement}`:""}
                                  </div>
                                : a.statut==="annule"
                                  ? <div style={{flex:1,background:"#EF444415",border:"1px solid #EF444430",borderRadius:9,padding:"9px 12px",textAlign:"center",fontSize:13,color:"#EF4444",fontWeight:700}}>❌ Annulé</div>
                                  : null
                            }
                            {canEdit(role)&&<>
                              <button onClick={()=>setEditModal({...a})} style={{background:"#1B2D4F",border:"none",borderRadius:9,color:"#7B96C8",padding:"9px 12px",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:'"Outfit",sans-serif'}} title="Modifier">✏️</button>
                              <button onClick={()=>setDelConf(a)} style={{background:"#EF444415",border:"1px solid #EF444430",borderRadius:9,color:"#EF4444",padding:"9px 10px",cursor:"pointer",fontSize:13,fontWeight:700}} title="Supprimer">🗑️</button>
                            </>}
                          </div>
                        </>
                      );
                    })()}
                  </div>
                );
              })}
            </div>
          }
        </div>
      );
    }

    // ══════════════════════════════════════
    // ONGLET ÉQUIPE (admin)
    // ══════════════════════════════════════
    function EquipeTab({isMobile, chantiers, setChantiers, rapports, setRapports}) {
      const[users,setUsers]=useState([]);
      const[loading,setLoading]=useState(true);
      const[modal,setModal]=useState(false);
      const[form,setForm]=useState({nom:"",email:"",role:"installateur",pass:""});
      const[err,setErr]=useState("");
      const[saving,setSaving]=useState(false);
      const[editUser,setEditUser]=useState(null);
      const[editForm,setEditForm]=useState({nom:"",email:"",role:"installateur",newPass:""});
      const[editErr,setEditErr]=useState("");
      const[editSaving,setEditSaving]=useState(false);
      const[mergeModal,setMergeModal]=useState(false);
      const[mergeFrom,setMergeFrom]=useState("");
      const[mergeTo,setMergeTo]=useState("");
      const[mergeResult,setMergeResult]=useState(null);

      const INP=(e={})=>({background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,color:"#E8F0FF",padding:"11px 13px",fontSize:14,width:"100%",outline:"none",boxSizing:"border-box",fontFamily:'"Outfit",sans-serif',...e});
      const BTN=(bg,e={})=>({background:bg,border:"none",borderRadius:9,color:"#FFF",padding:"9px 14px",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:'"Outfit",sans-serif',...e});
      const L=({c})=><label style={{fontSize:11,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:5,letterSpacing:"0.05em"}}>{c}</label>;

      const loadUsers = async () => {
        setLoading(true);
        const{data}=await sb.from("profiles").select("*").order("created_at");
        if(data) setUsers(data);
        setLoading(false);
      };

      useEffect(()=>{loadUsers();},[]);

      const createUser = async () => {
        if(!form.nom||!form.email||!form.pass){setErr("Tous les champs sont requis.");return;}
        setSaving(true); setErr("");
        const{data,error}=await sb.auth.signUp({email:form.email,password:form.pass});
        if(error){setErr("Erreur : "+error.message);setSaving(false);return;}
        const uid=data.user?.id;
        if(uid){
          await sb.from("profiles").insert({id:uid,email:form.email,nom:form.nom,role:form.role,actif:true});
        }
        await loadUsers();
        setModal(false); setForm({nom:"",email:"",role:"installateur",pass:""});
        setSaving(false);
      };

      const openEdit=(u)=>{
        setEditUser(u);
        setEditForm({nom:u.nom||"",email:u.email||"",role:u.role||"installateur",newPass:""});
        setEditErr("");
      };

      const saveEdit = async () => {
        if(!editForm.nom.trim()||!editForm.email.trim()){setEditErr("Nom et email requis.");return;}
        setEditSaving(true); setEditErr("");
        try{
          // Mettre à jour le profil (nom + rôle)
          const{error:pErr}=await sb.from("profiles").update({nom:editForm.nom.trim(),email:editForm.email.trim(),role:editForm.role}).eq("id",editUser.id);
          if(pErr){setEditErr("Erreur profil : "+pErr.message);setEditSaving(false);return;}

          // Changer le mot de passe via admin API si renseigné
          if(editForm.newPass.trim()){
            if(editForm.newPass.length<6){setEditErr("Mot de passe min. 6 caractères.");setEditSaving(false);return;}
            // Utiliser updateUser (fonctionne seulement pour le compte connecté) ou admin
            // Solution : appel à l'API admin via la fonction edge si dispo, sinon info
            const{error:pwErr}=await sb.auth.admin?.updateUserById(editUser.id,{password:editForm.newPass}).catch(()=>({error:{message:"API admin non disponible"}}));
            if(pwErr){
              // Fallback : signaler mais continuer le reste
              setEditErr("⚠️ Profil mis à jour, mais le mot de passe n'a pas pu être changé (nécessite les droits service_role). Nom et rôle sauvegardés.");
              setUsers(p=>p.map(u=>u.id===editUser.id?{...u,nom:editForm.nom,email:editForm.email,role:editForm.role}:u));
              setEditSaving(false);
              return;
            }
          }

          setUsers(p=>p.map(u=>u.id===editUser.id?{...u,nom:editForm.nom,email:editForm.email,role:editForm.role}:u));
          setEditUser(null);
        }catch(e){setEditErr("Erreur : "+e.message);}
        setEditSaving(false);
      };

      const toggleActif = async (uid,actif) => {
        await sb.from("profiles").update({actif:!actif}).eq("id",uid);
        setUsers(p=>p.map(u=>u.id===uid?{...u,actif:!actif}:u));
      };

      // Tous les noms uniques utilisés dans chantiers + rapports
      const allTechNames=React.useMemo(()=>[...new Set([
        ...(chantiers||[]).map(c=>c.technicien).filter(Boolean),
        ...(rapports||[]).map(r=>r.technicien).filter(Boolean),
      ])].sort(),[chantiers,rapports]);

      const doMerge=async()=>{
        if(!mergeFrom||!mergeTo||mergeFrom===mergeTo)return;
        let chCount=0, rapCount=0;
        // Remplacer dans chantiers localement + Supabase
        const newChantiers=(chantiers||[]).map(c=>{
          if((c.technicien||"").toLowerCase()===mergeFrom.toLowerCase()){chCount++;return{...c,technicien:mergeTo};}
          return c;
        });
        if(chCount>0){
          setChantiers(newChantiers);
          // Mettre à jour dans Supabase
          await sb.from("chantiers").update({technicien:mergeTo}).eq("technicien",mergeFrom);
        }
        // Remplacer dans rapports
        const newRapports=(rapports||[]).map(r=>{
          if((r.technicien||"").toLowerCase()===mergeFrom.toLowerCase()){rapCount++;return{...r,technicien:mergeTo};}
          return r;
        });
        if(rapCount>0){
          setRapports(newRapports);
          await sb.from("rapports").update({technicien:mergeTo}).eq("technicien",mergeFrom);
        }
        setMergeResult({chCount,rapCount,from:mergeFrom,to:mergeTo});
        setMergeFrom("");
      };

      const OVL={position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"};
      const MBX=isMobile?{background:"#0D1828",borderRadius:"20px 20px 0 0",padding:"8px 16px 32px",width:"100%",border:"1px solid #1B2D4F",maxHeight:"92vh",overflowY:"auto"}:{background:"#0D1828",borderRadius:16,padding:24,width:440,maxWidth:"95vw",border:"1px solid #1B2D4F",maxHeight:"90vh",overflowY:"auto"};

      return(
        <div>
          {/* Modal création */}
          {modal&&<div style={OVL} onClick={()=>setModal(false)}><div style={MBX} onClick={e=>e.stopPropagation()}>
            {isMobile&&<div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"8px auto 16px"}}/>}
            <h3 style={{margin:"0 0 18px",fontWeight:800,fontSize:16}}>👤 Créer un utilisateur</h3>
            <div style={{marginBottom:12}}><L c="NOM COMPLET"/><input value={form.nom} onChange={e=>setForm(p=>({...p,nom:e.target.value}))} placeholder="Ex: Jean Dupont" style={INP()}/></div>
            <div style={{marginBottom:12}}><L c="EMAIL"/><input type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="jean@societe.fr" style={INP()}/></div>
            <div style={{marginBottom:12}}><L c="MOT DE PASSE PROVISOIRE"/><input type="text" value={form.pass} onChange={e=>setForm(p=>({...p,pass:e.target.value}))} placeholder="Min. 6 caractères" style={INP()}/></div>
            <div style={{marginBottom:18}}>
              <L c="RÔLE"/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {Object.entries(ROLES).map(([k,r])=>(
                  <button key={k} onClick={()=>setForm(p=>({...p,role:k}))} style={{background:form.role===k?r.bg:"#070D1A",border:`2px solid ${form.role===k?r.color:"#1B2D4F"}`,borderRadius:10,color:form.role===k?r.color:"#4A6A9E",padding:"10px 8px",cursor:"pointer",fontWeight:700,fontSize:12,textAlign:"left",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:16}}>{r.icon}</span><span>{r.label}</span>
                  </button>
                ))}
              </div>
            </div>
            {err&&<div style={{background:"#EF444418",border:"1px solid #EF444440",borderRadius:8,padding:"9px 12px",marginBottom:12,color:"#EF4444",fontSize:12}}>⚠️ {err}</div>}
            <div style={{background:"#070D1A",borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:11,color:"#4A6A9E"}}>
              💡 L'utilisateur recevra un email de confirmation. Il devra cliquer sur le lien pour activer son compte.
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setModal(false)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={createUser} disabled={saving} style={BTN(saving?"#1B2D4F":"#3B82F6",{flex:2})}>
                {saving?"Création…":"✅ Créer le compte"}
              </button>
            </div>
          </div></div>}

          {/* Modal édition profil */}
          {editUser&&<div style={OVL} onClick={()=>setEditUser(null)}><div style={MBX} onClick={e=>e.stopPropagation()}>
            {isMobile&&<div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"8px auto 16px"}}/>}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
              <div style={{width:44,height:44,borderRadius:12,background:(ROLES[editForm.role]||ROLES.installateur).bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>
                {(ROLES[editForm.role]||ROLES.installateur).icon}
              </div>
              <div>
                <div style={{fontWeight:800,fontSize:16,color:"#F0F6FF"}}>Modifier le profil</div>
                <div style={{fontSize:11,color:"#4A6A9E",marginTop:2}}>{editUser.email}</div>
              </div>
            </div>

            <div style={{marginBottom:12}}><L c="NOM COMPLET"/>
              <input value={editForm.nom} onChange={e=>setEditForm(p=>({...p,nom:e.target.value}))} placeholder="Nom complet" style={INP()}/>
            </div>
            <div style={{marginBottom:12}}><L c="ADRESSE EMAIL"/>
              <input type="email" value={editForm.email} onChange={e=>setEditForm(p=>({...p,email:e.target.value}))} placeholder="email@societe.fr" style={INP()}/>
            </div>
            <div style={{marginBottom:16}}><L c="NOUVEAU MOT DE PASSE (optionnel)"/>
              <input type="password" value={editForm.newPass} onChange={e=>setEditForm(p=>({...p,newPass:e.target.value}))} placeholder="Laisser vide pour ne pas changer" style={INP()}/>
              <div style={{fontSize:10,color:"#2E4D82",marginTop:4}}>⚠️ Nécessite les droits service_role sur Supabase</div>
            </div>

            <div style={{marginBottom:18}}><L c="RÔLE"/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {Object.entries(ROLES).map(([k,r])=>(
                  <button key={k} onClick={()=>setEditForm(p=>({...p,role:k}))}
                    style={{background:editForm.role===k?r.bg:"#070D1A",border:`2px solid ${editForm.role===k?r.color:"#1B2D4F"}`,borderRadius:10,color:editForm.role===k?r.color:"#7B96C8",padding:"10px 8px",cursor:"pointer",fontWeight:700,fontSize:12,textAlign:"left",display:"flex",alignItems:"center",gap:6,fontFamily:'"Outfit",sans-serif'}}>
                    <span style={{fontSize:16}}>{r.icon}</span><span>{r.label}</span>
                    {editForm.role===k&&<span style={{marginLeft:"auto",fontSize:10}}>✓</span>}
                  </button>
                ))}
              </div>
            </div>

            {editErr&&<div style={{background:editErr.startsWith("⚠️")?"#F59E0B18":"#EF444418",border:`1px solid ${editErr.startsWith("⚠️")?"#F59E0B40":"#EF444440"}`,borderRadius:8,padding:"9px 12px",marginBottom:12,color:editErr.startsWith("⚠️")?"#F59E0B":"#EF4444",fontSize:12}}>{editErr}</div>}

            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setEditUser(null)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={saveEdit} disabled={editSaving}
                style={BTN(editSaving?"#1B2D4F":"linear-gradient(135deg,#3B82F6,#1D4ED8)",{flex:2})}>
                {editSaving?"Sauvegarde…":"💾 Enregistrer"}
              </button>
            </div>
          </div></div>}

          {/* Modal fusion noms */}
          {mergeModal&&<div style={OVL} onClick={()=>{setMergeModal(false);setMergeResult(null);}}><div style={{...MBX,maxWidth:420}} onClick={e=>e.stopPropagation()}>
            {isMobile&&<div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"8px auto 16px"}}/>}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
              <span style={{fontSize:28}}>🔀</span>
              <div>
                <div style={{fontWeight:800,fontSize:15,color:"#F0F6FF"}}>Fusionner des noms d'installateur</div>
                <div style={{fontSize:11,color:"#4A6A9E",marginTop:2}}>Remplace un nom par un autre dans tous les chantiers et rapports</div>
              </div>
            </div>

            {mergeResult
              ?<>
                <div style={{background:"#10B98115",border:"1px solid #10B98140",borderRadius:12,padding:"14px",marginBottom:16,textAlign:"center"}}>
                  <div style={{fontSize:20,marginBottom:8}}>✅</div>
                  <div style={{fontWeight:700,color:"#10B981",marginBottom:4}}>Fusion effectuée !</div>
                  <div style={{fontSize:12,color:"#7B96C8"}}>
                    <span style={{color:"#EF4444"}}>{mergeResult.from}</span> → <span style={{color:"#10B981"}}>{mergeResult.to}</span>
                  </div>
                  <div style={{fontSize:12,color:"#4A6A9E",marginTop:6}}>
                    {mergeResult.chCount} chantier{mergeResult.chCount>1?"s":""} · {mergeResult.rapCount} rapport{mergeResult.rapCount>1?"s":""} mis à jour
                  </div>
                </div>
                <button onClick={()=>{setMergeModal(false);setMergeResult(null);}} style={BTN("linear-gradient(135deg,#10B981,#059669)",{width:"100%"})}>Fermer</button>
              </>
              :<>
                <div style={{marginBottom:12}}>
                  <L c="NOM À REMPLACER (l'ancien)"/>
                  <select value={mergeFrom} onChange={e=>setMergeFrom(e.target.value)} style={{...INP(),appearance:"none"}}>
                    <option value="">— Choisir le nom erroné —</option>
                    {allTechNames.map(n=><option key={n} value={n}>{n}</option>)}
                  </select>
                </div>
                <div style={{marginBottom:20}}>
                  <L c="REMPLACER PAR (le bon nom)"/>
                  <select value={mergeTo} onChange={e=>setMergeTo(e.target.value)} style={{...INP(),appearance:"none"}}>
                    <option value="">— Choisir le nom correct —</option>
                    {allTechNames.filter(n=>n!==mergeFrom).map(n=><option key={n} value={n}>{n}</option>)}
                    {users.filter(u=>u.role==="installateur"||u.role==="administrateur").map(u=>(
                      allTechNames.includes(u.nom)?null:<option key={u.id} value={u.nom}>{u.nom} (profil)</option>
                    ))}
                  </select>
                </div>
                {mergeFrom&&mergeTo&&<div style={{background:"#F59E0B10",border:"1px solid #F59E0B30",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#F59E0B"}}>
                  ⚠️ Toutes les occurrences de <strong>"{mergeFrom}"</strong> seront remplacées par <strong>"{mergeTo}"</strong>. Action irréversible.
                </div>}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setMergeModal(false)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
                  <button onClick={doMerge} disabled={!mergeFrom||!mergeTo||mergeFrom===mergeTo}
                    style={BTN(!mergeFrom||!mergeTo?"#1B2D4F":"linear-gradient(135deg,#F59E0B,#D97706)",{flex:2})}>
                    🔀 Fusionner
                  </button>
                </div>
              </>
            }
          </div></div>}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:8}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>👥 Équipe</h2>
              <p style={{margin:0,fontSize:12,color:"#4A6A9E"}}>{users.length} utilisateur{users.length>1?"s":""}</p>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setMergeModal(true);setMergeResult(null);setMergeFrom("");setMergeTo("");}} style={BTN("#1B2D4F",{padding:"9px 14px",fontSize:12,border:"1px solid #1B2D4F"})}>🔀 Fusionner noms</button>
              <button onClick={()=>setModal(true)} style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{padding:"10px 16px",fontSize:13})}>➕ Nouvel utilisateur</button>
            </div>
          </div>

          {loading?<div style={{textAlign:"center",padding:40,color:"#4A6A9E"}}>Chargement…</div>
            :<div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(320px,1fr))",gap:10}}>
              {users.map(u=>{
                const r=ROLES[u.role]||ROLES.installateur;
                return(
                  <div key={u.id} style={{background:u.actif?"#0D1828":"#141E2D",borderRadius:12,border:`1px solid ${u.actif?r.color+"40":"#1B2D4F"}`,padding:"14px 16px",opacity:u.actif?1:0.6}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:800,fontSize:15,color:"#F0F6FF",marginBottom:3}}>{u.nom}</div>
                        <div style={{fontSize:12,color:"#4A6A9E",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.email}</div>
                      </div>
                      <span style={{background:r.bg,color:r.color,padding:"3px 9px",borderRadius:20,fontSize:10,fontWeight:700,flexShrink:0,marginLeft:8}}>{r.icon} {r.label}</span>
                    </div>
                    <div style={{fontSize:11,color:"#2E4D82",marginBottom:10}}>
                      Créé le {new Date(u.created_at).toLocaleDateString("fr-FR")} · {u.actif?"✅ Actif":"⛔ Désactivé"}
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>openEdit(u)} style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{flex:2,fontSize:12})}>✏️ Modifier</button>
                      <button onClick={()=>toggleActif(u.id,u.actif)} style={{background:u.actif?"#EF444415":"#10B98115",border:`1px solid ${u.actif?"#EF444440":"#10B98140"}`,borderRadius:9,color:u.actif?"#EF4444":"#10B981",padding:"9px 14px",cursor:"pointer",fontWeight:700,fontSize:12,flex:1,fontFamily:'"Outfit",sans-serif'}}>
                        {u.actif?"Désactiver":"Réactiver"}
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          }
        </div>
      );
    }


    // ══════════════════════════════════════
