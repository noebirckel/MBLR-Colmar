    function LoginScreen() {
      const[email,setEmail]=useState("");
      const[pass,setPass]=useState("");
      const[err,setErr]=useState("");

        setLoading(true); setErr("");

        setLoading(false);
      };

    // ══════════════════════════════════════
    // ONGLET CARTES
    // ══════════════════════════════════════
    function CarteTab({isMobile, ventes, chantiers, fmt}) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const markersRef = useRef([]);
      const[selectedPoint,setSelectedPoint]=useState(null);
      const[lightbox,setLightbox]=useState(null);
      const[filter,setFilter]=useState("tous"); // tous | avec_photos | sans_coords

      // Points : ventes avec coords + chantiers terminés liés
      const points = useMemo(()=>{
        return ventes
          .filter(v=>v.coords)
          .map(v=>{
            // find linked chantier
            const ch=chantiers.find(c=>c.vente_id===v.id);
            const photos=ch?.photos||[];
            return {
              id:v.id, client:v.client, adresse:v.adresse, coords:v.coords,
              date:v.date, montant:v.prix_ht, par:v.par||"",
              description:v.description||"",
              statut_chantier:ch?.statut||null,
              technicien:ch?.technicien||"",
              photos,
              materiels:v.materiels||[],
            };
          });
      },[ventes,chantiers]);

      const filtered = filter==="avec_photos"?points.filter(p=>p.photos.length>0):points;
      const sansCoords = ventes.filter(v=>v.adresse&&!v.coords).length;

      // Init Leaflet map
      useEffect(()=>{
        if(!mapRef.current||mapInstanceRef.current)return;
        // Centre Grand Est
        const map=L.map(mapRef.current,{zoomControl:true}).setView([48.5,6.5],7);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
          attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',
          maxZoom:19
        }).addTo(map);
        mapInstanceRef.current=map;
        return()=>{map.remove();mapInstanceRef.current=null;};
      },[]);

      // Update markers when points change
      useEffect(()=>{
        const map=mapInstanceRef.current;
        if(!map)return;

        // Clear old markers
        markersRef.current.forEach(m=>m.remove());
        markersRef.current=[];

        filtered.forEach(pt=>{
          const hasPhotos=pt.photos.length>0;
          const STATUT_COLORS={a_planifier:"#F59E0B",planifie:"#3B82F6",en_cours:"#A855F7",termine:"#10B981"};
          const color=pt.statut_chantier?STATUT_COLORS[pt.statut_chantier]||"#10B981":"#3B82F6";

          const icon=L.divIcon({
            className:"",
            html:`<div style="
              width:${hasPhotos?38:32}px;height:${hasPhotos?38:32}px;
              background:${color};
              border:3px solid white;
              border-radius:50%;
              display:flex;align-items:center;justify-content:center;
              font-size:${hasPhotos?16:13}px;
              box-shadow:0 2px 8px #0006;
              cursor:pointer;
            ">${hasPhotos?"📸":"⚡"}</div>`,
            iconSize:[hasPhotos?38:32,hasPhotos?38:32],
            iconAnchor:[hasPhotos?19:16,hasPhotos?19:16],
          });

          const marker=L.marker([pt.coords.lat,pt.coords.lng],{icon}).addTo(map);
          marker.on("click",()=>{
            setSelectedPoint(pt);
          });
          markersRef.current.push(marker);
        });

        // Fit bounds if points exist
        if(filtered.length>0){
          const bounds=L.latLngBounds(filtered.map(p=>[p.coords.lat,p.coords.lng]));
          map.fitBounds(bounds,{padding:[40,40],maxZoom:12});
        }
      },[filtered]);

      const STATUT_CH={
        a_planifier:{label:"À planifier",color:"#F59E0B"},
        planifie:{label:"Planifié",color:"#3B82F6"},
        en_cours:{label:"En cours",color:"#A855F7"},
        termine:{label:"Terminé",color:"#10B981"},
      };

      return(
        <div>
          {/* LIGHTBOX */}
          {lightbox&&<div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"#000000EE",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}}>
            <img src={lightbox} style={{maxWidth:"95vw",maxHeight:"92vh",borderRadius:12,objectFit:"contain"}}/>
            <button onClick={()=>setLightbox(null)} style={{position:"fixed",top:16,right:20,background:"#1E293B",border:"1px solid #334155",borderRadius:8,color:"#E2E8F0",padding:"8px 14px",cursor:"pointer",fontSize:16,fontWeight:700,zIndex:3001}}>✕</button>
          </div>}

          {/* HEADER */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>🗺️ Carte des chantiers</h2>
              <p style={{margin:0,fontSize:12,color:"#64748B"}}>{points.length} chantier(s) géolocalisé(s) sur {ventes.length} vente(s)</p>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[["tous","Tous","#94A3B8"],["avec_photos","📸 Avec photos","#3B82F6"]].map(([k,l,col])=>(
                <button key={k} onClick={()=>setFilter(k)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${filter===k?col:"#334155"}`,background:filter===k?col+"25":"transparent",color:filter===k?col:"#64748B",fontSize:12,fontWeight:700,cursor:"pointer"}}>{l}</button>
              ))}
            </div>
          </div>

          {/* Alerte adresses non géocodées */}
          {sansCoords>0&&<div style={{background:"#F59E0B15",border:"1px solid #F59E0B40",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#F59E0B",display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:16}}>⚠️</span>
            <span><strong>{sansCoords} vente(s)</strong> ont une adresse non encore géocodée. Ouvre et réenregistre ces ventes pour les placer sur la carte.</span>
          </div>}

          {/* LÉGENDE */}
          <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
            {Object.entries(STATUT_CH).map(([k,s])=>(
              <div key={k} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#94A3B8"}}>
                <div style={{width:12,height:12,borderRadius:"50%",background:s.color,border:"2px solid white",boxShadow:"0 1px 3px #0004"}}/>
                {s.label}
              </div>
            ))}
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#94A3B8"}}>
              <span style={{fontSize:14}}>📸</span> Avec photos
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#94A3B8"}}>
              <span style={{fontSize:14}}>⚡</span> Sans photos
            </div>
          </div>

          {/* LAYOUT : carte + panneau latéral */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":selectedPoint?"1fr 360px":"1fr",gap:14,alignItems:"start"}}>

            {/* CARTE */}
            <div style={{borderRadius:14,overflow:"hidden",border:"1px solid #334155",position:"relative"}}>
              <div ref={mapRef} style={{height:isMobile?"65vh":"72vh",width:"100%"}}/>
              {filtered.length===0&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
                <div style={{background:"#1E293B",borderRadius:12,padding:"20px 28px",textAlign:"center",border:"1px solid #334155"}}>
                  <div style={{fontSize:40,marginBottom:8}}>📍</div>
                  <div style={{fontWeight:800,color:"#F1F5F9",marginBottom:4}}>Aucun point à afficher</div>
                  <div style={{fontSize:12,color:"#64748B"}}>Ajoutez des adresses à vos ventes</div>
                </div>
              </div>}
            </div>

            {/* PANNEAU DÉTAIL */}
            {selectedPoint&&<div style={{background:"#1E293B",borderRadius:14,border:"1px solid #334155",padding:"16px",maxHeight:isMobile?"auto":"72vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div>
                  <div style={{fontWeight:800,fontSize:16,color:"#F1F5F9",marginBottom:3}}>{selectedPoint.client}</div>
                  {selectedPoint.statut_chantier&&<span style={{background:STATUT_CH[selectedPoint.statut_chantier]?.color+"20",color:STATUT_CH[selectedPoint.statut_chantier]?.color,padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700}}>{STATUT_CH[selectedPoint.statut_chantier]?.label}</span>}
                </div>
                <button onClick={()=>setSelectedPoint(null)} style={{background:"#334155",border:"none",borderRadius:7,color:"#94A3B8",width:28,height:28,cursor:"pointer",fontSize:14,fontWeight:700,flexShrink:0}}>✕</button>
              </div>

              <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:14}}>
                {selectedPoint.adresse&&<div style={{fontSize:12,color:"#64748B"}}>📍 {selectedPoint.adresse}</div>}
                <div style={{fontSize:12,color:"#64748B"}}>📅 {selectedPoint.date}</div>
                {selectedPoint.par&&<div style={{fontSize:12,color:"#64748B"}}>👤 {selectedPoint.par}</div>}
                {selectedPoint.technicien&&<div style={{fontSize:12,color:"#64748B"}}>🔧 {selectedPoint.technicien}</div>}
                <div style={{fontSize:15,fontWeight:800,color:"#10B981"}}>💶 {fmt(selectedPoint.montant)}</div>
              </div>

              {selectedPoint.materiels.length>0&&<div style={{marginBottom:14}}>
                <div style={{fontSize:10,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Matériel installé</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {selectedPoint.materiels.map((m,i)=><span key={i} style={{background:"#0F172A",borderRadius:6,padding:"3px 8px",fontSize:11,color:"#94A3B8"}}>{m.qty}× {m.article}</span>)}
                </div>
              </div>}

              {selectedPoint.description&&<div style={{fontSize:12,color:"#64748B",fontStyle:"italic",marginBottom:14,padding:"8px 10px",background:"#0F172A",borderRadius:8}}>"{selectedPoint.description}"</div>}

              {/* Photos */}
              <div style={{marginBottom:4}}>
                <div style={{fontSize:10,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>
                  📸 Photos {selectedPoint.photos.length>0?`(${selectedPoint.photos.length})`:""}
                </div>
                {selectedPoint.photos.length===0
                  ?<div style={{textAlign:"center",padding:"20px 0",color:"#475569",background:"#0F172A",borderRadius:10,fontSize:12}}>Aucune photo pour ce chantier</div>
                  :<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                    {selectedPoint.photos.map((url,i)=>(
                      <div key={i} style={{borderRadius:8,overflow:"hidden",aspectRatio:"1"}}>
                        <img src={url} onClick={()=>setLightbox(url)} style={{width:"100%",height:"100%",objectFit:"cover",cursor:"zoom-in",display:"block"}}/>
                      </div>
                    ))}
                  </div>
                }
              </div>
            </div>}
          </div>

          {/* Liste des ventes sans coords */}
          {ventes.filter(v=>!v.coords&&!v.adresse).length>0&&<div style={{marginTop:14,background:"#1E293B",borderRadius:12,border:"1px solid #334155",padding:"12px 14px"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#64748B",marginBottom:8}}>Ventes sans adresse ({ventes.filter(v=>!v.coords&&!v.adresse).length})</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {ventes.filter(v=>!v.coords&&!v.adresse).map(v=>(
                <span key={v.id} style={{background:"#0F172A",borderRadius:7,padding:"4px 10px",fontSize:11,color:"#64748B"}}>{v.client}</span>
              ))}
            </div>
          </div>}
        </div>
      );
    }

    function AdminTab({isMobile, acomptes, setAcomptes, ventes, profile, fmt, role}) {
      const canEdit = r => ["administrateur","secretaire","commercial"].includes(r);

      const STATUTS = {
        a_envoyer:  {label:"À envoyer",   color:"#F59E0B", bg:"#2D2008", icon:"📤"},
        envoye:     {label:"Envoyé",      color:"#3B82F6", bg:"#0F1F3D", icon:"📨"},
        paye:       {label:"Payé",        color:"#10B981", bg:"#0A2218", icon:"✅"},
        annule:     {label:"Annulé",      color:"#EF4444", bg:"#3B1212", icon:"❌"},
      };

      const[filter,setFilter]=useState("tous");
      const[search,setSearch]=useState("");
      const[editModal,setEditModal]=useState(null);
      const[delConf,setDelConf]=useState(null);
      const[newModal,setNewModal]=useState(false);
      const[newForm,setNewForm]=useState({client:"",montant_vente:"",montant_acompte:"",date_creation:new Date().toLocaleDateString("fr-FR"),statut:"a_envoyer",notes:"",par:profile?.nom||""});

      const INP=(e={})=>({background:"#0F172A",border:"1px solid #334155",borderRadius:10,color:"#E2E8F0",padding:"10px 12px",fontSize:14,width:"100%",outline:"none",boxSizing:"border-box",...e});
      const BTN=(bg,e={})=>({background:bg,border:"none",borderRadius:10,color:"#FFF",padding:"10px 14px",cursor:"pointer",fontWeight:700,fontSize:13,...e});
      const L=({c})=><label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:4,letterSpacing:"0.05em"}}>{c}</label>;
      const OVL={position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"};
      const MBX=isMobile?{background:"#1E293B",borderRadius:"20px 20px 0 0",padding:"8px 16px 32px",width:"100%",border:"1px solid #334155",maxHeight:"92vh",overflowY:"auto"}:{background:"#1E293B",borderRadius:16,padding:24,width:500,maxWidth:"96vw",border:"1px solid #334155",maxHeight:"90vh",overflowY:"auto"};
      const Handle=()=>isMobile?<div style={{width:36,height:4,background:"#334155",borderRadius:2,margin:"8px auto 16px"}}/>:null;

      const totalAcomptes = acomptes.reduce((s,a)=>s+Number(a.montant_acompte||0),0);
      const totalPaye     = acomptes.filter(a=>a.statut==="paye").reduce((s,a)=>s+Number(a.montant_acompte||0),0);
      const totalEnAttente= acomptes.filter(a=>["a_envoyer","envoye"].includes(a.statut)).reduce((s,a)=>s+Number(a.montant_acompte||0),0);

      const filtered = acomptes.filter(a=>{
        if(filter!=="tous"&&a.statut!==filter) return false;
        if(search&&!(a.client||"").toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      });

      const updateAcompte=(id,patch)=>setAcomptes(p=>p.map(a=>a.id===id?{...a,...patch}:a));

      return (
        <div>
          {/* MODAL ÉDITION */}
          {editModal&&<div style={OVL} onClick={()=>setEditModal(null)}><div style={MBX} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{margin:0,fontWeight:800,fontSize:17}}>✏️ Modifier l'acompte</h3>
              {editModal.vente_id&&<span style={{fontSize:10,color:"#64748B",background:"#0F172A",padding:"3px 8px",borderRadius:6}}>🔗 Depuis vente</span>}
            </div>

            <div style={{marginBottom:12}}><L c="CLIENT"/><input value={editModal.client} onChange={e=>setEditModal(p=>({...p,client:e.target.value}))} style={INP()}/></div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div><L c="MONTANT VENTE HT (€)"/>
                <input type="number" value={editModal.montant_vente||""} onChange={e=>{const mv=Number(e.target.value);setEditModal(p=>({...p,montant_vente:mv,montant_acompte:Math.round(mv*0.3*100)/100}));}} style={INP()}/>
              </div>
              <div><L c="ACOMPTE (€)"/>
                <input type="number" value={editModal.montant_acompte||""} onChange={e=>setEditModal(p=>({...p,montant_acompte:Number(e.target.value)}))} style={INP()}/>
              </div>
            </div>

            {editModal.montant_vente>0&&<div style={{background:"#3B82F615",border:"1px solid #3B82F630",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#3B82F6"}}>
              💡 Acompte = {editModal.montant_vente>0?((editModal.montant_acompte/editModal.montant_vente)*100).toFixed(0):"—"}% du montant HT
            </div>}

            <div style={{marginBottom:12}}>
              <L c="STATUT"/>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {Object.entries(STATUTS).map(([k,s])=>(
                  <button key={k} onClick={()=>setEditModal(p=>({...p,statut:k}))} style={{padding:"6px 12px",borderRadius:20,border:`2px solid ${editModal.statut===k?s.color:"#334155"}`,background:editModal.statut===k?s.bg:"transparent",color:editModal.statut===k?s.color:"#64748B",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                    {s.icon} {s.label}
                  </button>
                ))}
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div><L c="DATE ENVOI"/><input value={editModal.date_envoi||""} onChange={e=>setEditModal(p=>({...p,date_envoi:e.target.value}))} placeholder="JJ/MM/AAAA" style={INP()}/></div>
              <div><L c="DATE PAIEMENT"/><input value={editModal.date_paiement||""} onChange={e=>setEditModal(p=>({...p,date_paiement:e.target.value}))} placeholder="JJ/MM/AAAA" style={INP()}/></div>
            </div>

            <div style={{marginBottom:16}}><L c="NOTES"/><textarea value={editModal.notes||""} onChange={e=>setEditModal(p=>({...p,notes:e.target.value}))} placeholder="Informations complémentaires…" style={{...INP(),height:70,resize:"none"}}/></div>

            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setEditModal(null)} style={BTN("#334155",{flex:1})}>Annuler</button>
              <button onClick={()=>{updateAcompte(editModal.id,editModal);setEditModal(null);}} style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{flex:2,padding:"12px"})}>💾 Enregistrer</button>
            </div>
          </div></div>}

          {/* MODAL NOUVEL ACOMPTE MANUEL */}
          {newModal&&<div style={OVL} onClick={()=>setNewModal(false)}><div style={MBX} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <h3 style={{margin:"0 0 16px",fontWeight:800,fontSize:17}}>📄 Nouvel acompte</h3>

            <div style={{marginBottom:12}}><L c="CLIENT"/><input value={newForm.client} onChange={e=>setNewForm(p=>({...p,client:e.target.value}))} placeholder="Nom du client" style={INP()}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div><L c="MONTANT VENTE HT (€)"/><input type="number" value={newForm.montant_vente} onChange={e=>{const mv=Number(e.target.value);setNewForm(p=>({...p,montant_vente:mv,montant_acompte:Math.round(mv*0.3*100)/100}));}} style={INP()}/></div>
              <div><L c="ACOMPTE (€)"/><input type="number" value={newForm.montant_acompte} onChange={e=>setNewForm(p=>({...p,montant_acompte:Number(e.target.value)}))} style={INP()}/></div>
            </div>
            {newForm.montant_vente>0&&<div style={{background:"#3B82F615",border:"1px solid #3B82F630",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#3B82F6"}}>
              💡 Acompte = {((newForm.montant_acompte/newForm.montant_vente)*100).toFixed(0)}% — par défaut 30%
            </div>}
            <div style={{marginBottom:12}}><L c="NOTES"/><textarea value={newForm.notes} onChange={e=>setNewForm(p=>({...p,notes:e.target.value}))} placeholder="Informations…" style={{...INP(),height:60,resize:"none"}}/></div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setNewModal(false)} style={BTN("#334155",{flex:1})}>Annuler</button>
              <button disabled={!newForm.client||!newForm.montant_acompte} onClick={()=>{setAcomptes(p=>[{...newForm,id:Date.now()},...p]);setNewModal(false);setNewForm({client:"",montant_vente:"",montant_acompte:"",date_creation:new Date().toLocaleDateString("fr-FR"),statut:"a_envoyer",notes:"",par:profile?.nom||""});}} style={BTN(!newForm.client||!newForm.montant_acompte?"#1E293B":"linear-gradient(135deg,#10B981,#059669)",{flex:2,padding:"12px"})}>✅ Créer</button>
            </div>
          </div></div>}

          {/* MODAL SUPPRESSION */}
          {delConf&&<div style={OVL} onClick={()=>setDelConf(null)}><div style={{...MBX,maxWidth:360,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <div style={{fontSize:44,marginBottom:10}}>🗑️</div>
            <h3 style={{margin:"0 0 8px",fontWeight:800}}>Supprimer cet acompte ?</h3>
            <p style={{color:"#64748B",fontSize:13,margin:"0 0 20px"}}><strong style={{color:"#E2E8F0"}}>{delConf.client}</strong> — {fmt(delConf.montant_acompte)}</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setDelConf(null)} style={BTN("#334155",{flex:1})}>Annuler</button>
              <button onClick={()=>{setAcomptes(p=>p.filter(a=>a.id!==delConf.id));setDelConf(null);}} style={BTN("#EF4444",{flex:1})}>Supprimer</button>
            </div>
          </div></div>}

          {/* HEADER */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>📄 Administratif — Acomptes</h2>
              <p style={{margin:0,fontSize:12,color:"#64748B"}}>{acomptes.length} demande{acomptes.length>1?"s":""}</p>
            </div>
            {canEdit(role)&&<button onClick={()=>setNewModal(true)} style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{padding:"10px 16px",fontSize:13})}>➕ Nouvel acompte</button>}
          </div>

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:8,marginBottom:16}}>
            {[
              {l:"Total acomptes",v:fmt(totalAcomptes),c:"#3B82F6",i:"💶",sub:`${acomptes.length} demande(s)`},
              {l:"Encaissé",v:fmt(totalPaye),c:"#10B981",i:"✅",sub:`${acomptes.filter(a=>a.statut==="paye").length} payé(s)`},
              {l:"En attente",v:fmt(totalEnAttente),c:"#F59E0B",i:"⏳",sub:`${acomptes.filter(a=>["a_envoyer","envoye"].includes(a.statut)).length} en cours`},
              {l:"Taux encaissement",v:totalAcomptes>0?Math.round((totalPaye/totalAcomptes)*100)+"%":"—",c:"#A855F7",i:"📊",sub:"du total acomptes"},
            ].map(({l,v,c,i,sub})=>(
              <div key={l} style={{background:"#1E293B",borderRadius:12,padding:"13px 15px",border:`1px solid ${c}30`}}>
                <div style={{fontSize:18,marginBottom:4}}>{i}</div>
                <div style={{fontSize:isMobile?14:17,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:11,color:"#64748B",marginTop:3}}>{l}</div>
                <div style={{fontSize:10,color:"#475569",marginTop:1}}>{sub}</div>
              </div>
            ))}
          </div>

          {/* Alerte acomptes à envoyer */}
          {acomptes.filter(a=>a.statut==="a_envoyer").length>0&&<div style={{background:"#F59E0B15",border:"1px solid #F59E0B40",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>⚠️</span>
            <div>
              <span style={{fontWeight:700,color:"#F59E0B",fontSize:13}}>{acomptes.filter(a=>a.statut==="a_envoyer").length} demande{acomptes.filter(a=>a.statut==="a_envoyer").length>1?"s":""} d'acompte à envoyer</span>
              <div style={{fontSize:11,color:"#92400E",marginTop:2}}>{acomptes.filter(a=>a.statut==="a_envoyer").map(a=>a.client).join(", ")}</div>
            </div>
          </div>}

          {/* Filtres */}
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher client…" style={{...INP(),maxWidth:220,fontSize:13}}/>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {[["tous","Tous","#94A3B8"],...Object.entries(STATUTS).map(([k,s])=>[k,s.label,s.color])].map(([k,l,col])=>(
                <button key={k} onClick={()=>setFilter(k)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${filter===k?col:"#334155"}`,background:filter===k?col+"25":"transparent",color:filter===k?col:"#64748B",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                  {l} {k!=="tous"&&<span style={{fontSize:10,opacity:0.8}}>({acomptes.filter(a=>a.statut===k).length})</span>}
                </button>
              ))}
            </div>
          </div>

          {/* Liste */}
          {filtered.length===0
            ?<div style={{textAlign:"center",padding:"50px 0",color:"#475569"}}><div style={{fontSize:40,marginBottom:8}}>📄</div><div style={{fontWeight:700}}>Aucun acompte trouvé</div></div>
            :<div style={{display:"flex",flexDirection:"column",gap:10}}>
              {filtered.map(a=>{
                const S=STATUTS[a.statut]||STATUTS.a_envoyer;
                const pct=a.montant_vente>0?Math.round((a.montant_acompte/a.montant_vente)*100):null;
                // Link to vente
                const vente=a.vente_id?ventes.find(v=>v.id===a.vente_id):null;
                return(
                  <div key={a.id} style={{background:"#1E293B",borderRadius:14,border:`1px solid ${S.color}30`,padding:"14px 16px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                          <span style={{fontWeight:800,fontSize:16,color:"#F1F5F9"}}>{a.client}</span>
                          <span style={{background:S.bg,color:S.color,padding:"3px 8px",borderRadius:20,fontSize:10,fontWeight:700}}>{S.icon} {S.label}</span>
                          {a.vente_id&&<span style={{fontSize:10,color:"#64748B",background:"#0F172A",padding:"2px 7px",borderRadius:5}}>🔗 Vente liée</span>}
                        </div>
                        <div style={{fontSize:11,color:"#64748B"}}>
                          Créé le {a.date_creation} · {a.par||""}
                          {a.date_envoi&&<span> · 📤 Envoyé le {a.date_envoi}</span>}
                          {a.date_paiement&&<span> · ✅ Payé le {a.date_paiement}</span>}
                        </div>
                        {a.notes&&<div style={{fontSize:12,color:"#94A3B8",fontStyle:"italic",marginTop:4}}>"{a.notes}"</div>}
                      </div>
                      <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                        <div style={{fontSize:20,fontWeight:800,color:S.color}}>{fmt(a.montant_acompte)}</div>
                        {a.montant_vente>0&&<div style={{fontSize:11,color:"#64748B",marginTop:2}}>{pct}% de {fmt(a.montant_vente)}</div>}
                      </div>
                    </div>

                    {/* Barre de progression paiement */}
                    <div style={{background:"#0F172A",borderRadius:6,height:4,marginBottom:10,overflow:"hidden"}}>
                      <div style={{height:4,borderRadius:6,width:a.statut==="paye"?"100%":a.statut==="envoye"?"50%":a.statut==="annule"?"100%":"15%",background:a.statut==="paye"?"#10B981":a.statut==="annule"?"#EF4444":"#F59E0B",transition:"width 0.3s"}}/>
                    </div>

                    {/* Actions rapides statut */}
                    {canEdit(role)&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {a.statut==="a_envoyer"&&<button onClick={()=>updateAcompte(a.id,{statut:"envoye",date_envoi:new Date().toLocaleDateString("fr-FR")})} style={BTN("#3B82F6",{flex:2,padding:"7px 10px",fontSize:12})}>📨 Marquer envoyé</button>}
                      {a.statut==="envoye"&&<button onClick={()=>updateAcompte(a.id,{statut:"paye",date_paiement:new Date().toLocaleDateString("fr-FR")})} style={BTN("#10B981",{flex:2,padding:"7px 10px",fontSize:12})}>✅ Marquer payé</button>}
                      {a.statut==="paye"&&<div style={{flex:2,background:"#10B98115",border:"1px solid #10B98140",borderRadius:9,padding:"7px 10px",textAlign:"center",fontSize:12,color:"#10B981",fontWeight:700}}>✅ Acompte encaissé le {a.date_paiement}</div>}
                      <button onClick={()=>setEditModal({...a})} style={BTN("#334155",{padding:"7px 12px",fontSize:12})}>✏️</button>
                      <button onClick={()=>setDelConf(a)} style={{background:"#EF444415",border:"1px solid #EF444430",borderRadius:9,color:"#EF4444",padding:"7px 10px",cursor:"pointer",fontSize:12,fontWeight:700}}>🗑️</button>
                    </div>}
                  </div>
                );
              })}
            </div>
          }
        </div>
      );
    }

    // ══════════════════════════════════════
    // ONGLET ÉQUIPE (admin)
    // ══════════════════════════════════════
    function EquipeTab({isMobile}) {
      const[users,setUsers]=useState([]);
      const[loading,setLoading]=useState(true);
      const[modal,setModal]=useState(false);
      const[form,setForm]=useState({nom:"",email:"",role:"installateur",pass:""});
      const[err,setErr]=useState("");
      const[saving,setSaving]=useState(false);
      const[editUser,setEditUser]=useState(null);

      const INP=(e={})=>({background:"#0F172A",border:"1px solid #334155",borderRadius:10,color:"#E2E8F0",padding:"11px 13px",fontSize:14,width:"100%",outline:"none",boxSizing:"border-box",...e});
      const BTN=(bg,e={})=>({background:bg,border:"none",borderRadius:9,color:"#FFF",padding:"9px 14px",cursor:"pointer",fontWeight:700,fontSize:12,...e});
      const L=({c})=><label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:5,letterSpacing:"0.05em"}}>{c}</label>;

      const loadUsers = async () => {
        setLoading(true);
        const{data}=await sb.from("profiles").select("*").order("created_at");
        if(data) setUsers(data);
        setLoading(false);
      };

      useEffect(()=>{loadUsers();},[]);

      const createUser = async () => {
        if(!form.nom||!form.email||!form.pass){setErr("Tous les champs sont requis.");return;}
        setSaving(true); setErr("");
        const{data,error}=await sb.auth.signUp({email:form.email,password:form.pass});
        if(error){setErr("Erreur : "+error.message);setSaving(false);return;}
        const uid=data.user?.id;
        if(uid){
          await sb.from("profiles").insert({id:uid,email:form.email,nom:form.nom,role:form.role,actif:true});
        }
        await loadUsers();
        setModal(false); setForm({nom:"",email:"",role:"installateur",pass:""});
        setSaving(false);
      };

      const updateRole = async (uid,role) => {
        await sb.from("profiles").update({role}).eq("id",uid);
        setUsers(p=>p.map(u=>u.id===uid?{...u,role}:u));
        setEditUser(null);
      };

      const toggleActif = async (uid,actif) => {
        await sb.from("profiles").update({actif:!actif}).eq("id",uid);
        setUsers(p=>p.map(u=>u.id===uid?{...u,actif:!actif}:u));
      };

      const OVL={position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"};
      const MBX=isMobile?{background:"#1E293B",borderRadius:"20px 20px 0 0",padding:"8px 16px 32px",width:"100%",border:"1px solid #334155",maxHeight:"90vh",overflowY:"auto"}:{background:"#1E293B",borderRadius:16,padding:24,width:420,maxWidth:"95vw",border:"1px solid #334155"};

      return(
        <div>
          {/* Modal création */}
          {modal&&<div style={OVL} onClick={()=>setModal(false)}><div style={MBX} onClick={e=>e.stopPropagation()}>
            {isMobile&&<div style={{width:36,height:4,background:"#334155",borderRadius:2,margin:"8px auto 16px"}}/>}
            <h3 style={{margin:"0 0 18px",fontWeight:800,fontSize:16}}>👤 Créer un utilisateur</h3>
            <div style={{marginBottom:12}}><L c="NOM COMPLET"/><input value={form.nom} onChange={e=>setForm(p=>({...p,nom:e.target.value}))} placeholder="Ex: Jean Dupont" style={INP()}/></div>
            <div style={{marginBottom:12}}><L c="EMAIL"/><input type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="jean@societe.fr" style={INP()}/></div>
            <div style={{marginBottom:12}}><L c="MOT DE PASSE PROVISOIRE"/><input type="text" value={form.pass} onChange={e=>setForm(p=>({...p,pass:e.target.value}))} placeholder="Min. 6 caractères" style={INP()}/></div>
            <div style={{marginBottom:18}}>
              <L c="RÔLE"/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {Object.entries(ROLES).map(([k,r])=>(
                  <button key={k} onClick={()=>setForm(p=>({...p,role:k}))} style={{background:form.role===k?r.bg:"#0F172A",border:`2px solid ${form.role===k?r.color:"#334155"}`,borderRadius:10,color:form.role===k?r.color:"#64748B",padding:"10px 8px",cursor:"pointer",fontWeight:700,fontSize:12,textAlign:"left",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:16}}>{r.icon}</span><span>{r.label}</span>
                  </button>
                ))}
              </div>
            </div>
            {err&&<div style={{background:"#EF444418",border:"1px solid #EF444440",borderRadius:8,padding:"9px 12px",marginBottom:12,color:"#EF4444",fontSize:12}}>⚠️ {err}</div>}
            <div style={{background:"#0F172A",borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:11,color:"#64748B"}}>
              💡 L'utilisateur recevra un email de confirmation. Il devra cliquer sur le lien pour activer son compte.
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setModal(false)} style={BTN("#334155",{flex:1})}>Annuler</button>
              <button onClick={createUser} disabled={saving} style={BTN(saving?"#334155":"#3B82F6",{flex:2})}>
                {saving?"Création…":"✅ Créer le compte"}
              </button>
            </div>
          </div></div>}

          {/* Modal changement de rôle */}
          {editUser&&<div style={OVL} onClick={()=>setEditUser(null)}><div style={{...MBX,maxWidth:380}} onClick={e=>e.stopPropagation()}>
            {isMobile&&<div style={{width:36,height:4,background:"#334155",borderRadius:2,margin:"8px auto 16px"}}/>}
            <h3 style={{margin:"0 0 6px",fontWeight:800,fontSize:15}}>🔄 Changer le rôle</h3>
            <p style={{color:"#64748B",fontSize:13,marginBottom:16}}>{editUser.nom}</p>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
              {Object.entries(ROLES).map(([k,r])=>(
                <button key={k} onClick={()=>updateRole(editUser.id,k)} style={{background:editUser.role===k?r.bg:"#0F172A",border:`2px solid ${editUser.role===k?r.color:"#334155"}`,borderRadius:10,color:editUser.role===k?r.color:"#94A3B8",padding:"11px 14px",cursor:"pointer",fontWeight:700,fontSize:13,textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:18}}>{r.icon}</span><span>{r.label}</span>
                  {editUser.role===k&&<span style={{marginLeft:"auto",fontSize:11}}>✓ Actuel</span>}
                </button>
              ))}
            </div>
            <button onClick={()=>setEditUser(null)} style={BTN("#334155",{width:"100%"})}>Fermer</button>
          </div></div>}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>👥 Équipe</h2>
              <p style={{margin:0,fontSize:12,color:"#64748B"}}>{users.length} utilisateur{users.length>1?"s":""}</p>
            </div>
            <button onClick={()=>setModal(true)} style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{padding:"10px 16px",fontSize:13})}>➕ Nouvel utilisateur</button>
          </div>

          {loading?<div style={{textAlign:"center",padding:40,color:"#64748B"}}>Chargement…</div>
            :<div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(320px,1fr))",gap:10}}>
              {users.map(u=>{
                const r=ROLES[u.role]||ROLES.installateur;
                return(
                  <div key={u.id} style={{background:u.actif?"#1E293B":"#141E2D",borderRadius:12,border:`1px solid ${u.actif?r.color+"40":"#334155"}`,padding:"14px 16px",opacity:u.actif?1:0.6}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div>
                        <div style={{fontWeight:800,fontSize:15,color:"#F1F5F9",marginBottom:4}}>{u.nom}</div>
                        <div style={{fontSize:12,color:"#64748B"}}>{u.email}</div>
                      </div>
                      <span style={{background:r.bg,color:r.color,padding:"3px 9px",borderRadius:20,fontSize:10,fontWeight:700,flexShrink:0,marginLeft:8}}>{r.icon} {r.label}</span>
                    </div>
                    <div style={{fontSize:11,color:"#475569",marginBottom:10}}>
                      Créé le {new Date(u.created_at).toLocaleDateString("fr-FR")} · {u.actif?"✅ Actif":"⛔ Désactivé"}
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>setEditUser(u)} style={BTN("#334155",{flex:1,fontSize:12})}>🔄 Rôle</button>
                      <button onClick={()=>toggleActif(u.id,u.actif)} style={{background:u.actif?"#EF444415":"#10B98115",border:`1px solid ${u.actif?"#EF444440":"#10B98140"}`,borderRadius:9,color:u.actif?"#EF4444":"#10B981",padding:"9px 14px",cursor:"pointer",fontWeight:700,fontSize:12,flex:1}}>
                        {u.actif?"Désactiver":"Réactiver"}
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          }
        </div>
      );
    }


    // ══════════════════════════════════════
    // ONGLET VENTES
    // ══════════════════════════════════════
    // ══════════════════════════════════════
    // ONGLET VENTES
    // ══════════════════════════════════════
    function VentesTab({isMobile, ventes, setVentes, stock, profile, fmt, role, onVenteSaved}) {
      const CABLES = stock.filter(s=>s.unite==="ml");
      const BORNES = stock.filter(s=>s.unite!=="ml");
      const canEdit = r => ["administrateur","commercial"].includes(r);
      const BRANDS = ["Easee","Ohme","Zaptec","V2C"];
      const BC = {"Easee":"#1A73E8","Ohme":"#00897B","Zaptec":"#7B1FA2","V2C":"#E53935"};

      const emptyForm = () => ({
        client:"", description:"", prix_ht:"", adresse:"",
        materiels:[], cables:[],
        date: new Date().toLocaleDateString("fr-FR"),
        par: profile?.nom||"",
        coords:null,
      });

      // viewMode: "list" | "stats" | "form"
      // On mount, check localStorage for a draft — if found, go straight to form
      const[viewMode,setViewMode]=useState(()=>{
        try {
          if(localStorage.getItem("vente_draft")) return "form";
          return localStorage.getItem("vente_view")||"list";
        } catch(e) { return "list"; }
      });
      const goToView=v=>{try{localStorage.setItem("vente_view",v);}catch(e){}setViewMode(v);};
      const[form,setForm]=useState(()=>{
        try {
          const d=localStorage.getItem("vente_draft");
          return d ? JSON.parse(d) : emptyForm();
        } catch(e) { return emptyForm(); }
      });
      const[mItem,setMItem]=useState({id:"",qty:""});
      const[cItem,setCItem]=useState({id:"",qty:""});
      const[search,setSearch]=useState("");
      const[editId,setEditId]=useState(null);
      const[delConf,setDelConf]=useState(null);

      const INP=(e={})=>({background:"#0F172A",border:"1px solid #334155",borderRadius:10,color:"#E2E8F0",padding:"10px 12px",fontSize:15,width:"100%",outline:"none",boxSizing:"border-box",...e});
      const BTN=(bg,e={})=>({background:bg,border:"none",borderRadius:10,color:"#FFF",padding:"10px 14px",cursor:"pointer",fontWeight:700,fontSize:13,...e});
      const L=({c})=><label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:4,letterSpacing:"0.05em"}}>{c}</label>;
      const OVL={position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"};
      const MBX=isMobile?{background:"#1E293B",borderRadius:"20px 20px 0 0",padding:"8px 16px 32px",width:"100%",border:"1px solid #334155",maxHeight:"90vh",overflowY:"auto"}:{background:"#1E293B",borderRadius:16,padding:24,width:440,maxWidth:"95vw",border:"1px solid #334155",maxHeight:"90vh",overflowY:"auto"};
      const Handle=()=>isMobile?<div style={{width:36,height:4,background:"#334155",borderRadius:2,margin:"8px auto 16px"}}/>:null;

      // Save form to localStorage on every change
      useEffect(()=>{
        if(viewMode==="form"){
          try { localStorage.setItem("vente_draft", JSON.stringify(form)); } catch(e){}
        }
      },[form, viewMode]);

      const clearDraft = () => { try { localStorage.removeItem("vente_draft"); } catch(e){} };

      const openCreate = () => {
        setEditId(null);
        setForm(emptyForm());
        setMItem({id:"",qty:""});
        setCItem({id:"",qty:""});
        goToView("form");
      };
      const openEdit = v => {
        setEditId(v.id);
        setForm({...v});
        setMItem({id:"",qty:""});
        setCItem({id:"",qty:""});
        goToView("form");
      };
      const cancelForm = () => {
        clearDraft();
        goToView("list");
        setEditId(null);
      };
      const saveVente = async() => {
        if(!form.client||!form.prix_ht)return;
        let coords=form.coords||null;
        // Géocodage Nominatim si adresse fournie et pas encore geocodée
        if(form.adresse&&!coords){
          try{
            const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(form.adresse)}&limit=1`,{headers:{"Accept-Language":"fr"}});
            const j=await r.json();
            if(j&&j[0])coords={lat:parseFloat(j[0].lat),lng:parseFloat(j[0].lon),display:j[0].display_name};
          }catch(e){}
        }
        const entry={...form, prix_ht:Number(form.prix_ht), id:editId||Date.now(), coords};
        if(editId) setVentes(p=>p.map(v=>v.id===editId?entry:v));
        else { setVentes(p=>[entry,...p]); if(onVenteSaved) onVenteSaved(entry); }
        clearDraft();
        goToView("list");
        setEditId(null);
      };

      const addMat = () => {
        if(!mItem.id||!mItem.qty)return;
        const a=stock.find(s=>s.id===Number(mItem.id));
        setForm(p=>({...p,materiels:[...p.materiels.filter(x=>x.id!==mItem.id),{id:mItem.id,article:a?.article,cat:a?.cat,qty:Number(mItem.qty),prix_unit:a?.prix||0}]}));
        setMItem({id:"",qty:""});
      };
      const addCable = () => {
        if(!cItem.id||!cItem.qty)return;
        const a=stock.find(s=>s.id===Number(cItem.id));
        setForm(p=>({...p,cables:[...p.cables.filter(x=>x.id!==cItem.id),{id:cItem.id,article:a?.article,qty:Number(cItem.qty),prix_unit:a?.prix||0}]}));
        setCItem({id:"",qty:""});
      };

      const totalMat = f => (f.materiels||[]).reduce((s,m)=>s+m.qty*(m.prix_unit||0),0);
      const totalCab = f => (f.cables||[]).reduce((s,m)=>s+m.qty*(m.prix_unit||0),0);
      const caTotal  = ventes.reduce((s,v)=>s+Number(v.prix_ht||0),0);
      const mM = String(new Date().getMonth()+1).padStart(2,"0");
      const mY = String(new Date().getFullYear());
      const moisActuel = new Date().toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
      const caMonth = ventes.filter(v=>v.date&&v.date.split("/")[1]===mM&&v.date.split("/")[2]===mY).reduce((s,v)=>s+Number(v.prix_ht||0),0);
      const vendeurs = [...new Set(ventes.map(v=>v.par||"Inconnu"))].sort();
      const caByVendeur = vendeurs.map(nom=>({
        nom,
        ca: ventes.filter(v=>(v.par||"Inconnu")===nom).reduce((s,v)=>s+Number(v.prix_ht||0),0),
        nb: ventes.filter(v=>(v.par||"Inconnu")===nom).length,
        caMois: ventes.filter(v=>(v.par||"Inconnu")===nom&&v.date&&v.date.split("/")[1]===mM&&v.date.split("/")[2]===mY).reduce((s,v)=>s+Number(v.prix_ht||0),0),
      })).sort((a,b)=>b.ca-a.ca);
      const ventesParBrand = BRANDS.map(brand=>({
        brand,
        list: ventes.filter(v=>(v.materiels||[]).some(m=>m.cat===brand)),
        bornes: ventes.reduce((s,v)=>(v.materiels||[]).filter(m=>m.cat===brand).reduce((ss,m)=>ss+m.qty,0)+s,0),
      }));
      const filteredVentes = ventes.filter(v=>!search||(v.client||"").toLowerCase().includes(search.toLowerCase())||(v.par||"").toLowerCase().includes(search.toLowerCase()));

      // ══ VUE FORMULAIRE (page complète, pas de modal) ══
      if(viewMode==="form") return (
        <div>
          {/* Bandeau brouillon */}
          <div style={{background:"#10B98115",border:"1px solid #10B98140",borderRadius:10,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#10B981"}}>
            <span style={{fontSize:16}}>💾</span>
            <span style={{fontWeight:600}}>Brouillon auto-sauvegardé — tu peux changer d'onglet ou de page, ta saisie est conservée.</span>
          </div>

          <div style={{background:"#1E293B",borderRadius:14,border:"1px solid #334155",padding:isMobile?16:24,maxWidth:620}}>
            <h3 style={{margin:"0 0 20px",fontWeight:800,fontSize:17}}>{editId?"✏️ Modifier la vente":"💰 Nouvelle vente"}</h3>

            {/* Client + Date */}
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr auto",gap:10,marginBottom:10}}>
              <div><L c="CLIENT"/><input value={form.client} onChange={e=>setForm(p=>({...p,client:e.target.value}))} placeholder="Nom du client ou société" style={INP()}/></div>
              <div><L c="DATE"/><input value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={INP({width:isMobile?"100%":115})}/></div>
            </div>
            {/* Adresse */}
            <div style={{marginBottom:14}}>
              <L c="ADRESSE D'INSTALLATION"/>
              <div style={{position:"relative"}}>
                <input value={form.adresse||""} onChange={e=>setForm(p=>({...p,adresse:e.target.value,coords:null}))} placeholder="Ex: 12 rue des Lilas, 67000 Strasbourg" style={INP()}/>
                {form.coords&&<div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"#10B981",fontWeight:700}}>📍 Géolocalisé</div>}
              </div>
              {form.adresse&&!form.coords&&<div style={{fontSize:10,color:"#64748B",marginTop:4}}>📍 Sera géocodé automatiquement à l'enregistrement</div>}
            </div>

            {/* Matériel */}
            <div style={{marginBottom:14}}>
              <L c="MATÉRIEL (BORNES & ACCESSOIRES)"/>
              <div style={{display:"flex",gap:6,marginBottom:6}}>
                <select value={mItem.id} onChange={e=>setMItem(p=>({...p,id:e.target.value}))} style={{...INP(),flex:2}}>
                  <option value="">Choisir un article…</option>
                  {BORNES.map(s=><option key={s.id} value={s.id}>{s.cat} — {s.article} ({fmt(s.prix)})</option>)}
                </select>
                <input type="number" min="1" value={mItem.qty} onChange={e=>setMItem(p=>({...p,qty:e.target.value}))} placeholder="Qté" style={{...INP(),width:65,textAlign:"center"}}/>
                <button onClick={addMat} style={BTN("#3B82F6",{padding:"10px 16px",fontSize:18})}>+</button>
              </div>
              {form.materiels.map(m=>(
                <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#0F172A",borderRadius:8,padding:"8px 12px",marginBottom:5}}>
                  <span style={{fontSize:13}}>{m.article}</span>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:13,color:"#10B981",fontWeight:600}}>{m.qty}×</span>
                    <button onClick={()=>setForm(p=>({...p,materiels:p.materiels.filter(x=>x.id!==m.id)}))} style={{background:"#EF444420",border:"none",borderRadius:5,color:"#EF4444",cursor:"pointer",padding:"3px 9px",fontSize:13}}>✕</button>
                  </div>
                </div>
              ))}
            </div>

            {/* Câbles */}
            <div style={{marginBottom:14}}>
              <L c="CÂBLES (ML)"/>
              <div style={{display:"flex",gap:6,marginBottom:6}}>
                <select value={cItem.id} onChange={e=>setCItem(p=>({...p,id:e.target.value}))} style={{...INP(),flex:2}}>
                  <option value="">Choisir un câble…</option>
                  {CABLES.map(s=><option key={s.id} value={s.id}>{s.article} ({fmt(s.prix)}/ml)</option>)}
                </select>
                <input type="number" min="1" value={cItem.qty} onChange={e=>setCItem(p=>({...p,qty:e.target.value}))} placeholder="ml" style={{...INP(),width:65,textAlign:"center"}}/>
                <button onClick={addCable} style={BTN("#3B82F6",{padding:"10px 16px",fontSize:18})}>+</button>
              </div>
              {form.cables.map(m=>(
                <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#0F172A",borderRadius:8,padding:"8px 12px",marginBottom:5}}>
                  <span style={{fontSize:13}}>{m.article}</span>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:13,color:"#10B981",fontWeight:600}}>{m.qty} ml</span>
                    <button onClick={()=>setForm(p=>({...p,cables:p.cables.filter(x=>x.id!==m.id)}))} style={{background:"#EF444420",border:"none",borderRadius:5,color:"#EF4444",cursor:"pointer",padding:"3px 9px",fontSize:13}}>✕</button>
                  </div>
                </div>
              ))}
            </div>

            {/* Prix HT */}
            <div style={{marginBottom:14}}>
              <L c="PRIX DE VENTE HT (€)"/>
              <input type="number" step="0.01" value={form.prix_ht} onChange={e=>setForm(p=>({...p,prix_ht:e.target.value}))} placeholder="Ex: 1250.00" style={INP()}/>
            </div>

            {/* Marge */}
            {Number(form.prix_ht)>0&&(form.materiels.length>0||form.cables.length>0)&&(()=>{
              const cout=totalMat(form)+totalCab(form);
              const marge=Number(form.prix_ht)-cout;
              const pct=cout>0?((marge/Number(form.prix_ht))*100).toFixed(1):null;
              return <div style={{background:marge>=0?"#10B98115":"#EF444415",border:`1px solid ${marge>=0?"#10B98140":"#EF444440"}`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontWeight:700,color:marge>=0?"#10B981":"#EF4444",fontSize:13}}>
                {marge>=0?"📈":"📉"} Marge estimée : {fmt(marge)} {pct&&`(${pct}%)`}
              </div>;
            })()}

            {/* Description */}
            <div style={{marginBottom:20}}>
              <L c="DESCRIPTION / NOTES"/>
              <textarea value={form.description||""} onChange={e=>setForm(p=>({...p,description:e.target.value}))} placeholder="Détails du projet, conditions particulières…" style={{...INP(),height:90,resize:"none",lineHeight:1.6}}/>
            </div>

            <div style={{display:"flex",gap:8}}>
              <button onClick={cancelForm} style={BTN("#334155",{flex:1})}>Annuler</button>
              <button onClick={saveVente} disabled={!form.client||!form.prix_ht} style={BTN(!form.client||!form.prix_ht?"#1E293B":"linear-gradient(135deg,#10B981,#059669)",{flex:2,padding:"13px"})}>
                {editId?"💾 Mettre à jour":"💰 Enregistrer la vente"}
              </button>
            </div>
          </div>
        </div>
      );

      // ══ MODAL SUPPRESSION ══
      const DelModal = () => delConf&&(
        <div style={OVL} onClick={()=>setDelConf(null)}><div style={{...MBX,maxWidth:360,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
          <Handle/>
          <div style={{fontSize:44,marginBottom:10}}>🗑️</div>
          <h3 style={{margin:"0 0 8px",fontWeight:800}}>Supprimer cette vente ?</h3>
          <p style={{color:"#64748B",fontSize:13,margin:"0 0 20px"}}><strong style={{color:"#E2E8F0"}}>{delConf.client}</strong> — {fmt(delConf.prix_ht)}</p>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setDelConf(null)} style={BTN("#334155",{flex:1})}>Annuler</button>
            <button onClick={()=>{setVentes(p=>p.filter(v=>v.id!==delConf.id));setDelConf(null);}} style={BTN("#EF4444",{flex:1})}>Supprimer</button>
          </div>
        </div></div>
      );

      // ══ VUE LISTE ══
      if(viewMode==="list") return (
        <div>
          <DelModal/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>💰 Ventes & Chiffre d'affaires</h2>
              <p style={{margin:0,fontSize:12,color:"#64748B"}}>{ventes.length} vente{ventes.length>1?"s":""} · {moisActuel}</p>
            </div>
            <div style={{display:"flex",gap:8}}>
              <div style={{display:"flex",background:"#1E293B",borderRadius:10,border:"1px solid #334155",overflow:"hidden"}}>
                <button onClick={()=>goToView("list")} style={{padding:"7px 14px",background:"#3B82F6",border:"none",color:"#FFF",cursor:"pointer",fontSize:12,fontWeight:700}}>📋 Ventes</button>
                <button onClick={()=>goToView("stats")} style={{padding:"7px 14px",background:"transparent",border:"none",color:"#64748B",cursor:"pointer",fontSize:12,fontWeight:700}}>📊 Stats</button>
              </div>
              {canEdit(role)&&<button onClick={openCreate} style={BTN("linear-gradient(135deg,#10B981,#059669)",{padding:"10px 16px",fontSize:13})}>➕ Nouvelle vente</button>}
            </div>
          </div>

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(3,1fr)",gap:8,marginBottom:18}}>
            {[
              {l:"CA Total",v:fmt(caTotal),c:"#10B981",i:"💶",sub:`${ventes.length} vente(s)`},
              {l:"CA ce mois",v:fmt(caMonth),c:"#3B82F6",i:"📅",sub:moisActuel},
              {l:"Panier moyen",v:ventes.length>0?fmt(caTotal/ventes.length):"—",c:"#F59E0B",i:"📊",sub:"par vente"},
            ].map(({l,v,c,i,sub})=>(
              <div key={l} style={{background:"#1E293B",borderRadius:12,padding:"14px 16px",border:`1px solid ${c}30`}}>
                <div style={{fontSize:20,marginBottom:5}}>{i}</div>
                <div style={{fontSize:isMobile?15:19,fontWeight:800,color:c,lineHeight:1}}>{v}</div>
                <div style={{fontSize:11,color:"#64748B",marginTop:4}}>{l}</div>
                <div style={{fontSize:10,color:"#475569",marginTop:2}}>{sub}</div>
              </div>
            ))}
          </div>

          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher client, vendeur…" style={{...INP(),marginBottom:12,fontSize:13}}/>

          {filteredVentes.length===0
            ?<div style={{textAlign:"center",padding:"50px 0",color:"#475569"}}><div style={{fontSize:40,marginBottom:8}}>💰</div><div style={{fontWeight:700}}>{canEdit(role)?"Cliquez sur + Nouvelle vente pour commencer":"Aucune vente enregistrée."}</div></div>
            :<div style={{display:"flex",flexDirection:"column",gap:10}}>
              {filteredVentes.map(v=>(
                <div key={v.id} style={{background:"#1E293B",borderRadius:14,border:"1px solid #10B98130",padding:"14px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div style={{flex:1,paddingRight:10}}>

                    <div style={{textAlign:"right",flexShrink:0}}>

                  {(v.materiels?.length>0||v.cables?.length>0)&&(

                      {v.materiels?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:v.cables?.length>0?6:0}}>
                        {v.materiels.map((m,i)=>{const col=BC[m.cat]||"#94A3B8";return<span key={i} style={{background:col+"20",border:`1px solid ${col}40`,borderRadius:6,padding:"2px 8px",fontSize:11,color:col,fontWeight:600}}>{m.qty}× {m.article}</span>;})}
                      </div>}
                      {v.cables?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        {v.cables.map((m,i)=><span key={i} style={{background:"#55832520",border:"1px solid #55832540",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#A3C45A",fontWeight:600}}>{m.qty}ml {m.article}</span>)}
                      </div>}
                    </div>
                  )}
                  {canEdit(role)&&<div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                    <button onClick={()=>openEdit(v)} style={BTN("#334155",{padding:"6px 12px",fontSize:12})}>✏️ Modifier</button>
                    <button onClick={()=>setDelConf(v)} style={{background:"#EF444415",border:"1px solid #EF444430",borderRadius:8,color:"#EF4444",padding:"6px 10px",cursor:"pointer",fontSize:12,fontWeight:700}}>🗑️</button>
                  </div>}
                </div>
              ))}
            </div>
          }
        </div>
      );

      // ══ VUE STATS ══
      return (
        <div>
          <DelModal/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>📊 Statistiques de ventes</h2>
              <p style={{margin:0,fontSize:12,color:"#64748B"}}>{moisActuel}</p>
            </div>
            <div style={{display:"flex",background:"#1E293B",borderRadius:10,border:"1px solid #334155",overflow:"hidden"}}>
              <button onClick={()=>goToView("list")} style={{padding:"7px 14px",background:"transparent",border:"none",color:"#64748B",cursor:"pointer",fontSize:12,fontWeight:700}}>📋 Ventes</button>
              <button onClick={()=>goToView("stats")} style={{padding:"7px 14px",background:"#3B82F6",border:"none",color:"#FFF",cursor:"pointer",fontSize:12,fontWeight:700}}>📊 Stats</button>
            </div>
          </div>

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(3,1fr)",gap:8,marginBottom:18}}>
            {[
              {l:"CA Total",v:fmt(caTotal),c:"#10B981",i:"💶",sub:`${ventes.length} vente(s)`},
              {l:"CA ce mois",v:fmt(caMonth),c:"#3B82F6",i:"📅",sub:moisActuel},
              {l:"Panier moyen",v:ventes.length>0?fmt(caTotal/ventes.length):"—",c:"#F59E0B",i:"📊",sub:"par vente"},
            ].map(({l,v,c,i,sub})=>(
              <div key={l} style={{background:"#1E293B",borderRadius:12,padding:"14px 16px",border:`1px solid ${c}30`}}>
                <div style={{fontSize:20,marginBottom:5}}>{i}</div>
                <div style={{fontSize:isMobile?15:19,fontWeight:800,color:c,lineHeight:1}}>{v}</div>
                <div style={{fontSize:11,color:"#64748B",marginTop:4}}>{l}</div>
                <div style={{fontSize:10,color:"#475569",marginTop:2}}>{sub}</div>
              </div>
            ))}
          </div>

          {/* CA par vendeur */}
          <div style={{background:"#1E293B",borderRadius:14,border:"1px solid #334155",padding:16,marginBottom:16}}>
            <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800}}>👤 CA par vendeur</h3>
            {vendeurs.length===0?<p style={{color:"#475569",fontSize:13}}>Aucune vente enregistrée.</p>
              :<div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>
                    {["Vendeur","Nb ventes","CA Total","CA ce mois","Panier moy."].map(h=>(
                      <th key={h} style={{padding:"8px 12px",textAlign:h==="Vendeur"?"left":"center",fontSize:10,fontWeight:700,color:"#64748B",textTransform:"uppercase",borderBottom:"1px solid #334155",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {caByVendeur.map((v,idx)=>{
                      const pct=caTotal>0?((v.ca/caTotal)*100).toFixed(0):0;
                      return(
                        <tr key={v.nom} style={{background:idx%2===0?"#1E293B":"#182030"}}>
                          <td style={{padding:"10px 12px",borderBottom:"1px solid #1E293B44"}}>
                            <div style={{fontWeight:700}}>{v.nom}</div>
                            <div style={{marginTop:4,background:"#0F172A",borderRadius:4,height:4,width:"100%"}}><div style={{background:"#3B82F6",height:4,borderRadius:4,width:`${pct}%`}}/></div>
                          </td>
                          <td style={{padding:"10px 12px",borderBottom:"1px solid #1E293B44",textAlign:"center",fontWeight:700}}>{v.nb}</td>
                          <td style={{padding:"10px 12px",borderBottom:"1px solid #1E293B44",textAlign:"center",fontWeight:800,color:"#10B981",fontSize:15}}>{fmt(v.ca)}</td>
                          <td style={{padding:"10px 12px",borderBottom:"1px solid #1E293B44",textAlign:"center",color:"#3B82F6",fontWeight:700}}>{fmt(v.caMois)}</td>
                          <td style={{padding:"10px 12px",borderBottom:"1px solid #1E293B44",textAlign:"center",color:"#F59E0B",fontWeight:700}}>{v.nb>0?fmt(v.ca/v.nb):"—"}</td>
                        </tr>
                      );
                    })}
                    <tr style={{background:"#0F172A",borderTop:"2px solid #334155"}}>
                      <td style={{padding:"10px 12px",fontWeight:800,color:"#F1F5F9"}}>🏆 TOTAL</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:800}}>{ventes.length}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:800,color:"#10B981",fontSize:15}}>{fmt(caTotal)}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:800,color:"#3B82F6"}}>{fmt(caMonth)}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:800,color:"#F59E0B"}}>{ventes.length>0?fmt(caTotal/ventes.length):"—"}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            }
          </div>

          {/* CA par marque */}
          <div style={{background:"#1E293B",borderRadius:14,border:"1px solid #334155",padding:16}}>
            <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800}}>⚡ Ventes par marque</h3>
            <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:10,marginBottom:16}}>
              {ventesParBrand.map(({brand,list:bv,bornes:nb})=>{
                const col=BC[brand]||"#94A3B8";
                return(
                  <div key={brand} style={{background:"#0F172A",borderRadius:12,padding:"12px 14px",border:`1px solid ${col}30`}}>
                    <div style={{fontSize:12,fontWeight:800,color:col,marginBottom:4}}>{brand}</div>
                    <div style={{fontSize:22,fontWeight:800,color:"#F1F5F9"}}>{bv.length}</div>
                    <div style={{fontSize:10,color:"#64748B",marginTop:2}}>vente{bv.length>1?"s":""}</div>
                    {nb>0&&<div style={{fontSize:11,color:col,marginTop:4,fontWeight:700}}>{nb} borne{nb>1?"s":""}</div>}
                  </div>
                );
              })}
            </div>
            {vendeurs.length>0&&<>
              <div style={{fontSize:11,fontWeight:700,color:"#64748B",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Détail par vendeur</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>
                    <th style={{padding:"8px 12px",textAlign:"left",fontSize:10,fontWeight:700,color:"#64748B",textTransform:"uppercase",borderBottom:"1px solid #334155"}}>Vendeur</th>
                    {BRANDS.map(b=><th key={b} style={{padding:"8px 12px",textAlign:"center",fontSize:10,fontWeight:700,color:BC[b],borderBottom:"1px solid #334155",whiteSpace:"nowrap"}}>{b}</th>)}
                  </tr></thead>
                  <tbody>
                    {vendeurs.map((nom,idx)=>(
                      <tr key={nom} style={{background:idx%2===0?"#1E293B":"#182030"}}>
                        <td style={{padding:"9px 12px",borderBottom:"1px solid #1E293B44",fontWeight:700}}>{nom}</td>
                        {BRANDS.map(brand=>{
                          const nb=ventes.filter(v=>(v.par||"Inconnu")===nom&&(v.materiels||[]).some(m=>m.cat===brand)).length;
                          const nbB=ventes.filter(v=>(v.par||"Inconnu")===nom).reduce((s,v)=>(v.materiels||[]).filter(m=>m.cat===brand).reduce((ss,m)=>ss+m.qty,0)+s,0);
                          const col=BC[brand]||"#94A3B8";
                          return <td key={brand} style={{padding:"9px 12px",borderBottom:"1px solid #1E293B44",textAlign:"center"}}>
                            {nb>0?<div><div style={{fontWeight:800,color:col,fontSize:14}}>{nb}</div><div style={{fontSize:10,color:"#64748B"}}>{nbB} borne{nbB>1?"s":""}</div></div>:<span style={{color:"#334155"}}>—</span>}
                          </td>;
                        })}
                      </tr>
                    ))}
                    <tr style={{background:"#0F172A",borderTop:"2px solid #334155"}}>
                      <td style={{padding:"9px 12px",fontWeight:800,color:"#F1F5F9"}}>TOTAL</td>
                      {BRANDS.map(brand=>{
                        const nb=ventes.filter(v=>(v.materiels||[]).some(m=>m.cat===brand)).length;
                        const nbB=ventes.reduce((s,v)=>(v.materiels||[]).filter(m=>m.cat===brand).reduce((ss,m)=>ss+m.qty,0)+s,0);
                        const col=BC[brand]||"#94A3B8";
                        return <td key={brand} style={{padding:"9px 12px",textAlign:"center",fontWeight:800,color:col}}>
                          {nb>0?<div><div>{nb}</div><div style={{fontSize:10}}>{nbB} borne{nbB>1?"s":""}</div></div>:<span style={{color:"#334155"}}>—</span>}
                        </td>;
                      })}
                    </tr>
                  </tbody>
                </table>
              </div>
            </>}
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════
    // ONGLET CHANTIER (pipeline complet)
    // ══════════════════════════════════════
    function ChantierTab({isMobile, chantiers, setChantiers, stock, hist, profile, fmt, role, goTo, BTN, INP, BDG}) {
      const canEdit = r => ["administrateur","installateur"].includes(r);

      const STATUTS_CH = {
        a_planifier: {label:"À planifier", color:"#F59E0B", bg:"#2D2008", icon:"📋", next:"planifie"},
        planifie:    {label:"Planifié",    color:"#3B82F6", bg:"#0F1F3D", icon:"📅", next:"en_cours"},
        en_cours:    {label:"En cours",    color:"#A855F7", bg:"#1E0A2D", icon:"🔧", next:"termine"},
        termine:     {label:"Terminé",     color:"#10B981", bg:"#0A2218", icon:"✅", next:null},
      };
      const CHECKLIST_ITEMS=[
        {key:"client_contacte",label:"Client contacté"},
        {key:"materiel_prepare",label:"Matériel préparé"},
        {key:"acces_confirme",label:"Accès confirmé"},
      ];

      const[tabView,setTabView]=useState("pipeline");
      const[editModal,setEditModal]=useState(null);
      const[delConf,setDelConf]=useState(null);
      const[newForm,setNewForm]=useState(null);
      const[mItem,setMItem]=useState({id:"",qty:""});
      const[cItem,setCItem]=useState({id:"",qty:""});
      const[calMonth,setCalMonth]=useState(new Date().getMonth());
      const[calYear,setCalYear]=useState(new Date().getFullYear());
      const[photosModal,setPhotosModal]=useState(null); // chantier en cours de visualisation
      const[lightbox,setLightbox]=useState(null);       // URL photo plein écran
      const[uploading,setUploading]=useState(false);

      const uploadPhotos=async(ch,files)=>{
        if(!files||files.length===0)return;
        setUploading(true);
        const urls=[];
        for(const file of Array.from(files)){
          const ext=file.name.split(".").pop();
          const path=`chantier-${ch.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
          const{data,error}=await sb.storage.from("chantier-photos").upload(path,file,{cacheControl:"3600",upsert:false});
          if(!error){
            const{data:pub}=sb.storage.from("chantier-photos").getPublicUrl(path);
            if(pub?.publicUrl)urls.push(pub.publicUrl);
          }
        }
        if(urls.length>0){
          const updated=chantiers.map(c2=>c2.id===ch.id?{...c2,photos:[...(c2.photos||[]),...urls]}:c2);
          setChantiers(updated);
          if(photosModal?.id===ch.id)setPhotosModal(prev=>({...prev,photos:[...(prev.photos||[]),...urls]}));
        }
        setUploading(false);
      };

      const deletePhoto=async(ch,url)=>{
        // Extract path from URL
        const path=url.split("/chantier-photos/")[1];
        if(path)await sb.storage.from("chantier-photos").remove([path]);
        const updated=chantiers.map(c2=>c2.id===ch.id?{...c2,photos:(c2.photos||[]).filter(p=>p!==url)}:c2);
        setChantiers(updated);
        if(photosModal?.id===ch.id)setPhotosModal(prev=>({...prev,photos:(prev.photos||[]).filter(p=>p!==url)}));
      };

      const L=({c})=><label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:4,letterSpacing:"0.05em"}}>{c}</label>;
      const OVL={position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"};
      const MBX=isMobile?{background:"#1E293B",borderRadius:"20px 20px 0 0",padding:"8px 16px 32px",width:"100%",border:"1px solid #334155",maxHeight:"94vh",overflowY:"auto"}:{background:"#1E293B",borderRadius:16,padding:24,width:560,maxWidth:"96vw",border:"1px solid #334155",maxHeight:"92vh",overflowY:"auto"};
      const Handle=()=>isMobile?<div style={{width:36,height:4,background:"#334155",borderRadius:2,margin:"8px auto 16px"}}/>:null;
      const CABLES=stock.filter(s=>s.unite==="ml");
      const BORNES=stock.filter(s=>s.unite!=="ml");
      const emptyNew={client:"",notes:"",date_installation:"",technicien:"",materiels:[],cables:[]};

      const reservations=useMemo(()=>{
        const r={};
        chantiers.filter(ch=>ch.statut!=="termine").forEach(ch=>{
          (ch.materiels||[]).forEach(m=>{const sid=Number(m.id);r[sid]=(r[sid]||0)+Number(m.qty||0);});
          (ch.cables||[]).forEach(m=>{const sid=Number(m.id);r[sid]=(r[sid]||0)+Number(m.qty||0);});
        });
        return r;
      },[chantiers]);

      const stockDispo=id=>Math.max(0,(stock.find(s=>s.id===id)?.stock||0)-(reservations[id]||0));
      const updateChantier=(id,patch)=>setChantiers(p=>p.map(ch=>ch.id===id?{...ch,...patch}:ch));

      const nextStatut=ch=>{
        const n=STATUTS_CH[ch.statut]?.next;
        if(!n)return;
        if(n==="termine"){
          const ns=stock.map(s=>{
            const u=(ch.materiels||[]).find(m=>Number(m.id)===s.id);
            const uc=(ch.cables||[]).find(m=>Number(m.id)===s.id);
            const q=(u?Number(u.qty):0)+(uc?Number(uc.qty):0);
            return q>0?{...s,stock:Math.max(0,s.stock-q)}:s;
          });
          const d=new Date().toLocaleDateString("fr-FR");
          const newHist=[
            ...(ch.materiels||[]).map(m=>({date:d,chantier:ch.client,article:m.article,cat:m.cat,unite:m.unite||"pce",qty:m.qty,par:ch.technicien||profile?.nom||""})),
            ...(ch.cables||[]).map(m=>({date:d,chantier:ch.client,article:m.article,cat:"Câble",unite:"ml",qty:m.qty,par:ch.technicien||profile?.nom||""})),
          ];
          const updated=chantiers.map(c2=>c2.id===ch.id?{...c2,statut:"termine",date_fin:d}:c2);
          setChantiers(updated);
          if(window._appState)window._appState.finishChantier(ns,newHist,updated);
        }else{
          updateChantier(ch.id,{statut:n});
        }
      };

      const addMat=(form,setForm)=>{
        if(!mItem.id||!mItem.qty)return;
        const a=stock.find(s=>s.id===Number(mItem.id));
        setForm(p=>({...p,materiels:[...p.materiels.filter(x=>x.id!==mItem.id),{id:mItem.id,article:a?.article,cat:a?.cat,unite:a?.unite||"pce",qty:Number(mItem.qty)}]}));
        setMItem({id:"",qty:""});
      };
      const addCab=(form,setForm)=>{
        if(!cItem.id||!cItem.qty)return;
        const a=stock.find(s=>s.id===Number(cItem.id));
        setForm(p=>({...p,cables:[...p.cables.filter(x=>x.id!==cItem.id),{id:cItem.id,article:a?.article,unite:"ml",qty:Number(cItem.qty)}]}));
        setCItem({id:"",qty:""});
      };

      const daysInMonth=(m,y)=>new Date(y,m+1,0).getDate();
      const firstDay=(m,y)=>(new Date(y,m,1).getDay()+6)%7;
      const chantiersInMonth=chantiers.filter(ch=>{
        if(!ch.date_installation)return false;
        const p=ch.date_installation.split("/");
        return p.length===3&&Number(p[1])-1===calMonth&&Number(p[2])===calYear;
      });
      const pipeline=s=>chantiers.filter(ch=>ch.statut===s);
      const statOrder=["a_planifier","planifie","en_cours"];
      const insufficientChantiers=chantiers.filter(ch=>ch.statut!=="termine"&&(ch.materiels||[]).some(m=>stockDispo(Number(m.id))<Number(m.qty)));

      return(
        <div>
          {editModal&&<div style={OVL} onClick={()=>setEditModal(null)}><div style={MBX} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <h3 style={{margin:"0 0 16px",fontWeight:800,fontSize:17}}>✏️ Modifier le chantier</h3>
            <div style={{marginBottom:12}}><L c="CLIENT"/><input value={editModal.client} onChange={e=>setEditModal(p=>({...p,client:e.target.value}))} style={INP()}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div><L c="DATE D'INSTALLATION"/><input value={editModal.date_installation||""} onChange={e=>setEditModal(p=>({...p,date_installation:e.target.value}))} placeholder="JJ/MM/AAAA" style={INP()}/></div>
              <div><L c="TECHNICIEN"/><input value={editModal.technicien||""} onChange={e=>setEditModal(p=>({...p,technicien:e.target.value}))} placeholder="Nom technicien" style={INP()}/></div>
            </div>
            <div style={{marginBottom:10}}>
              <L c="MATÉRIEL"/>
              <div style={{display:"flex",gap:6,marginBottom:6}}>
                <select value={mItem.id} onChange={e=>setMItem(p=>({...p,id:e.target.value}))} style={{...INP(),flex:2}}><option value="">Choisir…</option>{BORNES.map(s=><option key={s.id} value={s.id}>{s.cat} — {s.article}</option>)}</select>
                <input type="number" min="1" value={mItem.qty} onChange={e=>setMItem(p=>({...p,qty:e.target.value}))} placeholder="Qté" style={{...INP(),width:62,textAlign:"center"}}/>
                <button onClick={()=>addMat(editModal,setEditModal)} style={BTN("#3B82F6",{padding:"10px 14px",fontSize:16})}>+</button>
              </div>
              {(editModal.materiels||[]).map(m=>{const ins=stockDispo(Number(m.id))<Number(m.qty);return<div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#0F172A",borderRadius:8,padding:"7px 10px",marginBottom:4}}><span style={{fontSize:12,color:ins?"#EF4444":"#E2E8F0"}}>{m.article}</span><div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:12,fontWeight:700,color:ins?"#EF4444":"#10B981"}}>{m.qty}×</span>{ins&&<span style={{fontSize:10,color:"#EF4444"}}>⚠️{stockDispo(Number(m.id))}</span>}<button onClick={()=>setEditModal(p=>({...p,materiels:p.materiels.filter(x=>x.id!==m.id)}))} style={{background:"#EF444420",border:"none",borderRadius:5,color:"#EF4444",cursor:"pointer",padding:"2px 8px",fontSize:12}}>✕</button></div></div>;})}
            </div>
            <div style={{marginBottom:10}}>
              <L c="CÂBLES (ML)"/>
              <div style={{display:"flex",gap:6,marginBottom:6}}>
                <select value={cItem.id} onChange={e=>setCItem(p=>({...p,id:e.target.value}))} style={{...INP(),flex:2}}><option value="">Choisir…</option>{CABLES.map(s=><option key={s.id} value={s.id}>{s.article}</option>)}</select>
                <input type="number" min="1" value={cItem.qty} onChange={e=>setCItem(p=>({...p,qty:e.target.value}))} placeholder="ml" style={{...INP(),width:62,textAlign:"center"}}/>
