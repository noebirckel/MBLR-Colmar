    function MessagerieTab({isMobile, profile, authUser}) {
      const[channel,setChannel]=useState("general"); // "general" | userId (privé)
      const[messages,setMessages]=useState([]);
      const[users,setUsers]=useState([]);
      const[text,setText]=useState("");
      const[sending,setSending]=useState(false);
      const[unread,setUnread]=useState({});
      const[mention,setMention]=useState(null); // {type:"chantier"|"vente", label}
      const[showMention,setShowMention]=useState(false);
      const bottomRef=useRef(null);
      const inputRef=useRef(null);

      // Load users list
      useEffect(()=>{
        sb.from("profiles").select("id,nom,role,actif").then(({data})=>{
          if(data)setUsers(data.filter(u=>u.id!==authUser?.id&&u.actif!==false));
        });
      },[]);

      // Subscribe to messages realtime
      useEffect(()=>{
        setMessages([]);
        // Load existing messages
        const query=channel==="general"
          ?sb.from("messages").select("*").eq("channel","general").order("created_at",{ascending:true}).limit(100)
          :sb.from("messages").select("*").or(`and(channel.eq.${channel},sender_id.eq.${authUser?.id}),and(channel.eq.${authUser?.id},sender_id.eq.${channel})`).order("created_at",{ascending:true}).limit(100);
        query.then(({data})=>{ if(data)setMessages(data); });

        // Realtime subscription
        const sub=sb.channel("messages-"+channel)
          .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},(payload)=>{
            const m=payload.new;
            const isForMe=(m.channel==="general")||(m.channel===authUser?.id&&m.sender_id===channel)||(m.sender_id===authUser?.id&&m.channel===channel);
            if(isForMe)setMessages(p=>[...p,m]);
          }).subscribe();
        return()=>sub.unsubscribe();
      },[channel,authUser?.id]);

      // Auto scroll to bottom
      useEffect(()=>{
        bottomRef.current?.scrollIntoView({behavior:"smooth"});
      },[messages]);

      const sendMessage=async()=>{
        if(!text.trim()&&!mention)return;
        setSending(true);
        const content=mention?`[${mention.type.toUpperCase()}] ${mention.label}${text?" — "+text:""}`:text;
        await sb.from("messages").insert({
          channel: channel,
          sender_id: authUser?.id,
          sender_nom: profile?.nom||"Inconnu",
          sender_role: profile?.role||"",
          content,
          mention_type: mention?.type||null,
          mention_label: mention?.label||null,
          created_at: new Date().toISOString(),
        });
        setText("");setMention(null);setShowMention(false);setSending(false);
        inputRef.current?.focus();
      };

      const ROLE_COLORS={administrateur:"#A855F7",commercial:"#3B82F6",installateur:"#10B981",secretaire:"#F59E0B"};
      const ROLE_ICONS={administrateur:"👑",commercial:"💼",installateur:"🔧",secretaire:"📋"};

      const fmt_time=iso=>{
        const d=new Date(iso);
        const now=new Date();
        const isToday=d.toDateString()===now.toDateString();
        return isToday?d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}):d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"})+" "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
      };

      const currentUserName=channel==="general"?"Canal général":users.find(u=>u.id===channel)?.nom||"Inconnu";

      return(
        <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"240px 1fr",gap:12,height:isMobile?"auto":"78vh"}}>

          {/* SIDEBAR CANAUX */}
          <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"12px 10px",display:"flex",flexDirection:"column",gap:4,overflowY:"auto"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#4A6A9E",padding:"4px 8px",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>Canaux</div>
            <button onClick={()=>setChannel("general")} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",borderRadius:9,border:"none",background:channel==="general"?"#3B82F625":"transparent",cursor:"pointer",textAlign:"left",width:"100%"}}>
              <span style={{fontSize:16}}>💬</span>
              <span style={{fontSize:13,fontWeight:700,color:channel==="general"?"#3B82F6":"#7B96C8"}}>Général</span>
            </button>

            <div style={{fontSize:10,fontWeight:700,color:"#4A6A9E",padding:"12px 8px 4px",textTransform:"uppercase",letterSpacing:"0.05em"}}>Messages privés</div>
            {users.map(u=>(
              <button key={u.id} onClick={()=>setChannel(u.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",borderRadius:9,border:"none",background:channel===u.id?"#3B82F625":"transparent",cursor:"pointer",textAlign:"left",width:"100%"}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:ROLE_COLORS[u.role]||"#1B2D4F",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{ROLE_ICONS[u.role]||"👤"}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:700,color:channel===u.id?"#3B82F6":"#E8F0FF",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.nom}</div>
                  <div style={{fontSize:10,color:ROLE_COLORS[u.role]||"#4A6A9E"}}>{ROLE_ICONS[u.role]} {u.role}</div>
                </div>
              </button>
            ))}
          </div>

          {/* ZONE MESSAGES */}
          <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",display:"flex",flexDirection:"column",overflow:"hidden",minHeight:isMobile?"60vh":"auto"}}>
            {/* Header canal */}
            <div style={{padding:"12px 16px",borderBottom:"1px solid #1B2D4F",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
              <span style={{fontSize:18}}>{channel==="general"?"💬":"💌"}</span>
              <div>
                <div style={{fontWeight:800,fontSize:14,color:"#F0F6FF"}}>{currentUserName}</div>
                {channel!=="general"&&<div style={{fontSize:10,color:"#4A6A9E"}}>Conversation privée</div>}
              </div>
            </div>

            {/* Messages */}
            <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
              {messages.length===0&&<div style={{textAlign:"center",color:"#2E4D82",padding:"40px 0"}}>
                <div style={{fontSize:40,marginBottom:8}}>💬</div>
                <div style={{fontWeight:700}}>Aucun message</div>
                <div style={{fontSize:12,marginTop:4}}>Soyez le premier à écrire !</div>
              </div>}
              {messages.map((m,i)=>{
                const isMe=m.sender_id===authUser?.id;
                const prevSame=i>0&&messages[i-1].sender_id===m.sender_id;
                return(
                  <div key={m.id||i} style={{display:"flex",flexDirection:isMe?"row-reverse":"row",gap:8,alignItems:"flex-end"}}>
                    {!isMe&&!prevSame&&<div style={{width:28,height:28,borderRadius:"50%",background:ROLE_COLORS[m.sender_role]||"#1B2D4F",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{ROLE_ICONS[m.sender_role]||"👤"}</div>}
                    {!isMe&&prevSame&&<div style={{width:28,flexShrink:0}}/>}
                    <div style={{maxWidth:"70%"}}>
                      {!isMe&&!prevSame&&<div style={{fontSize:10,color:ROLE_COLORS[m.sender_role]||"#4A6A9E",fontWeight:700,marginBottom:3,marginLeft:4}}>{m.sender_nom}</div>}
                      <div style={{background:isMe?"linear-gradient(135deg,#3B82F6,#1D4ED8)":"#070D1A",borderRadius:isMe?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"9px 12px",position:"relative"}}>
                        {m.mention_type&&<div style={{fontSize:10,fontWeight:700,color:"#F59E0B",marginBottom:4,background:"#F59E0B15",borderRadius:5,padding:"2px 6px",display:"inline-block"}}>
                          {m.mention_type==="chantier"?"🔧":"💰"} {m.mention_label}
                        </div>}
                        <div style={{fontSize:13,color:"#E8F0FF",lineHeight:1.4,whiteSpace:"pre-wrap"}}>{m.mention_type?m.content.replace(`[${m.mention_type.toUpperCase()}] ${m.mention_label}${m.content.includes(" — ")?" — ":""}`,""): m.content}</div>
                        <div style={{fontSize:9,color:isMe?"#93C5FD":"#2E4D82",marginTop:4,textAlign:isMe?"left":"right"}}>{fmt_time(m.created_at)}</div>
                      </div>
                    </div>
                  </div>
                );
              })}
              <div ref={bottomRef}/>
            </div>

            {/* Zone saisie */}
            <div style={{padding:"12px 14px",borderTop:"1px solid #1B2D4F",flexShrink:0}}>
              {/* Mention sélectionnée */}
              {mention&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,background:"#F59E0B15",borderRadius:8,padding:"6px 10px"}}>
                <span style={{fontSize:12,color:"#F59E0B",fontWeight:700}}>{mention.type==="chantier"?"🔧":"💰"} {mention.label}</span>
                <button onClick={()=>setMention(null)} style={{marginLeft:"auto",background:"none",border:"none",color:"#4A6A9E",cursor:"pointer",fontSize:14}}>✕</button>
              </div>}

              <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                <textarea
                  ref={inputRef}
                  value={text}
                  onChange={e=>setText(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}}
                  placeholder="Écrire un message… (Entrée pour envoyer)"
                  rows={1}
                  style={{flex:1,background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,color:"#E8F0FF",padding:"10px 12px",fontSize:13,outline:"none",resize:"none",lineHeight:1.4,maxHeight:100,overflow:"auto",fontFamily:"inherit"}}
                />
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  <button title="Mentionner un chantier ou une vente" onClick={()=>setShowMention(p=>!p)} style={{background:"#1B2D4F",border:"none",borderRadius:8,color:"#7B96C8",width:36,height:36,cursor:"pointer",fontSize:16}}>@</button>
                  <button onClick={sendMessage} disabled={(!text.trim()&&!mention)||sending} style={{background:(!text.trim()&&!mention)||sending?"#1B2D4F":"linear-gradient(135deg,#3B82F6,#1D4ED8)",border:"none",borderRadius:8,color:"#FFF",width:36,height:36,cursor:"pointer",fontSize:16,fontWeight:700}}>↑</button>
                </div>
              </div>

              {/* Popup mention */}
              {showMention&&<div style={{marginTop:8,background:"#070D1A",borderRadius:10,border:"1px solid #1B2D4F",padding:10,maxHeight:160,overflowY:"auto"}}>
                <div style={{fontSize:10,fontWeight:700,color:"#4A6A9E",marginBottom:6,textTransform:"uppercase"}}>Mentionner…</div>
                {window._appState?.getChantiers?.()?.filter(ch=>ch.statut!=="termine").slice(0,5).map(ch=>(
                  <div key={ch.id} onClick={()=>{setMention({type:"chantier",label:ch.client});setShowMention(false);}} style={{padding:"6px 8px",borderRadius:7,cursor:"pointer",fontSize:12,color:"#E8F0FF",display:"flex",gap:6,alignItems:"center"}}>
                    <span>🔧</span>{ch.client}
                  </div>
                ))}
                {window._appState?.getVentes?.()?.slice(0,5).map(v=>(
                  <div key={v.id} onClick={()=>{setMention({type:"vente",label:v.client});setShowMention(false);}} style={{padding:"6px 8px",borderRadius:7,cursor:"pointer",fontSize:12,color:"#E8F0FF",display:"flex",gap:6,alignItems:"center"}}>
                    <span>💰</span>{v.client}
                  </div>
                ))}
              </div>}
            </div>
          </div>
        </div>
      );
    }

    function StatsTab({isMobile, ventes, chantiers, acomptes, stock, fmt, objectifs, setObjectifs, role}) {
      const[period,setPeriod]=useState(6); // nb de mois à afficher

      // Calculs CA par mois
      const caParMois=useMemo(()=>{
        const months=[];
        for(let i=period-1;i>=0;i--){
          const d=new Date();d.setMonth(d.getMonth()-i);
          const m=String(d.getMonth()+1).padStart(2,"0");
          const y=String(d.getFullYear());
          const label=d.toLocaleDateString("fr-FR",{month:"short",year:"2-digit"});
          const ca=ventes.filter(v=>v.date&&v.date.split("/")[1]===m&&v.date.split("/")[2]===y).reduce((s,v)=>s+Number(v.prix_ht||0),0);
          const nb=ventes.filter(v=>v.date&&v.date.split("/")[1]===m&&v.date.split("/")[2]===y).length;
          months.push({label,ca,nb,m,y});
        }
        return months;
      },[ventes,period]);

      const maxCA=Math.max(...caParMois.map(m=>m.ca),1);

      // CA par commercial
      const caParVendeur=useMemo(()=>{
        const map={};
        ventes.forEach(v=>{const k=v.par||"Inconnu";if(!map[k])map[k]={nom:k,ca:0,nb:0};map[k].ca+=Number(v.prix_ht||0);map[k].nb++;});
        return Object.values(map).sort((a,b)=>b.ca-a.ca);
      },[ventes]);
      const maxVendeur=Math.max(...caParVendeur.map(v=>v.ca),1);

      // Chantiers par statut
      const STATUTS_CH={a_planifier:{label:"À planifier",color:"#F59E0B"},planifie:{label:"Planifié",color:"#3B82F6"},en_cours:{label:"En cours",color:"#A855F7"},termine:{label:"Terminé",color:"#10B981"}};
      const chantiersParStatut=Object.entries(STATUTS_CH).map(([k,s])=>({...s,key:k,nb:chantiers.filter(c=>c.statut===k).length}));
      const totalChantiers=chantiers.length||1;

      // Acomptes
      const totalAcomptes=acomptes.reduce((s,a)=>s+Number(a.montant_acompte||0),0);
      const totalPaye=acomptes.filter(a=>a.statut==="paye").reduce((s,a)=>s+Number(a.montant_acompte||0),0);
      const totalEnvoy=acomptes.filter(a=>a.statut==="envoye").reduce((s,a)=>s+Number(a.montant_acompte||0),0);
      const totalAttente=acomptes.filter(a=>a.statut==="a_envoyer").reduce((s,a)=>s+Number(a.montant_acompte||0),0);

      // Stock valeur
      const valeurStock=stock.reduce((s,a)=>s+Number(a.stock||0)*Number(a.prix||0),0);
      const nbAlerts=stock.filter(s=>s.stock<=s.seuil).length;

      // KPIs globaux
      const caTotal=ventes.reduce((s,v)=>s+Number(v.prix_ht||0),0);
      const mM=String(new Date().getMonth()+1).padStart(2,"0");
      const mY=String(new Date().getFullYear());
      const caMois=ventes.filter(v=>v.date&&v.date.split("/")[1]===mM&&v.date.split("/")[2]===mY).reduce((s,v)=>s+Number(v.prix_ht||0),0);

      const Card=({icon,label,value,sub,color})=>(
        <div style={{background:"#0D1828",borderRadius:12,padding:"14px 16px",border:`1px solid ${color}25`}}>
          <div style={{fontSize:22,marginBottom:6}}>{icon}</div>
          <div style={{fontSize:isMobile?16:20,fontWeight:800,color}}>{value}</div>
          <div style={{fontSize:11,color:"#7B96C8",marginTop:2}}>{label}</div>
          {sub&&<div style={{fontSize:10,color:"#4A6A9E",marginTop:2}}>{sub}</div>}
        </div>
      );

      return(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>📊 Tableau de bord</h2>
              <p style={{margin:0,fontSize:12,color:"#4A6A9E"}}>Vue globale de l'activité</p>
            </div>
            <div style={{display:"flex",gap:5}}>
              {[3,6,12].map(p=>(
                <button key={p} onClick={()=>setPeriod(p)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${period===p?"#3B82F6":"#1B2D4F"}`,background:period===p?"#3B82F625":"transparent",color:period===p?"#3B82F6":"#4A6A9E",fontSize:12,fontWeight:700,cursor:"pointer"}}>{p} mois</button>
              ))}
            </div>
          </div>

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:10,marginBottom:20}}>
            <Card icon="💶" label="CA total" value={fmt(caTotal)} sub={`${ventes.length} ventes`} color="#10B981"/>
            <Card icon="📅" label="CA ce mois" value={fmt(caMois)} sub={`${ventes.filter(v=>v.date&&v.date.split("/")[1]===mM&&v.date.split("/")[2]===mY).length} ventes`} color="#3B82F6"/>
            <Card icon="🔧" label="Chantiers actifs" value={chantiers.filter(c=>c.statut!=="termine").length} sub={`${chantiers.filter(c=>c.statut==="termine").length} terminés`} color="#A855F7"/>
            <Card icon="✅" label="Acomptes encaissés" value={fmt(totalPaye)} sub={`${Math.round(totalAcomptes>0?(totalPaye/totalAcomptes)*100:0)}% du total`} color="#F59E0B"/>
          </div>

          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14,marginBottom:14}}>

            {/* GRAPHIQUE CA PAR MOIS */}
            <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"16px"}}>
              <h3 style={{margin:"0 0 16px",fontSize:14,fontWeight:800}}>💶 CA mensuel</h3>
              <div style={{display:"flex",alignItems:"flex-end",gap:6,height:140,paddingBottom:24,position:"relative"}}>
                {caParMois.map((m,i)=>{
                  const h=maxCA>0?Math.round((m.ca/maxCA)*120):0;
                  const isCurrent=m.m===mM&&m.y===mY;
                  return(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,height:"100%",justifyContent:"flex-end"}}>
                      <div title={`${fmt(m.ca)} — ${m.nb} vente(s)`} style={{width:"100%",height:h||2,background:isCurrent?"linear-gradient(180deg,#3B82F6,#1D4ED8)":"#1B2D4F",borderRadius:"4px 4px 0 0",minHeight:2,cursor:"default",transition:"height 0.3s"}}/>
                      <div style={{fontSize:9,color:isCurrent?"#3B82F6":"#2E4D82",fontWeight:isCurrent?700:400,textAlign:"center",lineHeight:1.2,position:"absolute",bottom:0}}>{m.label}</div>
                    </div>
                  );
                })}
              </div>
              {/* Légende valeurs */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                {caParMois.filter(m=>m.ca>0).slice(-3).map((m,i)=>(
                  <span key={i} style={{fontSize:10,color:"#4A6A9E"}}>{m.label}: <strong style={{color:"#10B981"}}>{fmt(m.ca)}</strong></span>
                ))}
              </div>
            </div>

            {/* CA PAR COMMERCIAL */}
            <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"16px"}}>
              <h3 style={{margin:"0 0 16px",fontSize:14,fontWeight:800}}>👤 CA par commercial</h3>
              {caParVendeur.length===0?<div style={{textAlign:"center",color:"#2E4D82",padding:"30px 0",fontSize:12}}>Aucune vente enregistrée</div>
                :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {caParVendeur.map((v,i)=>{
                    const pct=maxVendeur>0?Math.round((v.ca/maxVendeur)*100):0;
                    const colors=["#3B82F6","#10B981","#A855F7","#F59E0B","#EF4444"];
                    const col=colors[i%colors.length];
                    return(
                      <div key={v.nom}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                          <span style={{fontSize:12,fontWeight:700,color:"#E8F0FF"}}>{v.nom}</span>
                          <span style={{fontSize:12,color:col,fontWeight:800}}>{fmt(v.ca)}</span>
                        </div>
                        <div style={{background:"#070D1A",borderRadius:6,height:8,overflow:"hidden"}}>

                  {label:"📨 Envoyés",value:totalEnvoy,color:"#3B82F6",nb:acomptes.filter(a=>a.statut==="envoye").length},
                  {label:"📤 À envoyer",value:totalAttente,color:"#F59E0B",nb:acomptes.filter(a=>a.statut==="a_envoyer").length},

          {/* ══ OBJECTIFS COMMERCIAUX ══ */}

                        const objCA    = Number(obj.ca    || 0);
                        const objMarge = Number(obj.marge || 0);

                        // CA réel ce mois
                        const caReel = ventes
                          .filter(v=>(v.par||"Inconnu")===nom && v.date
                            && v.date.split("/")[1]===mM_now && v.date.split("/")[2]===mY_now)
                          .reduce((s,v)=>s+Number(v.prix_ht||0),0);

                        // Marge réelle (prix_ht - coût matériel)
                        const margeReelle = ventes
                          .filter(v=>(v.par||"Inconnu")===nom && v.date
                            && v.date.split("/")[1]===mM_now && v.date.split("/")[2]===mY_now)
                          .reduce((s,v)=>{
                            const cout=(v.materiels||[]).reduce((sc,m)=>sc+Number(m.prix_unit||0)*Number(m.qty||0),0)
                                      +(v.cables||[]).reduce((sc,m)=>sc+Number(m.prix_unit||0)*Number(m.qty||0),0);
                            return s+(Number(v.prix_ht||0)-cout);
                          },0);

                        const pctCA    = objCA    > 0 ? Math.min(100, Math.round((caReel/objCA)*100))    : null;
                        const pctMarge = objMarge > 0 ? Math.min(100, Math.round((margeReelle/objMarge)*100)) : null;

                        const colorCA    = pctCA===null?"#1B2D4F" : pctCA>=100?"#10B981" : pctCA>=70?"#3B82F6" : pctCA>=40?"#F59E0B":"#EF4444";
                        const colorMarge = pctMarge===null?"#1B2D4F" : pctMarge>=100?"#10B981" : pctMarge>=70?"#3B82F6" : pctMarge>=40?"#F59E0B":"#EF4444";

                        const[editMode,setEditMode]=useState(false);
                        const[draftCA,setDraftCA]  =useState(String(objCA||""));
                        const[draftMarge,setDraftMarge]=useState(String(objMarge||""));

                        const saveObj=()=>{
                          setObjectifs(p=>({...p,[oKey]:{ca:Number(draftCA)||0,marge:Number(draftMarge)||0}}));
                          setEditMode(false);
                        };

                        return (
                          <div key={nom} style={{background:"#070D1A",borderRadius:12,padding:"14px 16px",
                            border:"1px solid #1B2D4F"}}>
                            <div style={{display:"flex",justifyContent:"space-between",
                              alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
                              <div style={{display:"flex",alignItems:"center",gap:8}}>
                                <div style={{width:34,height:34,borderRadius:"50%",
                                  background:"linear-gradient(135deg,#1B2D4F,#112038)",
                                  border:"1px solid #1B2D4F",display:"flex",alignItems:"center",
                                  justifyContent:"center",fontSize:15,flexShrink:0}}>💼</div>
                                <div>
                                  <div style={{fontWeight:800,fontSize:14,color:"#F0F6FF"}}>{nom}</div>
                                  <div style={{fontSize:11,color:"#4A6A9E"}}>
                                    {ventes.filter(v=>(v.par||"Inconnu")===nom&&v.date

                                      <button onClick={saveObj} style={{

                                        border:"none",borderRadius:8,color:"#FFF",

                                        fontFamily:'"Outfit",sans-serif',
                                        boxShadow:"0 2px 10px rgba(59,130,246,0.3)"}}>💾 Sauver</button>
                                    </div>
                                  : <button onClick={()=>{setDraftCA(String(objCA||""));setDraftMarge(String(objMarge||""));setEditMode(true);}} style={{
                                      background:"rgba(59,130,246,0.08)",border:"1px solid #1B2D4F",
                                      borderRadius:8,color:"#7B96C8",padding:"6px 12px",cursor:"pointer",
                                      fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>
                                      {objCA||objMarge?"✏️ Modifier":"➕ Fixer objectif"}
                                    </button>
                              )}
                            </div>

                            {/* Formulaire édition */}
                            {editMode&&(
                              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,
                                marginBottom:14,padding:"12px",background:"#0D1828",borderRadius:10,
                                border:"1px solid #1B2D4F"}}>
                                <div>
                                  <label style={{display:"block",fontSize:10,fontWeight:700,
                                    color:"#4A6A9E",marginBottom:6,textTransform:"uppercase",
                                    letterSpacing:"0.08em"}}>Objectif CA (€ HT)</label>
                                  <input type="number" value={draftCA}
                                    onChange={e=>setDraftCA(e.target.value)}
                                    placeholder="Ex: 15000"
                                    style={{width:"100%",background:"#070D1A",border:"1px solid #1B2D4F",
                                      borderRadius:8,color:"#F0F6FF",padding:"10px 12px",fontSize:14,
                                      outline:"none",boxSizing:"border-box",fontFamily:'"Outfit",sans-serif'}}/>
                                </div>
                                <div>
                                  <label style={{display:"block",fontSize:10,fontWeight:700,
                                    color:"#4A6A9E",marginBottom:6,textTransform:"uppercase",
                                    letterSpacing:"0.08em"}}>Objectif marge (€)</label>
                                  <input type="number" value={draftMarge}
                                    onChange={e=>setDraftMarge(e.target.value)}
                                    placeholder="Ex: 3000"
                                    style={{width:"100%",background:"#070D1A",border:"1px solid #1B2D4F",
                                      borderRadius:8,color:"#F0F6FF",padding:"10px 12px",fontSize:14,
                                      outline:"none",boxSizing:"border-box",fontFamily:'"Outfit",sans-serif'}}/>
                                </div>
                              </div>
                            )}

                            {/* Barres de progression */}
                            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:12}}>

                              {/* CA */}
                              <div>
                                <div style={{display:"flex",justifyContent:"space-between",
                                  alignItems:"baseline",marginBottom:6}}>
                                  <span style={{fontSize:11,fontWeight:700,color:"#7B96C8"}}>
                                    💶 Chiffre d'affaires
                                  </span>
                                  {pctCA!==null&&(
                                    <span style={{fontSize:12,fontWeight:800,color:colorCA}}>
                                      {pctCA}%
                                    </span>
                                  )}
                                </div>
                                <div style={{background:"#1B2D4F",borderRadius:8,height:10,overflow:"hidden",marginBottom:5}}>
                                  <div style={{
                                    height:10,borderRadius:8,width:(pctCA||0)+"%",
                                    background:pctCA>=100
                                      ?"linear-gradient(90deg,#10B981,#059669)"
                                      :"linear-gradient(90deg,#3B82F6,#1D4ED8)",
                                    transition:"width 0.6s cubic-bezier(.4,0,.2,1)",
                                    boxShadow:pctCA>0?`0 0 8px ${colorCA}60`:"none"
                                  }}/>
                                </div>
                                <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                                  <span style={{color:colorCA,fontWeight:700}}>{fmt(caReel)}</span>
                                  <span style={{color:"#2E4D82"}}>
                                    {objCA>0?`/ ${fmt(objCA)}`:"Pas d'objectif fixé"}
                                  </span>
                                </div>
                                {pctCA>=100&&<div style={{fontSize:10,color:"#10B981",fontWeight:700,marginTop:4}}>
                                  🎉 Objectif atteint !
                                </div>}
                                {pctCA!==null&&pctCA<100&&objCA>0&&<div style={{fontSize:10,color:"#4A6A9E",marginTop:4}}>
                                  {fmt(objCA-caReel)} restants
                                </div>}
                              </div>

                              {/* MARGE */}
                              <div>
                                <div style={{display:"flex",justifyContent:"space-between",
                                  alignItems:"baseline",marginBottom:6}}>
                                  <span style={{fontSize:11,fontWeight:700,color:"#7B96C8"}}>
                                    📈 Marge
                                  </span>
                                  {pctMarge!==null&&(
                                    <span style={{fontSize:12,fontWeight:800,color:colorMarge}}>
                                      {pctMarge}%
                                    </span>
                                  )}
                                </div>
                                <div style={{background:"#1B2D4F",borderRadius:8,height:10,overflow:"hidden",marginBottom:5}}>
                                  <div style={{
                                    height:10,borderRadius:8,width:(pctMarge||0)+"%",
                                    background:pctMarge>=100
                                      ?"linear-gradient(90deg,#10B981,#059669)"
                                      :"linear-gradient(90deg,#8B5CF6,#6D28D9)",
                                    transition:"width 0.6s cubic-bezier(.4,0,.2,1)",
                                    boxShadow:pctMarge>0?`0 0 8px ${colorMarge}60`:"none"
                                  }}/>
                                </div>
                                <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                                  <span style={{color:colorMarge,fontWeight:700}}>{fmt(margeReelle)}</span>
                                  <span style={{color:"#2E4D82"}}>
                                    {objMarge>0?`/ ${fmt(objMarge)}`:"Pas d'objectif fixé"}
                                  </span>
                                </div>
                                {pctMarge>=100&&<div style={{fontSize:10,color:"#10B981",fontWeight:700,marginTop:4}}>
                                  🎉 Objectif atteint !
                                </div>}
                                {pctMarge!==null&&pctMarge<100&&objMarge>0&&<div style={{fontSize:10,color:"#4A6A9E",marginTop:4}}>
                                  {fmt(objMarge-margeReelle)} restants
                                </div>}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                }
              </div>
            );
          })()}

          {/* STOCK */}
          <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"16px"}}>
            <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800}}>📦 Stock</h3>
            <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:10}}>
              <Card icon="📦" label="Valeur totale stock" value={fmt(valeurStock)} sub={`${stock.length} références`} color="#3B82F6"/>
              <Card icon="🔴" label="Articles à commander" value={stock.filter(s=>s.stock<=s.seuil&&s.stock>0).length} sub="sous le seuil" color="#EF4444"/>
              <Card icon="⛔" label="Ruptures" value={stock.filter(s=>s.stock===0).length} sub="stock à zéro" color="#7C3AED"/>
              <Card icon="✅" label="Articles OK" value={stock.filter(s=>s.stock>s.seuil).length} sub="au-dessus du seuil" color="#10B981"/>
            </div>
          </div>
        </div>
      );
    }

    // Contacts SAV par défaut
    const DEFAULT_SAV_CONTACTS = [

    // TicketForm OUTSIDE SavTab to avoid re-mount on every keystroke
    function TicketForm({isMobile, form, onChange, onSave, onCancel, title, STATUTS, STATUTS_RESOLUS, stock}) {

        marginBottom:7,textTransform:"uppercase",letterSpacing:"0.08em"}}>{c}</label>;
      const INP = (e={}) => ({background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,
        color:"#F0F6FF",padding:"11px 14px",fontSize:14,width:"100%",outline:"none",
        boxSizing:"border-box",fontFamily:'"Outfit",sans-serif',transition:"border-color 0.2s",...e});
      const BTN = (bg,e={}) => ({background:bg,border:"none",borderRadius:10,color:"#FFF",
        padding:"10px 16px",cursor:"pointer",fontWeight:700,fontSize:13,
        fontFamily:'"Outfit",sans-serif',transition:"all 0.15s",...e});

        ? {background:"#0D1828",borderRadius:"20px 20px 0 0",padding:"8px 20px 36px",
           width:"100%",border:"1px solid #1B2D4F",maxHeight:"94vh",overflowY:"auto"}

           border:"1px solid #1B2D4F",maxHeight:"92vh",overflowY:"auto",
           boxShadow:"0 24px 60px rgba(0,0,0,0.6)"};
      const Handle = () => isMobile
        ? <div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"10px auto 18px"}}/>
        : null;

      return (
        <div style={MBX} onClick={e=>e.stopPropagation()}>

          <h3 style={{margin:"0 0 20px",fontWeight:800,fontSize:17,color:"#F0F6FF"}}>{title}</h3>

          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:12,marginBottom:14}}>
            <div><L c="Nom du client"/>
              <input value={form.client} onChange={e=>onChange("client",e.target.value)}
                placeholder="Société ou particulier" style={INP()}/></div>
            <div><L c="N° de série"/>
              <input value={form.num_serie} onChange={e=>onChange("num_serie",e.target.value)}

              <input value={form.modele} onChange={e=>onChange("modele",e.target.value)}
                placeholder="Ex: Copper SB" style={INP()}/></div>
          </div>

          <div style={{marginBottom:14}}><L c="Descriptif du problème"/>

                  color:form.statut===k?s.color:"#4A6A9E",
                  cursor:"pointer",fontSize:12,fontWeight:700,
                  fontFamily:'"Outfit",sans-serif',transition:"all 0.15s"

              ?"#112038":"linear-gradient(135deg,#3B82F6,#1D4ED8)",{flex:2,padding:"12px",
              boxShadow:!valid?"none":"0 4px 16px rgba(59,130,246,0.3)"})}>
              💾 Enregistrer
            </button>
          </div>
        </div>
      );

    function SavTab({isMobile, tickets, setTickets, profile, role}) {
