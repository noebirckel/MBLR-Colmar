          {/* ── VUE STATS SAV ── */}
          {tabView==="stats"&&(()=>{
            const total=tickets.length;
            const resolus=tickets.filter(t=>STATUTS_RESOLUS.includes(t.statut)).length;
            const actifs=tickets.filter(t=>!STATUTS_RESOLUS.includes(t.statut)).length;
            const txResol=total>0?Math.round((resolus/total)*100):0;
            const depuisRapport=tickets.filter(t=>t.origine==="rapport").length;
            const urgents=tickets.filter(t=>t.urgence).length;
            const nbBornesChangees=tickets.filter(t=>t.borne_changee).length;
            const nbDeplacements=tickets.filter(t=>t.deplacement_effectue).length;
            const regleNous=tickets.filter(t=>t.statut==="regle_nous").length;
            const regleMarque=tickets.filter(t=>t.statut==="regle_marque").length;
            const avecCause=tickets.filter(t=>t.cause_origine).length;
            const totalTempsPerdu=tickets.reduce((s,t)=>s+Number(t.temps_perdu||0),0);
            const totalCoutInstallation=tickets.reduce((s,t)=>s+Number(t.cout_installation||0),0);

            // Par marque
            const parMarque={};
            tickets.forEach(t=>{const k=t.marque||"Non renseigné";if(!parMarque[k])parMarque[k]={nb:0,resolus:0,bornes:0,depla:0};parMarque[k].nb++;if(STATUTS_RESOLUS.includes(t.statut))parMarque[k].resolus++;if(t.borne_changee)parMarque[k].bornes++;if(t.deplacement_effectue)parMarque[k].depla++;});
            const marques=Object.entries(parMarque).sort((a,b)=>b[1].nb-a[1].nb);

            // Par technicien
            const parTech={};
            tickets.forEach(t=>{
              const ch=t.chantier_id?(chantiers||[]).find(c=>c.id===t.chantier_id||c.id===Number(t.chantier_id)):null;
              const tech=ch?.technicien||t.par||"Non renseigné";
              if(!parTech[tech])parTech[tech]={nb:0,resolus:0,urgents:0};
              parTech[tech].nb++;
              if(STATUTS_RESOLUS.includes(t.statut))parTech[tech].resolus++;
              if(t.urgence)parTech[tech].urgents++;
            });
            const techs=Object.entries(parTech).sort((a,b)=>b[1].nb-a[1].nb);

            // Par cause
            const parCause={};
            tickets.filter(t=>t.cause_origine).forEach(t=>{const k=t.cause_origine;if(!parCause[k])parCause[k]=0;parCause[k]++;});

            const Bar=({val,max,color})=><div style={{flex:1,height:6,background:"#1B2D4F",borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${max>0?Math.round((val/max)*100):0}%`,background:color,borderRadius:3,transition:"width 0.4s"}}/>
            </div>;

            return(
              <div>
                {/* KPIs globaux */}
                <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:8,marginBottom:16}}>
                  {[
                    {v:total,l:"Total SAV",i:"🎫",c:"#3B82F6"},
                    {v:txResol+"%",l:"Taux résolution",i:"📈",c:txResol>=70?"#10B981":txResol>=40?"#F59E0B":"#EF4444"},
                    {v:nbDeplacements,l:"Déplacements",i:"🚗",c:"#F59E0B"},
                    {v:nbBornesChangees,l:"Bornes changées",i:"🔄",c:"#60A5FA"},
                  ].map(k=>(
                    <div key={k.l} style={{background:"#0D1828",borderRadius:12,border:"1px solid #1B2D4F",padding:"12px",textAlign:"center"}}>
                      <div style={{fontSize:18,marginBottom:3}}>{k.i}</div>
                      <div style={{fontSize:18,fontWeight:900,color:k.c}}>{k.v}</div>
                      <div style={{fontSize:10,color:"#4A6A9E",marginTop:2}}>{k.l}</div>
                    </div>
                  ))}
                </div>
                {/* KPIs coût & temps */}
                {(totalTempsPerdu>0||totalCoutInstallation>0)&&<div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"1fr 1fr",gap:8,marginBottom:16}}>
                  {totalTempsPerdu>0&&<div style={{background:"#F59E0B08",border:"1px solid #F59E0B25",borderRadius:12,padding:"12px",textAlign:"center"}}>
                    <div style={{fontSize:18,marginBottom:3}}>⏱️</div>
                    <div style={{fontSize:18,fontWeight:900,color:"#F59E0B"}}>{totalTempsPerdu}h</div>
                    <div style={{fontSize:10,color:"#4A6A9E",marginTop:2}}>Temps perdu total</div>
                  </div>}
                  {totalCoutInstallation>0&&<div style={{background:"#EF444408",border:"1px solid #EF444425",borderRadius:12,padding:"12px",textAlign:"center"}}>
                    <div style={{fontSize:18,marginBottom:3}}>💸</div>
                    <div style={{fontSize:16,fontWeight:900,color:"#EF4444"}}>{totalCoutInstallation.toLocaleString("fr-FR",{minimumFractionDigits:2})} €</div>
                    <div style={{fontSize:10,color:"#4A6A9E",marginTop:2}}>Coût erreurs installation</div>
                  </div>}
                </div>}

                {/* Répartition résolution */}
                <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"14px",marginBottom:12}}>
                  <h3 style={{margin:"0 0 12px",fontSize:13,fontWeight:800}}>📊 Répartition des clôtures</h3>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:12}}>
                    {[
                      {v:regleNous,l:"Réglé par nous",c:"#10B981",i:"✅",pct:resolus>0?Math.round((regleNous/resolus)*100):0},
                      {v:regleMarque,l:"Réglé par marque",c:"#8B5CF6",i:"🏭",pct:resolus>0?Math.round((regleMarque/resolus)*100):0},
                      {v:depuisRapport,l:"Depuis rapports",c:"#A855F7",i:"📋",pct:total>0?Math.round((depuisRapport/total)*100):0},
                      {v:urgents,l:"Urgences",c:"#EF4444",i:"🚨",pct:total>0?Math.round((urgents/total)*100):0},
                    ].map(k=>(
                      <div key={k.l} style={{background:"#070D1A",borderRadius:10,padding:"10px 12px",display:"flex",gap:8,alignItems:"center"}}>
                        <span style={{fontSize:16}}>{k.i}</span>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                            <span style={{fontSize:11,color:"#E8F0FF",fontWeight:600}}>{k.l}</span>
                            <span style={{fontSize:11,fontWeight:800,color:k.c}}>{k.v} <span style={{fontSize:9,color:"#4A6A9E"}}>({k.pct}%)</span></span>
                          </div>
                          <Bar val={k.v} max={total} color={k.c}/>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Analyse causes */}

                                🔍 {t.cause_origine?"Cause":"Analyser"}
                              </button>
                            )}
                            <button onClick={()=>setEditForm({...t})} style={{
                              background:"#112038",border:"1px solid #1B2D4F",borderRadius:8,
                              color:"#7B96C8",padding:"6px 10px",cursor:"pointer",fontSize:12,
                              fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>✏️</button>
                            {role!=="installateur"&&<button onClick={()=>setDelConf(t)} style={{
                              background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",
                              borderRadius:8,color:"#EF4444",padding:"6px 10px",cursor:"pointer",
                              fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>🗑️</button>}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            }
          </>)}
        </div>
      );
    }

    // ══════════════════════════════════════
    // ONGLET RAPPORTS D'INTERVENTION
    // ══════════════════════════════════════
    function RapportsTab({isMobile, rapports, setRapports, chantiers, setChantiers, savTickets, setSavTickets, ventes, profile, role, allProfiles}) {

      const emptyForm = (ch=null) => ({
        id: null,
        chantier_id:   ch?.id||"",
        chantier_nom:  ch?.client||"",
        adresse:       ch?.adresse||"",
        technicien:    profile?.nom||"",
        date:          new Date().toLocaleDateString("fr-FR"),
        heure_debut:   "",
        heure_fin:     "",
        type_travaux:  [],
        materiels_poses:[],
        observations:  "",
        problemes:     "",
        etat_final:    "ok",        // ok | a_revoir | urgence
        photos:        [],
        created_at:    new Date().toISOString(),
      });

      const TYPES_TRAVAUX = [
        "Borne de recharge",
        "Panneaux solaires",
      ];
      const ETAT = {
        ok:       {label:"Installation OK",   color:"#10B981", bg:"rgba(16,185,129,0.1)",  icon:"✅"},
        a_revoir: {label:"À revoir",          color:"#F59E0B", bg:"rgba(245,158,11,0.1)",  icon:"⚠️"},
        urgence:  {label:"Intervention urgente",color:"#EF4444",bg:"rgba(239,68,68,0.1)", icon:"🚨"},
      };

      const[view,setView]       = useState("liste");   // liste | form | detail
      const[form,setForm]       = useState(null);
      const[detailId,setDetailId] = useState(null);
      const[search,setSearch]   = useState("");
      const[uploading,setUploading] = useState(false);
      const[delConf,setDelConf] = useState(null);
      const fileRef = useRef(null);

      const F = (k,v) => setForm(p=>({...p,[k]:v}));

      const heuresTotal = (debut, fin) => {
        if(!debut||!fin) return null;
        const [h1,m1]=debut.split(":").map(Number);
        const [h2,m2]=fin.split(":").map(Number);
        const mins=(h2*60+m2)-(h1*60+m1);
        if(mins<=0) return null;
        const h=Math.floor(mins/60), m=mins%60;
        return `${h}h${m>0?m.toString().padStart(2,"0"):""}`;
      };

      const uploadPhotos = async(files) => {
        if(!files.length) return;
        setUploading(true);
        const urls=[];
        for(const file of files){
          const ext=file.name.split(".").pop();
          const path=`rapport-${form.id||Date.now()}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
          const{data,error}=await sb.storage.from("chantier-photos").upload(path,file,{cacheControl:"3600",upsert:false});
          if(!error){
            const{data:pub}=sb.storage.from("chantier-photos").getPublicUrl(path);
            if(pub?.publicUrl) urls.push(pub.publicUrl);
          }
        }
        F("photos",[...(form.photos||[]),...urls]);
        setUploading(false);
      };

      const saveRapport = () => {
        if(!form.chantier_nom||!form.technicien||!form.date) return;
        const entry = {...form, id: form.id||Date.now()};
        setRapports(p => form.id ? p.map(r=>r.id===form.id?entry:r) : [entry,...p]);

        // Auto-création SAV si rapport problématique (à revoir ou urgence)
        if((form.etat_final==="a_revoir"||form.etat_final==="urgence")&&setSavTickets){
          // Vérifier qu'un SAV lié n'existe pas déjà
          const alreadyHasSav=(savTickets||[]).some(t=>t.rapport_id===entry.id||t.chantier_id===form.chantier_id);
          if(!alreadyHasSav){
            // Chercher la vente liée pour récupérer la marque
            const ch=chantiers.find(c=>c.id===form.chantier_id||c.id===Number(form.chantier_id));
            const vente=ventes.find(v=>v.id===ch?.vente_id);
            const newTicket={
              id:Date.now(),
              client:form.chantier_nom,
              num_serie:vente?.num_serie||"",
              marque:vente?.marque||ch?.marque||"",
              modele:vente?.modele||"",
              description:form.etat_final==="urgence"
                ?`🚨 URGENCE — ${form.problemes||form.observations||"Intervention urgente signalée dans le rapport"}`
                :`⚠️ À REVOIR — ${form.problemes||form.observations||"Installation à revoir selon le rapport"}`,
              statut:"ouvert",
              notes:`Créé automatiquement depuis le rapport d'intervention du ${form.date}.\nTechnicien : ${form.technicien}`,
              date_ouverture:form.date||new Date().toLocaleDateString("fr-FR"),
              date_resolution:"",
              par:profile?.nom||"",
              rapport_id:entry.id,
              chantier_id:form.chantier_id,
              origine:"rapport",
              urgence:form.etat_final==="urgence",
            };
            setSavTickets(p=>[newTicket,...p]);
          }
        }

        // Si un chantier est lié, le passer en "terminé"
        // Facturation auto UNIQUEMENT si rapport OK, sinon "bloque" (décision consciente admin/secrétaire)
        if(form.chantier_id){
          const factureAuto = form.etat_final==="ok"
            ? {statut:"a_facturer"}
            : {statut:"bloque", raison:form.etat_final==="urgence"?"Intervention urgente signalée":"Intervention à revoir"};
          setChantiers(p=>p.map(ch=>{
            if(ch.id!==Number(form.chantier_id)&&ch.id!==form.chantier_id) return ch;
            if(ch.statut==="termine") return ch;
            return{...ch, statut:"termine", date_fin:form.date, rapport:entry, facture:ch.facture?.statut?ch.facture:factureAuto};
          }));
          const factureStatut = form.etat_final==="ok"
            ? {statut:"a_facturer"}
            : {statut:"bloque", raison:form.etat_final==="urgence"?"Intervention urgente signalée":"Intervention à revoir"};
          sb.from("chantiers").update({
            statut:"termine", date_fin:form.date, facture:factureStatut,
          }).eq("id",form.chantier_id).then(({error})=>{
            if(error)console.error("auto-termine chantier:",error.message);
          });
        }
        setView("liste"); setForm(null);
      };

      // Créer un chantier terminé depuis un rapport orphelin
      const creerChantierDepuisRapport = (r) => {
        const factureAuto = r.etat_final==="ok"
          ? {statut:"a_facturer"}
          : {statut:"bloque", raison:r.etat_final==="urgence"?"Intervention urgente signalée":"Intervention à revoir"};
        const newCh = {
          id: Date.now(),
          client: r.chantier_nom||"",
          adresse: r.adresse||"",
          technicien: r.technicien||"",
          date_fin: r.date||"",
          date_installation: r.date||"",
          date_creation: new Date().toLocaleDateString("fr-FR"),
          statut: "termine",
          materiels: r.materiels_poses||[],
          cables: [],
          rapport: r,
          facture: factureAuto,
          notes: "Créé automatiquement depuis rapport d'intervention",
          checklist: {},
          problemes_admin: [],
        };
        setChantiers(p=>[newCh,...p]);
        setRapports(p=>p.map(rp=>rp.id===r.id?{...rp,chantier_id:newCh.id}:rp));
        sb.from("chantiers").insert([{...newCh}]).then(({error})=>{
          if(error)console.error("create chantier from rapport:",error.message);
        });
      };

      const filtered = rapports.filter(r =>
        !search ||
        (r.chantier_nom||"").toLowerCase().includes(search.toLowerCase()) ||
        (r.technicien||"").toLowerCase().includes(search.toLowerCase())
      );

      const detail = rapports.find(r=>r.id===detailId);

      const OVL = {position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:999,
        display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",
        backdropFilter:"blur(4px)"};
      const L = ({c}) => <label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",
        marginBottom:7,textTransform:"uppercase",letterSpacing:"0.08em"}}>{c}</label>;
      const INP = (e={}) => ({background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,
        color:"#F0F6FF",padding:"11px 14px",fontSize:14,width:"100%",outline:"none",
        boxSizing:"border-box",fontFamily:'"Outfit",sans-serif',transition:"border-color 0.2s",...e});
      const BTN = (bg,e={}) => ({background:bg,border:"none",borderRadius:10,color:"#FFF",
        padding:"10px 16px",cursor:"pointer",fontWeight:700,fontSize:13,
        fontFamily:'"Outfit",sans-serif',transition:"all 0.15s",...e});

      // ── FORMULAIRE ──────────────────────────────────────────
      if(view==="form"&&form) return (
        <div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
            <button onClick={()=>{setView("liste");setForm(null);}} style={{
              background:"#112038",border:"1px solid #1B2D4F",borderRadius:8,
              color:"#7B96C8",padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:700,
              fontFamily:'"Outfit",sans-serif'}}>← Retour</button>
            <div>
              <h2 style={{margin:0,fontSize:17,fontWeight:800,color:"#F0F6FF",letterSpacing:"-0.3px"}}>
                {form.id?"✏️ Modifier le rapport":"📋 Nouveau rapport d'intervention"}
              </h2>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14}}>

            {/* COL GAUCHE */}
            <div style={{display:"flex",flexDirection:"column",gap:14}}>

              {/* Chantier */}
              <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📍 Chantier</h3>
                <div style={{marginBottom:12}}>
                  <L c="Chantier"/>
                  <select value={form.chantier_id}
                    onChange={e=>{
                      const ch=chantiers.find(c=>String(c.id)===e.target.value);
                      // Récupérer les matériels depuis le chantier + la vente liée
                      const vente=ch?.vente_id?(ventes||[]).find(v=>v.id===ch.vente_id):null;
                      const mats=[
                        ...(ch?.materiels||[]).map(m=>({nom:m.article||"",qty:m.qty||1,_from_vente:true})),
                        ...(ch?.cables||[]).map(m=>({nom:m.article+" (câble)"||"",qty:m.qty||1,unite:"ml",_from_vente:true})),
                      ];
                      // Compléter avec les matériels de la vente si pas déjà dans le chantier
                      if(vente){
                        (vente.materiels||[]).forEach(m=>{
                          if(!mats.find(x=>x.nom===m.article))mats.push({nom:m.article||"",qty:m.qty||1,_from_vente:true});
                        });
                        (vente.cables||[]).forEach(m=>{
                          const n=m.article+" (câble)";
                          if(!mats.find(x=>x.nom===n))mats.push({nom:n,qty:m.qty||1,unite:"ml",_from_vente:true});
                        });
                      }
                      setForm(p=>({...p,chantier_id:e.target.value,chantier_nom:ch?.client||"",adresse:ch?.adresse||"",materiels_poses:mats}));
                    }}
                    style={{...INP(),appearance:"none"}}>
                    <option value="">— Sélectionner un chantier —</option>
                    {chantiers
                      .filter(ch=>ch.client&&ch.statut!=="annule")
                      .sort((a,b)=>(a.client||"").localeCompare(b.client||""))
                      .map(ch=>(
                        <option key={ch.id} value={ch.id}>
                          {ch.client}{ch.date_installation?" ("+ch.date_installation+")":""} — {ch.statut==="termine"?"✅":"🔧"}
                        </option>
                      ))
                    }
                  </select>
                </div>
                <div style={{marginBottom:12}}>
                  <L c="Client / Nom chantier"/>
                  <input value={form.chantier_nom} onChange={e=>F("chantier_nom",e.target.value)}
                    placeholder="Nom du client" style={INP()}/>
                </div>
                <div>
                  <L c="Adresse"/>
                  <input value={form.adresse||""} onChange={e=>F("adresse",e.target.value)}
                    placeholder="Adresse du chantier" style={INP()}/>
                </div>
              </div>

              {/* Intervenant & temps */}
              <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>⏱️ Intervenant & durée</h3>
                <div style={{marginBottom:12}}>
                  <L c="Technicien"/>
                  {(()=>{
                    const opts=[...new Set([...((allProfiles||[]).filter(p=>p.role==="installateur"||p.role==="administrateur").map(p=>p.nom)),...chantiers.map(c=>c.technicien)].filter(Boolean))].sort();
                    return opts.length>0
                      ?<select value={form.technicien||""} onChange={e=>F("technicien",e.target.value)} style={{...INP(),appearance:"none"}}>
                          <option value="">— Choisir un technicien —</option>
                          {opts.map(n=><option key={n} value={n}>{n}</option>)}
                        </select>
                      :<input value={form.technicien} onChange={e=>F("technicien",e.target.value)} placeholder="Nom du technicien" style={INP()}/>;
                  })()}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                  <div>
                    <L c="Date"/>
                    <input value={form.date} onChange={e=>F("date",e.target.value)}
                      placeholder="jj/mm/aaaa" style={INP()}/>
                  </div>
                  <div>
                    <L c="Heure début"/>
                    <input type="time" value={form.heure_debut||""}
                      onChange={e=>F("heure_debut",e.target.value)} style={INP()}/>
                  </div>
                  <div>
                    <L c="Heure fin"/>
                    <input type="time" value={form.heure_fin||""}
                      onChange={e=>F("heure_fin",e.target.value)} style={INP()}/>
                  </div>
                </div>
                {form.heure_debut&&form.heure_fin&&heuresTotal(form.heure_debut,form.heure_fin)&&(
                  <div style={{marginTop:10,padding:"8px 12px",background:"rgba(59,130,246,0.08)",
                    borderRadius:8,fontSize:13,color:"#60A5FA",fontWeight:700}}>
                    ⏱️ Durée : {heuresTotal(form.heure_debut,form.heure_fin)}
                  </div>
                )}
              </div>

              {/* Types de travaux */}
              <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>🔧 Travaux réalisés</h3>
                <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                  {TYPES_TRAVAUX.map(t=>{
                    const sel=(form.type_travaux||[]).includes(t);
                    return(
                      <button key={t} onClick={()=>F("type_travaux",
                        sel?(form.type_travaux||[]).filter(x=>x!==t):[...(form.type_travaux||[]),t])}
                        style={{padding:"7px 12px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,
                          fontFamily:'"Outfit",sans-serif',transition:"all 0.15s",
                          background:sel?"rgba(59,130,246,0.15)":"#070D1A",
                          border:`1px solid ${sel?"#3B82F6":"#1B2D4F"}`,
                          color:sel?"#60A5FA":"#4A6A9E"}}>
                        {sel?"✓ ":""}{t}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* COL DROITE */}
            <div style={{display:"flex",flexDirection:"column",gap:14}}>

              {/* Matériels posés */}
              <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                <h3 style={{margin:"0 0 4px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📦 Matériels posés</h3>
                {(form.materiels_poses||[]).some(m=>m._from_vente)&&
                  <p style={{margin:"0 0 12px",fontSize:11,color:"#4A6A9E"}}>Pré-rempli depuis la vente — modifiable</p>
                }
                {(form.materiels_poses||[]).length===0&&<p style={{fontSize:12,color:"#2E4D82",marginBottom:10}}>Sélectionne un chantier pour pré-remplir automatiquement</p>}
                {(form.materiels_poses||[]).map((m,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"1fr auto auto",
                    gap:8,marginBottom:8,alignItems:"center"}}>
                    <input value={m.nom||""} onChange={e=>{
                      const arr=[...(form.materiels_poses||[])];
                      arr[i]={...arr[i],nom:e.target.value};F("materiels_poses",arr);
                    }} placeholder="Désignation" style={{...INP(),fontSize:13,padding:"9px 12px",
                      background:m._from_vente?"#0A1628":"#070D1A",
                      borderColor:m._from_vente?"#3B82F640":"#1B2D4F"}}/>
                    <input value={m.qty||""} type="number" min="1" onChange={e=>{
                      const arr=[...(form.materiels_poses||[])];
                      arr[i]={...arr[i],qty:e.target.value};F("materiels_poses",arr);
                    }} placeholder="Qté" style={{...INP(),width:60,fontSize:13,padding:"9px 10px"}}/>
                    <button onClick={()=>F("materiels_poses",(form.materiels_poses||[]).filter((_,j)=>j!==i))}
                      style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",
                        borderRadius:8,color:"#EF4444",padding:"9px 10px",cursor:"pointer",
                        fontSize:14,fontFamily:'"Outfit",sans-serif'}}>✕</button>
                  </div>
                ))}
                <div style={{borderTop:"1px dashed #1B2D4F",marginTop:8,paddingTop:10}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#4A6A9E",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>➕ Matériel supplémentaire</div>
                  <button onClick={()=>F("materiels_poses",[...(form.materiels_poses||[]),{nom:"",qty:1,_from_vente:false}])}
                    style={{...BTN("rgba(59,130,246,0.08)",{border:"1px solid #1B2D4F",
                      color:"#3B82F6",padding:"8px 14px",fontSize:12,width:"100%"})}}>
                    ➕ Ajouter une ligne
                  </button>
                </div>
              </div>

              {/* Observations */}
              <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📝 Observations</h3>
                <div style={{marginBottom:12}}>
                  <L c="Compte-rendu de l'intervention"/>
                  <textarea value={form.observations} onChange={e=>F("observations",e.target.value)}
                    placeholder="Déroulement de l'intervention, travaux effectués…"
                    rows={4} style={{...INP(),resize:"vertical",lineHeight:1.5,minHeight:100}}/>
                </div>
                <div style={{marginBottom:14}}>
                  <L c="Problèmes rencontrés (optionnel)"/>
                  <textarea value={form.problemes||""} onChange={e=>F("problemes",e.target.value)}
                    placeholder="Difficultés, points à surveiller…"
                    rows={2} style={{...INP(),resize:"vertical",lineHeight:1.5}}/>
                </div>
                <div>
                  <L c="État final de l'installation"/>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {Object.entries(ETAT).map(([k,v])=>(
                      <button key={k} onClick={()=>F("etat_final",k)} style={{
                        padding:"8px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,
                        fontFamily:'"Outfit",sans-serif',transition:"all 0.15s",
                        background:form.etat_final===k?v.bg:"transparent",
                        border:`1px solid ${form.etat_final===k?v.color:"#1B2D4F"}`,
                        color:form.etat_final===k?v.color:"#4A6A9E"}}>
                        {v.icon} {v.label}
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              {/* Photos */}
              <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📸 Photos</h3>
                <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}}
                  onChange={e=>uploadPhotos(Array.from(e.target.files))}/>
                {(form.photos||[]).length>0&&(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
                    {(form.photos||[]).map((url,i)=>(
                      <div key={i} style={{position:"relative",paddingBottom:"100%",overflow:"hidden",borderRadius:8}}>
                        <img src={url} style={{position:"absolute",inset:0,width:"100%",
                          height:"100%",objectFit:"cover"}} alt=""/>
                        <button onClick={()=>F("photos",(form.photos||[]).filter((_,j)=>j!==i))}
                          style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.7)",
                            border:"none",borderRadius:"50%",color:"#FFF",width:22,height:22,
                            cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",
                            justifyContent:"center"}}>✕</button>
                      </div>
                    ))}
                  </div>
                )}
                <button onClick={()=>fileRef.current?.click()} disabled={uploading}
                  style={{...BTN(uploading?"#112038":"rgba(59,130,246,0.08)",{
                    border:"1px solid #1B2D4F",color:"#3B82F6",width:"100%",
                    padding:"11px",fontSize:13})}}>
                  {uploading?"⏳ Envoi en cours…":"📷 Ajouter des photos"}
                </button>
              </div>
            </div>
          </div>

          {/* Bouton sauvegarder */}
          {form.chantier_id&&(()=>{
            const ch=chantiers.find(c=>c.id===form.chantier_id||c.id===Number(form.chantier_id));
            if(!ch||ch.statut==="termine") return null;
            return(
              <div style={{background:"#3B82F610",border:"1px solid #3B82F640",borderRadius:10,padding:"10px 14px",marginTop:12,fontSize:12,color:"#60A5FA",display:"flex",gap:8,alignItems:"center"}}>
                <span>🔗</span>
                <div>En enregistrant ce rapport, le chantier <strong>{ch.client}</strong> passera automatiquement en <strong>Terminé</strong> et sera ouvert en facturation.</div>
              </div>
            );
          })()}

          <div style={{display:"flex",gap:10,marginTop:16}}>
            <button onClick={()=>{setView("liste");setForm(null);}} style={BTN("#1B2D4F",{flex:1,padding:"13px"})}>
              Annuler
            </button>
            <button onClick={saveRapport}
              disabled={!form.chantier_nom||!form.technicien||!form.date}
              style={BTN(!form.chantier_nom||!form.technicien||!form.date
                ?"#112038":"linear-gradient(135deg,#3B82F6,#1D4ED8)",{
                flex:3,padding:"13px",fontSize:15,
                boxShadow:!form.chantier_nom||!form.technicien||!form.date?"none":"0 4px 20px rgba(59,130,246,0.3)"})}>
              💾 {form.chantier_id?"Enregistrer et terminer le chantier":"Enregistrer le rapport"}
            </button>
          </div>
        </div>
      );

      // ── DÉTAIL RAPPORT ──────────────────────────────────────
      if(view==="detail"&&detail) {
        const S=ETAT[detail.etat_final]||ETAT.ok;
        const duree=heuresTotal(detail.heure_debut,detail.heure_fin);
        return(
          <div>
            {/* MODAL SUPPRESSION */}
            {delConf&&(
              <div style={OVL} onClick={()=>setDelConf(null)}>
                <div style={{background:"#0D1828",borderRadius:18,padding:28,width:340,maxWidth:"94vw",
                  border:"1px solid #1B2D4F",textAlign:"center",boxShadow:"0 24px 60px rgba(0,0,0,0.6)"}}
                  onClick={e=>e.stopPropagation()}>
                  <div style={{fontSize:48,marginBottom:12}}>🗑️</div>
                  <h3 style={{margin:"0 0 8px",fontWeight:800,color:"#F0F6FF"}}>Supprimer ce rapport ?</h3>
                  <p style={{color:"#4A6A9E",fontSize:13,margin:"0 0 24px"}}>{detail.chantier_nom} — {detail.date}</p>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>setDelConf(null)}
                      style={{...BTN("#1B2D4F"),flex:1,padding:"11px"}}>Annuler</button>
                    <button onClick={()=>{
                      const id=detail.id;
                      setRapports(p=>p.filter(r=>r.id!==id));
                      sb.from("rapports").delete().eq("id",id).then(({error})=>{if(error)console.error("delete rapport:",error.message);});
                      setView("liste");setDelConf(null);
                    }} style={{...BTN("#EF4444"),flex:1,padding:"11px"}}>Supprimer</button>
                  </div>
                </div>
              </div>
            )}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              marginBottom:22,flexWrap:"wrap",gap:10}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <button onClick={()=>setView("liste")} style={{
                  background:"#112038",border:"1px solid #1B2D4F",borderRadius:8,
                  color:"#7B96C8",padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:700,
                  fontFamily:'"Outfit",sans-serif'}}>← Retour</button>
                <div>
                  <h2 style={{margin:"0 0 2px",fontSize:17,fontWeight:800,color:"#F0F6FF"}}>
                    📋 {detail.chantier_nom}
                  </h2>
                  <div style={{fontSize:12,color:"#4A6A9E"}}>
                    {detail.date} · {detail.technicien}
                    {duree&&<span style={{marginLeft:8,color:"#60A5FA"}}>· ⏱️ {duree}</span>}
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setForm({...detail});setView("form");}} style={{
                  background:"rgba(59,130,246,0.08)",border:"1px solid #1B2D4F",borderRadius:8,
                  color:"#3B82F6",padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:700,
                  fontFamily:'"Outfit",sans-serif'}}>✏️ Modifier</button>
                <button onClick={()=>setDelConf(detail)} style={{
                  background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",
                  borderRadius:8,color:"#EF4444",padding:"8px 14px",cursor:"pointer",fontSize:13,
                  fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>🗑️</button>
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14}}>
              {/* Infos */}
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <h3 style={{margin:0,fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📍 Chantier</h3>
                    <span style={{background:S.bg,color:S.color,border:`1px solid ${S.color}50`,
                      borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:700}}>
                      {S.icon} {S.label}
                    </span>
                  </div>
                  {[
                    ["Client",detail.chantier_nom],
                    ["Adresse",detail.adresse||"—"],
                    ["Technicien",detail.technicien],
                    ["Date",detail.date],
                    ["Horaires",detail.heure_debut&&detail.heure_fin?`${detail.heure_debut} → ${detail.heure_fin}${duree?" ("+duree+")":""}` :"—"],
                  ].map(([k,v])=>(
                    <div key={k} style={{display:"flex",justifyContent:"space-between",
                      padding:"8px 0",borderBottom:"1px solid #1B2D4F"}}>
                      <span style={{fontSize:12,color:"#4A6A9E",fontWeight:600}}>{k}</span>
                      <span style={{fontSize:13,color:"#F0F6FF",fontWeight:500,textAlign:"right",maxWidth:"60%"}}>{v}</span>
                    </div>
                  ))}
                </div>

                {detail.type_travaux?.length>0&&(
                  <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                    <h3 style={{margin:"0 0 12px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>🔧 Travaux</h3>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {detail.type_travaux.map(t=>(
                        <span key={t} style={{background:"rgba(59,130,246,0.12)",color:"#60A5FA",
                          border:"1px solid rgba(59,130,246,0.2)",borderRadius:20,
                          padding:"5px 11px",fontSize:12,fontWeight:600}}>{t}</span>
                      ))}
                    </div>
                  </div>
                )}

                {detail.materiels_poses?.length>0&&(
                  <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                    <h3 style={{margin:"0 0 12px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📦 Matériels posés</h3>
                    {detail.materiels_poses.map((m,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",
                        padding:"7px 0",borderBottom:"1px solid #1B2D4F"}}>
                        <span style={{fontSize:13,color:"#A8C4E8"}}>{m.nom}</span>
                        <span style={{fontSize:13,color:"#60A5FA",fontWeight:700}}>×{m.qty}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Observations + photos */}
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {detail.observations&&(
                  <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                    <h3 style={{margin:"0 0 12px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📝 Compte-rendu</h3>
                    <p style={{margin:0,fontSize:13,color:"#A8C4E8",lineHeight:1.7,
                      whiteSpace:"pre-wrap"}}>{detail.observations}</p>
                  </div>
                )}
                {detail.problemes&&(
                  <div style={{background:"rgba(245,158,11,0.06)",borderRadius:14,
                    border:"1px solid rgba(245,158,11,0.2)",padding:"18px"}}>
                    <h3 style={{margin:"0 0 12px",fontWeight:800,fontSize:14,color:"#F59E0B"}}>⚠️ Problèmes</h3>
                    <p style={{margin:0,fontSize:13,color:"#A8C4E8",lineHeight:1.7,
                      whiteSpace:"pre-wrap"}}>{detail.problemes}</p>
                  </div>
                )}
                {detail.photos?.length>0&&(
                  <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                    <h3 style={{margin:"0 0 12px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>
                      📸 Photos ({detail.photos.length})

                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                      {detail.photos.map((url,i)=>(
                        <a key={i} href={url} target="_blank" rel="noopener"
                          style={{display:"block",paddingBottom:"100%",position:"relative",
                            overflow:"hidden",borderRadius:8,cursor:"zoom-in"}}>
                          <img src={url} style={{position:"absolute",inset:0,width:"100%",

                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>

        );

      // ── LISTE ───────────────────────────────────────────────
      return(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            marginBottom:18,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:18,fontWeight:800,color:"#F0F6FF",letterSpacing:"-0.3px"}}>
                📋 Rapports d'intervention
              </h2>
              <p style={{margin:0,fontSize:12,color:"#4A6A9E"}}>
                {rapports.length} rapport(s) enregistré(s)
              </p>
            </div>
            <button onClick={()=>{setForm(emptyForm());setView("form");}}
              style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{
                padding:"10px 18px",boxShadow:"0 4px 16px rgba(59,130,246,0.3)"})}>
              ➕ Nouveau rapport
            </button>
          </div>

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",
            gap:10,marginBottom:18}}>
            {[
              {icon:"📋",label:"Total rapports", val:rapports.length,                                       color:"#3B82F6"},
              {icon:"✅",label:"Installation OK", val:rapports.filter(r=>r.etat_final==="ok").length,        color:"#10B981"},
              {icon:"⚠️",label:"À revoir",        val:rapports.filter(r=>r.etat_final==="a_revoir").length, color:"#F59E0B"},
              {icon:"🚨",label:"Urgences",        val:rapports.filter(r=>r.etat_final==="urgence").length,  color:"#EF4444"},
            ].map(k=>(
              <div key={k.label} style={{background:"#0D1828",borderRadius:12,padding:"14px 16px",
                border:`1px solid ${k.color}20`,borderLeft:`3px solid ${k.color}`}}>
                <div style={{fontSize:20,marginBottom:6}}>{k.icon}</div>
                <div style={{fontSize:22,fontWeight:800,color:k.color}}>{k.val}</div>
                <div style={{fontSize:11,color:"#4A6A9E",marginTop:2}}>{k.label}</div>
              </div>
            ))}
          </div>

          {/* Recherche */}
          <div style={{marginBottom:14}}>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="🔍 Rechercher par client ou technicien…"
              style={{...INP(),background:"#0D1828"}}/>
          </div>

          {/* Rapports orphelins — sans chantier lié */}
          {(()=>{
            const orphans=rapports.filter(r=>{
              if(!r.chantier_id) return true;
              return !chantiers.find(ch=>ch.id===r.chantier_id||ch.id===Number(r.chantier_id));
            });
            if(!orphans.length) return null;
            return(
              <div style={{background:"#F59E0B08",border:"1px solid #F59E0B40",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{fontSize:18}}>⚠️</span>
                  <div>
                    <div style={{fontWeight:800,fontSize:13,color:"#F59E0B"}}>{orphans.length} rapport{orphans.length>1?"s":""} sans chantier lié</div>
                    <div style={{fontSize:11,color:"#4A6A9E",marginTop:1}}>Ces rapports n'apparaissent pas en facturation. Recréez le chantier pour débloquer la facturation.</div>
                  </div>
                </div>
                {orphans.map(r=>(
                  <div key={r.id} style={{background:"#070D1A",borderRadius:10,padding:"10px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:13,color:"#E8F0FF"}}>{r.chantier_nom||"—"}</div>
                      <div style={{fontSize:11,color:"#4A6A9E"}}>👤 {r.technicien||"—"} · 📅 {r.date||"—"}</div>
                    </div>
                    <button onClick={()=>creerChantierDepuisRapport(r)}
                      style={{background:"linear-gradient(135deg,#F59E0B,#D97706)",border:"none",borderRadius:9,color:"#fff",padding:"8px 14px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif',flexShrink:0}}>
                      🔧 Recréer le chantier + ouvrir facturation
                    </button>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* Rapports problématiques sans SAV — migration anciens chantiers */}
          {(()=>{
            const sansSav=rapports.filter(r=>{
              if(r.etat_final!=="a_revoir"&&r.etat_final!=="urgence") return false;
              // Pas de SAV déjà lié
              return !(savTickets||[]).some(t=>t.rapport_id===r.id||t.rapport_id===String(r.id));
            });
            if(!sansSav.length) return null;
            const creerSAVDepuisRapport=(r)=>{
              const ch=chantiers.find(c=>c.id===r.chantier_id||c.id===Number(r.chantier_id));
              const vente=null; // pas de ventes passées en prop ici
              const ticket={
                id:Date.now()+Math.floor(Math.random()*1000),
                client:r.chantier_nom||"",
                num_serie:"",
                marque:ch?.marque||"",
                modele:"",
                description:r.etat_final==="urgence"
                  ?`🚨 URGENCE — ${r.problemes||r.observations||"Intervention urgente signalée dans le rapport"}`
                  :`⚠️ À REVOIR — ${r.problemes||r.observations||"Installation à revoir selon le rapport"}`,
                statut:"ouvert",
                notes:`Migré depuis rapport du ${r.date}. Technicien : ${r.technicien}`,
                date_ouverture:r.date||new Date().toLocaleDateString("fr-FR"),
                date_resolution:"",
                par:r.technicien||"",
                rapport_id:r.id,
                chantier_id:r.chantier_id||null,
                origine:"rapport",
                urgence:r.etat_final==="urgence",
              };
              if(setSavTickets) setSavTickets(p=>[ticket,...p]);
            };
            const creerTous=()=>sansSav.forEach(r=>creerSAVDepuisRapport(r));
            return(
              <div style={{background:"#A855F708",border:"1px solid #A855F730",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:10,flexWrap:"wrap"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:18}}>📋</span>
                    <div>
                      <div style={{fontWeight:800,fontSize:13,color:"#A855F7"}}>{sansSav.length} rapport{sansSav.length>1?"s":""} problématique{sansSav.length>1?"s":""} sans ticket SAV</div>
                      <div style={{fontSize:11,color:"#4A6A9E",marginTop:1}}>Ces anciens rapports "à revoir" ou "urgence" n'ont pas de ticket SAV. Créez-les en un clic.</div>
                    </div>
                  </div>
                  <button onClick={creerTous}
                    style={{background:"linear-gradient(135deg,#A855F7,#7C3AED)",border:"none",borderRadius:9,color:"#fff",padding:"8px 16px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif',flexShrink:0,whiteSpace:"nowrap"}}>
                    ✅ Créer tous les SAV manquants
                  </button>
                </div>
                {sansSav.map(r=>{
                  const ETAT_R={ok:{l:"OK",c:"#10B981"},a_revoir:{l:"À revoir",c:"#F59E0B"},urgence:{l:"Urgence",c:"#EF4444"}};
                  const E=ETAT_R[r.etat_final]||ETAT_R.ok;
                  return(
                    <div key={r.id} style={{background:"#070D1A",borderRadius:10,padding:"10px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}>
                          <span style={{fontWeight:700,fontSize:13,color:"#E8F0FF"}}>{r.chantier_nom||"—"}</span>
                          <span style={{background:E.c+"20",color:E.c,borderRadius:20,padding:"1px 7px",fontSize:10,fontWeight:700}}>{r.etat_final==="urgence"?"🚨 Urgence":"⚠️ À revoir"}</span>
                        </div>
                        <div style={{fontSize:11,color:"#4A6A9E"}}>👤 {r.technicien||"—"} · 📅 {r.date||"—"}</div>
                        {(r.problemes||r.observations)&&<div style={{fontSize:11,color:"#7B96C8",marginTop:2,fontStyle:"italic"}}>"{(r.problemes||r.observations||"").slice(0,60)}…"</div>}
                      </div>
                      <button onClick={()=>creerSAVDepuisRapport(r)}
                        style={{background:"#A855F720",border:"1px solid #A855F740",borderRadius:9,color:"#A855F7",padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif',flexShrink:0}}>
                        🎫 Créer le SAV
                      </button>
                    </div>
                  );
                })}
              </div>
            );
          })()}

          {/* Liste */}
          {filtered.length===0
            ?<div style={{textAlign:"center",padding:"60px 0",color:"#2E4D82"}}>
              <div style={{fontSize:52,marginBottom:12}}>📋</div>
              <div style={{fontWeight:800,fontSize:16,color:"#4A6A9E",marginBottom:6}}>
                {search?"Aucun résultat":"Aucun rapport"}</div>
              <div style={{fontSize:13,color:"#2E4D82"}}>
                {search?"Modifiez votre recherche":"Créez votre premier rapport d'intervention"}</div>
            </div>
            :<div style={{display:"flex",flexDirection:"column",gap:8}}>
              {filtered.map(r=>{
                const S=ETAT[r.etat_final]||ETAT.ok;
                const duree=heuresTotal(r.heure_debut,r.heure_fin);
                const linkedCh=r.chantier_id?chantiers.find(c=>c.id===r.chantier_id||c.id===Number(r.chantier_id)):null;
                const isOrphan=!r.chantier_id||!linkedCh;
                return(
                  <div key={r.id} onClick={()=>{setDetailId(r.id);setView("detail");}}
                    style={{background:"#0D1828",borderRadius:13,
                      border:`1px solid ${isOrphan?"#F59E0B40":r.etat_final==="ok"?"#1B2D4F":S.color+"40"}`,
                      padding:"14px 18px",cursor:"pointer",transition:"border-color 0.2s,transform 0.15s",
                      display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,
                      flexWrap:"wrap"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                        <span style={{fontWeight:800,fontSize:15,color:"#F0F6FF"}}>{r.chantier_nom}</span>
                        <span style={{background:S.bg,color:S.color,border:`1px solid ${S.color}50`,
                          borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:700}}>
                          {S.icon} {S.label}
                        </span>
                        {isOrphan
                          ?<span style={{background:"#F59E0B15",color:"#F59E0B",border:"1px solid #F59E0B40",borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:700}}>⚠️ Sans chantier</span>
                          :<span style={{background:"#10B98115",color:"#10B981",border:"1px solid #10B98130",borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:700}}>🔗 {linkedCh.statut==="termine"?"Facturé":"Chantier lié"}</span>
                        }
                      </div>
                      <div style={{display:"flex",gap:14,flexWrap:"wrap",fontSize:12,color:"#4A6A9E"}}>
                        <span>🔧 {r.technicien}</span>
                        <span>📅 {r.date}</span>
                        {duree&&<span style={{color:"#60A5FA"}}>⏱️ {duree}</span>}
                        {r.type_travaux?.length>0&&<span>{r.type_travaux.slice(0,2).join(", ")}{r.type_travaux.length>2?" …":""}</span>}
                        {r.photos?.length>0&&<span>📸 {r.photos.length}</span>}
                      </div>
                    </div>
                    <span style={{fontSize:18,color:"#2E4D82"}}>›</span>
                  </div>
                );
              })}
            </div>
          }
        </div>
      );
    }

    // ══════════════════════════════════════════
    // ONGLET LISTE CLIENTS
    // ══════════════════════════════════════════
    function ClientsTab({isMobile, ventes, chantiers, savTickets, rapports, acomptes, fmt, role, goTo}) {
      const[search,setSearch]=useState("");
      const[selected,setSelected]=useState(null);
      const[lightbox,setLightbox]=useState(null);
      const[rapportDetail,setRapportDetail]=useState(null); // rapport complet à afficher

      const ETAT_FACT={
        a_facturer:{label:"En attente",color:"#EF4444",icon:"🔴"},
        facture:{label:"Facturé",color:"#3B82F6",icon:"📄"},
        paye:{label:"Payé",color:"#10B981",icon:"✅"},
      };

      // Regrouper tous les clients uniques depuis ventes + chantiers
      const allClients=useMemo(()=>{
        const names=new Set([
          ...ventes.map(v=>v.client).filter(Boolean),
          ...chantiers.map(c=>c.client).filter(Boolean),
        ]);
        return [...names].sort((a,b)=>a.localeCompare(b,"fr",{sensitivity:"base"}));
      },[ventes,chantiers]);

      const filtered=search?allClients.filter(n=>n.toLowerCase().includes(search.toLowerCase())):allClients;

      // Données d'un client
      const getClientData=(nom)=>{
        const norm=n=>(n||"").toLowerCase().trim();
        const nNom=norm(nom);
        const cVentes=ventes.filter(v=>norm(v.client)===nNom);
        const cChantiers=chantiers.filter(c=>norm(c.client)===nNom);
        const cSav=savTickets.filter(t=>norm(t.client)===nNom);
        const cRapports=rapports.filter(r=>norm(r.chantier_nom)===nNom);
        const cAcomptes=acomptes.filter(a=>norm(a.client)===nNom);
        const cFactures=cChantiers.filter(ch=>ch.statut==="termine"&&ch.facture);
        const cProblemes=cChantiers.flatMap(ch=>(ch.problemes_admin||[]).map(pb=>({...pb,chantier:ch.client,date_fin:ch.date_fin})));
        const allPhotos=[
          ...cVentes.flatMap(v=>(v.photos_vente||[]).map(url=>({url,label:"Photo visite — "+v.client,date:v.date||""}))),
          ...cChantiers.flatMap(ch=>(ch.photos||[]).map(url=>({url,label:"Chantier — "+(ch.date_fin||ch.date_installation||""),date:ch.date_fin||""}))),
        ];
        const caTot=cVentes.reduce((s,v)=>s+Number(v.prix_ht||0),0);
        return{cVentes,cChantiers,cSav,cRapports,cAcomptes,cFactures,cProblemes,allPhotos,caTot};
      };

      const sel=selected?getClientData(selected):null;

      const INP=(e={})=>({background:"#0D1828",border:"1px solid #1B2D4F",borderRadius:10,color:"#E8F0FF",padding:"10px 13px",width:"100%",outline:"none",boxSizing:"border-box",fontSize:13,fontFamily:'"Outfit",sans-serif',...e});

          <span style={{marginLeft:"auto",background:"#1B2D4F",color:"#7B96C8",borderRadius:20,fontSize:10,fontWeight:700,padding:"1px 7px"}}>{count}</span>

      const Section=({icon,title,count,children,linkLabel,onLink})=>count>0?<div style={{background:"#070D1A",borderRadius:12,border:"1px solid #1B2D4F",marginBottom:12,overflow:"hidden"}}>

      // Rapport detail modal

            <div>
              <h2 style={{margin:0,fontSize:16,fontWeight:800,color:"#F0F6FF"}}>📋 Rapport — {rapportDetail.chantier_nom||rapportDetail.technicien}</h2>

          </div>
          {(()=>{
            const ETAT_R={ok:{label:"Installation OK",color:"#10B981",icon:"✅"},a_revoir:{label:"À revoir",color:"#F59E0B",icon:"⚠️"},urgence:{label:"Urgence",color:"#EF4444",icon:"🚨"}};

              {rapportDetail.materiels_poses?.length>0&&<div style={{background:"#0D1828",borderRadius:12,border:"1px solid #1B2D4F",padding:"14px",marginBottom:12}}>

              {rapportDetail.observations&&<div style={{background:"#0D1828",borderRadius:12,border:"1px solid #1B2D4F",padding:"14px",marginBottom:12}}>

                <div style={{fontSize:11,color:"#4A6A9E"}}>👤 {ch.technicien||"—"} · {ch.date_fin?"✅ "+ch.date_fin:ch.date_installation?"📅 "+ch.date_installation:"—"}</div>

          </Section>

          <Section icon="🧾" title="Factures" count={sel.cFactures.length} linkLabel="Onglet Factures" onLink={()=>goTo("factures")}>
            {sel.cFactures.map(ch=>{
              const fact=ch.facture||{};
              const E=ETAT_FACT[fact.statut||"a_facturer"]||ETAT_FACT.a_facturer;
              return(
                <div key={ch.id} style={{padding:"8px 0",borderBottom:"1px solid #1B2D4F66",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:12,color:"#4A6A9E"}}>Terminé le {ch.date_fin||"—"}</div>
                    {fact.mode_paiement&&<div style={{fontSize:11,color:"#10B981"}}>💳 {fact.mode_paiement}</div>}
                  </div>
                  <span style={{background:E.color+"20",color:E.color,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>{E.icon} {E.label}</span>
                </div>
              );
            })}
          </Section>

          <Section icon="📄" title="Acomptes" count={sel.cAcomptes.length} linkLabel="Onglet Acomptes" onLink={()=>goTo("administratif")}>
            {sel.cAcomptes.map(a=>(
              <div key={a.id} style={{padding:"8px 0",borderBottom:"1px solid #1B2D4F66",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>

                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontWeight:800,color:"#3B82F6",fontSize:13}}>{fmt(a.montant_acompte)}</div>
                  <div style={{fontSize:10,fontWeight:700,color:a.statut==="paye"?"#10B981":a.statut==="envoye"?"#3B82F6":"#F59E0B"}}>{a.statut}</div>

          </Section>

          <Section icon="🛠️" title="Tickets SAV" count={sel.cSav.length} linkLabel="Onglet SAV" onLink={()=>goTo("sav")}>
            {sel.cSav.map(t=>(
              <div key={t.id} style={{padding:"8px 0",borderBottom:"1px solid #1B2D4F66"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                  <div style={{fontSize:12,fontWeight:700,color:t.statut==="ouvert"?"#EF4444":"#10B981"}}>{t.statut==="ouvert"?"🔴 Ouvert":"✅ Résolu"}</div>
                  <div style={{fontSize:11,color:"#4A6A9E"}}>{t.date_ouverture||"—"}</div>
                </div>
                <div style={{fontSize:12,color:"#E8F0FF"}}>{t.description||"—"}</div>
                {t.num_serie&&<div style={{fontSize:10,color:"#4A6A9E"}}>N° série : {t.num_serie}</div>}

          <Section icon="⚠️" title="Incidents signalés" count={sel.cProblemes.length}>

          <Section icon="📋" title="Rapports d'intervention" count={sel.cRapports.length} linkLabel="Onglet Rapports" onLink={()=>goTo("rapports")}>

              <button key={r.id} onClick={()=>setRapportDetail(r)}
                style={{width:"100%",padding:"9px 0",borderBottom:"1px solid #1B2D4F66",textAlign:"left",background:"transparent",border:"none",cursor:"pointer",fontFamily:'"Outfit",sans-serif',display:"flex",justifyContent:"space-between",alignItems:"center"}}

            // VUE LISTE

    function CarteTab({isMobile, ventes, setVentes, chantiers, fmt, role, allProfiles}) {
      const mapRef = useRef(null);
