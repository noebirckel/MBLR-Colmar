        regle_nous:       { label:"Réglé par nous",       color:"#10B981", bg:"rgba(16,185,129,0.1)",  icon:"✅" },
        regle_marque:     { label:"Réglé par la marque",  color:"#8B5CF6", bg:"rgba(139,92,246,0.1)",  icon:"🏭" },
        borne_changee:    { label:"Borne changée",        color:"#60A5FA", bg:"rgba(96,165,250,0.1)",  icon:"🔄" },
      };
      const STATUTS_ACTIFS  = ["ouvert","marque_contactee"];
      const STATUTS_RESOLUS = ["regle_nous","regle_marque","borne_changee"];

      const emptyForm = () => ({
        client:"", num_serie:"", marque:"", modele:"",
        description:"", statut:"ouvert", notes:"",
        date_ouverture: new Date().toLocaleDateString("fr-FR"),
        date_resolution:"", par: profile?.nom||"",
      });

      const[filter,setFilter]     = useState("actifs");
      const[search,setSearch]     = useState("");
      const[newForm,setNewForm]   = useState(null);
      const[editForm,setEditForm] = useState(null);
      const[delConf,setDelConf]   = useState(null);
      const[statutPop,setStatutPop] = useState(null);
      const[tabView,setTabView]   = useState("tickets"); // tickets | contacts
      const[contacts,setContacts] = useState(()=>{
        try{ const s=localStorage.getItem("sav_contacts"); return s?JSON.parse(s):DEFAULT_SAV_CONTACTS; }
        catch(e){ return DEFAULT_SAV_CONTACTS; }
      });
      const[editContact,setEditContact] = useState(null);  // {id,marque,tel,site} en cours d'édition
      const[newContact,setNewContact]   = useState(null);

      // Persist contacts
      useEffect(()=>{
        try{ localStorage.setItem("sav_contacts", JSON.stringify(contacts)); }catch(e){}
      },[contacts]);

      const saveNewTicket = () => {
        if(!newForm||!newForm.client||!newForm.num_serie||!newForm.description) return;
        setTickets(p=>[{...newForm, id:Date.now()},...p]);
        setNewForm(null);
      };
      const saveEditTicket = () => {
        if(!editForm||!editForm.client||!editForm.num_serie||!editForm.description) return;
        setTickets(p=>p.map(t=>t.id===editForm.id?editForm:t));
        setEditForm(null);
      };
      const changeStatut = (ticket, statut) => {
        const patch = {statut};
        if(STATUTS_RESOLUS.includes(statut)) patch.date_resolution = new Date().toLocaleDateString("fr-FR");
        setTickets(p=>p.map(t=>t.id===ticket.id?{...t,...patch}:t));
        setStatutPop(null);
      };

      const filtered = tickets
        .filter(t => filter==="actifs"  ? STATUTS_ACTIFS.includes(t.statut)
                   : filter==="resolus" ? STATUTS_RESOLUS.includes(t.statut) : true)
        .filter(t => !search
          || (t.client||"").toLowerCase().includes(search.toLowerCase())
          || (t.num_serie||"").toLowerCase().includes(search.toLowerCase())
          || (t.description||"").toLowerCase().includes(search.toLowerCase()));

      const kpis = {
        total:   tickets.length,
        actifs:  tickets.filter(t=>STATUTS_ACTIFS.includes(t.statut)).length,
        resolus: tickets.filter(t=>STATUTS_RESOLUS.includes(t.statut)).length,
        change:  tickets.filter(t=>t.statut==="borne_changee").length,
      };

      const OVL = {position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:999,
        display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",
        backdropFilter:"blur(4px)"};
      const BTN_SM = (bg) => ({background:bg,border:"none",borderRadius:8,color:"#FFF",
        padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700,
        fontFamily:'"Outfit",sans-serif',transition:"all 0.15s"});
      const INP_SM = {background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:8,
        color:"#F0F6FF",padding:"9px 12px",fontSize:13,width:"100%",outline:"none",
        boxSizing:"border-box",fontFamily:'"Outfit",sans-serif'};

      return (
        <div>
          {/* MODAL NOUVEAU */}
          {newForm&&(
            <div style={OVL} onClick={()=>setNewForm(null)}>
              <TicketForm isMobile={isMobile} form={newForm}
                onChange={(k,v)=>setNewForm(p=>({...p,[k]:v}))}
                onSave={saveNewTicket} onCancel={()=>setNewForm(null)}
                title="🛠️ Nouveau ticket SAV"
                STATUTS={STATUTS} STATUTS_RESOLUS={STATUTS_RESOLUS}/>
            </div>
          )}

          {/* MODAL ÉDITION */}
          {editForm&&(
            <div style={OVL} onClick={()=>setEditForm(null)}>
              <TicketForm isMobile={isMobile} form={editForm}
                onChange={(k,v)=>setEditForm(p=>({...p,[k]:v}))}
                onSave={saveEditTicket} onCancel={()=>setEditForm(null)}
                title="✏️ Modifier le ticket"
                STATUTS={STATUTS} STATUTS_RESOLUS={STATUTS_RESOLUS}/>
            </div>
          )}

          {/* MODAL SUPPRESSION */}
          {delConf&&(
            <div style={OVL} onClick={()=>setDelConf(null)}>
              <div style={{background:"#0D1828",borderRadius:18,padding:28,width:340,maxWidth:"94vw",
                border:"1px solid #1B2D4F",textAlign:"center",boxShadow:"0 24px 60px rgba(0,0,0,0.6)"}}
                onClick={e=>e.stopPropagation()}>
                <div style={{fontSize:48,marginBottom:12}}>🗑️</div>
                <h3 style={{margin:"0 0 8px",fontWeight:800,color:"#F0F6FF"}}>Supprimer ce ticket ?</h3>
                <p style={{color:"#4A6A9E",fontSize:13,margin:"0 0 24px"}}>
                  <strong style={{color:"#F0F6FF"}}>{delConf.client}</strong> — {delConf.num_serie}
                </p>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setDelConf(null)} style={{...BTN_SM("#1B2D4F"),flex:1,padding:"10px"}}>Annuler</button>
                  <button onClick={()=>{setTickets(p=>p.filter(t=>t.id!==delConf.id));setDelConf(null);}}
                    style={{...BTN_SM("#EF4444"),flex:1,padding:"10px"}}>Supprimer</button>
                </div>
              </div>
            </div>
          )}

          {/* HEADER */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            marginBottom:18,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:18,fontWeight:800,color:"#F0F6FF",letterSpacing:"-0.3px"}}>
                🛠️ Suivi SAV
              </h2>
              <p style={{margin:0,fontSize:12,color:"#4A6A9E"}}>
                {kpis.actifs} en cours · {kpis.resolus} résolus
              </p>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {/* Onglets tickets / contacts */}
              <div style={{display:"flex",background:"#0D1828",borderRadius:10,
                border:"1px solid #1B2D4F",overflow:"hidden"}}>
                {[["tickets","🎫 Tickets"],["contacts","📞 Contacts SAV"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setTabView(k)} style={{
                    padding:"8px 14px",background:tabView===k?"linear-gradient(135deg,#3B82F6,#1D4ED8)":"transparent",
                    border:"none",color:tabView===k?"#FFF":"#4A6A9E",cursor:"pointer",
                    fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>{l}</button>
                ))}
              </div>
              {tabView==="tickets"&&(
                <button onClick={()=>setNewForm(emptyForm())}
                  style={{...BTN_SM("linear-gradient(135deg,#3B82F6,#1D4ED8)"),
                    padding:"9px 16px",boxShadow:"0 4px 14px rgba(59,130,246,0.3)"}}>
                  ➕ Nouveau ticket
                </button>
              )}
              {tabView==="contacts"&&role==="administrateur"&&(
                <button onClick={()=>setNewContact({id:Date.now(),marque:"",tel:"",site:""})}
                  style={{...BTN_SM("linear-gradient(135deg,#3B82F6,#1D4ED8)"),
                    padding:"9px 16px",boxShadow:"0 4px 14px rgba(59,130,246,0.3)"}}>
                  ➕ Ajouter contact
                </button>
              )}
            </div>
          </div>

          {/* ── VUE CONTACTS SAV ── */}
          {tabView==="contacts"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
                {[...(newContact?[newContact]:[]),...contacts].map((ct,i)=>{
                  const isNew = newContact&&ct.id===newContact.id;
                  const isEdit = editContact&&ct.id===editContact.id;
                  const display = isNew ? newContact : (isEdit ? editContact : ct);

                  return (
                    <div key={ct.id} style={{background:"#0D1828",borderRadius:14,
                      border:`1px solid ${isEdit||isNew?"#3B82F6":"#1B2D4F"}`,padding:"18px 20px",
                      boxShadow:isEdit||isNew?"0 0 0 1px rgba(59,130,246,0.15)":"none"}}>

                      {(isEdit||isNew)?(
                        <>
                          <div style={{marginBottom:10}}>
                            <label style={{...{fontSize:10,fontWeight:700,color:"#4A6A9E",
                              display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}}>
                              Marque</label>
                            <input value={display.marque}
                              onChange={e=>{const v=e.target.value;isNew?setNewContact(p=>({...p,marque:v})):setEditContact(p=>({...p,marque:v}));}}
                              placeholder="Ex: Wallbox" style={INP_SM}/>
                          </div>
                          <div style={{marginBottom:10}}>
                            <label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",
                              display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>
                              Téléphone SAV</label>
                            <input value={display.tel}
                              onChange={e=>{const v=e.target.value;isNew?setNewContact(p=>({...p,tel:v})):setEditContact(p=>({...p,tel:v}));}}
                              placeholder="Ex: 01.23.45.67.89" style={INP_SM}/>
                          </div>
                          <div style={{marginBottom:14}}>
                            <label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",
                              display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>
                              Site / Email (optionnel)</label>
                            <input value={display.site||""}
                              onChange={e=>{const v=e.target.value;isNew?setNewContact(p=>({...p,site:v})):setEditContact(p=>({...p,site:v}));}}
                              placeholder="Ex: support@marque.com" style={INP_SM}/>
                          </div>
                          <div style={{display:"flex",gap:6}}>
                            <button onClick={()=>{isNew?setNewContact(null):setEditContact(null);}}
                              style={{...BTN_SM("#1B2D4F"),flex:1}}>Annuler</button>
                            <button onClick={()=>{
                              if(!display.marque||!display.tel)return;
                              if(isNew){setContacts(p=>[...p,{...newContact}]);setNewContact(null);}
                              else{setContacts(p=>p.map(c=>c.id===editContact.id?editContact:c));setEditContact(null);}
                            }} style={{...BTN_SM("linear-gradient(135deg,#3B82F6,#1D4ED8)"),flex:2}}>
                              💾 Sauvegarder
                            </button>
                          </div>
                        </>
                      ):(
                        <>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                            <div style={{display:"flex",alignItems:"center",gap:10}}>
                              <div style={{width:42,height:42,borderRadius:10,
                                background:"linear-gradient(135deg,#1B2D4F,#112038)",
                                border:"1px solid #1B2D4F",display:"flex",alignItems:"center",
                                justifyContent:"center",fontSize:20}}>⚡</div>
                              <div>
                                <div style={{fontWeight:800,fontSize:15,color:"#F0F6FF"}}>{ct.marque}</div>
                                <div style={{fontSize:11,color:"#4A6A9E"}}>Service après-vente</div>
                              </div>
                            </div>
                            {role==="administrateur"&&(
                              <div style={{display:"flex",gap:5}}>
                                <button onClick={()=>setEditContact({...ct})}
                                  style={{...BTN_SM("#112038"),border:"1px solid #1B2D4F",color:"#7B96C8"}}>✏️</button>
                                <button onClick={()=>setContacts(p=>p.filter(c=>c.id!==ct.id))}
                                  style={{...BTN_SM("rgba(239,68,68,0.08)"),border:"1px solid rgba(239,68,68,0.2)",color:"#EF4444"}}>🗑️</button>
                              </div>
                            )}
                          </div>
                          <div style={{display:"flex",flexDirection:"column",gap:8}}>
                            <a href={`tel:${ct.tel.replace(/\./g,"")}`} style={{
                              display:"flex",alignItems:"center",gap:10,
                              background:"rgba(59,130,246,0.08)",borderRadius:10,
                              padding:"10px 14px",textDecoration:"none",
                              border:"1px solid rgba(59,130,246,0.15)"}}>
                              <span style={{fontSize:18}}>📞</span>
                              <div>
                                <div style={{fontSize:10,color:"#4A6A9E",fontWeight:600,
                                  textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:2}}>Téléphone</div>
                                <div style={{fontSize:15,fontWeight:800,color:"#3B82F6",
                                  fontFamily:"JetBrains Mono,monospace",letterSpacing:"0.05em"}}>{ct.tel}</div>
                              </div>
                            </a>
                            {ct.site&&(
                              <div style={{display:"flex",alignItems:"center",gap:10,
                                background:"#070D1A",borderRadius:10,padding:"10px 14px",
                                border:"1px solid #1B2D4F"}}>
                                <span style={{fontSize:18}}>🌐</span>
                                <div>
                                  <div style={{fontSize:10,color:"#4A6A9E",fontWeight:600,
                                    textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:2}}>Contact</div>
                                  <div style={{fontSize:13,color:"#7B96C8"}}>{ct.site}</div>
                                </div>
                              </div>
                            )}
                          </div>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── VUE TICKETS ── */}
          {tabView==="tickets"&&(<>
            {/* KPIs */}
            <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",
              gap:10,marginBottom:18}}>
              {[
                {icon:"🎫",label:"Total",      val:kpis.total,   color:"#3B82F6"},
                {icon:"🔴",label:"En cours",   val:kpis.actifs,  color:"#F59E0B"},
                {icon:"✅",label:"Résolus",    val:kpis.resolus, color:"#10B981"},
                {icon:"🔄",label:"Borne changée",val:kpis.change,color:"#8B5CF6"},
              ].map(k=>(
                <div key={k.label} style={{background:"#0D1828",borderRadius:12,padding:"14px 16px",
                  border:`1px solid ${k.color}20`,borderLeft:`3px solid ${k.color}`}}>
                  <div style={{fontSize:20,marginBottom:6}}>{k.icon}</div>
                  <div style={{fontSize:22,fontWeight:800,color:k.color}}>{k.val}</div>
                  <div style={{fontSize:11,color:"#4A6A9E",marginTop:2}}>{k.label}</div>
                </div>
              ))}
            </div>

            {/* Filtres + recherche */}
            <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
              <div style={{display:"flex",background:"#0D1828",borderRadius:10,
                border:"1px solid #1B2D4F",overflow:"hidden"}}>
                {[["actifs","🔴 En cours"],["resolus","✅ Résolus"],["tous","Tous"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setFilter(k)} style={{
                    padding:"8px 14px",
                    background:filter===k?"linear-gradient(135deg,#3B82F6,#1D4ED8)":"transparent",
                    border:"none",color:filter===k?"#FFF":"#4A6A9E",cursor:"pointer",
                    fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>
                    {l} <span style={{marginLeft:4,background:filter===k?"rgba(255,255,255,0.2)":"#1B2D4F",
                      borderRadius:10,padding:"1px 6px",fontSize:10}}>
                      {k==="actifs"?kpis.actifs:k==="resolus"?kpis.resolus:kpis.total}
                    </span>
                  </button>
                ))}
              </div>
              <input value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="🔍 Client, n° série…"
                style={{flex:1,minWidth:180,background:"#0D1828",border:"1px solid #1B2D4F",
                  borderRadius:10,color:"#F0F6FF",padding:"9px 14px",fontSize:13,outline:"none",
                  boxSizing:"border-box",fontFamily:'"Outfit",sans-serif'}}/>
            </div>

            {/* Liste tickets */}
            {filtered.length===0
              ?<div style={{textAlign:"center",padding:"60px 0",color:"#2E4D82"}}>
                <div style={{fontSize:52,marginBottom:12}}>🛠️</div>
                <div style={{fontWeight:800,fontSize:16,color:"#4A6A9E",marginBottom:6}}>
                  {search?"Aucun résultat":"Aucun ticket"}</div>
                <div style={{fontSize:13}}>
                  {search?"Modifiez votre recherche":"Créez votre premier ticket SAV"}</div>
              </div>
              :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                {filtered.map(t=>{
                  const S=STATUTS[t.statut]||STATUTS.ouvert;
                  const isResolu=STATUTS_RESOLUS.includes(t.statut);
                  return(
                    <div key={t.id} style={{background:"#0D1828",borderRadius:14,
                      border:`1px solid ${isResolu?"#1B2D4F":S.color+"40"}`,padding:"16px 18px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",
                        alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                            <span style={{fontWeight:800,fontSize:15,color:"#F0F6FF"}}>{t.client}</span>
                            <div style={{position:"relative"}}>
                              <button onClick={()=>setStatutPop(statutPop===t.id?null:t.id)} style={{
                                background:S.bg,color:S.color,border:`1px solid ${S.color}50`,
                                borderRadius:20,padding:"3px 10px",cursor:"pointer",fontSize:11,
                                fontWeight:700,fontFamily:'"Outfit",sans-serif',
                                display:"flex",alignItems:"center",gap:4}}>
                                {S.icon} {S.label} ▾
                              </button>
                              {statutPop===t.id&&(
                                <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,
                                  background:"#0D1828",border:"1px solid #1B2D4F",borderRadius:12,
                                  padding:8,zIndex:100,minWidth:220,
                                  boxShadow:"0 12px 32px rgba(0,0,0,0.6)"}}>
                                  {Object.entries(STATUTS).map(([k,s])=>(
                                    <button key={k} onClick={()=>changeStatut(t,k)} style={{
                                      display:"flex",alignItems:"center",gap:8,width:"100%",
                                      padding:"9px 12px",background:t.statut===k?s.bg:"transparent",
                                      border:"none",borderRadius:8,cursor:"pointer",
                                      fontFamily:'"Outfit",sans-serif'}}>
                                      <span style={{fontSize:15}}>{s.icon}</span>
                                      <span style={{fontSize:12,fontWeight:700,
                                        color:t.statut===k?s.color:"#7B96C8"}}>{s.label}</span>
                                      {t.statut===k&&<span style={{marginLeft:"auto",fontSize:10,color:s.color}}>✓</span>}
                                    </button>
                                  ))}
                                </div>
                              )}
                            </div>
                          </div>
                          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:8}}>
                            <span style={{fontSize:12,color:"#4A6A9E",display:"flex",alignItems:"center",gap:4}}>
                              🔖 <span style={{fontWeight:600,color:"#7B96C8",
                                fontFamily:"JetBrains Mono,monospace"}}>{t.num_serie}</span>
                            </span>
                            {t.marque&&<span style={{fontSize:12,color:"#4A6A9E"}}>
                              ⚡ {t.marque}{t.modele?" — "+t.modele:""}
                            </span>}
                          </div>
                          <div style={{fontSize:13,color:"#A8C4E8",lineHeight:1.5,
                            padding:"10px 12px",background:"#070D1A",borderRadius:8,marginBottom:t.notes?8:0}}>
                            {t.description}
                          </div>
                          {t.notes&&<div style={{fontSize:12,color:"#4A6A9E",fontStyle:"italic",
                            marginTop:6,padding:"7px 10px",background:"rgba(59,130,246,0.05)",
                            borderRadius:7,borderLeft:"2px solid #1B2D4F"}}>
                            📝 {t.notes}
                          </div>}
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0,alignItems:"flex-end"}}>
                          <div style={{fontSize:10,color:"#2E4D82",textAlign:"right"}}>
                            📅 {t.date_ouverture}{t.par&&<span> · {t.par}</span>}
                          </div>
                          {isResolu&&t.date_resolution&&
                            <div style={{fontSize:10,color:"#10B981"}}>✅ Résolu le {t.date_resolution}</div>}
                          <div style={{display:"flex",gap:6,marginTop:4}}>
                            <button onClick={()=>setEditForm({...t})} style={{
                              background:"#112038",border:"1px solid #1B2D4F",borderRadius:8,
                              color:"#7B96C8",padding:"6px 12px",cursor:"pointer",fontSize:12,
                              fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>✏️</button>
                            <button onClick={()=>setDelConf(t)} style={{
                              background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",
                              borderRadius:8,color:"#EF4444",padding:"6px 12px",cursor:"pointer",
                              fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>🗑️</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            }
          </>)}
        </div>
      );
    }

    // ══════════════════════════════════════
    // ONGLET RAPPORTS D'INTERVENTION
    // ══════════════════════════════════════
    function RapportsTab({isMobile, rapports, setRapports, chantiers, profile, role}) {

      const emptyForm = (ch=null) => ({
        id: null,
        chantier_id:   ch?.id||"",
        chantier_nom:  ch?.client||"",
        adresse:       ch?.adresse||"",
        technicien:    profile?.nom||"",
        date:          new Date().toLocaleDateString("fr-FR"),
        heure_debut:   "",
        heure_fin:     "",
        type_travaux:  [],
        materiels_poses:[],
        observations:  "",
        problemes:     "",
        etat_final:    "ok",        // ok | a_revoir | urgence
        photos:        [],
        created_at:    new Date().toISOString(),
      });

      const TYPES_TRAVAUX = [
        "Installation borne","Mise en service","Câblage","Raccordement TGBT",
        "Pose gaine","Pose pied","Remplacement borne","Diagnostic","Autre"
      ];
      const ETAT = {
        ok:       {label:"Installation OK",   color:"#10B981", bg:"rgba(16,185,129,0.1)",  icon:"✅"},
        a_revoir: {label:"À revoir",          color:"#F59E0B", bg:"rgba(245,158,11,0.1)",  icon:"⚠️"},
        urgence:  {label:"Intervention urgente",color:"#EF4444",bg:"rgba(239,68,68,0.1)", icon:"🚨"},
      };

      const[view,setView]       = useState("liste");   // liste | form | detail
      const[form,setForm]       = useState(null);
      const[detailId,setDetailId] = useState(null);
      const[search,setSearch]   = useState("");
      const[uploading,setUploading] = useState(false);
      const[delConf,setDelConf] = useState(null);
      const fileRef = useRef(null);

      const F = (k,v) => setForm(p=>({...p,[k]:v}));

      const heuresTotal = (debut, fin) => {
        if(!debut||!fin) return null;
        const [h1,m1]=debut.split(":").map(Number);
        const [h2,m2]=fin.split(":").map(Number);
        const mins=(h2*60+m2)-(h1*60+m1);
        if(mins<=0) return null;
        const h=Math.floor(mins/60), m=mins%60;
        return `${h}h${m>0?m.toString().padStart(2,"0"):""}`;
      };

      const uploadPhotos = async(files) => {
        if(!files.length) return;
        setUploading(true);
        const urls=[];
        for(const file of files){
          const ext=file.name.split(".").pop();
          const path=`rapport-${form.id||Date.now()}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
          const{data,error}=await sb.storage.from("chantier-photos").upload(path,file,{cacheControl:"3600",upsert:false});
          if(!error){
            const{data:pub}=sb.storage.from("chantier-photos").getPublicUrl(path);
            if(pub?.publicUrl) urls.push(pub.publicUrl);
          }
        }
        F("photos",[...(form.photos||[]),...urls]);
        setUploading(false);
      };

      const saveRapport = () => {
        if(!form.chantier_nom||!form.technicien||!form.date) return;
        const entry = {...form, id: form.id||Date.now()};
        setRapports(p => form.id ? p.map(r=>r.id===form.id?entry:r) : [entry,...p]);
        setView("liste"); setForm(null);
      };

      const filtered = rapports.filter(r =>
        !search ||
        (r.chantier_nom||"").toLowerCase().includes(search.toLowerCase()) ||
        (r.technicien||"").toLowerCase().includes(search.toLowerCase())
      );

      const detail = rapports.find(r=>r.id===detailId);

      const OVL = {position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:999,
        display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",
        backdropFilter:"blur(4px)"};
      const L = ({c}) => <label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",
        marginBottom:7,textTransform:"uppercase",letterSpacing:"0.08em"}}>{c}</label>;
      const INP = (e={}) => ({background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,
        color:"#F0F6FF",padding:"11px 14px",fontSize:14,width:"100%",outline:"none",
        boxSizing:"border-box",fontFamily:'"Outfit",sans-serif',transition:"border-color 0.2s",...e});
      const BTN = (bg,e={}) => ({background:bg,border:"none",borderRadius:10,color:"#FFF",
        padding:"10px 16px",cursor:"pointer",fontWeight:700,fontSize:13,
        fontFamily:'"Outfit",sans-serif',transition:"all 0.15s",...e});

      // ── FORMULAIRE ──────────────────────────────────────────
      if(view==="form"&&form) return (
        <div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
            <button onClick={()=>{setView("liste");setForm(null);}} style={{
              background:"#112038",border:"1px solid #1B2D4F",borderRadius:8,
              color:"#7B96C8",padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:700,
              fontFamily:'"Outfit",sans-serif'}}>← Retour</button>
            <div>
              <h2 style={{margin:0,fontSize:17,fontWeight:800,color:"#F0F6FF",letterSpacing:"-0.3px"}}>
                {form.id?"✏️ Modifier le rapport":"📋 Nouveau rapport d'intervention"}
              </h2>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14}}>

            {/* COL GAUCHE */}
            <div style={{display:"flex",flexDirection:"column",gap:14}}>

              {/* Chantier */}
              <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📍 Chantier</h3>
                <div style={{marginBottom:12}}>
                  <L c="Chantier"/>
                  <select value={form.chantier_id}
                    onChange={e=>{
                      const ch=chantiers.find(c=>String(c.id)===e.target.value);
                      setForm(p=>({...p,chantier_id:e.target.value,chantier_nom:ch?.client||"",adresse:ch?.adresse||""}));
                    }}
                    style={{...INP(),appearance:"none"}}>
                    <option value="">— Sélectionner un chantier —</option>
                    {chantiers.map(ch=>(
                      <option key={ch.id} value={ch.id}>{ch.client} {ch.date_installation?"("+ch.date_installation+")":""}</option>
                    ))}
                  </select>
                </div>
                <div style={{marginBottom:12}}>
                  <L c="Client / Nom chantier"/>
                  <input value={form.chantier_nom} onChange={e=>F("chantier_nom",e.target.value)}
                    placeholder="Nom du client" style={INP()}/>
                </div>
                <div>
                  <L c="Adresse"/>
                  <input value={form.adresse||""} onChange={e=>F("adresse",e.target.value)}
                    placeholder="Adresse du chantier" style={INP()}/>
                </div>
              </div>

              {/* Intervenant & temps */}
              <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>⏱️ Intervenant & durée</h3>
                <div style={{marginBottom:12}}>
                  <L c="Technicien"/>
                  <input value={form.technicien} onChange={e=>F("technicien",e.target.value)}
                    placeholder="Nom du technicien" style={INP()}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                  <div>
                    <L c="Date"/>
                    <input value={form.date} onChange={e=>F("date",e.target.value)}
                      placeholder="jj/mm/aaaa" style={INP()}/>
                  </div>
                  <div>
                    <L c="Heure début"/>
                    <input type="time" value={form.heure_debut||""}
                      onChange={e=>F("heure_debut",e.target.value)} style={INP()}/>
                  </div>
                  <div>
                    <L c="Heure fin"/>
                    <input type="time" value={form.heure_fin||""}
                      onChange={e=>F("heure_fin",e.target.value)} style={INP()}/>
                  </div>
                </div>
                {form.heure_debut&&form.heure_fin&&heuresTotal(form.heure_debut,form.heure_fin)&&(
                  <div style={{marginTop:10,padding:"8px 12px",background:"rgba(59,130,246,0.08)",
                    borderRadius:8,fontSize:13,color:"#60A5FA",fontWeight:700}}>
                    ⏱️ Durée : {heuresTotal(form.heure_debut,form.heure_fin)}
                  </div>
                )}
              </div>

              {/* Types de travaux */}
              <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>🔧 Travaux réalisés</h3>
                <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                  {TYPES_TRAVAUX.map(t=>{
                    const sel=(form.type_travaux||[]).includes(t);
                    return(
                      <button key={t} onClick={()=>F("type_travaux",
                        sel?(form.type_travaux||[]).filter(x=>x!==t):[...(form.type_travaux||[]),t])}
                        style={{padding:"7px 12px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,
                          fontFamily:'"Outfit",sans-serif',transition:"all 0.15s",
                          background:sel?"rgba(59,130,246,0.15)":"#070D1A",
                          border:`1px solid ${sel?"#3B82F6":"#1B2D4F"}`,
                          color:sel?"#60A5FA":"#4A6A9E"}}>
                        {sel?"✓ ":""}{t}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* COL DROITE */}
            <div style={{display:"flex",flexDirection:"column",gap:14}}>

              {/* Matériels posés */}
              <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📦 Matériels posés</h3>
                {(form.materiels_poses||[]).map((m,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"1fr auto auto",
                    gap:8,marginBottom:8,alignItems:"center"}}>
                    <input value={m.nom||""} onChange={e=>{
                      const arr=[...(form.materiels_poses||[])];
                      arr[i]={...arr[i],nom:e.target.value};F("materiels_poses",arr);
                    }} placeholder="Désignation" style={{...INP(),fontSize:13,padding:"9px 12px"}}/>
                    <input value={m.qty||""} type="number" min="1" onChange={e=>{
                      const arr=[...(form.materiels_poses||[])];
                      arr[i]={...arr[i],qty:e.target.value};F("materiels_poses",arr);
                    }} placeholder="Qté" style={{...INP(),width:60,fontSize:13,padding:"9px 10px"}}/>
                    <button onClick={()=>F("materiels_poses",(form.materiels_poses||[]).filter((_,j)=>j!==i))}
                      style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",
                        borderRadius:8,color:"#EF4444",padding:"9px 10px",cursor:"pointer",
                        fontSize:14,fontFamily:'"Outfit",sans-serif'}}>✕</button>
                  </div>
                ))}
                <button onClick={()=>F("materiels_poses",[...(form.materiels_poses||[]),{nom:"",qty:1}])}
                  style={{...BTN("rgba(59,130,246,0.08)",{border:"1px solid #1B2D4F",
                    color:"#3B82F6",padding:"8px 14px",fontSize:12,width:"100%",marginTop:4})}}>
                  ➕ Ajouter matériel
                </button>
              </div>

              {/* Observations */}
              <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📝 Observations</h3>
                <div style={{marginBottom:12}}>
                  <L c="Compte-rendu de l'intervention"/>
                  <textarea value={form.observations} onChange={e=>F("observations",e.target.value)}
                    placeholder="Déroulement de l'intervention, travaux effectués…"
                    rows={4} style={{...INP(),resize:"vertical",lineHeight:1.5,minHeight:100}}/>
                </div>
                <div style={{marginBottom:14}}>
                  <L c="Problèmes rencontrés (optionnel)"/>
                  <textarea value={form.problemes||""} onChange={e=>F("problemes",e.target.value)}
                    placeholder="Difficultés, points à surveiller…"
                    rows={2} style={{...INP(),resize:"vertical",lineHeight:1.5}}/>
                </div>
                <div>
                  <L c="État final de l'installation"/>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {Object.entries(ETAT).map(([k,v])=>(
                      <button key={k} onClick={()=>F("etat_final",k)} style={{
                        padding:"8px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,
                        fontFamily:'"Outfit",sans-serif',transition:"all 0.15s",
                        background:form.etat_final===k?v.bg:"transparent",
                        border:`1px solid ${form.etat_final===k?v.color:"#1B2D4F"}`,
                        color:form.etat_final===k?v.color:"#4A6A9E"}}>
                        {v.icon} {v.label}
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              {/* Photos */}
              <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📸 Photos</h3>
                <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}}
                  onChange={e=>uploadPhotos(Array.from(e.target.files))}/>
                {(form.photos||[]).length>0&&(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
                    {(form.photos||[]).map((url,i)=>(
                      <div key={i} style={{position:"relative",paddingBottom:"100%",overflow:"hidden",borderRadius:8}}>
                        <img src={url} style={{position:"absolute",inset:0,width:"100%",
                          height:"100%",objectFit:"cover"}} alt=""/>
                        <button onClick={()=>F("photos",(form.photos||[]).filter((_,j)=>j!==i))}
                          style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.7)",
                            border:"none",borderRadius:"50%",color:"#FFF",width:22,height:22,
                            cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",
                            justifyContent:"center"}}>✕</button>
                      </div>
                    ))}
                  </div>
                )}
                <button onClick={()=>fileRef.current?.click()} disabled={uploading}
                  style={{...BTN(uploading?"#112038":"rgba(59,130,246,0.08)",{
                    border:"1px solid #1B2D4F",color:"#3B82F6",width:"100%",
                    padding:"11px",fontSize:13})}}>
                  {uploading?"⏳ Envoi en cours…":"📷 Ajouter des photos"}
                </button>
              </div>
            </div>
          </div>

          {/* Bouton sauvegarder */}
          <div style={{display:"flex",gap:10,marginTop:16}}>
            <button onClick={()=>{setView("liste");setForm(null);}} style={BTN("#1B2D4F",{flex:1,padding:"13px"})}>
              Annuler
            </button>
            <button onClick={saveRapport}
              disabled={!form.chantier_nom||!form.technicien||!form.date}
              style={BTN(!form.chantier_nom||!form.technicien||!form.date
                ?"#112038":"linear-gradient(135deg,#3B82F6,#1D4ED8)",{
                flex:3,padding:"13px",fontSize:15,
                boxShadow:!form.chantier_nom||!form.technicien||!form.date?"none":"0 4px 20px rgba(59,130,246,0.3)"})}>
              💾 Enregistrer le rapport
            </button>
          </div>
        </div>
      );

      // ── DÉTAIL RAPPORT ──────────────────────────────────────
      if(view==="detail"&&detail) {
        const S=ETAT[detail.etat_final]||ETAT.ok;
        const duree=heuresTotal(detail.heure_debut,detail.heure_fin);
        return(
          <div>
            {/* MODAL SUPPRESSION */}
            {delConf&&(
              <div style={OVL} onClick={()=>setDelConf(null)}>
                <div style={{background:"#0D1828",borderRadius:18,padding:28,width:340,maxWidth:"94vw",
                  border:"1px solid #1B2D4F",textAlign:"center",boxShadow:"0 24px 60px rgba(0,0,0,0.6)"}}
                  onClick={e=>e.stopPropagation()}>
                  <div style={{fontSize:48,marginBottom:12}}>🗑️</div>
                  <h3 style={{margin:"0 0 8px",fontWeight:800,color:"#F0F6FF"}}>Supprimer ce rapport ?</h3>
                  <p style={{color:"#4A6A9E",fontSize:13,margin:"0 0 24px"}}>{detail.chantier_nom} — {detail.date}</p>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>setDelConf(null)}
                      style={{...BTN("#1B2D4F"),flex:1,padding:"11px"}}>Annuler</button>
                    <button onClick={()=>{setRapports(p=>p.filter(r=>r.id!==detail.id));setView("liste");setDelConf(null);}}
                      style={{...BTN("#EF4444"),flex:1,padding:"11px"}}>Supprimer</button>
                  </div>
                </div>
              </div>
            )}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              marginBottom:22,flexWrap:"wrap",gap:10}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <button onClick={()=>setView("liste")} style={{
                  background:"#112038",border:"1px solid #1B2D4F",borderRadius:8,
                  color:"#7B96C8",padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:700,
                  fontFamily:'"Outfit",sans-serif'}}>← Retour</button>
                <div>
                  <h2 style={{margin:"0 0 2px",fontSize:17,fontWeight:800,color:"#F0F6FF"}}>
                    📋 {detail.chantier_nom}
                  </h2>
                  <div style={{fontSize:12,color:"#4A6A9E"}}>
                    {detail.date} · {detail.technicien}
                    {duree&&<span style={{marginLeft:8,color:"#60A5FA"}}>· ⏱️ {duree}</span>}
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setForm({...detail});setView("form");}} style={{
                  background:"rgba(59,130,246,0.08)",border:"1px solid #1B2D4F",borderRadius:8,
                  color:"#3B82F6",padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:700,
                  fontFamily:'"Outfit",sans-serif'}}>✏️ Modifier</button>
                <button onClick={()=>setDelConf(detail)} style={{
                  background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",
                  borderRadius:8,color:"#EF4444",padding:"8px 14px",cursor:"pointer",fontSize:13,
                  fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>🗑️</button>
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14}}>
              {/* Infos */}
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <h3 style={{margin:0,fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📍 Chantier</h3>
                    <span style={{background:S.bg,color:S.color,border:`1px solid ${S.color}50`,
                      borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:700}}>
                      {S.icon} {S.label}
                    </span>
                  </div>
                  {[
                    ["Client",detail.chantier_nom],
                    ["Adresse",detail.adresse||"—"],
                    ["Technicien",detail.technicien],
                    ["Date",detail.date],
                    ["Horaires",detail.heure_debut&&detail.heure_fin?`${detail.heure_debut} → ${detail.heure_fin}${duree?" ("+duree+")":""}` :"—"],
                  ].map(([k,v])=>(
                    <div key={k} style={{display:"flex",justifyContent:"space-between",
                      padding:"8px 0",borderBottom:"1px solid #1B2D4F"}}>
                      <span style={{fontSize:12,color:"#4A6A9E",fontWeight:600}}>{k}</span>
                      <span style={{fontSize:13,color:"#F0F6FF",fontWeight:500,textAlign:"right",maxWidth:"60%"}}>{v}</span>
                    </div>
                  ))}
                </div>

                {detail.type_travaux?.length>0&&(
                  <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                    <h3 style={{margin:"0 0 12px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>🔧 Travaux</h3>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {detail.type_travaux.map(t=>(
                        <span key={t} style={{background:"rgba(59,130,246,0.12)",color:"#60A5FA",
                          border:"1px solid rgba(59,130,246,0.2)",borderRadius:20,
                          padding:"5px 11px",fontSize:12,fontWeight:600}}>{t}</span>
                      ))}
                    </div>
                  </div>
                )}

                {detail.materiels_poses?.length>0&&(
                  <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                    <h3 style={{margin:"0 0 12px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📦 Matériels posés</h3>
                    {detail.materiels_poses.map((m,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",
                        padding:"7px 0",borderBottom:"1px solid #1B2D4F"}}>
                        <span style={{fontSize:13,color:"#A8C4E8"}}>{m.nom}</span>
                        <span style={{fontSize:13,color:"#60A5FA",fontWeight:700}}>×{m.qty}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Observations + photos */}
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {detail.observations&&(
                  <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                    <h3 style={{margin:"0 0 12px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📝 Compte-rendu</h3>
                    <p style={{margin:0,fontSize:13,color:"#A8C4E8",lineHeight:1.7,
                      whiteSpace:"pre-wrap"}}>{detail.observations}</p>
                  </div>
                )}
                {detail.problemes&&(
                  <div style={{background:"rgba(245,158,11,0.06)",borderRadius:14,
                    border:"1px solid rgba(245,158,11,0.2)",padding:"18px"}}>
                    <h3 style={{margin:"0 0 12px",fontWeight:800,fontSize:14,color:"#F59E0B"}}>⚠️ Problèmes</h3>
                    <p style={{margin:0,fontSize:13,color:"#A8C4E8",lineHeight:1.7,
                      whiteSpace:"pre-wrap"}}>{detail.problemes}</p>
                  </div>
                )}
                {detail.photos?.length>0&&(
                  <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"}}>
                    <h3 style={{margin:"0 0 12px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>
                      📸 Photos ({detail.photos.length})
                    </h3>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                      {detail.photos.map((url,i)=>(
                        <a key={i} href={url} target="_blank" rel="noopener"
                          style={{display:"block",paddingBottom:"100%",position:"relative",
                            overflow:"hidden",borderRadius:8,cursor:"zoom-in"}}>
                          <img src={url} style={{position:"absolute",inset:0,width:"100%",
                            height:"100%",objectFit:"cover",transition:"transform 0.2s"}} alt=""/>
                        </a>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      // ── LISTE ───────────────────────────────────────────────
      return(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            marginBottom:18,flexWrap:"wrap",gap:10}}>
            <div>

    // ══════════════════════════════════════
    // ONGLET CARTES
    // ══════════════════════════════════════
    function CarteTab({isMobile, ventes, chantiers, fmt}) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const markersRef = useRef([]);
      const[selectedPoint,setSelectedPoint]=useState(null);
      const[lightbox,setLightbox]=useState(null);
      const[filter,setFilter]=useState("tous"); // tous | avec_photos | sans_coords

      // Points : ventes avec coords + chantiers terminés liés
      const points = useMemo(()=>{
        return ventes
          .filter(v=>v.coords)
          .map(v=>{
            // find linked chantier
            const ch=chantiers.find(c=>c.vente_id===v.id);
            const photos=ch?.photos||[];
            return {
              id:v.id, client:v.client, adresse:v.adresse, coords:v.coords,
              date:v.date, montant:v.prix_ht, par:v.par||"",
              description:v.description||"",
              statut_chantier:ch?.statut||null,
              technicien:ch?.technicien||"",
              photos,
              materiels:v.materiels||[],
            };
          });
      },[ventes,chantiers]);

      const filtered = filter==="avec_photos"?points.filter(p=>p.photos.length>0):points;
      const sansCoords = ventes.filter(v=>v.adresse&&!v.coords).length;

      // Init Leaflet map
      useEffect(()=>{
        if(!mapRef.current||mapInstanceRef.current)return;
        // Centre Grand Est
        const map=L.map(mapRef.current,{zoomControl:true}).setView([48.5,6.5],7);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
          attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',
          maxZoom:19
        }).addTo(map);
        mapInstanceRef.current=map;
        return()=>{map.remove();mapInstanceRef.current=null;};
      },[]);

      // Update markers when points change
      useEffect(()=>{
        const map=mapInstanceRef.current;
        if(!map)return;

        // Clear old markers
        markersRef.current.forEach(m=>m.remove());
        markersRef.current=[];

        filtered.forEach(pt=>{
          const hasPhotos=pt.photos.length>0;
          const STATUT_COLORS={a_planifier:"#F59E0B",planifie:"#3B82F6",en_cours:"#A855F7",termine:"#10B981"};
          const color=pt.statut_chantier?STATUT_COLORS[pt.statut_chantier]||"#10B981":"#3B82F6";

          const icon=L.divIcon({
            className:"",
            html:`<div style="
              width:${hasPhotos?38:32}px;height:${hasPhotos?38:32}px;
              background:${color};
              border:3px solid white;
              border-radius:50%;
              display:flex;align-items:center;justify-content:center;
              font-size:${hasPhotos?16:13}px;
              box-shadow:0 2px 8px #0006;
              cursor:pointer;
            ">${hasPhotos?"📸":"⚡"}</div>`,
            iconSize:[hasPhotos?38:32,hasPhotos?38:32],
            iconAnchor:[hasPhotos?19:16,hasPhotos?19:16],
          });

          const marker=L.marker([pt.coords.lat,pt.coords.lng],{icon}).addTo(map);
          marker.on("click",()=>{
            setSelectedPoint(pt);
          });
          markersRef.current.push(marker);
        });

        // Fit bounds if points exist
        if(filtered.length>0){
          const bounds=L.latLngBounds(filtered.map(p=>[p.coords.lat,p.coords.lng]));
          map.fitBounds(bounds,{padding:[40,40],maxZoom:12});
        }
      },[filtered]);

      const STATUT_CH={
        a_planifier:{label:"À planifier",color:"#F59E0B"},
        planifie:{label:"Planifié",color:"#3B82F6"},
        en_cours:{label:"En cours",color:"#A855F7"},
        termine:{label:"Terminé",color:"#10B981"},
      };

      return(
        <div>
          {/* LIGHTBOX */}
          {lightbox&&<div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"#000000EE",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}}>
            <img src={lightbox} style={{maxWidth:"95vw",maxHeight:"92vh",borderRadius:12,objectFit:"contain"}}/>
            <button onClick={()=>setLightbox(null)} style={{position:"fixed",top:16,right:20,background:"#0D1828",border:"1px solid #1B2D4F",borderRadius:8,color:"#E8F0FF",padding:"8px 14px",cursor:"pointer",fontSize:16,fontWeight:700,zIndex:3001}}>✕</button>
          </div>}

          {/* HEADER */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>🗺️ Carte des chantiers</h2>
              <p style={{margin:0,fontSize:12,color:"#4A6A9E"}}>{points.length} chantier(s) géolocalisé(s) sur {ventes.length} vente(s)</p>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[["tous","Tous","#7B96C8"],["avec_photos","📸 Avec photos","#3B82F6"]].map(([k,l,col])=>(
                <button key={k} onClick={()=>setFilter(k)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${filter===k?col:"#1B2D4F"}`,background:filter===k?col+"25":"transparent",color:filter===k?col:"#4A6A9E",fontSize:12,fontWeight:700,cursor:"pointer"}}>{l}</button>
              ))}
            </div>
          </div>

          {/* Alerte adresses non géocodées */}
          {sansCoords>0&&<div style={{background:"#F59E0B15",border:"1px solid #F59E0B40",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#F59E0B",display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:16}}>⚠️</span>
            <span><strong>{sansCoords} vente(s)</strong> ont une adresse non encore géocodée. Ouvre et réenregistre ces ventes pour les placer sur la carte.</span>
          </div>}

          {/* LÉGENDE */}
          <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
            {Object.entries(STATUT_CH).map(([k,s])=>(
              <div key={k} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#7B96C8"}}>
                <div style={{width:12,height:12,borderRadius:"50%",background:s.color,border:"2px solid white",boxShadow:"0 1px 3px #0004"}}/>
                {s.label}
              </div>
            ))}
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#7B96C8"}}>
              <span style={{fontSize:14}}>📸</span> Avec photos
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#7B96C8"}}>
              <span style={{fontSize:14}}>⚡</span> Sans photos
            </div>
          </div>

          {/* LAYOUT : carte + panneau latéral */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":selectedPoint?"1fr 360px":"1fr",gap:14,alignItems:"start"}}>

            {/* CARTE */}
            <div style={{borderRadius:14,overflow:"hidden",border:"1px solid #1B2D4F",position:"relative"}}>
              <div ref={mapRef} style={{height:isMobile?"65vh":"72vh",width:"100%"}}/>
              {filtered.length===0&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
                <div style={{background:"#0D1828",borderRadius:12,padding:"20px 28px",textAlign:"center",border:"1px solid #1B2D4F"}}>
                  <div style={{fontSize:40,marginBottom:8}}>📍</div>
                  <div style={{fontWeight:800,color:"#F0F6FF",marginBottom:4}}>Aucun point à afficher</div>
                  <div style={{fontSize:12,color:"#4A6A9E"}}>Ajoutez des adresses à vos ventes</div>
                </div>
              </div>}
            </div>

            {/* PANNEAU DÉTAIL */}
            {selectedPoint&&<div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"16px",maxHeight:isMobile?"auto":"72vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div>
                  <div style={{fontWeight:800,fontSize:16,color:"#F0F6FF",marginBottom:3}}>{selectedPoint.client}</div>
                  {selectedPoint.statut_chantier&&<span style={{background:STATUT_CH[selectedPoint.statut_chantier]?.color+"20",color:STATUT_CH[selectedPoint.statut_chantier]?.color,padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700}}>{STATUT_CH[selectedPoint.statut_chantier]?.label}</span>}
                </div>
                <button onClick={()=>setSelectedPoint(null)} style={{background:"#1B2D4F",border:"none",borderRadius:7,color:"#7B96C8",width:28,height:28,cursor:"pointer",fontSize:14,fontWeight:700,flexShrink:0}}>✕</button>
              </div>

              <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:14}}>
                {selectedPoint.adresse&&<div style={{fontSize:12,color:"#4A6A9E"}}>📍 {selectedPoint.adresse}</div>}
                <div style={{fontSize:12,color:"#4A6A9E"}}>📅 {selectedPoint.date}</div>
                {selectedPoint.par&&<div style={{fontSize:12,color:"#4A6A9E"}}>👤 {selectedPoint.par}</div>}
                {selectedPoint.technicien&&<div style={{fontSize:12,color:"#4A6A9E"}}>🔧 {selectedPoint.technicien}</div>}
                <div style={{fontSize:15,fontWeight:800,color:"#10B981"}}>💶 {fmt(selectedPoint.montant)}</div>
              </div>

              {selectedPoint.materiels.length>0&&<div style={{marginBottom:14}}>
                <div style={{fontSize:10,fontWeight:700,color:"#4A6A9E",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Matériel installé</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {selectedPoint.materiels.map((m,i)=><span key={i} style={{background:"#070D1A",borderRadius:6,padding:"3px 8px",fontSize:11,color:"#7B96C8"}}>{m.qty}× {m.article}</span>)}
                </div>
              </div>}

              {selectedPoint.description&&<div style={{fontSize:12,color:"#4A6A9E",fontStyle:"italic",marginBottom:14,padding:"8px 10px",background:"#070D1A",borderRadius:8}}>"{selectedPoint.description}"</div>}

              {/* Photos */}
              <div style={{marginBottom:4}}>
                <div style={{fontSize:10,fontWeight:700,color:"#4A6A9E",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>
                  📸 Photos {selectedPoint.photos.length>0?`(${selectedPoint.photos.length})`:""}
                </div>
                {selectedPoint.photos.length===0
                  ?<div style={{textAlign:"center",padding:"20px 0",color:"#2E4D82",background:"#070D1A",borderRadius:10,fontSize:12}}>Aucune photo pour ce chantier</div>
                  :<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                    {selectedPoint.photos.map((url,i)=>(
                      <div key={i} style={{borderRadius:8,overflow:"hidden",aspectRatio:"1"}}>
                        <img src={url} onClick={()=>setLightbox(url)} style={{width:"100%",height:"100%",objectFit:"cover",cursor:"zoom-in",display:"block"}}/>
                      </div>
                    ))}
                  </div>
                }
              </div>
            </div>}
          </div>

          {/* Liste des ventes sans coords */}
          {ventes.filter(v=>!v.coords&&!v.adresse).length>0&&<div style={{marginTop:14,background:"#0D1828",borderRadius:12,border:"1px solid #1B2D4F",padding:"12px 14px"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#4A6A9E",marginBottom:8}}>Ventes sans adresse ({ventes.filter(v=>!v.coords&&!v.adresse).length})</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {ventes.filter(v=>!v.coords&&!v.adresse).map(v=>(
                <span key={v.id} style={{background:"#070D1A",borderRadius:7,padding:"4px 10px",fontSize:11,color:"#4A6A9E"}}>{v.client}</span>
              ))}
            </div>
          </div>}
        </div>
      );
    }

    // ══════════════════════════════════════
    // ONGLET ADMINISTRATIF — Acomptes
    // ══════════════════════════════════════
    function AdminTab({isMobile, acomptes, setAcomptes, ventes, profile, fmt, role}) {
      const canEdit = r => ["administrateur","secretaire","commercial"].includes(r);

      const STATUTS = {
        a_envoyer:  {label:"À envoyer",   color:"#F59E0B", bg:"#2D2008", icon:"📤"},
        envoye:     {label:"Envoyé",      color:"#3B82F6", bg:"#0F1F3D", icon:"📨"},
        paye:       {label:"Payé",        color:"#10B981", bg:"#0A2218", icon:"✅"},
        annule:     {label:"Annulé",      color:"#EF4444", bg:"#3B1212", icon:"❌"},
      };

      const[newModal,setNewModal]=useState(false);
      const[newForm,setNewForm]=useState({client:"",montant_vente:"",montant_acompte:"",date_creation:new Date().toLocaleDateString("fr-FR"),statut:"a_envoyer",notes:"",par:profile?.nom||""});

      const INP=(e={})=>({background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,color:"#E8F0FF",padding:"10px 12px",fontSize:14,width:"100%",outline:"none",boxSizing:"border-box",...e});
      const BTN=(bg,e={})=>({background:bg,border:"none",borderRadius:10,color:"#FFF",padding:"10px 14px",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:'"Outfit",sans-serif',transition:"all 0.15s",...e});
      const L=({c})=><label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,letterSpacing:"0.08em",textTransform:"uppercase"}}>{c}</label>;
      const OVL={position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"};

      const totalPaye     = acomptes.filter(a=>a.statut==="paye").reduce((s,a)=>s+Number(a.montant_acompte||0),0);
      const totalEnAttente= acomptes.filter(a=>["a_envoyer","envoye"].includes(a.statut)).reduce((s,a)=>s+Number(a.montant_acompte||0),0);

      const filtered = acomptes.filter(a=>{

        if(search&&!(a.client||"").toLowerCase().includes(search.toLowerCase())) return false;
        return true;

        <div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>

              {editModal.vente_id&&<span style={{fontSize:10,color:"#4A6A9E",background:"#070D1A",padding:"3px 8px",borderRadius:6}}>🔗 Depuis vente</span>}
            </div>

            <div style={{marginBottom:12}}><L c="CLIENT"/><input value={editModal.client} onChange={e=>setEditModal(p=>({...p,client:e.target.value}))} style={INP()}/></div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>

                <input type="number" value={editModal.montant_vente||""} onChange={e=>{const mv=Number(e.target.value);setEditModal(p=>({...p,montant_vente:mv,montant_acompte:Math.round(mv*0.3*100)/100}));}} style={INP()}/>

              <div><L c="ACOMPTE (€)"/>
                <input type="number" value={editModal.montant_acompte||""} onChange={e=>setEditModal(p=>({...p,montant_acompte:Number(e.target.value)}))} style={INP()}/>
              </div>
            </div>

            {editModal.montant_vente>0&&<div style={{background:"#3B82F615",border:"1px solid #3B82F630",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#3B82F6"}}>
              💡 Acompte = {editModal.montant_vente>0?((editModal.montant_acompte/editModal.montant_vente)*100).toFixed(0):"—"}% du montant HT
