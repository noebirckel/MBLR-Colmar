              <div><L c="DATE PAIEMENT"/><input value={editModal.date_paiement||""} onChange={e=>setEditModal(p=>({...p,date_paiement:e.target.value}))} placeholder="JJ/MM/AAAA" style={INP()}/></div>
            </div>

            <div style={{marginBottom:16}}><L c="NOTES"/><textarea value={editModal.notes||""} onChange={e=>setEditModal(p=>({...p,notes:e.target.value}))} placeholder="Informations complémentaires…" style={{...INP(),height:70,resize:"none"}}/></div>

            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setEditModal(null)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={()=>{updateAcompte(editModal.id,editModal);setEditModal(null);}} style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{flex:2,padding:"12px"})}>💾 Enregistrer</button>
            </div>
          </div></div>}

          {/* MODAL NOUVEL ACOMPTE MANUEL */}
          {newModal&&<div style={OVL} onClick={()=>setNewModal(false)}><div style={MBX} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <h3 style={{margin:"0 0 16px",fontWeight:800,fontSize:17}}>📄 Nouvel acompte</h3>

            <div style={{marginBottom:12}}><L c="CLIENT"/><input value={newForm.client} onChange={e=>setNewForm(p=>({...p,client:e.target.value}))} placeholder="Nom du client" style={INP()}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div><L c="MONTANT VENTE HT (€)"/><input type="number" value={newForm.montant_vente} onChange={e=>{const mv=Number(e.target.value);setNewForm(p=>({...p,montant_vente:mv,montant_acompte:Math.round(mv*0.3*100)/100}));}} style={INP()}/></div>
              <div><L c="ACOMPTE (€)"/><input type="number" value={newForm.montant_acompte} onChange={e=>setNewForm(p=>({...p,montant_acompte:Number(e.target.value)}))} style={INP()}/></div>
            </div>
            {newForm.montant_vente>0&&<div style={{background:"#3B82F615",border:"1px solid #3B82F630",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#3B82F6"}}>
              💡 Acompte = {((newForm.montant_acompte/newForm.montant_vente)*100).toFixed(0)}% — par défaut 30%
            </div>}
            <div style={{marginBottom:12}}><L c="NOTES"/><textarea value={newForm.notes} onChange={e=>setNewForm(p=>({...p,notes:e.target.value}))} placeholder="Informations…" style={{...INP(),height:60,resize:"none"}}/></div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setNewModal(false)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button disabled={!newForm.client||!newForm.montant_acompte} onClick={()=>{setAcomptes(p=>[{...newForm,id:Date.now()},...p]);setNewModal(false);setNewForm({client:"",montant_vente:"",montant_acompte:"",date_creation:new Date().toLocaleDateString("fr-FR"),statut:"a_envoyer",notes:"",par:profile?.nom||""});}} style={BTN(!newForm.client||!newForm.montant_acompte?"#0D1828":"linear-gradient(135deg,#10B981,#059669)",{flex:2,padding:"12px"})}>✅ Créer</button>
            </div>
          </div></div>}

          {/* MODAL SUPPRESSION */}
          {delConf&&<div style={OVL} onClick={()=>setDelConf(null)}><div style={{...MBX,maxWidth:360,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <div style={{fontSize:44,marginBottom:10}}>🗑️</div>
            <h3 style={{margin:"0 0 8px",fontWeight:800}}>Supprimer cet acompte ?</h3>
            <p style={{color:"#4A6A9E",fontSize:13,margin:"0 0 20px"}}><strong style={{color:"#E8F0FF"}}>{delConf.client}</strong> — {fmt(delConf.montant_acompte)}</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setDelConf(null)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={()=>{setAcomptes(p=>p.filter(a=>a.id!==delConf.id));setDelConf(null);}} style={BTN("#EF4444",{flex:1})}>Supprimer</button>
            </div>
          </div></div>}

          {/* HEADER */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>📄 Administratif — Acomptes</h2>
              <p style={{margin:0,fontSize:12,color:"#4A6A9E"}}>{acomptes.length} demande{acomptes.length>1?"s":""}</p>
            </div>
            {canEdit(role)&&<button onClick={()=>setNewModal(true)} style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{padding:"10px 16px",fontSize:13})}>➕ Nouvel acompte</button>}
          </div>

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:8,marginBottom:16}}>
            {[
              {l:"Total acomptes",v:fmt(totalAcomptes),c:"#3B82F6",i:"💶",sub:`${acomptes.length} demande(s)`},
              {l:"Encaissé",v:fmt(totalPaye),c:"#10B981",i:"✅",sub:`${acomptes.filter(a=>a.statut==="paye").length} payé(s)`},
              {l:"En attente",v:fmt(totalEnAttente),c:"#F59E0B",i:"⏳",sub:`${acomptes.filter(a=>["a_envoyer","envoye"].includes(a.statut)).length} en cours`},
              {l:"Taux encaissement",v:totalAcomptes>0?Math.round((totalPaye/totalAcomptes)*100)+"%":"—",c:"#A855F7",i:"📊",sub:"du total acomptes"},
            ].map(({l,v,c,i,sub})=>(
              <div key={l} style={{background:"#0D1828",borderRadius:12,padding:"13px 15px",border:`1px solid ${c}30`}}>
                <div style={{fontSize:18,marginBottom:4}}>{i}</div>
                <div style={{fontSize:isMobile?14:17,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:11,color:"#4A6A9E",marginTop:3}}>{l}</div>
                <div style={{fontSize:10,color:"#2E4D82",marginTop:1}}>{sub}</div>
              </div>
            ))}
          </div>

          {/* Alerte acomptes à envoyer */}
          {acomptes.filter(a=>a.statut==="a_envoyer").length>0&&<div style={{background:"#F59E0B15",border:"1px solid #F59E0B40",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>⚠️</span>
            <div>
              <span style={{fontWeight:700,color:"#F59E0B",fontSize:13}}>{acomptes.filter(a=>a.statut==="a_envoyer").length} demande{acomptes.filter(a=>a.statut==="a_envoyer").length>1?"s":""} d'acompte à envoyer</span>
              <div style={{fontSize:11,color:"#92400E",marginTop:2}}>{acomptes.filter(a=>a.statut==="a_envoyer").map(a=>a.client).join(", ")}</div>
            </div>
          </div>}

          {/* Filtres */}
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher client…" style={{...INP(),maxWidth:220,fontSize:13}}/>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {[["tous","Tous","#7B96C8"],...Object.entries(STATUTS).map(([k,s])=>[k,s.label,s.color])].map(([k,l,col])=>(
                <button key={k} onClick={()=>setFilter(k)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${filter===k?col:"#1B2D4F"}`,background:filter===k?col+"25":"transparent",color:filter===k?col:"#4A6A9E",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                  {l} {k!=="tous"&&<span style={{fontSize:10,opacity:0.8}}>({acomptes.filter(a=>a.statut===k).length})</span>}
                </button>
              ))}
            </div>
          </div>

          {/* Liste */}
          {filtered.length===0
            ?<div style={{textAlign:"center",padding:"50px 0",color:"#2E4D82"}}><div style={{fontSize:40,marginBottom:8}}>📄</div><div style={{fontWeight:700}}>Aucun acompte trouvé</div></div>
            :<div style={{display:"flex",flexDirection:"column",gap:10}}>
              {filtered.map(a=>{
                const S=STATUTS[a.statut]||STATUTS.a_envoyer;
                const pct=a.montant_vente>0?Math.round((a.montant_acompte/a.montant_vente)*100):null;
                // Link to vente
                const vente=a.vente_id?ventes.find(v=>v.id===a.vente_id):null;
                return(
                  <div key={a.id} style={{background:"#0D1828",borderRadius:14,border:`1px solid ${S.color}30`,padding:"14px 16px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                          <span style={{fontWeight:800,fontSize:16,color:"#F0F6FF"}}>{a.client}</span>
                          <span style={{background:S.bg,color:S.color,padding:"3px 8px",borderRadius:20,fontSize:10,fontWeight:700}}>{S.icon} {S.label}</span>
                          {a.vente_id&&<span style={{fontSize:10,color:"#4A6A9E",background:"#070D1A",padding:"2px 7px",borderRadius:5}}>🔗 Vente liée</span>}
                        </div>
                        <div style={{fontSize:11,color:"#4A6A9E"}}>
                          Créé le {a.date_creation} · {a.par||""}
                          {a.date_envoi&&<span> · 📤 Envoyé le {a.date_envoi}</span>}
                          {a.date_paiement&&<span> · ✅ Payé le {a.date_paiement}</span>}
                        </div>
                        {a.notes&&<div style={{fontSize:12,color:"#7B96C8",fontStyle:"italic",marginTop:4}}>"{a.notes}"</div>}
                      </div>
                      <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                        <div style={{fontSize:20,fontWeight:800,color:S.color}}>{fmt(a.montant_acompte)}</div>
                        {a.montant_vente>0&&<div style={{fontSize:11,color:"#4A6A9E",marginTop:2}}>{pct}% de {fmt(a.montant_vente)}</div>}
                      </div>
                    </div>

                    {/* Barre de progression paiement */}
                    <div style={{background:"#070D1A",borderRadius:6,height:4,marginBottom:10,overflow:"hidden"}}>
                      <div style={{height:4,borderRadius:6,width:a.statut==="paye"?"100%":a.statut==="envoye"?"50%":a.statut==="annule"?"100%":"15%",background:a.statut==="paye"?"#10B981":a.statut==="annule"?"#EF4444":"#F59E0B",transition:"width 0.3s"}}/>
                    </div>

                    {/* Actions rapides statut */}
                    {canEdit(role)&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {a.statut==="a_envoyer"&&<button onClick={()=>updateAcompte(a.id,{statut:"envoye",date_envoi:new Date().toLocaleDateString("fr-FR")})} style={BTN("#3B82F6",{flex:2,padding:"7px 10px",fontSize:12})}>📨 Marquer envoyé</button>}
                      {a.statut==="envoye"&&<button onClick={()=>updateAcompte(a.id,{statut:"paye",date_paiement:new Date().toLocaleDateString("fr-FR")})} style={BTN("#10B981",{flex:2,padding:"7px 10px",fontSize:12})}>✅ Marquer payé</button>}
                      {a.statut==="paye"&&<div style={{flex:2,background:"#10B98115",border:"1px solid #10B98140",borderRadius:9,padding:"7px 10px",textAlign:"center",fontSize:12,color:"#10B981",fontWeight:700}}>✅ Acompte encaissé le {a.date_paiement}</div>}
                      <button onClick={()=>setEditModal({...a})} style={BTN("#1B2D4F",{padding:"7px 12px",fontSize:12})}>✏️</button>
                      <button onClick={()=>setDelConf(a)} style={{background:"#EF444415",border:"1px solid #EF444430",borderRadius:9,color:"#EF4444",padding:"7px 10px",cursor:"pointer",fontSize:12,fontWeight:700}}>🗑️</button>
                    </div>}
                  </div>
                );
              })}
            </div>
          }
        </div>
      );
    }

    // ══════════════════════════════════════
    // ONGLET ÉQUIPE (admin)
    // ══════════════════════════════════════
    function EquipeTab({isMobile}) {
      const[users,setUsers]=useState([]);
      const[loading,setLoading]=useState(true);
      const[modal,setModal]=useState(false);
      const[form,setForm]=useState({nom:"",email:"",role:"installateur",pass:""});
      const[err,setErr]=useState("");
      const[saving,setSaving]=useState(false);
      const[editUser,setEditUser]=useState(null);

      const INP=(e={})=>({background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,color:"#E8F0FF",padding:"11px 13px",fontSize:14,width:"100%",outline:"none",boxSizing:"border-box",...e});
      const BTN=(bg,e={})=>({background:bg,border:"none",borderRadius:9,color:"#FFF",padding:"9px 14px",cursor:"pointer",fontWeight:700,fontSize:12,...e});
      const L=({c})=><label style={{fontSize:11,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:5,letterSpacing:"0.05em"}}>{c}</label>;

      const loadUsers = async () => {
        setLoading(true);
        const{data}=await sb.from("profiles").select("*").order("created_at");
        if(data) setUsers(data);
        setLoading(false);
      };

      useEffect(()=>{loadUsers();},[]);

      const createUser = async () => {
        if(!form.nom||!form.email||!form.pass){setErr("Tous les champs sont requis.");return;}
        setSaving(true); setErr("");
        const{data,error}=await sb.auth.signUp({email:form.email,password:form.pass});
        if(error){setErr("Erreur : "+error.message);setSaving(false);return;}
        const uid=data.user?.id;
        if(uid){
          await sb.from("profiles").insert({id:uid,email:form.email,nom:form.nom,role:form.role,actif:true});
        }
        await loadUsers();
        setModal(false); setForm({nom:"",email:"",role:"installateur",pass:""});
        setSaving(false);
      };

      const updateRole = async (uid,role) => {
        await sb.from("profiles").update({role}).eq("id",uid);
        setUsers(p=>p.map(u=>u.id===uid?{...u,role}:u));
        setEditUser(null);
      };

      const toggleActif = async (uid,actif) => {
        await sb.from("profiles").update({actif:!actif}).eq("id",uid);
        setUsers(p=>p.map(u=>u.id===uid?{...u,actif:!actif}:u));
      };

      const OVL={position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"};
      const MBX=isMobile?{background:"#0D1828",borderRadius:"20px 20px 0 0",padding:"8px 16px 32px",width:"100%",border:"1px solid #1B2D4F",maxHeight:"90vh",overflowY:"auto"}:{background:"#0D1828",borderRadius:16,padding:24,width:420,maxWidth:"95vw",border:"1px solid #1B2D4F"};

      return(
        <div>
          {/* Modal création */}
          {modal&&<div style={OVL} onClick={()=>setModal(false)}><div style={MBX} onClick={e=>e.stopPropagation()}>
            {isMobile&&<div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"8px auto 16px"}}/>}
            <h3 style={{margin:"0 0 18px",fontWeight:800,fontSize:16}}>👤 Créer un utilisateur</h3>
            <div style={{marginBottom:12}}><L c="NOM COMPLET"/><input value={form.nom} onChange={e=>setForm(p=>({...p,nom:e.target.value}))} placeholder="Ex: Jean Dupont" style={INP()}/></div>
            <div style={{marginBottom:12}}><L c="EMAIL"/><input type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="jean@societe.fr" style={INP()}/></div>
            <div style={{marginBottom:12}}><L c="MOT DE PASSE PROVISOIRE"/><input type="text" value={form.pass} onChange={e=>setForm(p=>({...p,pass:e.target.value}))} placeholder="Min. 6 caractères" style={INP()}/></div>
            <div style={{marginBottom:18}}>
              <L c="RÔLE"/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {Object.entries(ROLES).map(([k,r])=>(
                  <button key={k} onClick={()=>setForm(p=>({...p,role:k}))} style={{background:form.role===k?r.bg:"#070D1A",border:`2px solid ${form.role===k?r.color:"#1B2D4F"}`,borderRadius:10,color:form.role===k?r.color:"#4A6A9E",padding:"10px 8px",cursor:"pointer",fontWeight:700,fontSize:12,textAlign:"left",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:16}}>{r.icon}</span><span>{r.label}</span>
                  </button>
                ))}
              </div>
            </div>
            {err&&<div style={{background:"#EF444418",border:"1px solid #EF444440",borderRadius:8,padding:"9px 12px",marginBottom:12,color:"#EF4444",fontSize:12}}>⚠️ {err}</div>}
            <div style={{background:"#070D1A",borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:11,color:"#4A6A9E"}}>
              💡 L'utilisateur recevra un email de confirmation. Il devra cliquer sur le lien pour activer son compte.
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setModal(false)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={createUser} disabled={saving} style={BTN(saving?"#1B2D4F":"#3B82F6",{flex:2})}>
                {saving?"Création…":"✅ Créer le compte"}
              </button>
            </div>
          </div></div>}

          {/* Modal changement de rôle */}
          {editUser&&<div style={OVL} onClick={()=>setEditUser(null)}><div style={{...MBX,maxWidth:380}} onClick={e=>e.stopPropagation()}>
            {isMobile&&<div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"8px auto 16px"}}/>}
            <h3 style={{margin:"0 0 6px",fontWeight:800,fontSize:15}}>🔄 Changer le rôle</h3>
            <p style={{color:"#4A6A9E",fontSize:13,marginBottom:16}}>{editUser.nom}</p>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
              {Object.entries(ROLES).map(([k,r])=>(
                <button key={k} onClick={()=>updateRole(editUser.id,k)} style={{background:editUser.role===k?r.bg:"#070D1A",border:`2px solid ${editUser.role===k?r.color:"#1B2D4F"}`,borderRadius:10,color:editUser.role===k?r.color:"#7B96C8",padding:"11px 14px",cursor:"pointer",fontWeight:700,fontSize:13,textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:18}}>{r.icon}</span><span>{r.label}</span>
                  {editUser.role===k&&<span style={{marginLeft:"auto",fontSize:11}}>✓ Actuel</span>}
                </button>
              ))}
            </div>
            <button onClick={()=>setEditUser(null)} style={BTN("#1B2D4F",{width:"100%"})}>Fermer</button>
          </div></div>}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>👥 Équipe</h2>
              <p style={{margin:0,fontSize:12,color:"#4A6A9E"}}>{users.length} utilisateur{users.length>1?"s":""}</p>
            </div>
            <button onClick={()=>setModal(true)} style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{padding:"10px 16px",fontSize:13})}>➕ Nouvel utilisateur</button>
          </div>

          {loading?<div style={{textAlign:"center",padding:40,color:"#4A6A9E"}}>Chargement…</div>
            :<div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(320px,1fr))",gap:10}}>
              {users.map(u=>{
                const r=ROLES[u.role]||ROLES.installateur;
                return(
                  <div key={u.id} style={{background:u.actif?"#0D1828":"#141E2D",borderRadius:12,border:`1px solid ${u.actif?r.color+"40":"#1B2D4F"}`,padding:"14px 16px",opacity:u.actif?1:0.6}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div>
                        <div style={{fontWeight:800,fontSize:15,color:"#F0F6FF",marginBottom:4}}>{u.nom}</div>
                        <div style={{fontSize:12,color:"#4A6A9E"}}>{u.email}</div>
                      </div>
                      <span style={{background:r.bg,color:r.color,padding:"3px 9px",borderRadius:20,fontSize:10,fontWeight:700,flexShrink:0,marginLeft:8}}>{r.icon} {r.label}</span>
                    </div>
                    <div style={{fontSize:11,color:"#2E4D82",marginBottom:10}}>
                      Créé le {new Date(u.created_at).toLocaleDateString("fr-FR")} · {u.actif?"✅ Actif":"⛔ Désactivé"}
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>setEditUser(u)} style={BTN("#1B2D4F",{flex:1,fontSize:12})}>🔄 Rôle</button>
                      <button onClick={()=>toggleActif(u.id,u.actif)} style={{background:u.actif?"#EF444415":"#10B98115",border:`1px solid ${u.actif?"#EF444440":"#10B98140"}`,borderRadius:9,color:u.actif?"#EF4444":"#10B981",padding:"9px 14px",cursor:"pointer",fontWeight:700,fontSize:12,flex:1}}>
                        {u.actif?"Désactiver":"Réactiver"}
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          }
        </div>
      );
    }
