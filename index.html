              <div style={{fontSize:12,color:"#4A6A9E",marginTop:4}}>Prix : <strong style={{color:"#3B82F6"}}>{fmt(oArt.prix)}</strong> / {oArt.unite} · Stock : <strong style={{color:"#EF4444"}}>{oArt.stock}</strong> · Seuil : {oArt.seuil}</div>
              {aOByA[oModal]&&<div style={{marginTop:8,padding:"6px 10px",background:"#0F1F3D",borderRadius:8,fontSize:12,color:"#3B82F6",fontWeight:600}}>🚚 Déjà en cours : {aOByA[oModal].reduce((x,o)=>x+o.qty,0)} {oArt.unite} en transit</div>}
            </div>
            <L c="QUANTITÉ"/><input type="number" min="1" value={oForm.qty} onChange={e=>setOForm(p=>({...p,qty:e.target.value}))} style={{...INP(),marginBottom:8}}/>
            {Number(oForm.qty)>0&&<div style={{background:"#10B98118",border:"1px solid #10B98140",borderRadius:10,padding:"11px 14px",marginBottom:12,fontWeight:700,color:"#10B981",fontSize:16}}>💶 Total : {fmt(Number(oForm.qty)*oArt.prix)}</div>}
            <L c="NOTE"/>
            <textarea value={oForm.desc} onChange={e=>setOForm(p=>({...p,desc:e.target.value}))} placeholder="Ex: Fournisseur XYZ, commande urgente…" style={{...INP(),height:80,resize:"none",lineHeight:1.6}}/>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={()=>setOModal(null)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={subO} style={BTN("#3B82F6",{flex:2,padding:"13px"})}>✅ Valider</button>
            </div>
          </div></div>}

          {/* MODAL ÉDITION */}
          {eComp!==null&&<div style={OVL} onClick={()=>setEComp(null)}><div style={MBX} onClick={e=>e.stopPropagation()}>

            <L c="CATÉGORIE"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>

                      border:`1px solid ${view===t?"#3B82F6":"#1B2D4F"}`,whiteSpace:"nowrap",
                      background:view===t?"linear-gradient(135deg,#3B82F6,#1D4ED8)":"#070D1A",
                      color:view===t?"#FFF":"#5A7AAA",cursor:"pointer",fontSize:12,fontWeight:700,
                      flexShrink:0,fontFamily:'"Outfit",sans-serif'}}>
                      {TAB_ICONS[t]} {TAB_LABELS[t]}
                    </button>
                  ))}
                </div>
              )}

              <div style={{flex:1,overflowY:"auto",padding:isMobile?"12px 12px 90px":"18px 20px"}}>
          <div style={{maxWidth:1200,margin:"0 auto",padding:isMobile?"12px 12px":"18px 16px"}}>

            {/* ── VENTES ── */}
            {view==="ventes"&&<VentesTab isMobile={isMobile} ventes={ventes} setVentes={SV} stock={stock} profile={profile} fmt={fmt} role={role} onVenteSaved={v=>{
              // Créer chantier auto
              SC2(p=>[{id:Date.now(),vente_id:v.id,client:v.client,materiels:v.materiels||[],cables:v.cables||[],date_creation:new Date().toLocaleDateString("fr-FR"),date_installation:"",technicien:"",statut:"a_planifier",checklist:{client_contacte:false,materiel_prepare:false,acces_confirme:false},notes:""},...p]);
              // Créer acompte auto
              SA(p=>[{id:Date.now()+1,vente_id:v.id,client:v.client,montant_vente:v.prix_ht,montant_acompte:Math.round(v.prix_ht*0.3*100)/100,date_creation:new Date().toLocaleDateString("fr-FR"),statut:"a_envoyer",date_envoi:"",date_paiement:"",notes:"",par:v.par||""},...p]);
            }}/>}

            {/* ── ADMINISTRATIF ── */}
            {view==="administratif"&&<AdminTab isMobile={isMobile} acomptes={acomptes} setAcomptes={SA} ventes={ventes} profile={profile} fmt={fmt} role={role}/>}

            {/* ── CARTES ── */}
            {view==="cartes"&&<CarteTab isMobile={isMobile} ventes={ventes} chantiers={chantiersPipeline} fmt={fmt}/>}

            {/* ── MESSAGERIE ── */}
            {view==="messagerie"&&<MessagerieTab isMobile={isMobile} profile={profile} authUser={authUser}/>}

            {/* ── STATS ── */}
            {view==="stats"&&<StatsTab isMobile={isMobile} ventes={ventes} chantiers={chantiersPipeline} acomptes={acomptes} stock={stock} fmt={fmt} objectifs={objectifs} setObjectifs={SOBJ} role={role}/>}

            {/* ── SAV ── */}
            {view==="sav"&&<SavTab isMobile={isMobile} tickets={savTickets} setTickets={SSAV} profile={profile} role={role}/>}

            {/* ── RAPPORTS ── */}
            {view==="rapports"&&<RapportsTab isMobile={isMobile} rapports={rapports} setRapports={SRAPP} chantiers={chantiersPipeline} profile={profile} role={role}/>}

            {/* ── ÉQUIPE ── */}
            {view==="equipe"&&<EquipeTab isMobile={isMobile}/>}

            {/* ── ACCUEIL ── */}
            {view==="accueil"&&<>
              {/* Bonjour */}
              <div style={{marginBottom:20}}>
                <div style={{fontSize:isMobile?20:24,fontWeight:800,color:"#F0F6FF",marginBottom:4}}>
                  Bonjour {profile?.nom?.split(" ")[0]||""} {rCfg.icon}
                </div>
                <div style={{fontSize:12,color:"#4A6A9E"}}>
                  {new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
                </div>
              </div>

              {/* Météo stock + CA — rangée principale */}
              <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:10,marginBottom:16}}>
                {[
                  {l:"À commander",v:alerts.length,c:"#EF4444",i:"🔴",sub:"articles urgents",action:()=>goTo("stock")},
                  {l:"En transit",  v:ordered.length,c:"#3B82F6",i:"🚚",sub:"commandes en cours",action:()=>goTo("commandes")},
                  {l:"Surveiller",  v:warns.length,  c:"#F59E0B",i:"🟡",sub:"proches du seuil",action:()=>goTo("stock")},
                  {l:"Ruptures",    v:rupts.length,  c:"#A855F7",i:"⛔",sub:"fournisseur",action:()=>goTo("stock")},
                ].map(({l,v,c,i,sub,action})=>(
                  <div key={l} onClick={action} style={{background:"#0D1828",borderRadius:12,padding:isMobile?"12px 10px":"14px 16px",border:`1px solid ${c}30`,cursor:"pointer",transition:"border-color 0.15s"}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor=c}
                    onMouseLeave={e=>e.currentTarget.style.borderColor=c+"30"}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <div style={{fontSize:isMobile?22:28,fontWeight:800,color:v>0?c:"#1B2D4F",lineHeight:1}}>{v}</div>
                        <div style={{fontSize:11,fontWeight:700,color:"#7B96C8",marginTop:4}}>{l}</div>
                        <div style={{fontSize:10,color:"#2E4D82",marginTop:2}}>{sub}</div>
                      </div>
                      <span style={{fontSize:isMobile?20:22,opacity:v>0?1:0.3}}>{i}</span>
                    </div>
                  </div>
                ))}
              </div>

              {/* Météo stock par catégorie */}
              <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"14px 16px",marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <h3 style={{margin:0,fontSize:13,fontWeight:800,color:"#7B96C8",textTransform:"uppercase",letterSpacing:"0.05em"}}>Météo stock par catégorie</h3>
                  <button onClick={()=>goTo("stock")} style={{background:"transparent",border:"1px solid #1B2D4F",borderRadius:7,color:"#4A6A9E",padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:600}}>Voir tout →</button>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {uCats.map(cat=>{
                    const items=stock.filter(s=>s.cat===cat);
                    const nbAlert=items.filter(s=>gS(s.stock,s.seuil,s.rupture,aOIds.has(s.id))==="alert").length;
                    const nbWarn=items.filter(s=>gS(s.stock,s.seuil,s.rupture,aOIds.has(s.id))==="warn").length;
                    const nbOk=items.filter(s=>["ok","vide","ordered"].includes(gS(s.stock,s.seuil,s.rupture,aOIds.has(s.id)))).length;
                    const nbRupt=items.filter(s=>s.rupture).length;
                    const pctOk=Math.round((nbOk/items.length)*100);
                    const cc=CC[cat]||"#7B96C8";
                    const statusIcon = nbAlert>0?"🔴":nbWarn>0?"🟡":"✅";
                    return(
                      <div key={cat} style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:3,height:28,borderRadius:2,background:cc,flexShrink:0}}/>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                            <span style={{fontSize:12,fontWeight:700,color:cc}}>{cat}</span>
                            <div style={{display:"flex",gap:8,alignItems:"center"}}>
                              {nbAlert>0&&<span style={{fontSize:10,color:"#EF4444",fontWeight:700}}>{nbAlert} à commander</span>}
                              {nbWarn>0&&<span style={{fontSize:10,color:"#F59E0B",fontWeight:700}}>{nbWarn} à surveiller</span>}
                              {nbRupt>0&&<span style={{fontSize:10,color:"#A855F7",fontWeight:700}}>{nbRupt} rupture</span>}
                              <span style={{fontSize:11}}>{statusIcon}</span>
                            </div>
                          </div>
                          <div style={{background:"#070D1A",borderRadius:4,height:5,width:"100%",overflow:"hidden"}}>
                            <div style={{height:5,borderRadius:4,width:`${pctOk}%`,background:nbAlert>0?"#EF4444":nbWarn>0?"#F59E0B":"#10B981",transition:"width 0.3s"}}/>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Grille : alertes + CA + dernières commandes + dernières ventes + chantiers */}
              <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14}}>

                {/* Alertes stock */}
                {alerts.length>0&&<div style={{background:"#0D1828",borderRadius:14,border:"1px solid #EF444430",padding:"14px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <h3 style={{margin:0,fontSize:13,fontWeight:800,color:"#EF4444"}}>🔴 Articles à commander</h3>
                    {canOrder(role)&&<button onClick={()=>goTo("commandes")} style={{background:"transparent",border:"1px solid #1B2D4F",borderRadius:7,color:"#4A6A9E",padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:600}}>Voir →</button>}
                  </div>
                  {alerts.slice(0,5).map(item=>(
                    <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #0D182888"}}>
                      <div>
                        <span style={{fontSize:10,...BDG(item.cat)}}>{item.cat}</span>
                        <span style={{fontSize:13,fontWeight:700,color:"#F0F6FF",marginLeft:7}}>{item.article}</span>
                      </div>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <span style={{fontSize:12,color:"#EF4444",fontWeight:800}}>+{item.seuil-item.stock}</span>
                        {canOrder(role)&&<button onClick={()=>openO(item.id)} style={{...BTN("#1D4ED8"),padding:"4px 10px",fontSize:11}}>📦</button>}
                      </div>
                    </div>
                  ))}

              <input value={pSearch} onChange={e=>setPSearch(e.target.value)} placeholder="🔍 Rechercher…" style={{...INP(),marginBottom:10}}/>
              <div style={{display:"flex",gap:5,marginBottom:14,overflowX:"auto",paddingBottom:2,WebkitOverflowScrolling:"touch"}}>
                {cats.map(cat=><button key={cat} onClick={()=>setPCat(cat)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${pCat===cat?(CC[cat]||"#3B82F6"):"#1B2D4F"}`,background:pCat===cat?(CC[cat]||"#3B82F6")+"25":"transparent",color:pCat===cat?(CC[cat]||"#93C5FD"):"#7B96C8",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{cat}</button>)}
              </div>
              {uCats.filter(cat=>pCat==="Toutes"||cat===pCat).map(cat=>{
                const ci=pFil.filter(s=>s.cat===cat);
                if(ci.length===0)return null;
                const cc=CC[cat]||"#7B96C8";
                return(<div key={cat} style={{marginBottom:20}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <div style={{width:4,height:18,borderRadius:2,background:cc}}/>
                    <span style={{fontWeight:800,fontSize:14,color:cc}}>{cat}</span>
                    <span style={{fontSize:11,color:"#2E4D82"}}>{ci.length} article{ci.length>1?"s":""}</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(280px,1fr))",gap:8}}>
                    {ci.map(item=>{
                      const hasO=aOIds.has(item.id);
                      const st=gS(item.stock,item.seuil,item.rupture,hasO);
                      const s=SC[st];
                      return(<div key={item.id} style={{background:item.rupture?"#1A0A2A":hasO&&item.stock<item.seuil?"#0A1628":"#0D1828",borderRadius:12,border:`1px solid ${item.rupture?"#A855F740":hasO&&item.stock<item.seuil?"#1D4ED840":st==="alert"?"#EF444430":"#1B2D4F"}`,padding:"13px 14px",position:"relative"}}>
                        <div style={{position:"absolute",top:12,right:12}}><span style={{background:s.bg,color:s.color,padding:"2px 8px",borderRadius:20,fontSize:9,fontWeight:700}}>{s.icon} {s.label}</span></div>
                        <div style={{fontWeight:800,fontSize:14,color:"#F0F6FF",marginBottom:4,paddingRight:80}}>{item.article}</div>
                        {hasO&&<div style={{fontSize:10,color:"#3B82F6",marginBottom:6,fontWeight:600}}>🚚 {aOByA[item.id]?.reduce((x,o)=>x+o.qty,0)} {item.unite} en transit</div>}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
                          {[["STOCK",item.stock,st==="alert"?"#EF4444":st==="warn"?"#F59E0B":"#E8F0FF"],["SEUIL",item.seuil,"#7B96C8"],["PRIX",fmt(item.prix),"#10B981"]].map(([l,v,c])=>(
                            <div key={l} style={{background:"#070D1A",borderRadius:8,padding:"7px 4px",textAlign:"center"}}>
                              <div style={{fontSize:12,fontWeight:800,color:c}}>{v}</div>
                              <div style={{fontSize:9,color:"#4A6A9E",fontWeight:600,marginTop:1}}>{l}</div>
                            </div>
                          ))}
                        </div>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,background:"#070D1A",borderRadius:8,padding:"9px 12px"}}>
                          <span style={{fontSize:12,color:"#7B96C8",fontWeight:600}}>⛔ Rupture centrale</span>
                          <button onClick={()=>upd(item.id,"rupture",!item.rupture)} style={{background:item.rupture?"#A855F7":"#1B2D4F",border:"none",borderRadius:14,color:"#FFF",padding:"6px 14px",cursor:"pointer",fontWeight:700,fontSize:12}}>{item.rupture?"Oui ✓":"Non"}</button>
                        </div>
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={()=>{setEComp(item.id);setCForm({...item});}} style={{...BTN("#1B2D4F"),flex:1,fontSize:12,padding:"9px 0"}}>✏️ Modifier</button>
                          <button onClick={()=>openO(item.id)} style={BTN("#1D4ED8",{fontSize:12,padding:"9px 12px"})}>📦</button>
                          <button onClick={()=>setDelConf(item)} style={{background:"#EF444415",border:"1px solid #EF444430",borderRadius:8,color:"#EF4444",padding:"9px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>🗑️</button>
                        </div>
                      </div>);
                    })}
                  </div>
                </div>);
              })}
              {pFil.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:"#2E4D82"}}><div style={{fontSize:36,marginBottom:8}}>🔍</div><div style={{fontWeight:700}}>Aucun composant trouvé</div></div>}
            </>}
              </div>
              {/* NAV GROUPES BAS (mobile) */}
              {isMobile&&(
                <div style={{position:"fixed",bottom:0,left:0,right:0,
                  background:"rgba(8,16,31,0.97)",borderTop:"1px solid #1B2D4F",
                  display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom,6px)",
                  backdropFilter:"blur(12px)"}}>
                  {visibleGroups.map(g=>{
                    const isGroupActive=g.tabs.includes(view);
                    return(
                      <button key={g.id} onClick={()=>goTo(g.tabs[0])} style={{flex:1,background:"none",
                        border:"none",cursor:"pointer",padding:"10px 4px 6px",
                        display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                        <span style={{fontSize:19,lineHeight:1}}>{g.icon}</span>
                        <span style={{fontSize:9,fontWeight:700,lineHeight:1,
                          color:isGroupActive?"#3B82F6":"#4A6A9E"}}>{g.label}</span>
                        {isGroupActive&&<div style={{width:20,height:2,background:"#3B82F6",borderRadius:1,marginTop:2}}/>}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
