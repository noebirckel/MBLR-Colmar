              </h1>

              background:"linear-gradient(160deg,#0D1828 0%,#0B1422 100%)",
              borderRadius:24,
              border:"1px solid #1B2D4F",

                  onKeyDown={e=>e.key==="Enter"&&login()}
                  placeholder="prenom@mabornecolmar.fr"
                  style={{
                    width:"100%",background:"#070D1A",border:"1px solid #1B2D4F",
                    borderRadius:12,color:"#F0F6FF",padding:"14px 16px",

                    transition:"border-color 0.2s"
                  }}/>
              </div>
              <div style={{marginBottom:28}}>
                <label style={{display:"block",fontSize:10,fontWeight:700,color:"#4A6A9E",
                  marginBottom:8,textTransform:"uppercase",letterSpacing:"0.1em"}}>Mot de passe</label>
                <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&login()}
                  placeholder="••••••••••"
                  style={{
                    width:"100%",background:"#070D1A",border:"1px solid #1B2D4F",
                    borderRadius:12,color:"#F0F6FF",padding:"14px 16px",

                  }}/>
              </div>

                background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",
                borderRadius:10,padding:"11px 15px",marginBottom:20,
                fontSize:13,color:"#FCA5A5",textAlign:"center",fontWeight:500
              }}>{err}</div>}
              <button onClick={login} disabled={loading||!email||!pw} style={{
                width:"100%",padding:"15px",borderRadius:12,border:"none",cursor:"pointer",
                background:loading||!email||!pw
                  ?"#112038"
                  :"linear-gradient(135deg,#3B82F6 0%,#2563EB 50%,#1D4ED8 100%)",
                color: loading||!email||!pw?"#2E4D82":"#FFF",
                fontWeight:700,fontSize:15,

    function MessagerieTab({isMobile, profile, authUser}) {
      const[channel,setChannel]=useState("general"); // "general" | userId (privé)
      const[messages,setMessages]=useState([]);
      const[users,setUsers]=useState([]);
      const[text,setText]=useState("");
      const[sending,setSending]=useState(false);
      const[unread,setUnread]=useState({});
      const[mention,setMention]=useState(null); // {type:"chantier"|"vente", label}
      const[showMention,setShowMention]=useState(false);
      const bottomRef=useRef(null);
      const inputRef=useRef(null);

      // Load users list
      useEffect(()=>{
        sb.from("profiles").select("id,nom,role,actif").then(({data})=>{
          if(data)setUsers(data.filter(u=>u.id!==authUser?.id&&u.actif!==false));
        });
      },[]);

      // Subscribe to messages realtime
      useEffect(()=>{
        setMessages([]);
        // Load existing messages
        const query=channel==="general"
          ?sb.from("messages").select("*").eq("channel","general").order("created_at",{ascending:true}).limit(100)
          :sb.from("messages").select("*").or(`and(channel.eq.${channel},sender_id.eq.${authUser?.id}),and(channel.eq.${authUser?.id},sender_id.eq.${channel})`).order("created_at",{ascending:true}).limit(100);
        query.then(({data})=>{ if(data)setMessages(data); });

        // Realtime subscription
        const sub=sb.channel("messages-"+channel)
          .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},(payload)=>{
            const m=payload.new;
            const isForMe=(m.channel==="general")||(m.channel===authUser?.id&&m.sender_id===channel)||(m.sender_id===authUser?.id&&m.channel===channel);
            if(isForMe)setMessages(p=>[...p,m]);
          }).subscribe();
        return()=>sub.unsubscribe();
      },[channel,authUser?.id]);

      // Auto scroll to bottom
      useEffect(()=>{
        bottomRef.current?.scrollIntoView({behavior:"smooth"});
      },[messages]);

      const sendMessage=async()=>{
        if(!text.trim()&&!mention)return;
        setSending(true);
        const content=mention?`[${mention.type.toUpperCase()}] ${mention.label}${text?" — "+text:""}`:text;
        await sb.from("messages").insert({
          channel: channel,
          sender_id: authUser?.id,
          sender_nom: profile?.nom||"Inconnu",
          sender_role: profile?.role||"",
          content,
          mention_type: mention?.type||null,
          mention_label: mention?.label||null,
          created_at: new Date().toISOString(),
        });
        setText("");setMention(null);setShowMention(false);setSending(false);
        inputRef.current?.focus();
      };

      const ROLE_COLORS={administrateur:"#A855F7",commercial:"#3B82F6",installateur:"#10B981",secretaire:"#F59E0B"};
      const ROLE_ICONS={administrateur:"⚡",commercial:"💼",installateur:"🔧",secretaire:"📋"};

      const fmt_time=iso=>{
        const d=new Date(iso);
        const now=new Date();
        const isToday=d.toDateString()===now.toDateString();
        return isToday?d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}):d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"})+" "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
      };

      const currentUserName=channel==="general"?"Canal général":users.find(u=>u.id===channel)?.nom||"Inconnu";

      return(
        <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"240px 1fr",gap:12,height:isMobile?"auto":"78vh"}}>

          {/* SIDEBAR CANAUX */}
          <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"12px 10px",display:"flex",flexDirection:"column",gap:4,overflowY:"auto"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#4A6A9E",padding:"4px 8px",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>Canaux</div>
            <button onClick={()=>setChannel("general")} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",borderRadius:9,border:"none",background:channel==="general"?"#3B82F625":"transparent",cursor:"pointer",textAlign:"left",width:"100%"}}>
              <span style={{fontSize:16}}>💬</span>
              <span style={{fontSize:13,fontWeight:700,color:channel==="general"?"#3B82F6":"#7B96C8"}}>Général</span>
            </button>

            <div style={{fontSize:10,fontWeight:700,color:"#4A6A9E",padding:"12px 8px 4px",textTransform:"uppercase",letterSpacing:"0.05em"}}>Messages privés</div>
            {users.map(u=>(
              <button key={u.id} onClick={()=>setChannel(u.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",borderRadius:9,border:"none",background:channel===u.id?"#3B82F625":"transparent",cursor:"pointer",textAlign:"left",width:"100%"}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:ROLE_COLORS[u.role]||"#1B2D4F",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{ROLE_ICONS[u.role]||"👤"}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:700,color:channel===u.id?"#3B82F6":"#E8F0FF",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.nom}</div>
                  <div style={{fontSize:10,color:ROLE_COLORS[u.role]||"#4A6A9E"}}>{ROLE_ICONS[u.role]} {u.role}</div>
                </div>
              </button>
            ))}
          </div>

          {/* ZONE MESSAGES */}
          <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",display:"flex",flexDirection:"column",overflow:"hidden",minHeight:isMobile?"60vh":"auto"}}>
            {/* Header canal */}
            <div style={{padding:"12px 16px",borderBottom:"1px solid #1B2D4F",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
              <span style={{fontSize:18}}>{channel==="general"?"💬":"💌"}</span>
              <div>
                <div style={{fontWeight:800,fontSize:14,color:"#F0F6FF"}}>{currentUserName}</div>
                {channel!=="general"&&<div style={{fontSize:10,color:"#4A6A9E"}}>Conversation privée</div>}
              </div>
            </div>

            {/* Messages */}
            <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
              {messages.length===0&&<div style={{textAlign:"center",color:"#2E4D82",padding:"40px 0"}}>
                <div style={{fontSize:40,marginBottom:8}}>💬</div>
                <div style={{fontWeight:700}}>Aucun message</div>
                <div style={{fontSize:12,marginTop:4}}>Soyez le premier à écrire !</div>
              </div>}
              {messages.map((m,i)=>{
                const isMe=m.sender_id===authUser?.id;
                const prevSame=i>0&&messages[i-1].sender_id===m.sender_id;
                return(
                  <div key={m.id||i} style={{display:"flex",flexDirection:isMe?"row-reverse":"row",gap:8,alignItems:"flex-end"}}>
                    {!isMe&&!prevSame&&<div style={{width:28,height:28,borderRadius:"50%",background:ROLE_COLORS[m.sender_role]||"#1B2D4F",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{ROLE_ICONS[m.sender_role]||"👤"}</div>}
                    {!isMe&&prevSame&&<div style={{width:28,flexShrink:0}}/>}
                    <div style={{maxWidth:"70%"}}>
                      {!isMe&&!prevSame&&<div style={{fontSize:10,color:ROLE_COLORS[m.sender_role]||"#4A6A9E",fontWeight:700,marginBottom:3,marginLeft:4}}>{m.sender_nom}</div>}
                      <div style={{background:isMe?"linear-gradient(135deg,#3B82F6,#1D4ED8)":"#070D1A",borderRadius:isMe?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"9px 12px",position:"relative"}}>
                        {m.mention_type&&<div style={{fontSize:10,fontWeight:700,color:"#F59E0B",marginBottom:4,background:"#F59E0B15",borderRadius:5,padding:"2px 6px",display:"inline-block"}}>

      const getMontant = ch => {

        setChantiers(p => p.map(ch =>

      const debloquerFacture = (id) => {
        updateFacture(id, {statut:"a_facturer", raison:null, debloquer_par:profile?.nom||"", date_deblocage:new Date().toLocaleDateString("fr-FR")});

      const filtered = termines.filter(ch => {
        const s = ch.facture?.statut || "a_facturer";
        if(filtre !== "tous" && s !== filtre) return false;
        if(search && !(ch.client||"").toLowerCase().includes(search.toLowerCase())) return false;
        return true;

      const kpis = Object.entries(STATUTS_FACT).map(([k,v]) => ({
        ...v, key:k,
        nb: termines.filter(ch=>(ch.facture?.statut||"a_facturer")===k).length
      }));

      const urgent = termines.filter(ch => (ch.facture?.statut||"a_facturer") === "a_facturer").length;

      const CARD = {background:"#0D1828", borderRadius:14, border:"1px solid #1B2D4F", padding:"18px"};

      // ── DÉTAIL ──

              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14}}>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>

                {/* Statut facturation */}

                  <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📋 Statut facturation</h3>

                  {/* Barre de progression visuelle */}
                  {(()=>{
                    const steps=["a_facturer","facture","paye"];
                    const idx=steps.indexOf(etat);

                    const nextLabel={a_facturer:"Facturé",facture:"Payé"}[etat];
                    const nextIcon={a_facturer:"📄",facture:"✅"}[etat];

                                {i<steps.length-1&&<div style={{height:2,flex:0.5,background:i<idx?"#10B981":"#1B2D4F",marginBottom:16,transition:"background 0.3s"}}/>}

                        </div>

                        {/* Bouton avancer */}
                        {nextKey&&canEdit(role)&&(

                            if(nextKey==="paye"){setPayModal(ch.id);}
                            else{updateFacture(ch.id,{statut:nextKey,date_maj:new Date().toLocaleDateString("fr-FR"),maj_par:profile?.nom||""});}

                            style={{width:"100%",background:`linear-gradient(135deg,${nextColor},${nextColor}CC)`,

                              fontWeight:800,fontSize:13,fontFamily:'"Outfit",sans-serif',
                              boxShadow:`0 4px 14px ${nextColor}40`,marginBottom:8,

                        {/* Bouton retour en arrière */}
                        {prevKey&&canEdit(role)&&(
                          <button onClick={()=>updateFacture(ch.id,{statut:prevKey,mode_paiement:null,date_maj:new Date().toLocaleDateString("fr-FR"),maj_par:profile?.nom||""})}

                            ← Revenir à : {STATUTS_FACT[prevKey].label}

                        {etat==="paye"&&(
                          <div style={{background:"#10B98115",border:"1px solid #10B98140",borderRadius:10,

                <div style={CARD}>
                  <h3 style={{margin:"0 0 12px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>ℹ️ Infos chantier</h3>

                    {label:"Adresse",     val:String(ch.adresse||ch.notes||"—")},
                    {label:"Technicien",  val:String(ch.technicien||"—")},
                    {label:"Date fin",    val:String(ch.date_fin||"—")},
                    {label:"Matériels",   val:Array.isArray(ch.materiels)&&ch.materiels.length?ch.materiels.map(m=>typeof m==="object"?`${m.article||"?"} ×${m.qty||1}`:"").join(", "):"—"},

                      <span style={{color:"#E8F0FF"}}>{r.val}</span>

                <div style={{marginTop:10}}>

                    placeholder="FAC-2026-001" style={INP()}/>
                </div>
                <div style={{marginTop:10}}>
                  <label style={{fontSize:11,color:"#4A6A9E",display:"block",marginBottom:6,fontWeight:700,letterSpacing:"0.5px"}}>MONTANT (€)</label>
                  <input type="number" value={fact.montant||""} onChange={e=>updateFacture(ch.id,{montant:e.target.value})}
                    placeholder="0.00" style={INP()}/>
                </div>
              </div>
            </div>
          </div>
        {delConf&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={()=>setDelConf(false)}>
          <div style={{background:"#0D1828",borderRadius:16,border:"1px solid #1B2D4F",padding:"28px",maxWidth:360,width:"90%",textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:44,marginBottom:12}}>🗑️</div>
            <h3 style={{margin:"0 0 8px",fontWeight:800,color:"#F0F6FF"}}>Supprimer cette facture ?</h3>
            <p style={{color:"#4A6A9E",fontSize:13,margin:"0 0 20px"}}>Le chantier de <strong style={{color:"#E8F0FF"}}>{ch.client}</strong> sera retiré de la facturation.</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setDelConf(false)} style={{flex:1,background:"#1B2D4F",border:"none",borderRadius:10,color:"#E8F0FF",padding:"11px",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:'"Outfit",sans-serif'}}>Annuler</button>
              <button onClick={()=>{const id=ch.id;setChantiers(p=>p.filter(x=>x.id!==id));sb.from("chantiers").delete().eq("id",id).then(({error})=>{if(error)console.error("delete chantiers:",error.message);});setDetail(null);setDelConf(false);}} style={{flex:1,background:"#EF4444",border:"none",borderRadius:10,color:"#FFF",padding:"11px",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:'"Outfit",sans-serif'}}>Supprimer</button>
            </div>
          </div>
        </div>}
          </>
        );

          <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:8,marginBottom:18}}>

                style={{background:"#0D1828",borderRadius:10,padding:"14px 12px",border:`1px solid ${filtre===k.key?k.color:"#1B2D4F"}`,cursor:"pointer",textAlign:"center",transition:"all 0.15s"}}>
                <div style={{fontSize:22,marginBottom:4}}>{k.icon}</div>
                <div style={{fontSize:22,fontWeight:800,color:k.color}}>{k.nb}</div>
                <div style={{fontSize:11,color:"#4A6A9E",marginTop:2}}>{k.label}</div>
              </div>

          </div>

          {/* SAV à facturer à la marque — menu dépliable compact */}
          {(()=>{

                      {k:"a_facturer",l:"À facturer",c:"#A78BFA",i:"🏭"},

                            {steps.map((s,si)=>(
                              <React.Fragment key={s.k}>
                                <span style={{fontSize:9,fontWeight:700,color:si<=idx?s.c:"#2E4D82",opacity:si<=idx?1:0.5}}>{s.i} {s.l}</span>
                                {si<steps.length-1&&<span style={{color:"#1B2D4F",fontSize:9}}>›</span>}
                              </React.Fragment>
                            ))}
                          </div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                          <span style={{fontWeight:800,fontSize:13,color:steps[idx]?.c||"#A78BFA"}}>{fmtM(t.montant_facture_marque)}</span>
                          {canEdit(role)&&<div style={{display:"flex",gap:4}}>
                            {prev&&<button onClick={()=>updateSavStatut(t.id,prev.k)}
                              style={{background:"transparent",border:"1px solid #1B2D4F",borderRadius:7,color:"#4A6A9E",padding:"4px 8px",cursor:"pointer",fontSize:10,fontFamily:'"Outfit",sans-serif'}}>
                              ←
                            </button>}
                            {next&&<button onClick={()=>updateSavStatut(t.id,next.k)}
                              style={{background:next.c+"20",border:`1px solid ${next.c}40`,borderRadius:7,color:next.c,padding:"4px 8px",cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:'"Outfit",sans-serif',whiteSpace:"nowrap"}}>
                              {next.i} {next.l}
                            </button>}
                          </div>}
                        </div>
                      </div>
                    );
                  })}
                </div>}
              </div>
            );
          })()}

          {/* Bouton factures en attente de validation (bloquées) */}
          {terminesBloques.length>0&&canEdit(role)&&(
            <div style={{marginBottom:16}}>
              <button onClick={()=>setShowBloquesList(p=>!p)}
                style={{width:"100%",background:"#0D1828",border:`1px solid ${showBloquesList?"#F59E0B50":"#F59E0B30"}`,borderRadius:showBloquesList?"14px 14px 0 0":14,padding:"10px 14px",cursor:"pointer",textAlign:"left",fontFamily:'"Outfit",sans-serif',display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16}}>⏸️</span>
                <div style={{flex:1,minWidth:0}}>
                  <span style={{fontWeight:700,fontSize:13,color:"#F5C842"}}>{terminesBloques.length} facturation{terminesBloques.length>1?"s":""} en attente</span>
                  <span style={{fontSize:11,color:"#4A6A9E",marginLeft:8}}>
                    {totalBloques>0&&<span style={{color:"#7B96C8",fontWeight:600}}>{fmtE(totalBloques)}</span>}
                  </span>
                </div>
                <span style={{fontSize:11,color:"#F5C842",fontWeight:600}}>{showBloquesList?"▲":"▼"}</span>
              </button>

              {showBloquesList&&<div style={{background:"#070D1A",border:"1px solid #F59E0B30",borderTop:"none",borderRadius:"0 0 14px 14px",overflow:"hidden"}}>
                {terminesBloques.map((ch,i)=>(
                  <div key={ch.id} style={{padding:"13px 18px",borderBottom:i<terminesBloques.length-1?"1px solid #1B2D4F":"none",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:14,color:"#F0F6FF",marginBottom:2}}>{ch.client}</div>
                      <div style={{fontSize:11,color:"#4A6A9E"}}>
                        ✅ Terminé le <strong style={{color:"#E8F0FF"}}>{ch.date_fin||"—"}</strong>
                        {ch.technicien&&<span> · 👤 {ch.technicien}</span>}
                        {getMontant(ch)>0&&<span style={{color:"#10B981",marginLeft:6,fontWeight:700}}>· {fmtE(getMontant(ch))}</span>}
                      </div>
                      {ch.facture?.raison&&<div style={{fontSize:11,color:"#7B96C8",marginTop:3}}>ℹ️ {ch.facture.raison}</div>}
                    </div>
                    <button onClick={()=>debloquerFacture(ch.id)}
                      style={{background:"linear-gradient(135deg,#3B82F6,#1D4ED8)",border:"none",borderRadius:9,color:"#fff",padding:"9px 16px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif',flexShrink:0,whiteSpace:"nowrap"}}>
                      ✅ Valider et facturer
                    </button>
                  </div>
                ))}
              </div>}
            </div>
          )}

          {/* Recherche */}
          <div style={{marginBottom:14}}>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="🔍 Rechercher un client…"
              style={{background:"#0D1828",border:"1px solid #1B2D4F",borderRadius:10,color:"#F0F6FF",padding:"11px 14px",fontSize:14,width:"100%",outline:"none",boxSizing:"border-box",fontFamily:'"Outfit",sans-serif'}}/>
          </div>

          {/* Liste */}
          {filtered.length===0
            ?<div style={{textAlign:"center",padding:"60px 0",color:"#2E4D82"}}>
              <div style={{fontSize:48,marginBottom:12}}>🧾</div>
              <div style={{fontWeight:800,fontSize:16,color:"#4A6A9E",marginBottom:6}}>
                {termines.length===0?"Aucun chantier terminé":"Aucun résultat"}
              </div>
              <div style={{fontSize:13,color:"#2E4D82"}}>
                {termines.length===0?"Les chantiers terminés apparaîtront ici pour facturation":"Modifiez votre filtre"}
              </div>
            </div>
            :<div style={{display:"flex",flexDirection:"column",gap:8}}>
              {filtered.map(ch=>{
                const fact = ch.facture||{};
                const etat = fact.statut||"a_facturer";
                const E    = STATUTS_FACT[etat];
                return(
                  <div key={ch.id}
                    style={{background:"#0D1828",borderRadius:13,border:`1px solid ${etat==="a_facturer"?"rgba(239,68,68,0.3)":"#1B2D4F"}`,padding:"14px 18px",transition:"border-color 0.2s"}}
                    onMouseOver={e=>e.currentTarget.style.borderColor=E.color}
                    onMouseOut={e=>e.currentTarget.style.borderColor=etat==="a_facturer"?"rgba(239,68,68,0.3)":"#1B2D4F"}>
                    {/* Ligne principale cliquable → ouvre détail */}
                    <div onClick={()=>setDetail(ch.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap",cursor:"pointer",marginBottom:10}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                          <span style={{fontWeight:800,fontSize:15,color:"#F0F6FF"}}>{ch.client||"—"}</span>
                          <span style={{background:`${E.color}15`,color:E.color,border:`1px solid ${E.color}40`,borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:700}}>{E.icon} {E.label}</span>
                          {fact.numero&&<span style={{color:"#4A6A9E",fontSize:11}}>N° {fact.numero}</span>}
                        </div>
                        <div style={{display:"flex",gap:14,flexWrap:"wrap",fontSize:12,color:"#4A6A9E"}}>
                          {ch.date_fin&&<span>✅ Terminé le {ch.date_fin}</span>}
                          {ch.technicien&&<span>🔧 {ch.technicien}</span>}
                          {fact.montant&&<span style={{color:"#10B981",fontWeight:700}}>💰 {Number(fact.montant).toLocaleString("fr-FR",{minimumFractionDigits:2})} €</span>}
                          {fact.notes&&<span style={{color:"#60A5FA"}}>📝 Note</span>}
                        </div>
                      </div>
                      <span style={{fontSize:18,color:"#2E4D82"}}>›</span>
                    </div>
                    {/* Bouton avancement direct — sans ouvrir le détail */}
                    {(()=>{
                      const steps=["a_facturer","facture","paye"];
                      const idx=steps.indexOf(etat);
                      const nextKey=steps[idx+1]||null;
                      const prevKey=steps[idx-1]||null;
                      const cfg={
                        a_facturer:{label:"Marquer Facturé",icon:"📄",color:"#3B82F6",grad:"linear-gradient(135deg,#3B82F6,#1D4ED8)"},
                        facture:   {label:"Marquer Payé",   icon:"✅",color:"#10B981",grad:"linear-gradient(135deg,#10B981,#059669)"},
                      }[etat];
                      if(!nextKey||!cfg) return(
                        <div style={{background:"#10B98115",border:"1px solid #10B98140",borderRadius:9,padding:"8px 12px",textAlign:"center",fontSize:12,color:"#10B981",fontWeight:700}}>
                          ✅ Payé{fact.mode_paiement?` — ${fact.mode_paiement}`:""}
                        </div>
                      );
                      return(
                        <div style={{display:"flex",gap:6}}>
                          {prevKey&&canEdit(role)&&(
                            <button onClick={e=>{e.stopPropagation();updateFacture(ch.id,{statut:prevKey,mode_paiement:null,date_maj:new Date().toLocaleDateString("fr-FR"),maj_par:profile?.nom||""});}}
                              style={{background:"transparent",border:"1px solid #1B2D4F",borderRadius:9,color:"#4A6A9E",padding:"9px 12px",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:'"Outfit",sans-serif',flexShrink:0}}>
                              ← {STATUTS_FACT[prevKey].label}
                            </button>
                          )}
                          {/* Bouton Bloquer — visible sur les chantiers en attente uniquement */}
                          {etat==="a_facturer"&&canEdit(role)&&(
                            <button onClick={e=>{e.stopPropagation();updateFacture(ch.id,{statut:"bloque",raison:"Bloqué manuellement",date_maj:new Date().toLocaleDateString("fr-FR"),maj_par:profile?.nom||""});}}
                              style={{background:"#EF444415",border:"1px solid #EF444430",borderRadius:9,color:"#EF4444",padding:"9px 10px",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:'"Outfit",sans-serif',flexShrink:0}} title="Bloquer la facturation">
                              🚫
                            </button>
                          )}
                          <button onClick={e=>{e.stopPropagation();if(nextKey==="paye"){setPayModal(ch.id);}else{updateFacture(ch.id,{statut:nextKey,date_maj:new Date().toLocaleDateString("fr-FR"),maj_par:profile?.nom||""});}}}
                            style={{flex:1,background:cfg.grad,border:"none",borderRadius:9,color:"#FFF",
                              padding:"9px 14px",cursor:"pointer",fontWeight:800,fontSize:13,
                              fontFamily:'"Outfit",sans-serif',boxShadow:`0 3px 12px ${cfg.color}40`,
                              display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                            {cfg.icon} {cfg.label} →
                          </button>
                        </div>
                      );
                    })()}
                  </div>
                );
              })}
            </div>
          }

          {/* Modal choix du mode de paiement */}
          {payModal&&(()=>{
            const pCh=termines.find(c=>c.id===payModal);
            return pCh?(
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"}} onClick={()=>setPayModal(null)}>
                <div style={{background:"#0D1828",borderRadius:isMobile?"20px 20px 0 0":16,padding:"24px",width:isMobile?"100%":"100%",maxWidth:380,border:"1px solid #1B2D4F"}} onClick={e=>e.stopPropagation()}>
                  {isMobile&&<div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"0 auto 16px"}}/>}
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
                    <div style={{width:40,height:40,borderRadius:12,background:"#10B98115",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>💳</div>
                    <div>
                      <div style={{fontWeight:800,fontSize:15,color:"#F0F6FF"}}>Mode de paiement</div>
                      <div style={{fontSize:11,color:"#4A6A9E",marginTop:2}}>{pCh.client}</div>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                    {MODES_PAIEMENT.map(m=>(
                      <button key={m} onClick={()=>{
                        updateFacture(payModal,{statut:"paye",mode_paiement:m,date_maj:new Date().toLocaleDateString("fr-FR"),maj_par:profile?.nom||""});
                        setPayModal(null);
                      }} style={{background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,color:"#E8F0FF",padding:"12px",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:'"Outfit",sans-serif',textAlign:"center",transition:"all 0.15s"}}
                        onMouseOver={e=>{e.currentTarget.style.borderColor="#10B981";e.currentTarget.style.background="#10B98110";}}
                        onMouseOut={e=>{e.currentTarget.style.borderColor="#1B2D4F";e.currentTarget.style.background="#070D1A";}}>
                        {m==="Virement"?"🏦":m==="Carte"?"💳":m==="Chèque"?"📝":m==="Espèces"?"💵":"🏛️"} {m}
                      </button>
                    ))}
                  </div>
                  <button onClick={()=>setPayModal(null)} style={{width:"100%",background:"transparent",border:"1px solid #1B2D4F",borderRadius:10,color:"#4A6A9E",padding:"10px",cursor:"pointer",fontSize:13,fontWeight:600,marginTop:4,fontFamily:'"Outfit",sans-serif'}}>Annuler</button>
                </div>
              </div>
            ):null;
          })()}
        </div>
      );
    }

    // ══════════════════════════════════════════
    // ONGLET MES OBJECTIFS (commercial)
    // ══════════════════════════════════════════
    function MesObjectifsTab({isMobile, ventes, objectifs, setObjectifs, profile, fmt, role}) {
      const now = new Date();
      const mM  = String(now.getMonth()+1).padStart(2,"0");
      const mY  = String(now.getFullYear());
      const mKey= `${mY}-${mM}`;
      const nom = profile?.nom||"";

      // Objectif du commercial connecté ce mois
      const oKey    = `${mKey}__${nom}`;
      const obj     = objectifs[oKey]||{};
      const objCA   = Number(obj.ca||0);
      const objMarge= Number(obj.marge||0);

      // Filtre ventes par ce commercial
      const mesVentes = ventes.filter(v=>(v.par||"")=== nom);

      // Ventes du mois en cours
      const ventesMonth = mesVentes.filter(v=>v.date&&v.date.split("/")[1]===mM&&v.date.split("/")[2]===mY);
      const caMonth = ventesMonth.reduce((s,v)=>s+Number(v.prix_ht||0),0);
      const margeMonth = ventesMonth.reduce((s,v)=>{
        const cout=(v.materiels||[]).reduce((sc,m)=>sc+Number(m.prix_unit||0)*Number(m.qty||0),0)
                  +(v.cables||[]).reduce((sc,m)=>sc+Number(m.prix_unit||0)*Number(m.qty||0),0);
        return s+(Number(v.prix_ht||0)-cout);
      },0);

      const pctCA    = objCA>0    ? Math.min(100,Math.round((caMonth/objCA)*100))    : null;
      const pctMarge = objMarge>0 ? Math.min(100,Math.round((margeMonth/objMarge)*100)) : null;
      const colorCA    = pctCA===null?"#3B82F6"    : pctCA>=100?"#10B981" : pctCA>=70?"#3B82F6" : pctCA>=40?"#F59E0B":"#EF4444";
      const colorMarge = pctMarge===null?"#8B5CF6" : pctMarge>=100?"#10B981" : pctMarge>=70?"#3B82F6" : pctMarge>=40?"#F59E0B":"#EF4444";

      // Historique 6 derniers mois
      const history6 = Array.from({length:6},(_,i)=>{
        const d=new Date(now.getFullYear(),now.getMonth()-i,1);
        const mm=String(d.getMonth()+1).padStart(2,"0");
        const yy=String(d.getFullYear());
        const mk=`${yy}-${mm}`;
        const ok=`${mk}__${nom}`;
        const o=objectifs[ok]||{};
        const vs=mesVentes.filter(v=>v.date&&v.date.split("/")[1]===mm&&v.date.split("/")[2]===yy);
        const ca=vs.reduce((s,v)=>s+Number(v.prix_ht||0),0);
        const objc=Number(o.ca||0);
        return{label:d.toLocaleDateString("fr-FR",{month:"short",year:"numeric"}),ca,objCA:objc,nb:vs.length,isCurrentMonth:i===0};
      }).reverse();

      // Top 5 clients
      const clientMap={};
      mesVentes.forEach(v=>{
        const c=v.client||"Inconnu";
        clientMap[c]=(clientMap[c]||0)+Number(v.prix_ht||0);
      });
      const topClients=Object.entries(clientMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

      // Top produits vendus (par mois en cours)
      const prodMap={};
      ventesMonth.forEach(v=>{(v.materiels||[]).forEach(m=>{prodMap[m.article]=(prodMap[m.article]||0)+Number(m.qty||1);});});
      const topProd=Object.entries(prodMap).sort((a,b)=>b[1]-a[1]).slice(0,4);

      // Classement vs autres commerciaux ce mois
      const allCommerciaux=[...new Set(ventes.map(v=>v.par).filter(Boolean))];
      const ranking=allCommerciaux.map(n=>{
        const vs2=ventes.filter(v=>(v.par||"")===n&&v.date&&v.date.split("/")[1]===mM&&v.date.split("/")[2]===mY);
        return{nom:n,ca:vs2.reduce((s,v)=>s+Number(v.prix_ht||0),0),nb:vs2.length};
      }).sort((a,b)=>b.ca-a.ca);
      const myRank=ranking.findIndex(r=>r.nom===nom)+1;

      const [editObjModal,setEditObjModal]=useState(false);
      const [draftCA,setDraftCA]=useState(String(objCA||""));
      const [draftMarge,setDraftMarge]=useState(String(objMarge||""));

      const saveObj=()=>{
        setObjectifs(p=>({...p,[oKey]:{ca:Number(draftCA)||0,marge:Number(draftMarge)||0}}));
        setEditObjModal(false);
      };

      const CARD={background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"16px 18px",marginBottom:14};
      const INP=(e={})=>({background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:9,color:"#E8F0FF",padding:"10px 12px",fontSize:14,width:"100%",outline:"none",boxSizing:"border-box",fontFamily:'"Outfit",sans-serif',...e});

      const maxHistory=Math.max(...history6.map(h=>Math.max(h.ca,h.objCA)),1);

      return(
        <div>
          {/* Modal édition objectif — admin seulement */}
          {editObjModal&&role==="administrateur"&&<div style={{position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setEditObjModal(false)}>
            <div style={{background:"#0D1828",borderRadius:16,padding:24,width:"100%",maxWidth:400,border:"1px solid #1B2D4F"}} onClick={e=>e.stopPropagation()}>
              <h3 style={{margin:"0 0 16px",fontWeight:800,fontSize:16,color:"#F0F6FF"}}>🎯 Modifier mes objectifs — {now.toLocaleDateString("fr-FR",{month:"long",year:"numeric"})}</h3>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>OBJECTIF CA (€ HT)</label>
                <input type="number" value={draftCA} onChange={e=>setDraftCA(e.target.value)} placeholder="Ex: 15000" style={INP()}/>
              </div>
              <div style={{marginBottom:20}}>
                <label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>OBJECTIF MARGE (€)</label>
                <input type="number" value={draftMarge} onChange={e=>setDraftMarge(e.target.value)} placeholder="Ex: 3000" style={INP()}/>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setEditObjModal(false)} style={{flex:1,background:"#1B2D4F",border:"none",borderRadius:9,color:"#7B96C8",padding:"10px",cursor:"pointer",fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>Annuler</button>
                <button onClick={saveObj} style={{flex:2,background:"linear-gradient(135deg,#3B82F6,#1D4ED8)",border:"none",borderRadius:9,color:"#FFF",padding:"10px",cursor:"pointer",fontWeight:800,fontFamily:'"Outfit",sans-serif',boxShadow:"0 3px 12px rgba(59,130,246,0.3)"}}>💾 Enregistrer</button>
              </div>
            </div>
          </div>}

          {/* HEADER */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 4px",fontSize:18,fontWeight:800,color:"#F0F6FF",letterSpacing:"-0.3px"}}>🎯 Mes Objectifs</h2>
              <p style={{margin:0,fontSize:12,color:"#4A6A9E"}}>{now.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p>
            </div>
            {role==="administrateur"&&(
              <button onClick={()=>{setDraftCA(String(objCA||""));setDraftMarge(String(objMarge||""));setEditObjModal(true);}}
                style={{background:"rgba(59,130,246,0.1)",border:"1px solid #1B2D4F",borderRadius:9,color:"#7B96C8",padding:"8px 14px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif',display:"flex",alignItems:"center",gap:6}}>
                ✏️ {objCA||objMarge?"Modifier les objectifs":"Fixer les objectifs"}
              </button>
            )}
          </div>

          {/* KPIs MOIS */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:8,marginBottom:14}}>
            {[
              {icon:"💶",label:"CA ce mois",val:fmt(caMonth),color:colorCA,sub:objCA>0?`/ ${fmt(objCA)}`:"Pas d'objectif"},
              {icon:"📈",label:"Marge ce mois",val:fmt(margeMonth),color:colorMarge,sub:objMarge>0?`/ ${fmt(objMarge)}`:"Pas d'objectif"},
              {icon:"🧾",label:"Ventes ce mois",val:ventesMonth.length,color:"#A855F7",sub:`${mesVentes.length} au total`},
              {icon:"🏆",label:"Classement",val:myRank>0?`#${myRank}`:"—",color:"#F59E0B",sub:`sur ${ranking.length} commercial${ranking.length>1?"s":""}`},
            ].map(k=>(
              <div key={k.label} style={{background:"#0D1828",borderRadius:12,padding:"14px 12px",border:`1px solid ${k.color}25`,textAlign:"center"}}>
                <div style={{fontSize:22,marginBottom:4}}>{k.icon}</div>
                <div style={{fontSize:isMobile?16:20,fontWeight:800,color:k.color}}>{k.val}</div>
                <div style={{fontSize:10,color:"#4A6A9E",marginTop:3,fontWeight:600}}>{k.label}</div>
                <div style={{fontSize:10,color:"#2E4D82",marginTop:1}}>{k.sub}</div>
              </div>
            ))}
          </div>

          {/* BARRES DE PROGRESSION */}
          {(objCA>0||objMarge>0)&&<div style={CARD}>
            <h3 style={{margin:"0 0 16px",fontWeight:800,fontSize:14,color:"#F0F6FF"}}>📊 Progression du mois</h3>
            {objCA>0&&(
              <div style={{marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
                  <span style={{fontSize:12,fontWeight:700,color:"#7B96C8"}}>💶 Chiffre d'affaires</span>
                  <div style={{display:"flex",gap:10,alignItems:"baseline"}}>
                    <span style={{fontSize:13,fontWeight:800,color:colorCA}}>{pctCA}%</span>
                    <span style={{fontSize:11,color:"#2E4D82"}}>{fmt(caMonth)} / {fmt(objCA)}</span>

      </div>
    </div>
  </div>}

    // ══════════════════════════════════════════
    // ONGLET MARGES (admin only)
    // ══════════════════════════════════════════
    function MargesTab({isMobile, ventes, savTickets}){
      const [periode, setPeriode] = useState(3);
      const [onglet, setOnglet]   = useState("ventes");
      const fmt  = n => (n??0).toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";
      const pct  = (m,ca) => ca>0 ? Math.round((m/ca)*100) : 0;
      const coutVente = v =>
        (v.materiels||[]).reduce((s,m)=>s+Number(m.qty||0)*Number(m.prix_unit||0),0)
       +(v.cables||[]).reduce((s,m)=>s+Number(m.qty||0)*Number(m.prix_unit||0),0);
      const now = new Date();
      const ventesFiltered = useMemo(()=>ventes.filter(v=>{
        if(!v.date) return true;
        const [d,mo,y]=(v.date||"").split("/");
        if(!y) return true;
        const vd=new Date(Number(y),Number(mo)-1,Number(d));
        return (now-vd)/(1000*60*60*24*30)<=periode;
      }),[ventes,periode]);

      // SAV facturés aux marques dans la même période
      const savFactures=useMemo(()=>(savTickets||[]).filter(t=>{
        if(!Number(t.montant_facture_marque)) return false;
        if(!t.date_ouverture||periode===999) return true;
        const [d,mo,y]=(t.date_ouverture||"").split("/");
        if(!y) return true;
        const td=new Date(Number(y),Number(mo)-1,Number(d));
        return (now-td)/(1000*60*60*24*30)<=periode;
      }),[savTickets,periode]);
      const caSAV=savFactures.reduce((s,t)=>s+Number(t.montant_facture_marque||0),0);

      const caTotal=ventesFiltered.reduce((s,v)=>s+Number(v.prix_ht||0),0)+caSAV;
      const coutTotal=ventesFiltered.reduce((s,v)=>s+coutVente(v),0); // SAV = coût 0
      const margeTotal=caTotal-coutTotal;
      const txMarge=pct(margeTotal,caTotal);
      const ventesAvecMarge=useMemo(()=>[...ventesFiltered].map(v=>{
        const ca=Number(v.prix_ht||0),cout=coutVente(v),marge=ca-cout;
        return {...v,_ca:ca,_cout:cout,_marge:marge,_tx:pct(marge,ca)};
      }).sort((a,b)=>b._marge-a._marge),[ventesFiltered]);
      const parTech=useMemo(()=>{
        const map={};
        ventesFiltered.forEach(v=>{
          const k=v.par||"Inconnu";
          if(!map[k])map[k]={nom:k,ca:0,cout:0,nb:0};
          map[k].ca+=Number(v.prix_ht||0);map[k].cout+=coutVente(v);map[k].nb++;
        });
        return Object.values(map).map(r=>({...r,marge:r.ca-r.cout,tx:pct(r.ca-r.cout,r.ca)})).sort((a,b)=>b.marge-a.marge);
      },[ventesFiltered]);
      const parMois=useMemo(()=>{
        const map={};
        ventesFiltered.forEach(v=>{
          const [,mo,y]=(v.date||"").split("/");
          if(!mo||!y)return;
          const k=`${y}-${mo}`;
          if(!map[k])map[k]={label:`${mo}/${y}`,ca:0,cout:0,nb:0};
          map[k].ca+=Number(v.prix_ht||0);map[k].cout+=coutVente(v);map[k].nb++;
        });
        // Ajouter SAV dans les mois
        savFactures.forEach(t=>{
          const [,mo,y]=(t.date_ouverture||"").split("/");
          if(!mo||!y)return;
          const k=`${y}-${mo}`;
          if(!map[k])map[k]={label:`${mo}/${y}`,ca:0,cout:0,nb:0};
          map[k].ca+=Number(t.montant_facture_marque||0);
        });
        return Object.values(map).map(r=>({...r,marge:r.ca-r.cout,tx:pct(r.ca-r.cout,r.ca)})).sort((a,b)=>a.label<b.label?-1:1);
      },[ventesFiltered,savFactures]);
      const parCat=useMemo(()=>{
        const map={};
        ventesFiltered.forEach(v=>{
          (v.materiels||[]).forEach(m=>{
            const k=m.cat||"Autre";
            if(!map[k])map[k]={cat:k,cout:0,nb:0};
            map[k].cout+=Number(m.qty||0)*Number(m.prix_unit||0);map[k].nb+=Number(m.qty||0);
          });
        });
        return Object.values(map).sort((a,b)=>b.cout-a.cout);
      },[ventesFiltered]);
      const CARD={background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"18px"};
      const txColor=t=>t>=40?"#10B981":t>=20?"#3B82F6":t>=0?"#F59E0B":"#EF4444";
      return(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:18,fontWeight:800,color:"#F0F6FF",letterSpacing:"-0.3px"}}>💰 Analyse des marges</h2>
              <p style={{margin:0,fontSize:12,color:"#4A6A9E"}}>{ventesFiltered.length} vente(s){caSAV>0?` · ${savFactures.length} SAV facturé(s) à la marque`:""} · {periode===999?"Toutes périodes":periode+" mois"}</p>
            </div>
            <select value={periode} onChange={e=>setPeriode(Number(e.target.value))}
              style={{background:"#0D1828",border:"1px solid #1B2D4F",borderRadius:8,color:"#F0F6FF",padding:"8px 12px",fontSize:13,fontFamily:'"Outfit",sans-serif',cursor:"pointer"}}>
              <option value={1}>Ce mois</option><option value={3}>3 mois</option>
              <option value={6}>6 mois</option><option value={12}>12 mois</option>
              <option value={999}>Tout</option>
            </select>
          </div>
          {caSAV>0&&<div style={{background:"#10B98112",border:"1px solid #10B98130",borderRadius:12,padding:"10px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>🛠️</span>
            <div>
              <div style={{fontWeight:700,fontSize:13,color:"#10B981"}}>SAV facturés aux marques : {fmt(caSAV)} — marge 100%</div>
              <div style={{fontSize:11,color:"#4A6A9E"}}>{savFactures.length} ticket{savFactures.length>1?"s":""} · {savFactures.map(t=>`${t.marque||t.client} (${Number(t.montant_facture_marque||0).toLocaleString("fr-FR")} €)`).join(" · ")}</div>
            </div>
          </div>}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:10,marginBottom:20}}>
            {[
              {icon:"💰",label:"CA total",val:fmt(caTotal),color:"#3B82F6"},
              {icon:"🏭",label:"Coût matériaux",val:fmt(coutTotal),color:"#F59E0B"},
              {icon:"📈",label:"Marge brute",val:fmt(margeTotal),color:margeTotal>=0?"#10B981":"#EF4444"},
              {icon:"🎯",label:"Taux de marge",val:txMarge+"%",color:txColor(txMarge)},
            ].map(k=>(
              <div key={k.label} style={{...CARD,borderLeft:`3px solid ${k.color}`}}>
                <div style={{fontSize:20,marginBottom:6}}>{k.icon}</div>
                <div style={{fontSize:isMobile?16:20,fontWeight:800,color:k.color}}>{k.val}</div>
                <div style={{fontSize:11,color:"#4A6A9E",marginTop:3}}>{k.label}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
            {[["ventes","🧾 Par vente"],["tech","👤 Par commercial"],["mois","📅 Par mois"],["cat","📦 Par catégorie"]].map(([k,l])=>(
              <button key={k} onClick={()=>setOnglet(k)} style={{padding:"8px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif',border:`1px solid ${onglet===k?"#3B82F6":"#1B2D4F"}`,background:onglet===k?"rgba(59,130,246,0.15)":"transparent",color:onglet===k?"#60A5FA":"#4A6A9E"}}>{l}</button>
            ))}
          </div>
          {onglet==="ventes"&&<div style={CARD}><div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{borderBottom:"1px solid #1B2D4F"}}>
                {["Client","Commercial","Date","CA","Coût","Marge","Taux"].map(h=>(
                  <th key={h} style={{padding:"10px 12px",textAlign:"left",color:"#4A6A9E",fontWeight:700,fontSize:11,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {ventesAvecMarge.length===0
                  ?<tr><td colSpan={7} style={{padding:"40px",textAlign:"center",color:"#2E4D82"}}>Aucune vente sur cette période</td></tr>
                  :ventesAvecMarge.map(v=>(
                    <tr key={v.id} style={{borderBottom:"1px solid #0D1828"}}
                      onMouseOver={e=>e.currentTarget.style.background="rgba(59,130,246,0.04)"}
                      onMouseOut={e=>e.currentTarget.style.background="transparent"}>
                      <td style={{padding:"10px 12px",color:"#F0F6FF",fontWeight:600}}>{v.client||"—"}</td>
                      <td style={{padding:"10px 12px",color:"#A8C4E8"}}>{v.par||"—"}</td>
                      <td style={{padding:"10px 12px",color:"#4A6A9E",whiteSpace:"nowrap"}}>{v.date||"—"}</td>
                      <td style={{padding:"10px 12px",color:"#60A5FA",fontWeight:700,whiteSpace:"nowrap"}}>{fmt(v._ca)}</td>
                      <td style={{padding:"10px 12px",color:"#F59E0B",whiteSpace:"nowrap"}}>{fmt(v._cout)}</td>
                      <td style={{padding:"10px 12px",fontWeight:800,whiteSpace:"nowrap",color:v._marge>=0?"#10B981":"#EF4444"}}>{fmt(v._marge)}</td>
                      <td style={{padding:"10px 12px"}}><span style={{background:`${txColor(v._tx)}20`,color:txColor(v._tx),border:`1px solid ${txColor(v._tx)}40`,borderRadius:20,padding:"3px 9px",fontSize:11,fontWeight:700}}>{v._tx}%</span></td>
                    </tr>
                  ))
                }
              </tbody>
            </table>
          </div></div>}
          {onglet==="tech"&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
            {parTech.length===0
              ?<div style={{...CARD,textAlign:"center",padding:"60px",color:"#2E4D82"}}>Aucune donnée</div>
              :parTech.map(r=>(
                <div key={r.nom} style={CARD}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                    <div><div style={{fontWeight:800,fontSize:15,color:"#F0F6FF",marginBottom:4}}>👤 {r.nom}</div><div style={{fontSize:12,color:"#4A6A9E"}}>{r.nb} vente(s)</div></div>
                    <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>
                      <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#4A6A9E",marginBottom:2}}>CA</div><div style={{fontSize:15,fontWeight:700,color:"#60A5FA"}}>{fmt(r.ca)}</div></div>

                      <div style={{display:"flex",gap:12,fontSize:12,flexWrap:"wrap"}}>

    function VendeurRow({nom, mKey, mM_now, mY_now, ventes, objectifs, setObjectifs, canEdit, isMobile, fmt}) {
      const oKey     = `${mKey}__${nom}`;
      const obj      = objectifs[oKey] || {};
      const objCA    = Number(obj.ca    || 0);
      const objMarge = Number(obj.marge || 0);
      const caReel = ventes
        .filter(v=>(v.par||"Inconnu")===nom && v.date
          && v.date.split("/")[1]===mM_now && v.date.split("/")[2]===mY_now)
        .reduce((s,v)=>s+Number(v.prix_ht||0),0);
      const margeReelle = ventes
        .filter(v=>(v.par||"Inconnu")===nom && v.date
          && v.date.split("/")[1]===mM_now && v.date.split("/")[2]===mY_now)
        .reduce((s,v)=>{
          const cout=(v.materiels||[]).reduce((sc,m)=>sc+Number(m.prix_unit||0)*Number(m.qty||0),0)
                    +(v.cables||[]).reduce((sc,m)=>sc+Number(m.prix_unit||0)*Number(m.qty||0),0);
          return s+(Number(v.prix_ht||0)-cout);
        },0);
      const pctCA    = objCA    > 0 ? Math.min(100, Math.round((caReel/objCA)*100))    : null;
      const pctMarge = objMarge > 0 ? Math.min(100, Math.round((margeReelle/objMarge)*100)) : null;
      const colorCA    = pctCA===null?"#1B2D4F" : pctCA>=100?"#10B981" : pctCA>=70?"#3B82F6" : pctCA>=40?"#F59E0B":"#EF4444";
      const colorMarge = pctMarge===null?"#1B2D4F" : pctMarge>=100?"#10B981" : pctMarge>=70?"#3B82F6" : pctMarge>=40?"#F59E0B":"#EF4444";
      const[editMode,setEditMode]=useState(false);
      const[draftCA,setDraftCA]  =useState(String(objCA||""));
      const[draftMarge,setDraftMarge]=useState(String(objMarge||""));
      const saveObj=()=>{
        setObjectifs(p=>({...p,[oKey]:{ca:Number(draftCA)||0,marge:Number(draftMarge)||0}}));
        setEditMode(false);
      };
      return (
        <div style={{background:"#070D1A",borderRadius:12,padding:"14px 16px",border:"1px solid #1B2D4F"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,#1B2D4F,#112038)",border:"1px solid #1B2D4F",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>💼</div>
              <div>
                <div style={{fontWeight:800,fontSize:14,color:"#F0F6FF"}}>{nom}</div>
                <div style={{fontSize:11,color:"#4A6A9E"}}>
                  {ventes.filter(v=>(v.par||"Inconnu")===nom&&v.date&&v.date.split("/")[1]===mM_now&&v.date.split("/")[2]===mY_now).length} vente(s) ce mois
                </div>
              </div>
            </div>
            {canEdit&&(editMode
              ? <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>setEditMode(false)} style={{background:"#1B2D4F",border:"none",borderRadius:8,color:"#7B96C8",padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>Annuler</button>
                  <button onClick={saveObj} style={{background:"linear-gradient(135deg,#3B82F6,#1D4ED8)",border:"none",borderRadius:8,color:"#FFF",padding:"6px 14px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif',boxShadow:"0 2px 10px rgba(59,130,246,0.3)"}}>💾 Sauver</button>
                </div>
              : <button onClick={()=>{setDraftCA(String(objCA||""));setDraftMarge(String(objMarge||""));setEditMode(true);}} style={{background:"rgba(59,130,246,0.08)",border:"1px solid #1B2D4F",borderRadius:8,color:"#7B96C8",padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>
                  {objCA||objMarge?"✏️ Modifier":"➕ Fixer objectif"}
                </button>
            )}
          </div>
          {editMode&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14,padding:"12px",background:"#0D1828",borderRadius:10,border:"1px solid #1B2D4F"}}>
              <div>
                <label style={{display:"block",fontSize:10,fontWeight:700,color:"#4A6A9E",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Objectif CA (€ HT)</label>
                <input type="number" value={draftCA} onChange={e=>setDraftCA(e.target.value)} placeholder="Ex: 15000" style={{width:"100%",background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:8,color:"#F0F6FF",padding:"10px 12px",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:'"Outfit",sans-serif'}}/>
              </div>
              <div>
                <label style={{display:"block",fontSize:10,fontWeight:700,color:"#4A6A9E",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Objectif marge (€)</label>
                <input type="number" value={draftMarge} onChange={e=>setDraftMarge(e.target.value)} placeholder="Ex: 3000" style={{width:"100%",background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:8,color:"#F0F6FF",padding:"10px 12px",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:'"Outfit",sans-serif'}}/>
              </div>
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:12}}>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
                <span style={{fontSize:11,fontWeight:700,color:"#7B96C8"}}>💶 Chiffre d'affaires</span>
                {pctCA!==null&&<span style={{fontSize:12,fontWeight:800,color:colorCA}}>{pctCA}%</span>}
              </div>
              <div style={{background:"#1B2D4F",borderRadius:8,height:10,overflow:"hidden",marginBottom:5}}>
                <div style={{height:10,borderRadius:8,width:(pctCA||0)+"%",background:pctCA>=100?"linear-gradient(90deg,#10B981,#059669)":"linear-gradient(90deg,#3B82F6,#1D4ED8)",transition:"width 0.6s cubic-bezier(.4,0,.2,1)",boxShadow:pctCA>0?`0 0 8px ${colorCA}60`:"none"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                <span style={{color:colorCA,fontWeight:700}}>{fmt(caReel)}</span>
                <span style={{color:"#2E4D82"}}>{objCA>0?`/ ${fmt(objCA)}`:"Pas d'objectif fixé"}</span>
              </div>
              {pctCA>=100&&<div style={{fontSize:10,color:"#10B981",fontWeight:700,marginTop:4}}>🎉 Objectif atteint !</div>}
              {pctCA!==null&&pctCA<100&&objCA>0&&<div style={{fontSize:10,color:"#4A6A9E",marginTop:4}}>{fmt(objCA-caReel)} restants</div>}
            </div>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
                <span style={{fontSize:11,fontWeight:700,color:"#7B96C8"}}>📈 Marge</span>
                {pctMarge!==null&&<span style={{fontSize:12,fontWeight:800,color:colorMarge}}>{pctMarge}%</span>}
              </div>
              <div style={{background:"#1B2D4F",borderRadius:8,height:10,overflow:"hidden",marginBottom:5}}>
                <div style={{height:10,borderRadius:8,width:(pctMarge||0)+"%",background:pctMarge>=100?"linear-gradient(90deg,#10B981,#059669)":"linear-gradient(90deg,#8B5CF6,#6D28D9)",transition:"width 0.6s cubic-bezier(.4,0,.2,1)",boxShadow:pctMarge>0?`0 0 8px ${colorMarge}60`:"none"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                <span style={{color:colorMarge,fontWeight:700}}>{fmt(margeReelle)}</span>
                <span style={{color:"#2E4D82"}}>{objMarge>0?`/ ${fmt(objMarge)}`:"Pas d'objectif fixé"}</span>
              </div>
              {pctMarge>=100&&<div style={{fontSize:10,color:"#10B981",fontWeight:700,marginTop:4}}>🎉 Objectif atteint !</div>}
              {pctMarge!==null&&pctMarge<100&&objMarge>0&&<div style={{fontSize:10,color:"#4A6A9E",marginTop:4}}>{fmt(objMarge-margeReelle)} restants</div>}
            </div>
          </div>
        </div>
      );
    }

    function StatsTab({isMobile, ventes, chantiers, acomptes, stock, savTickets, fmt, objectifs, setObjectifs, role, addNotif}) {
      const[period,setPeriod]=useState(6); // nb de mois à afficher
      const[showBloquesStat,setShowBloquesStat]=useState(false);

      // Calculs CA par mois
      const caParMois=useMemo(()=>{
        const months=[];
        for(let i=period-1;i>=0;i--){
          const d=new Date();d.setMonth(d.getMonth()-i);
          const m=String(d.getMonth()+1).padStart(2,"0");
          const y=String(d.getFullYear());
          const label=d.toLocaleDateString("fr-FR",{month:"short",year:"2-digit"});
          const ca=ventes.filter(v=>v.date&&v.date.split("/")[1]===m&&v.date.split("/")[2]===y).reduce((s,v)=>s+Number(v.prix_ht||0),0);
          const nb=ventes.filter(v=>v.date&&v.date.split("/")[1]===m&&v.date.split("/")[2]===y).length;
          months.push({label,ca,nb,m,y});
        }
        return months;
      },[ventes,period]);

      const maxCA=Math.max(...caParMois.map(m=>m.ca),1);

      // CA par commercial
      const caParVendeur=useMemo(()=>{
        const map={};
        ventes.forEach(v=>{const k=v.par||"Inconnu";if(!map[k])map[k]={nom:k,ca:0,nb:0};map[k].ca+=Number(v.prix_ht||0);map[k].nb++;});
        return Object.values(map).sort((a,b)=>b.ca-a.ca);
      },[ventes]);
      const maxVendeur=Math.max(...caParVendeur.map(v=>v.ca),1);

      // Chantiers par statut
      const STATUTS_CH={a_planifier:{label:"À planifier",color:"#F59E0B"},planifie:{label:"Planifié",color:"#3B82F6"},en_cours:{label:"En cours",color:"#A855F7"},termine:{label:"Terminé",color:"#10B981"}};
      const chantiersParStatut=Object.entries(STATUTS_CH).map(([k,s])=>({...s,key:k,nb:chantiers.filter(c=>c.statut===k).length}));
      const totalChantiers=chantiers.length||1;

      // Acomptes
      const totalAcomptes=acomptes.reduce((s,a)=>s+Number(a.montant_acompte||0),0);
      const totalPaye=acomptes.filter(a=>a.statut==="paye").reduce((s,a)=>s+Number(a.montant_acompte||0),0);
      const totalEnvoy=acomptes.filter(a=>a.statut==="envoye").reduce((s,a)=>s+Number(a.montant_acompte||0),0);
      const totalAttente=acomptes.filter(a=>a.statut==="a_envoyer").reduce((s,a)=>s+Number(a.montant_acompte||0),0);

      // Stock valeur
      const valeurStock=stock.reduce((s,a)=>s+Number(a.stock||0)*Number(a.prix||0),0);
      const nbAlerts=stock.filter(s=>s.stock<=s.seuil).length;

      // KPIs globaux
      const caSAV=(savTickets||[]).reduce((s,t)=>s+Number(t.montant_facture_marque||0),0);
      const caTotal=ventes.reduce((s,v)=>s+Number(v.prix_ht||0),0)+caSAV;
      const mM=String(new Date().getMonth()+1).padStart(2,"0");
      const mY=String(new Date().getFullYear());
      const caMois=ventes.filter(v=>v.date&&v.date.split("/")[1]===mM&&v.date.split("/")[2]===mY).reduce((s,v)=>s+Number(v.prix_ht||0),0)
        +(savTickets||[]).filter(t=>Number(t.montant_facture_marque)>0&&t.date_ouverture&&t.date_ouverture.split("/")[1]===mM&&t.date_ouverture.split("/")[2]===mY).reduce((s,t)=>s+Number(t.montant_facture_marque||0),0);

      const Card=({icon,label,value,sub,color})=>(
        <div style={{background:"#0D1828",borderRadius:12,padding:"14px 16px",border:`1px solid ${color}25`}}>
          <div style={{fontSize:22,marginBottom:6}}>{icon}</div>
          <div style={{fontSize:isMobile?16:20,fontWeight:800,color:color}}>{value}</div>
          <div style={{fontSize:11,color:"#7B96C8",marginTop:2}}>{label}</div>
          {sub&&<div style={{fontSize:10,color:"#4A6A9E",marginTop:2}}>{sub}</div>}
        </div>
      );

      return(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>📊 Tableau de bord</h2>
              <p style={{margin:0,fontSize:12,color:"#4A6A9E"}}>Vue globale de l'activité</p>
            </div>
            <div style={{display:"flex",gap:5}}>
              {[3,6,12].map(p=>(
                <button key={p} onClick={()=>setPeriod(p)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${period===p?"#3B82F6":"#1B2D4F"}`,background:period===p?"#3B82F625":"transparent",color:period===p?"#3B82F6":"#4A6A9E",fontSize:12,fontWeight:700,cursor:"pointer"}}>{p} mois</button>
              ))}
            </div>
          </div>

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:10,marginBottom:20}}>
            <Card icon="💶" label="CA total" value={fmt(caTotal)} sub={`${ventes.length} ventes`} color="#10B981"/>
            <Card icon="📅" label="CA ce mois" value={fmt(caMois)} sub={`${ventes.filter(v=>v.date&&v.date.split("/")[1]===mM&&v.date.split("/")[2]===mY).length} ventes`} color="#3B82F6"/>
            <Card icon="🔧" label="Chantiers actifs" value={chantiers.filter(c=>c.statut!=="termine").length} sub={`${chantiers.filter(c=>c.statut==="termine").length} terminés`} color="#A855F7"/>
            <Card icon="✅" label="Acomptes encaissés" value={fmt(totalPaye)} sub={`${Math.round(totalAcomptes>0?(totalPaye/totalAcomptes)*100:0)}% du total`} color="#F59E0B"/>
          </div>

          {/* Facturations en attente de validation — admin */}
          {(()=>{
            const bloques=chantiers.filter(ch=>ch.statut==="termine"&&ch.facture?.statut==="bloque");
            if(!bloques.length||!["administrateur","secretaire"].includes(role)) return null;
            const fmtB=n=>(n??0).toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";
            return(
              <div style={{background:"#0D1828",border:"1px solid #2E4D82",borderRadius:14,padding:"12px 16px",marginBottom:16}}>
                <button onClick={()=>setShowBloquesStat(p=>!p)}
                  style={{width:"100%",background:"transparent",border:"none",cursor:"pointer",textAlign:"left",fontFamily:'"Outfit",sans-serif',display:"flex",alignItems:"center",gap:12,padding:0}}>
                  <div style={{width:40,height:40,borderRadius:10,background:"#1B2D4F",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>⏸️</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,color:"#A8C4E8",fontSize:13,marginBottom:2}}>
                      {bloques.length} facturation{bloques.length>1?"s":""} en attente de validation
                    </div>
                    <div style={{fontSize:11,color:"#4A6A9E",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{bloques.map(ch=>`${ch.client} (${ch.date_fin||"—"})`).join(" · ")}</div>
                  </div>
                  <span style={{background:"#1B2D4F",color:"#7B96C8",borderRadius:20,fontWeight:700,fontSize:12,padding:"2px 10px",flexShrink:0}}>{bloques.length}</span>
                  <span style={{fontSize:11,color:"#4A6A9E",marginLeft:4}}>{showBloquesStat?"▲":"▼"}</span>
                </button>
                {showBloquesStat&&<div style={{marginTop:10,display:"flex",flexDirection:"column",gap:5}}>
                  {bloques.map((ch,i)=>(
                    <div key={ch.id} style={{padding:"9px 12px",background:"#070D1A",borderRadius:9,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:13,color:"#F0F6FF"}}>{ch.client}</div>
                        <div style={{fontSize:11,color:"#4A6A9E"}}>✅ {ch.date_fin||"—"} · 👤 {ch.technicien||"—"}</div>
                        {ch.facture?.raison&&<div style={{fontSize:10,color:"#7B96C8"}}>ℹ️ {ch.facture.raison}</div>}
                      </div>
                      <span style={{fontSize:10,color:"#60A5FA",fontWeight:600,flexShrink:0}}>→ Onglet Factures</span>
                    </div>
                  ))}
                </div>}
              </div>
            );
          })()}

          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14,marginBottom:14}}>

            {/* GRAPHIQUE CA PAR MOIS */}
            <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:"16px"}}>
              <h3 style={{margin:"0 0 16px",fontSize:14,fontWeight:800}}>💶 CA mensuel</h3>
              <div style={{display:"flex",alignItems:"flex-end",gap:6,height:140,paddingBottom:24,position:"relative"}}>
                {caParMois.map((m,i)=>{
                  const h=maxCA>0?Math.round((m.ca/maxCA)*120):0;
                  const isCurrent=m.m===mM&&m.y===mY;
                  return(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,height:"100%",justifyContent:"flex-end"}}>
                      <div title={`${fmt(m.ca)} — ${m.nb} vente(s)`} style={{width:"100%",height:h||2,background:isCurrent?"linear-gradient(180deg,#3B82F6,#1D4ED8)":"#1B2D4F",borderRadius:"4px 4px 0 0",minHeight:2,cursor:"default",transition:"height 0.3s"}}/>
                      <div style={{fontSize:9,color:isCurrent?"#3B82F6":"#2E4D82",fontWeight:isCurrent?700:400,textAlign:"center",lineHeight:1.2,position:"absolute",bottom:0}}>{m.label}</div>
                    </div>

                    <label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,textTransform:"uppercase"}}>Détails / explication</label>
                    <textarea value={causeDetails} onChange={e=>setCauseDetails(e.target.value)} rows={3}

                  {/* Temps perdu — toutes causes */}
                  {causeVal&&<div style={{background:"#F59E0B08",border:"1px solid #F59E0B25",borderRadius:12,padding:"12px 14px",marginBottom:12}}>

                      <input type="number" min="0" step="0.5" value={tempsPerdu} onChange={e=>setTempsPerdu(e.target.value)}

                  {/* Coût intervention — uniquement si cause = installation */}

                    <div style={{display:"flex",gap:8,marginBottom:8}}>
                      {[["oui","✅ Oui, il y a eu un coût"],["non","✗ Non, sans coût"]].map(([k,l])=>(
                        <button key={k} onClick={()=>setFacturerInstallation(k==="oui")}
                          style={{flex:1,padding:"9px 6px",borderRadius:10,border:`2px solid ${(facturerInstallation&&k==="oui")||(!facturerInstallation&&k==="non")?"#EF4444":"#1B2D4F"}`,background:(facturerInstallation&&k==="oui")||(!facturerInstallation&&k==="non")?"#EF444420":"#070D1A",color:(facturerInstallation&&k==="oui")||(!facturerInstallation&&k==="non")?"#EF4444":"#4A6A9E",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:'"Outfit",sans-serif',textAlign:"center"}}>
                          {l}
                        </button>
                      ))}
                    </div>
                    {facturerInstallation&&<>

                      <input type="number" min="0" step="0.01" value={coutInstallation} onChange={e=>setCoutInstallation(e.target.value)}
                        placeholder="Ex : 80.00"
                        style={{background:"#070D1A",border:"1px solid #EF444440",borderRadius:10,color:"#E8F0FF",padding:"10px 12px",width:"100%",boxSizing:"border-box",fontFamily:'"Outfit",sans-serif',fontSize:14,outline:"none"}}/>

                    <div style={{display:"flex",gap:8,marginBottom:10}}>
                      {[["oui","✅ Oui, facturer la marque"],["non","✗ Non, ne pas facturer"]].map(([k,l])=>(
                        <button key={k} onClick={()=>setFacturerMarque(k==="oui")}

                      <input type="number" min="0" step="0.01" value={montantMarque} onChange={e=>setMontantMarque(e.target.value)}
                        placeholder="Ex : 150.00"
                        style={{background:"#070D1A",border:"1px solid #8B5CF650",borderRadius:10,color:"#E8F0FF",padding:"10px 12px",width:"100%",boxSizing:"border-box",fontFamily:'"Outfit",sans-serif',fontSize:14,outline:"none"}}/>

                        💰 {Number(montantMarque).toLocaleString("fr-FR",{minimumFractionDigits:2})} € · Marge 100% · Visible en facturation pour la secrétaire
                      </div>}
                    </>}
                  </div>}
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>setCauseModal(null)} style={{flex:1,background:"#1B2D4F",border:"none",borderRadius:10,color:"#7B96C8",padding:"11px",cursor:"pointer",fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>Annuler</button>
                    <button onClick={()=>saveCause(causeModal,causeVal,causeDetails)} disabled={!causeVal}
                      style={{flex:2,background:causeVal?`linear-gradient(135deg,${CAUSES[causeVal]?.color},${CAUSES[causeVal]?.color}CC)`:"#1B2D4F",border:"none",borderRadius:10,color:"#fff",padding:"11px",cursor:causeVal?"pointer":"default",fontWeight:800,fontSize:13,fontFamily:'"Outfit",sans-serif'}}>

                </div>

          {/* MODAL NOUVEAU */}
          {newForm&&(
            <div style={OVL} onClick={()=>setNewForm(null)}>
              <TicketForm isMobile={isMobile} form={newForm}
                onChange={(k,v)=>setNewForm(p=>({...p,[k]:v}))}
                onSave={saveNewTicket} onCancel={()=>setNewForm(null)}

                STATUTS={STATUTS} STATUTS_RESOLUS={STATUTS_RESOLUS}/>
            </div>
          )}

          {/* MODAL ÉDITION */}
          {editForm&&(
            <div style={OVL} onClick={()=>setEditForm(null)}>
              <TicketForm isMobile={isMobile} form={editForm}
                onChange={(k,v)=>setEditForm(p=>({...p,[k]:v}))}
                onSave={saveEditTicket} onCancel={()=>setEditForm(null)}
                title="✏️ Modifier le ticket"
                STATUTS={STATUTS} STATUTS_RESOLUS={STATUTS_RESOLUS}/>

            <div style={OVL} onClick={()=>setDelConf(null)}>

                border:"1px solid #1B2D4F",textAlign:"center",boxShadow:"0 24px 60px rgba(0,0,0,0.6)"}}
                onClick={e=>e.stopPropagation()}>
                <div style={{fontSize:48,marginBottom:12}}>🗑️</div>

                </p>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setDelConf(null)} style={{...BTN_SM("#1B2D4F"),flex:1,padding:"10px"}}>Annuler</button>
                  <button onClick={()=>{if(onDeleteTicket)onDeleteTicket(delConf.id);else setTickets(p=>p.filter(t=>t.id!==delConf.id));setDelConf(null);}}
                    style={{...BTN_SM("#EF4444"),flex:1,padding:"10px"}}>Supprimer</button>
                </div>
              </div>

              </h2>

                {kpis.actifs} en cours · {kpis.resolus} résolus
              </p>
            </div>

              {/* Onglets tickets / contacts */}
              <div style={{display:"flex",background:"#0D1828",borderRadius:10,
                border:"1px solid #1B2D4F",overflow:"hidden"}}>

                  <button key={k} onClick={()=>setTabView(k)} style={{
                    padding:"8px 14px",background:tabView===k?"linear-gradient(135deg,#3B82F6,#1D4ED8)":"transparent",

                  ➕ Nouveau ticket

              )}
              {tabView==="contacts"&&role==="administrateur"&&(
                <button onClick={()=>setNewContact({id:Date.now(),marque:"",tel:"",site:""})}

                </button>
              )}
