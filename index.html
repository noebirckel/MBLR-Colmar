    // ONGLET VENTES
    // ══════════════════════════════════════
    function VentesTab({isMobile, ventes, setVentes, stock, profile, fmt, role, onVenteSaved}) {
      const CABLES = stock.filter(s=>s.unite==="ml");
      const BORNES = stock.filter(s=>s.unite!=="ml");
      const canEdit = r => ["administrateur","commercial"].includes(r);
      const BRANDS = ["Easee","Ohme","Zaptec","V2C"];
      const BC = {"Easee":"#1A73E8","Ohme":"#00897B","Zaptec":"#7B1FA2","V2C":"#E53935"};

      const emptyForm = () => ({
        client:"", description:"", prix_ht:"", adresse:"",
        materiels:[], cables:[],
        date: new Date().toLocaleDateString("fr-FR"),
        par: profile?.nom||"",
        coords:null,
      });

      // viewMode: "list" | "stats" | "form"
      // On mount, check localStorage for a draft — if found, go straight to form
      const[viewMode,setViewMode]=useState(()=>{
        try {
          if(localStorage.getItem("vente_draft")) return "form";
          return localStorage.getItem("vente_view")||"list";
        } catch(e) { return "list"; }
      });
      const goToView=v=>{try{localStorage.setItem("vente_view",v);}catch(e){}setViewMode(v);};
      const[form,setForm]=useState(()=>{
        try {
          const d=localStorage.getItem("vente_draft");
          return d ? JSON.parse(d) : emptyForm();
        } catch(e) { return emptyForm(); }
      });
      const[mItem,setMItem]=useState({id:"",qty:""});
      const[cItem,setCItem]=useState({id:"",qty:""});
      const[search,setSearch]=useState("");
      const[editId,setEditId]=useState(null);
      const[delConf,setDelConf]=useState(null);

      const INP=(e={})=>({background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,color:"#E8F0FF",padding:"10px 12px",fontSize:15,width:"100%",outline:"none",boxSizing:"border-box",...e});
      const BTN=(bg,e={})=>({background:bg,border:"none",borderRadius:10,color:"#FFF",padding:"10px 14px",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:'"Outfit",sans-serif',transition:"all 0.15s",...e});
      const L=({c})=><label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,letterSpacing:"0.08em",textTransform:"uppercase"}}>{c}</label>;
      const OVL={position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"};
      const MBX=isMobile?{background:"#0D1828",borderRadius:"20px 20px 0 0",padding:"8px 16px 32px",width:"100%",border:"1px solid #1B2D4F",maxHeight:"90vh",overflowY:"auto"}:{background:"#0D1828",borderRadius:16,padding:24,width:440,maxWidth:"95vw",border:"1px solid #1B2D4F",maxHeight:"90vh",overflowY:"auto"};
      const Handle=()=>isMobile?<div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"8px auto 16px"}}/>:null;

      // Save form to localStorage on every change
      useEffect(()=>{
        if(viewMode==="form"){
          try { localStorage.setItem("vente_draft", JSON.stringify(form)); } catch(e){}
        }
      },[form, viewMode]);

      const clearDraft = () => { try { localStorage.removeItem("vente_draft"); } catch(e){} };

      const openCreate = () => {
        setEditId(null);
        setForm(emptyForm());
        setMItem({id:"",qty:""});
        setCItem({id:"",qty:""});
        goToView("form");
      };
      const openEdit = v => {
        setEditId(v.id);
        setForm({...v});
        setMItem({id:"",qty:""});
        setCItem({id:"",qty:""});
        goToView("form");
      };
      const cancelForm = () => {
        clearDraft();
        goToView("list");
        setEditId(null);
      };
      const saveVente = async() => {
        if(!form.client||!form.prix_ht)return;
        let coords=form.coords||null;
        // Géocodage Nominatim si adresse fournie et pas encore geocodée
        if(form.adresse&&!coords){
          try{
            const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(form.adresse)}&limit=1`,{headers:{"Accept-Language":"fr"}});
            const j=await r.json();
            if(j&&j[0])coords={lat:parseFloat(j[0].lat),lng:parseFloat(j[0].lon),display:j[0].display_name};
          }catch(e){}
        }
        const entry={...form, prix_ht:Number(form.prix_ht), id:editId||Date.now(), coords};
        if(editId) setVentes(p=>p.map(v=>v.id===editId?entry:v));
        else { setVentes(p=>[entry,...p]); if(onVenteSaved) onVenteSaved(entry); }
        clearDraft();
        goToView("list");
        setEditId(null);
      };

      const addMat = () => {
        if(!mItem.id||!mItem.qty)return;
        const a=stock.find(s=>s.id===Number(mItem.id));
        setForm(p=>({...p,materiels:[...p.materiels.filter(x=>x.id!==mItem.id),{id:mItem.id,article:a?.article,cat:a?.cat,qty:Number(mItem.qty),prix_unit:a?.prix||0}]}));
        setMItem({id:"",qty:""});
      };
      const addCable = () => {
        if(!cItem.id||!cItem.qty)return;
        const a=stock.find(s=>s.id===Number(cItem.id));
        setForm(p=>({...p,cables:[...p.cables.filter(x=>x.id!==cItem.id),{id:cItem.id,article:a?.article,qty:Number(cItem.qty),prix_unit:a?.prix||0}]}));
        setCItem({id:"",qty:""});
      };

      const totalMat = f => (f.materiels||[]).reduce((s,m)=>s+m.qty*(m.prix_unit||0),0);
      const totalCab = f => (f.cables||[]).reduce((s,m)=>s+m.qty*(m.prix_unit||0),0);
      const caTotal  = ventes.reduce((s,v)=>s+Number(v.prix_ht||0),0);
      const mM = String(new Date().getMonth()+1).padStart(2,"0");
      const mY = String(new Date().getFullYear());
      const moisActuel = new Date().toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
      const caMonth = ventes.filter(v=>v.date&&v.date.split("/")[1]===mM&&v.date.split("/")[2]===mY).reduce((s,v)=>s+Number(v.prix_ht||0),0);
      const vendeurs = [...new Set(ventes.map(v=>v.par||"Inconnu"))].sort();
      const caByVendeur = vendeurs.map(nom=>({
        nom,
        ca: ventes.filter(v=>(v.par||"Inconnu")===nom).reduce((s,v)=>s+Number(v.prix_ht||0),0),
        nb: ventes.filter(v=>(v.par||"Inconnu")===nom).length,
        caMois: ventes.filter(v=>(v.par||"Inconnu")===nom&&v.date&&v.date.split("/")[1]===mM&&v.date.split("/")[2]===mY).reduce((s,v)=>s+Number(v.prix_ht||0),0),
      })).sort((a,b)=>b.ca-a.ca);
      const ventesParBrand = BRANDS.map(brand=>({
        brand,
        list: ventes.filter(v=>(v.materiels||[]).some(m=>m.cat===brand)),
        bornes: ventes.reduce((s,v)=>(v.materiels||[]).filter(m=>m.cat===brand).reduce((ss,m)=>ss+m.qty,0)+s,0),
      }));
      const filteredVentes = ventes.filter(v=>!search||(v.client||"").toLowerCase().includes(search.toLowerCase())||(v.par||"").toLowerCase().includes(search.toLowerCase()));

      // ══ VUE FORMULAIRE (page complète, pas de modal) ══
      if(viewMode==="form") return (
        <div>
          {/* Bandeau brouillon */}
          <div style={{background:"#10B98115",border:"1px solid #10B98140",borderRadius:10,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#10B981"}}>
            <span style={{fontSize:16}}>💾</span>
            <span style={{fontWeight:600}}>Brouillon auto-sauvegardé — tu peux changer d'onglet ou de page, ta saisie est conservée.</span>
          </div>

          <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:isMobile?16:24,maxWidth:620}}>
            <h3 style={{margin:"0 0 20px",fontWeight:800,fontSize:17}}>{editId?"✏️ Modifier la vente":"💰 Nouvelle vente"}</h3>

            {/* Client + Date */}
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr auto",gap:10,marginBottom:10}}>
              <div><L c="CLIENT"/><input value={form.client} onChange={e=>setForm(p=>({...p,client:e.target.value}))} placeholder="Nom du client ou société" style={INP()}/></div>
              <div><L c="DATE"/><input value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={INP({width:isMobile?"100%":115})}/></div>
            </div>
            {/* Adresse */}
            <div style={{marginBottom:14}}>
              <L c="ADRESSE D'INSTALLATION"/>
              <div style={{position:"relative"}}>
                <input value={form.adresse||""} onChange={e=>setForm(p=>({...p,adresse:e.target.value,coords:null}))} placeholder="Ex: 12 rue des Lilas, 67000 Strasbourg" style={INP()}/>
                {form.coords&&<div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"#10B981",fontWeight:700}}>📍 Géolocalisé</div>}
              </div>
              {form.adresse&&!form.coords&&<div style={{fontSize:10,color:"#4A6A9E",marginTop:4}}>📍 Sera géocodé automatiquement à l'enregistrement</div>}
            </div>

            {/* Matériel */}
            <div style={{marginBottom:14}}>
              <L c="MATÉRIEL (BORNES & ACCESSOIRES)"/>
              <div style={{display:"flex",gap:6,marginBottom:6}}>
                <select value={mItem.id} onChange={e=>setMItem(p=>({...p,id:e.target.value}))} style={{...INP(),flex:2}}>
                  <option value="">Choisir un article…</option>
                  {BORNES.map(s=><option key={s.id} value={s.id}>{s.cat} — {s.article} ({fmt(s.prix)})</option>)}
                </select>
                <input type="number" min="1" value={mItem.qty} onChange={e=>setMItem(p=>({...p,qty:e.target.value}))} placeholder="Qté" style={{...INP(),width:65,textAlign:"center"}}/>
                <button onClick={addMat} style={BTN("#3B82F6",{padding:"10px 16px",fontSize:18})}>+</button>
              </div>
              {form.materiels.map(m=>(
                <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#070D1A",borderRadius:8,padding:"8px 12px",marginBottom:5}}>
                  <span style={{fontSize:13}}>{m.article}</span>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:13,color:"#10B981",fontWeight:600}}>{m.qty}×</span>
                    <button onClick={()=>setForm(p=>({...p,materiels:p.materiels.filter(x=>x.id!==m.id)}))} style={{background:"#EF444420",border:"none",borderRadius:5,color:"#EF4444",cursor:"pointer",padding:"3px 9px",fontSize:13}}>✕</button>
                  </div>
                </div>
              ))}
            </div>

            {/* Câbles */}
            <div style={{marginBottom:14}}>
              <L c="CÂBLES (ML)"/>
              <div style={{display:"flex",gap:6,marginBottom:6}}>
                <select value={cItem.id} onChange={e=>setCItem(p=>({...p,id:e.target.value}))} style={{...INP(),flex:2}}>
                  <option value="">Choisir un câble…</option>
                  {CABLES.map(s=><option key={s.id} value={s.id}>{s.article} ({fmt(s.prix)}/ml)</option>)}
                </select>
                <input type="number" min="1" value={cItem.qty} onChange={e=>setCItem(p=>({...p,qty:e.target.value}))} placeholder="ml" style={{...INP(),width:65,textAlign:"center"}}/>
                <button onClick={addCable} style={BTN("#3B82F6",{padding:"10px 16px",fontSize:18})}>+</button>
              </div>
              {form.cables.map(m=>(
                <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#070D1A",borderRadius:8,padding:"8px 12px",marginBottom:5}}>
                  <span style={{fontSize:13}}>{m.article}</span>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:13,color:"#10B981",fontWeight:600}}>{m.qty} ml</span>
                    <button onClick={()=>setForm(p=>({...p,cables:p.cables.filter(x=>x.id!==m.id)}))} style={{background:"#EF444420",border:"none",borderRadius:5,color:"#EF4444",cursor:"pointer",padding:"3px 9px",fontSize:13}}>✕</button>
                  </div>
                </div>
              ))}
            </div>

            {/* Prix HT */}
            <div style={{marginBottom:14}}>
              <L c="PRIX DE VENTE HT (€)"/>
              <input type="number" step="0.01" value={form.prix_ht} onChange={e=>setForm(p=>({...p,prix_ht:e.target.value}))} placeholder="Ex: 1250.00" style={INP()}/>
            </div>

            {/* Marge */}
            {Number(form.prix_ht)>0&&(form.materiels.length>0||form.cables.length>0)&&(()=>{
              const cout=totalMat(form)+totalCab(form);
              const marge=Number(form.prix_ht)-cout;
              const pct=cout>0?((marge/Number(form.prix_ht))*100).toFixed(1):null;
              return <div style={{background:marge>=0?"#10B98115":"#EF444415",border:`1px solid ${marge>=0?"#10B98140":"#EF444440"}`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontWeight:700,color:marge>=0?"#10B981":"#EF4444",fontSize:13}}>
                {marge>=0?"📈":"📉"} Marge estimée : {fmt(marge)} {pct&&`(${pct}%)`}
              </div>;
            })()}

            {/* Description */}
            <div style={{marginBottom:20}}>
              <L c="DESCRIPTION / NOTES"/>
              <textarea value={form.description||""} onChange={e=>setForm(p=>({...p,description:e.target.value}))} placeholder="Détails du projet, conditions particulières…" style={{...INP(),height:90,resize:"none",lineHeight:1.6}}/>
            </div>

            <div style={{display:"flex",gap:8}}>
              <button onClick={cancelForm} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={saveVente} disabled={!form.client||!form.prix_ht} style={BTN(!form.client||!form.prix_ht?"#0D1828":"linear-gradient(135deg,#10B981,#059669)",{flex:2,padding:"13px"})}>
                {editId?"💾 Mettre à jour":"💰 Enregistrer la vente"}
              </button>
            </div>
          </div>
        </div>
      );

      // ══ MODAL SUPPRESSION ══
      const DelModal = () => delConf&&(
        <div style={OVL} onClick={()=>setDelConf(null)}><div style={{...MBX,maxWidth:360,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
          <Handle/>
          <div style={{fontSize:44,marginBottom:10}}>🗑️</div>
          <h3 style={{margin:"0 0 8px",fontWeight:800}}>Supprimer cette vente ?</h3>
          <p style={{color:"#4A6A9E",fontSize:13,margin:"0 0 20px"}}><strong style={{color:"#E8F0FF"}}>{delConf.client}</strong> — {fmt(delConf.prix_ht)}</p>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setDelConf(null)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
            <button onClick={()=>{setVentes(p=>p.filter(v=>v.id!==delConf.id));setDelConf(null);}} style={BTN("#EF4444",{flex:1})}>Supprimer</button>
          </div>
        </div></div>
      );

      // ══ VUE LISTE ══
      if(viewMode==="list") return (
        <div>
          <DelModal/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>💰 Ventes & Chiffre d'affaires</h2>
              <p style={{margin:0,fontSize:12,color:"#4A6A9E"}}>{ventes.length} vente{ventes.length>1?"s":""} · {moisActuel}</p>
            </div>
            <div style={{display:"flex",gap:8}}>
              <div style={{display:"flex",background:"#0D1828",borderRadius:10,border:"1px solid #1B2D4F",overflow:"hidden"}}>
                <button onClick={()=>goToView("list")} style={{padding:"7px 14px",background:"#3B82F6",border:"none",color:"#FFF",cursor:"pointer",fontSize:12,fontWeight:700}}>📋 Ventes</button>
                <button onClick={()=>goToView("stats")} style={{padding:"7px 14px",background:"transparent",border:"none",color:"#4A6A9E",cursor:"pointer",fontSize:12,fontWeight:700}}>📊 Stats</button>
              </div>
              {canEdit(role)&&<button onClick={openCreate} style={BTN("linear-gradient(135deg,#10B981,#059669)",{padding:"10px 16px",fontSize:13})}>➕ Nouvelle vente</button>}
            </div>
          </div>

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(3,1fr)",gap:8,marginBottom:18}}>
            {[
              {l:"CA Total",v:fmt(caTotal),c:"#10B981",i:"💶",sub:`${ventes.length} vente(s)`},
              {l:"CA ce mois",v:fmt(caMonth),c:"#3B82F6",i:"📅",sub:moisActuel},
              {l:"Panier moyen",v:ventes.length>0?fmt(caTotal/ventes.length):"—",c:"#F59E0B",i:"📊",sub:"par vente"},
            ].map(({l,v,c,i,sub})=>(
              <div key={l} style={{background:"#0D1828",borderRadius:12,padding:"14px 16px",border:`1px solid ${c}30`}}>
                <div style={{fontSize:20,marginBottom:5}}>{i}</div>
                <div style={{fontSize:isMobile?15:19,fontWeight:800,color:c,lineHeight:1}}>{v}</div>
                <div style={{fontSize:11,color:"#4A6A9E",marginTop:4}}>{l}</div>
                <div style={{fontSize:10,color:"#2E4D82",marginTop:2}}>{sub}</div>
              </div>
            ))}
          </div>

          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher client, vendeur…" style={{...INP(),marginBottom:12,fontSize:13}}/>

          {filteredVentes.length===0
            ?<div style={{textAlign:"center",padding:"50px 0",color:"#2E4D82"}}><div style={{fontSize:40,marginBottom:8}}>💰</div><div style={{fontWeight:700}}>{canEdit(role)?"Cliquez sur + Nouvelle vente pour commencer":"Aucune vente enregistrée."}</div></div>
            :<div style={{display:"flex",flexDirection:"column",gap:10}}>
              {filteredVentes.map(v=>(
                <div key={v.id} style={{background:"#0D1828",borderRadius:14,border:"1px solid #10B98130",padding:"14px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div style={{flex:1,paddingRight:10}}>
                      <div style={{fontWeight:800,fontSize:16,color:"#F0F6FF",marginBottom:3}}>{v.client}</div>
                      <div style={{fontSize:11,color:"#4A6A9E"}}>{v.date} · <span style={{color:"#7B96C8",fontWeight:600}}>{v.par||"—"}</span></div>
                      {v.description&&<div style={{fontSize:12,color:"#7B96C8",marginTop:5,fontStyle:"italic"}}>"{v.description}"</div>}
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:20,fontWeight:800,color:"#10B981"}}>{fmt(v.prix_ht)}</div>
                      <div style={{fontSize:10,color:"#4A6A9E",marginTop:2}}>HT</div>
                    </div>
                  </div>
                  {(v.materiels?.length>0||v.cables?.length>0)&&(
                    <div style={{background:"#070D1A",borderRadius:10,padding:"9px 12px",marginBottom:canEdit(role)?10:0}}>
                      {v.materiels?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:v.cables?.length>0?6:0}}>
                        {v.materiels.map((m,i)=>{const col=BC[m.cat]||"#7B96C8";return<span key={i} style={{background:col+"20",border:`1px solid ${col}40`,borderRadius:6,padding:"2px 8px",fontSize:11,color:col,fontWeight:600}}>{m.qty}× {m.article}</span>;})}
                      </div>}
                      {v.cables?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        {v.cables.map((m,i)=><span key={i} style={{background:"#55832520",border:"1px solid #55832540",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#A3C45A",fontWeight:600}}>{m.qty}ml {m.article}</span>)}
                      </div>}
                    </div>
                  )}
                  {canEdit(role)&&<div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                    <button onClick={()=>openEdit(v)} style={BTN("#1B2D4F",{padding:"6px 12px",fontSize:12})}>✏️ Modifier</button>
                    <button onClick={()=>setDelConf(v)} style={{background:"#EF444415",border:"1px solid #EF444430",borderRadius:8,color:"#EF4444",padding:"6px 10px",cursor:"pointer",fontSize:12,fontWeight:700}}>🗑️</button>
                  </div>}
                </div>
              ))}
            </div>
          }
        </div>
      );

      // ══ VUE STATS ══
      return (
        <div>
          <DelModal/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:800}}>📊 Statistiques de ventes</h2>
              <p style={{margin:0,fontSize:12,color:"#4A6A9E"}}>{moisActuel}</p>
            </div>
            <div style={{display:"flex",background:"#0D1828",borderRadius:10,border:"1px solid #1B2D4F",overflow:"hidden"}}>
              <button onClick={()=>goToView("list")} style={{padding:"7px 14px",background:"transparent",border:"none",color:"#4A6A9E",cursor:"pointer",fontSize:12,fontWeight:700}}>📋 Ventes</button>
              <button onClick={()=>goToView("stats")} style={{padding:"7px 14px",background:"#3B82F6",border:"none",color:"#FFF",cursor:"pointer",fontSize:12,fontWeight:700}}>📊 Stats</button>
            </div>
          </div>

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(3,1fr)",gap:8,marginBottom:18}}>
            {[
              {l:"CA Total",v:fmt(caTotal),c:"#10B981",i:"💶",sub:`${ventes.length} vente(s)`},
              {l:"CA ce mois",v:fmt(caMonth),c:"#3B82F6",i:"📅",sub:moisActuel},
              {l:"Panier moyen",v:ventes.length>0?fmt(caTotal/ventes.length):"—",c:"#F59E0B",i:"📊",sub:"par vente"},
            ].map(({l,v,c,i,sub})=>(
              <div key={l} style={{background:"#0D1828",borderRadius:12,padding:"14px 16px",border:`1px solid ${c}30`}}>
                <div style={{fontSize:20,marginBottom:5}}>{i}</div>
                <div style={{fontSize:isMobile?15:19,fontWeight:800,color:c,lineHeight:1}}>{v}</div>
                <div style={{fontSize:11,color:"#4A6A9E",marginTop:4}}>{l}</div>
                <div style={{fontSize:10,color:"#2E4D82",marginTop:2}}>{sub}</div>
              </div>
            ))}
          </div>

          {/* CA par vendeur */}
          <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:16,marginBottom:16}}>
            <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800}}>👤 CA par vendeur</h3>
            {vendeurs.length===0?<p style={{color:"#2E4D82",fontSize:13}}>Aucune vente enregistrée.</p>
              :<div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>
                    {["Vendeur","Nb ventes","CA Total","CA ce mois","Panier moy."].map(h=>(
                      <th key={h} style={{padding:"8px 12px",textAlign:h==="Vendeur"?"left":"center",fontSize:10,fontWeight:700,color:"#4A6A9E",textTransform:"uppercase",borderBottom:"1px solid #1B2D4F",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {caByVendeur.map((v,idx)=>{
                      const pct=caTotal>0?((v.ca/caTotal)*100).toFixed(0):0;
                      return(
                        <tr key={v.nom} style={{background:idx%2===0?"#0D1828":"#182030"}}>
                          <td style={{padding:"10px 12px",borderBottom:"1px solid #0D182844"}}>
                            <div style={{fontWeight:700}}>{v.nom}</div>
                            <div style={{marginTop:4,background:"#070D1A",borderRadius:4,height:4,width:"100%"}}><div style={{background:"#3B82F6",height:4,borderRadius:4,width:`${pct}%`}}/></div>
                          </td>
                          <td style={{padding:"10px 12px",borderBottom:"1px solid #0D182844",textAlign:"center",fontWeight:700}}>{v.nb}</td>
                          <td style={{padding:"10px 12px",borderBottom:"1px solid #0D182844",textAlign:"center",fontWeight:800,color:"#10B981",fontSize:15}}>{fmt(v.ca)}</td>
                          <td style={{padding:"10px 12px",borderBottom:"1px solid #0D182844",textAlign:"center",color:"#3B82F6",fontWeight:700}}>{fmt(v.caMois)}</td>
                          <td style={{padding:"10px 12px",borderBottom:"1px solid #0D182844",textAlign:"center",color:"#F59E0B",fontWeight:700}}>{v.nb>0?fmt(v.ca/v.nb):"—"}</td>
                        </tr>
                      );
                    })}
                    <tr style={{background:"#070D1A",borderTop:"2px solid #1B2D4F"}}>
                      <td style={{padding:"10px 12px",fontWeight:800,color:"#F0F6FF"}}>🏆 TOTAL</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:800}}>{ventes.length}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:800,color:"#10B981",fontSize:15}}>{fmt(caTotal)}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:800,color:"#3B82F6"}}>{fmt(caMonth)}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:800,color:"#F59E0B"}}>{ventes.length>0?fmt(caTotal/ventes.length):"—"}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            }
          </div>

          {/* CA par marque */}
          <div style={{background:"#0D1828",borderRadius:14,border:"1px solid #1B2D4F",padding:16}}>
            <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800}}>⚡ Ventes par marque</h3>
            <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:10,marginBottom:16}}>
              {ventesParBrand.map(({brand,list:bv,bornes:nb})=>{
                const col=BC[brand]||"#7B96C8";
                return(
                  <div key={brand} style={{background:"#070D1A",borderRadius:12,padding:"12px 14px",border:`1px solid ${col}30`}}>
                    <div style={{fontSize:12,fontWeight:800,color:col,marginBottom:4}}>{brand}</div>
                    <div style={{fontSize:22,fontWeight:800,color:"#F0F6FF"}}>{bv.length}</div>
                    <div style={{fontSize:10,color:"#4A6A9E",marginTop:2}}>vente{bv.length>1?"s":""}</div>
                    {nb>0&&<div style={{fontSize:11,color:col,marginTop:4,fontWeight:700}}>{nb} borne{nb>1?"s":""}</div>}
                  </div>
                );
              })}
            </div>
            {vendeurs.length>0&&<>
              <div style={{fontSize:11,fontWeight:700,color:"#4A6A9E",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Détail par vendeur</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>
                    <th style={{padding:"8px 12px",textAlign:"left",fontSize:10,fontWeight:700,color:"#4A6A9E",textTransform:"uppercase",borderBottom:"1px solid #1B2D4F"}}>Vendeur</th>
                    {BRANDS.map(b=><th key={b} style={{padding:"8px 12px",textAlign:"center",fontSize:10,fontWeight:700,color:BC[b],borderBottom:"1px solid #1B2D4F",whiteSpace:"nowrap"}}>{b}</th>)}
                  </tr></thead>
                  <tbody>
                    {vendeurs.map((nom,idx)=>(
                      <tr key={nom} style={{background:idx%2===0?"#0D1828":"#182030"}}>
                        <td style={{padding:"9px 12px",borderBottom:"1px solid #0D182844",fontWeight:700}}>{nom}</td>
                        {BRANDS.map(brand=>{
                          const nb=ventes.filter(v=>(v.par||"Inconnu")===nom&&(v.materiels||[]).some(m=>m.cat===brand)).length;
                          const nbB=ventes.filter(v=>(v.par||"Inconnu")===nom).reduce((s,v)=>(v.materiels||[]).filter(m=>m.cat===brand).reduce((ss,m)=>ss+m.qty,0)+s,0);
                          const col=BC[brand]||"#7B96C8";
                          return <td key={brand} style={{padding:"9px 12px",borderBottom:"1px solid #0D182844",textAlign:"center"}}>
                            {nb>0?<div><div style={{fontWeight:800,color:col,fontSize:14}}>{nb}</div><div style={{fontSize:10,color:"#4A6A9E"}}>{nbB} borne{nbB>1?"s":""}</div></div>:<span style={{color:"#1B2D4F"}}>—</span>}
                          </td>;
                        })}
                      </tr>
                    ))}
                    <tr style={{background:"#070D1A",borderTop:"2px solid #1B2D4F"}}>
                      <td style={{padding:"9px 12px",fontWeight:800,color:"#F0F6FF"}}>TOTAL</td>
                      {BRANDS.map(brand=>{
                        const nb=ventes.filter(v=>(v.materiels||[]).some(m=>m.cat===brand)).length;
                        const nbB=ventes.reduce((s,v)=>(v.materiels||[]).filter(m=>m.cat===brand).reduce((ss,m)=>ss+m.qty,0)+s,0);
                        const col=BC[brand]||"#7B96C8";
                        return <td key={brand} style={{padding:"9px 12px",textAlign:"center",fontWeight:800,color:col}}>
                          {nb>0?<div><div>{nb}</div><div style={{fontSize:10}}>{nbB} borne{nbB>1?"s":""}</div></div>:<span style={{color:"#1B2D4F"}}>—</span>}
                        </td>;
                      })}
                    </tr>
                  </tbody>
                </table>
              </div>
            </>}
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════
    // ONGLET CHANTIER (pipeline complet)
    // ══════════════════════════════════════
    // ══════════════════════════════════════
    // RAPPORT D'INTERVENTION
    // ══════════════════════════════════════
    function RapportModal({isMobile, data, onClose, onSave, onSaveAndFinish, sb}) {
      const {ch} = data;
      const isReadOnly = ch.statut === "termine" && !!ch.rapport;
      const[rapport, setRapport] = useState(data.rapport || {
        heures_debut:"", heures_fin:"", observations:"",
        materiel_supp:"", photos_chantier:[], photo_pv:null,
        signature:null, rapport_date:"", rapport_par:"",
      });
      const[uploading, setUploading]     = useState(false);
      const[uploadingPV, setUploadingPV] = useState(false);
      const[lightbox, setLightbox]       = useState(null);
      const[editMode, setEditMode]       = useState(!ch.rapport);
      const canvasRef = useRef(null);
      const[drawing, setDrawing]         = useState(false);
      const[hasSig, setHasSig]           = useState(!!rapport.signature);

      const set = (k,v) => setRapport(p => ({...p, [k]:v}));

      // ── Init canvas signature ──────────────────────────────
      useEffect(()=>{
        if(!canvasRef.current) return;
        const ctx = canvasRef.current.getContext("2d");
        ctx.fillStyle = "#070D1A";
        ctx.fillRect(0,0,canvasRef.current.width,canvasRef.current.height);
        if(rapport.signature){
          const img = new Image();
          img.onload = () => ctx.drawImage(img,0,0);
          img.src = rapport.signature;
        }
      }, [canvasRef.current, editMode]);

      const getPos = (e,canvas) => {
        const r = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: (t.clientX - r.left)*(canvas.width/r.width),
                 y: (t.clientY - r.top)*(canvas.height/r.height) };
      };
      const startDraw = e => {
        if(!editMode) return;
        e.preventDefault();
        const c = canvasRef.current;
        const ctx = c.getContext("2d");
        const p = getPos(e,c);
        ctx.beginPath(); ctx.moveTo(p.x,p.y);
        setDrawing(true); setHasSig(true);
      };
      const draw = e => {
        if(!drawing||!editMode) return;
        e.preventDefault();
        const c = canvasRef.current;
        const ctx = c.getContext("2d");
        const p = getPos(e,c);
        ctx.lineTo(p.x,p.y);
        ctx.strokeStyle = "#3B82F6"; ctx.lineWidth = 2.5;
        ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.stroke();
      };
      const endDraw = () => setDrawing(false);
      const clearSig = () => {
        const c = canvasRef.current;
        if(!c) return;
        const ctx = c.getContext("2d");
        ctx.fillStyle = "#070D1A";
        ctx.fillRect(0,0,c.width,c.height);
        setHasSig(false);
        set("signature", null);
      };
      const saveSig = () => {
        if(!canvasRef.current) return;
        set("signature", canvasRef.current.toDataURL("image/png"));
      };

      // ── Upload photos chantier ─────────────────────────────
      const uploadChantierPhotos = async(files) => {
        setUploading(true);
        const urls = [];
        for(const file of Array.from(files)){
          const ext = file.name.split(".").pop();
          const path = `rapport-${ch.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
          const{data:up, error} = await sb.storage.from("chantier-photos").upload(path,file,{cacheControl:"3600",upsert:false});
          if(!error){
            const{data:pub} = sb.storage.from("chantier-photos").getPublicUrl(path);
            if(pub?.publicUrl) urls.push(pub.publicUrl);
          }
        }
        set("photos_chantier", [...(rapport.photos_chantier||[]), ...urls]);
        setUploading(false);
      };

      // ── Upload PV réception ────────────────────────────────
      const uploadPV = async(file) => {
        setUploadingPV(true);
        const ext = file.name.split(".").pop();
        const path = `pv-${ch.id}/${Date.now()}.${ext}`;
        const{data:up, error} = await sb.storage.from("chantier-photos").upload(path,file,{cacheControl:"3600",upsert:false});
        if(!error){
          const{data:pub} = sb.storage.from("chantier-photos").getPublicUrl(path);
          if(pub?.publicUrl) set("photo_pv", pub.publicUrl);
        }
        setUploadingPV(false);
      };

      const removeChantierPhoto = async(url) => {
        const path = url.split("/chantier-photos/")[1];
        if(path) await sb.storage.from("chantier-photos").remove([path]);
        set("photos_chantier", (rapport.photos_chantier||[]).filter(p=>p!==url));
      };

      const handleSave = (andFinish=false) => {
        const finalRapport = {...rapport};
        if(hasSig && canvasRef.current) finalRapport.signature = canvasRef.current.toDataURL("image/png");
        if(andFinish) onSaveAndFinish(finalRapport);
        else onSave(finalRapport);
      };

      const S = {background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,
        color:"#F0F6FF",padding:"10px 14px",fontSize:14,width:"100%",outline:"none",
        boxSizing:"border-box",fontFamily:'"Outfit",sans-serif'};
      const L = ({t}) => <label style={{display:"block",fontSize:10,fontWeight:700,
        color:"#4A6A9E",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.08em"}}>{t}</label>;

      const heuresDuree = () => {
        if(!rapport.heures_debut||!rapport.heures_fin) return null;
        const[h1,m1]=rapport.heures_debut.split(":").map(Number);
        const[h2,m2]=rapport.heures_fin.split(":").map(Number);
        const mins=(h2*60+m2)-(h1*60+m1);
        if(mins<=0) return null;
        return `${Math.floor(mins/60)}h${String(mins%60).padStart(2,"0")}`;
      };

      return(
        <>
          {/* Lightbox */}
          {lightbox&&<div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"#000000EE",zIndex:4000,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <img src={lightbox} style={{maxWidth:"95vw",maxHeight:"92vh",objectFit:"contain",borderRadius:8}}/>
            <button onClick={()=>setLightbox(null)} style={{position:"absolute",top:16,right:16,background:"#1B2D4F",border:"none",borderRadius:50,color:"#FFF",width:36,height:36,cursor:"pointer",fontSize:18,fontWeight:700}}>✕</button>
          </div>}

          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:999,
            display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",
            backdropFilter:"blur(6px)"}} onClick={onClose}>
            <div style={{
              background:"#0D1828",
              borderRadius:isMobile?"20px 20px 0 0":18,
              border:"1px solid #1B2D4F",
              width:isMobile?"100%":"680px", maxWidth:"98vw",
              maxHeight:isMobile?"96vh":"92vh",
              overflowY:"auto",
              boxShadow:"0 32px 80px rgba(0,0,0,0.7)"
            }} onClick={e=>e.stopPropagation()}>

              {/* Handle mobile */}
              {isMobile&&<div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"12px auto 0"}}/>}

              {/* Header */}
              <div style={{padding:"20px 24px 0",borderBottom:"1px solid #1B2D4F",paddingBottom:16,marginBottom:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontWeight:900,fontSize:18,color:"#F0F6FF",letterSpacing:"-0.3px",marginBottom:4}}>
                      📋 Rapport d'intervention
                    </div>
                    <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                      <span style={{fontSize:13,fontWeight:700,color:"#3B82F6"}}>🔧 {ch.client}</span>
                      {ch.technicien&&<span style={{fontSize:12,color:"#4A6A9E"}}>👤 {ch.technicien}</span>}
                      {ch.date_installation&&<span style={{fontSize:12,color:"#4A6A9E"}}>📅 {ch.date_installation}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    {ch.statut==="termine"&&ch.rapport&&(
                      <button onClick={()=>setEditMode(p=>!p)} style={{background:editMode?"rgba(245,158,11,0.1)":"rgba(59,130,246,0.08)",border:`1px solid ${editMode?"#F59E0B40":"#1B2D4F"}`,borderRadius:8,color:editMode?"#F59E0B":"#7B96C8",padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>
                        {editMode?"👁️ Lecture":"✏️ Modifier"}
                      </button>
                    )}
                    <button onClick={onClose} style={{background:"#1B2D4F",border:"none",borderRadius:8,color:"#7B96C8",width:32,height:32,cursor:"pointer",fontSize:16,fontWeight:700}}>✕</button>
                  </div>
                </div>
              </div>

              <div style={{padding:"20px 24px"}}>

                {/* ── MATÉRIEL INSTALLÉ (lecture) ── */}
                {(ch.materiels?.length>0||ch.cables?.length>0)&&(
                  <div style={{background:"#070D1A",borderRadius:12,padding:"12px 14px",marginBottom:20,border:"1px solid #1B2D4F"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#4A6A9E",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Matériel prévu</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {(ch.materiels||[]).map((m,i)=><span key={i} style={{background:"rgba(59,130,246,0.1)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:20,padding:"3px 10px",fontSize:11,color:"#60A5FA",fontWeight:600}}>{m.qty}× {m.article}</span>)}
                      {(ch.cables||[]).map((m,i)=><span key={i} style={{background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:20,padding:"3px 10px",fontSize:11,color:"#34D399",fontWeight:600}}>{m.qty}ml {m.article}</span>)}
                    </div>
                  </div>
                )}

                {/* ── HEURES ── */}
                <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr 1fr",gap:12,marginBottom:20}}>
                  <div>
                    <L t="Heure de début"/>
                    {editMode
                      ? <input type="time" value={rapport.heures_debut} onChange={e=>set("heures_debut",e.target.value)} style={S}/>
                      : <div style={{...S,opacity:0.7}}>{rapport.heures_debut||"—"}</div>}
                  </div>
                  <div>
                    <L t="Heure de fin"/>
                    {editMode
                      ? <input type="time" value={rapport.heures_fin} onChange={e=>set("heures_fin",e.target.value)} style={S}/>
                      : <div style={{...S,opacity:0.7}}>{rapport.heures_fin||"—"}</div>}
                  </div>
                  <div>
                    <L t="Durée totale"/>
                    <div style={{...S,color: heuresDuree()?"#10B981":"#2E4D82",fontWeight:800,fontSize:16,display:"flex",alignItems:"center"}}>
                      {heuresDuree()||"—"}
                    </div>
                  </div>
                </div>

                {/* ── OBSERVATIONS ── */}
                <div style={{marginBottom:20}}>
                  <L t="Observations / Compte rendu d'intervention"/>
                  {editMode
                    ? <textarea value={rapport.observations} onChange={e=>set("observations",e.target.value)}
                        placeholder="Décrivez le déroulement de l'intervention, difficultés rencontrées, état de l'installation…"
                        rows={5} style={{...S,resize:"vertical",lineHeight:1.6,minHeight:110}}/>
                    : <div style={{...S,opacity:0.8,whiteSpace:"pre-wrap",minHeight:80,lineHeight:1.6}}>
                        {rapport.observations||<span style={{color:"#2E4D82"}}>Aucune observation</span>}
                      </div>}
                </div>

                {/* ── MATÉRIEL SUPPLÉMENTAIRE ── */}
                <div style={{marginBottom:20}}>
                  <L t="Matériel supplémentaire posé (hors devis)"/>
                  {editMode
                    ? <textarea value={rapport.materiel_supp} onChange={e=>set("materiel_supp",e.target.value)}
                        placeholder="Ex: 2m de gaine supplémentaire, 1 disjoncteur 32A, raccord T45…"
                        rows={3} style={{...S,resize:"vertical",lineHeight:1.6}}/>
                    : <div style={{...S,opacity:0.8,whiteSpace:"pre-wrap",minHeight:60,lineHeight:1.6}}>
                        {rapport.materiel_supp
                          ? <><span style={{display:"inline-block",background:"rgba(245,158,11,0.12)",color:"#F59E0B",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700,marginBottom:6}}>⚠️ Matériel supplémentaire</span><br/>{rapport.materiel_supp}</>
                          : <span style={{color:"#2E4D82"}}>Aucun matériel supplémentaire</span>}
                      </div>}
                </div>

                {/* ── PHOTOS CHANTIER ── */}
                <div style={{marginBottom:20}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <L t={`Photos du chantier (${(rapport.photos_chantier||[]).length})`}/>
                    {editMode&&<label style={{background:"rgba(59,130,246,0.1)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:8,color:"#3B82F6",padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>
                      {uploading?"⏳ Envoi…":"📷 Ajouter"}
                      <input type="file" accept="image/*" multiple onChange={e=>uploadChantierPhotos(e.target.files)} style={{display:"none"}} disabled={uploading}/>
                    </label>}
                  </div>
                  {(rapport.photos_chantier||[]).length===0
                    ? <div style={{background:"#070D1A",borderRadius:10,border:"2px dashed #1B2D4F",padding:"24px",textAlign:"center",color:"#2E4D82",fontSize:12}}>
                        {editMode?"📷 Ajoutez les photos de l'installation":"Aucune photo"}
                      </div>
                    : <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                        {(rapport.photos_chantier||[]).map((url,i)=>(
                          <div key={i} style={{position:"relative",borderRadius:10,overflow:"hidden",aspectRatio:"1",border:"1px solid #1B2D4F"}}>
                            <img src={url} onClick={()=>setLightbox(url)} style={{width:"100%",height:"100%",objectFit:"cover",cursor:"zoom-in",display:"block"}}/>
                            {editMode&&<button onClick={()=>removeChantierPhoto(url)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.7)",border:"none",borderRadius:"50%",color:"#FFF",width:24,height:24,cursor:"pointer",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>}
                          </div>
                        ))}
                      </div>}
                </div>

                {/* ── PV DE RÉCEPTION ── */}
                <div style={{marginBottom:20}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <L t="Photo du PV de réception"/>
                    {editMode&&!rapport.photo_pv&&<label style={{background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:8,color:"#10B981",padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>
                      {uploadingPV?"⏳ Envoi…":"📄 Photo PV"}
                      <input type="file" accept="image/*" onChange={e=>uploadPV(e.target.files[0])} style={{display:"none"}} disabled={uploadingPV}/>
                    </label>}
                  </div>
                  {rapport.photo_pv
                    ? <div style={{position:"relative",display:"inline-block"}}>
                        <img src={rapport.photo_pv} onClick={()=>setLightbox(rapport.photo_pv)} style={{width:"100%",maxWidth:340,borderRadius:12,border:"2px solid #10B98140",cursor:"zoom-in",display:"block"}}/>
                        {editMode&&<button onClick={()=>set("photo_pv",null)} style={{position:"absolute",top:8,right:8,background:"rgba(239,68,68,0.8)",border:"none",borderRadius:"50%",color:"#FFF",width:28,height:28,cursor:"pointer",fontSize:14,fontWeight:700}}>✕</button>}
                        <div style={{marginTop:6,fontSize:11,color:"#10B981",fontWeight:700}}>✅ PV de réception joint</div>
                      </div>
                    : <div style={{background:"#070D1A",borderRadius:10,border:"2px dashed #1B2D4F",padding:"24px",textAlign:"center",color:"#2E4D82",fontSize:12}}>
                        {editMode?"📄 Photographiez et importez le PV signé par le client":"Aucun PV joint"}
                      </div>}
                </div>

                {/* ── SIGNATURE CLIENT ── */}
                <div style={{marginBottom:24}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <L t="Signature du client"/>
                    {editMode&&hasSig&&<button onClick={clearSig} style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,color:"#EF4444",padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>🗑️ Effacer</button>}
                  </div>
                  {editMode
                    ? <div style={{border:"2px solid #1B2D4F",borderRadius:12,overflow:"hidden",background:"#070D1A",touchAction:"none"}}>
                        <canvas ref={canvasRef} width={600} height={180}
                          style={{width:"100%",height:180,display:"block",cursor:"crosshair",touchAction:"none"}}
                          onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
                          onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}/>
                        <div style={{padding:"6px 12px",fontSize:10,color:"#2E4D82",borderTop:"1px solid #1B2D4F"}}>
                          {hasSig?"✍️ Signature enregistrée":"Signez ici avec votre doigt ou la souris"}
                        </div>
                      </div>
                    : rapport.signature
                      ? <div style={{border:"2px solid #1B2D4F",borderRadius:12,overflow:"hidden",background:"#070D1A"}}>
                          <img src={rapport.signature} style={{width:"100%",maxHeight:180,objectFit:"contain",display:"block"}}/>
                          <div style={{padding:"6px 12px",fontSize:10,color:"#10B981",fontWeight:700,borderTop:"1px solid #1B2D4F"}}>✅ Signature client</div>
                        </div>
                      : <div style={{background:"#070D1A",borderRadius:10,border:"2px dashed #1B2D4F",padding:"24px",textAlign:"center",color:"#2E4D82",fontSize:12}}>
                          Aucune signature
                        </div>}
                </div>

                {/* ── INFOS RAPPORT ── */}
                {editMode&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
                  <div><L t="Date du rapport"/>
                    <input value={rapport.rapport_date} onChange={e=>set("rapport_date",e.target.value)} style={S}/>
                  </div>
                  <div><L t="Rédigé par"/>
                    <input value={rapport.rapport_par} onChange={e=>set("rapport_par",e.target.value)} style={S}/>
                  </div>
                </div>}

                {/* ── ACTIONS ── */}
                {editMode&&<div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  <button onClick={onClose} style={{flex:1,background:"#1B2D4F",border:"none",borderRadius:10,color:"#7B96C8",padding:"12px",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:'"Outfit",sans-serif',minWidth:100}}>
                    Annuler
                  </button>
                  {ch.statut!=="termine"&&<button onClick={()=>handleSave(false)} style={{flex:1,background:"#112038",border:"1px solid #1B2D4F",borderRadius:10,color:"#7B96C8",padding:"12px",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:'"Outfit",sans-serif',minWidth:100}}>
                    💾 Sauvegarder
                  </button>}
                  {ch.statut==="termine"
                    ? <button onClick={()=>handleSave(false)} style={{flex:2,background:"linear-gradient(135deg,#3B82F6,#1D4ED8)",border:"none",borderRadius:10,color:"#FFF",padding:"12px",cursor:"pointer",fontWeight:700,fontSize:14,fontFamily:'"Outfit",sans-serif',boxShadow:"0 4px 16px rgba(59,130,246,0.3)",minWidth:160}}>
                        💾 Enregistrer les modifications
                      </button>
                    : <button onClick={()=>handleSave(true)} style={{flex:2,background:"linear-gradient(135deg,#10B981,#059669)",border:"none",borderRadius:10,color:"#FFF",padding:"12px",cursor:"pointer",fontWeight:700,fontSize:14,fontFamily:'"Outfit",sans-serif',boxShadow:"0 4px 16px rgba(16,185,129,0.3)",minWidth:160}}>
                        ✅ Valider & Terminer le chantier
                      </button>}
                </div>}

              </div>
            </div>
          </div>
        </>
      );
    }

    function ChantierTab({isMobile, chantiers, setChantiers, stock, hist, profile, fmt, role, goTo, BTN, INP, BDG}) {
      const canEdit = r => ["administrateur","installateur"].includes(r);

      const STATUTS_CH = {
        a_planifier: {label:"À planifier", color:"#F59E0B", bg:"#2D2008", icon:"📋", next:"planifie"},
        planifie:    {label:"Planifié",    color:"#3B82F6", bg:"#0F1F3D", icon:"📅", next:"en_cours"},
        en_cours:    {label:"En cours",    color:"#A855F7", bg:"#1E0A2D", icon:"🔧", next:"termine"},
        termine:     {label:"Terminé",     color:"#10B981", bg:"#0A2218", icon:"✅", next:null},
      };
      const CHECKLIST_ITEMS=[
        {key:"client_contacte",label:"Client contacté"},
        {key:"materiel_prepare",label:"Matériel préparé"},
        {key:"acces_confirme",label:"Accès confirmé"},
      ];

      const[tabView,setTabView]=useState("pipeline");
      const[editModal,setEditModal]=useState(null);
      const[delConf,setDelConf]=useState(null);
      const[newForm,setNewForm]=useState(null);
      const[mItem,setMItem]=useState({id:"",qty:""});
      const[cItem,setCItem]=useState({id:"",qty:""});
      const[calMonth,setCalMonth]=useState(new Date().getMonth());
      const[calYear,setCalYear]=useState(new Date().getFullYear());
      const[photosModal,setPhotosModal]=useState(null); // chantier en cours de visualisation
      const[rapportModal,setRapportModal]=useState(null); // {ch, rapport}
      const[lightbox,setLightbox]=useState(null);       // URL photo plein écran
      const[uploading,setUploading]=useState(false);

      const uploadPhotos=async(ch,files)=>{
        if(!files||files.length===0)return;
        setUploading(true);
        const urls=[];
        for(const file of Array.from(files)){
          const ext=file.name.split(".").pop();
          const path=`chantier-${ch.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
          const{data,error}=await sb.storage.from("chantier-photos").upload(path,file,{cacheControl:"3600",upsert:false});
          if(!error){
            const{data:pub}=sb.storage.from("chantier-photos").getPublicUrl(path);
            if(pub?.publicUrl)urls.push(pub.publicUrl);
          }
        }
        if(urls.length>0){
          const updated=chantiers.map(c2=>c2.id===ch.id?{...c2,photos:[...(c2.photos||[]),...urls]}:c2);
          setChantiers(updated);
          if(photosModal?.id===ch.id)setPhotosModal(prev=>({...prev,photos:[...(prev.photos||[]),...urls]}));
        }
        setUploading(false);
      };

      const deletePhoto=async(ch,url)=>{
        // Extract path from URL
        const path=url.split("/chantier-photos/")[1];
        if(path)await sb.storage.from("chantier-photos").remove([path]);
        const updated=chantiers.map(c2=>c2.id===ch.id?{...c2,photos:(c2.photos||[]).filter(p=>p!==url)}:c2);
        setChantiers(updated);
        if(photosModal?.id===ch.id)setPhotosModal(prev=>({...prev,photos:(prev.photos||[]).filter(p=>p!==url)}));
      };

      const L=({c})=><label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,letterSpacing:"0.08em",textTransform:"uppercase"}}>{c}</label>;
      const OVL={position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"};
      const MBX=isMobile?{background:"#0D1828",borderRadius:"20px 20px 0 0",padding:"8px 16px 32px",width:"100%",border:"1px solid #1B2D4F",maxHeight:"94vh",overflowY:"auto"}:{background:"#0D1828",borderRadius:16,padding:24,width:560,maxWidth:"96vw",border:"1px solid #1B2D4F",maxHeight:"92vh",overflowY:"auto"};
      const Handle=()=>isMobile?<div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"8px auto 16px"}}/>:null;
      const CABLES=stock.filter(s=>s.unite==="ml");
      const BORNES=stock.filter(s=>s.unite!=="ml");
      const emptyNew={client:"",notes:"",date_installation:"",technicien:"",materiels:[],cables:[]};

      const reservations=useMemo(()=>{
        const r={};
        chantiers.filter(ch=>ch.statut!=="termine").forEach(ch=>{
          (ch.materiels||[]).forEach(m=>{const sid=Number(m.id);r[sid]=(r[sid]||0)+Number(m.qty||0);});
          (ch.cables||[]).forEach(m=>{const sid=Number(m.id);r[sid]=(r[sid]||0)+Number(m.qty||0);});
        });
        return r;
      },[chantiers]);

      const stockDispo=id=>Math.max(0,(stock.find(s=>s.id===id)?.stock||0)-(reservations[id]||0));
      const updateChantier=(id,patch)=>setChantiers(p=>p.map(ch=>ch.id===id?{...ch,...patch}:ch));

      const nextStatut=ch=>{
        const n=STATUTS_CH[ch.statut]?.next;
        if(!n)return;
        if(n==="termine"){
          const ns=stock.map(s=>{
            const u=(ch.materiels||[]).find(m=>Number(m.id)===s.id);
            const uc=(ch.cables||[]).find(m=>Number(m.id)===s.id);
            const q=(u?Number(u.qty):0)+(uc?Number(uc.qty):0);
            return q>0?{...s,stock:Math.max(0,s.stock-q)}:s;
          });
          const d=new Date().toLocaleDateString("fr-FR");
          const newHist=[
            ...(ch.materiels||[]).map(m=>({date:d,chantier:ch.client,article:m.article,cat:m.cat,unite:m.unite||"pce",qty:m.qty,par:ch.technicien||profile?.nom||""})),
            ...(ch.cables||[]).map(m=>({date:d,chantier:ch.client,article:m.article,cat:"Câble",unite:"ml",qty:m.qty,par:ch.technicien||profile?.nom||""})),
          ];
          const updated=chantiers.map(c2=>c2.id===ch.id?{...c2,statut:"termine",date_fin:d}:c2);
          setChantiers(updated);
          if(window._appState)window._appState.finishChantier(ns,newHist,updated);
        }else{
          updateChantier(ch.id,{statut:n});
        }
      };

      const addMat=(form,setForm)=>{
        if(!mItem.id||!mItem.qty)return;
        const a=stock.find(s=>s.id===Number(mItem.id));
        setForm(p=>({...p,materiels:[...p.materiels.filter(x=>x.id!==mItem.id),{id:mItem.id,article:a?.article,cat:a?.cat,unite:a?.unite||"pce",qty:Number(mItem.qty)}]}));
        setMItem({id:"",qty:""});
      };
      const addCab=(form,setForm)=>{
        if(!cItem.id||!cItem.qty)return;
        const a=stock.find(s=>s.id===Number(cItem.id));
        setForm(p=>({...p,cables:[...p.cables.filter(x=>x.id!==cItem.id),{id:cItem.id,article:a?.article,unite:"ml",qty:Number(cItem.qty)}]}));
        setCItem({id:"",qty:""});
      };

      const daysInMonth=(m,y)=>new Date(y,m+1,0).getDate();
      const firstDay=(m,y)=>(new Date(y,m,1).getDay()+6)%7;
      const chantiersInMonth=chantiers.filter(ch=>{
        if(!ch.date_installation)return false;
        const p=ch.date_installation.split("/");
        return p.length===3&&Number(p[1])-1===calMonth&&Number(p[2])===calYear;
      });
      const pipeline=s=>chantiers.filter(ch=>ch.statut===s);
      const statOrder=["a_planifier","planifie","en_cours"];
      const insufficientChantiers=chantiers.filter(ch=>ch.statut!=="termine"&&(ch.materiels||[]).some(m=>stockDispo(Number(m.id))<Number(m.qty)));

      return(
        <div>
          {editModal&&<div style={OVL} onClick={()=>setEditModal(null)}><div style={MBX} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <h3 style={{margin:"0 0 16px",fontWeight:800,fontSize:17}}>✏️ Modifier le chantier</h3>
            <div style={{marginBottom:12}}><L c="CLIENT"/><input value={editModal.client} onChange={e=>setEditModal(p=>({...p,client:e.target.value}))} style={INP()}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div><L c="DATE D'INSTALLATION"/><input value={editModal.date_installation||""} onChange={e=>setEditModal(p=>({...p,date_installation:e.target.value}))} placeholder="JJ/MM/AAAA" style={INP()}/></div>
              <div><L c="TECHNICIEN"/><input value={editModal.technicien||""} onChange={e=>setEditModal(p=>({...p,technicien:e.target.value}))} placeholder="Nom technicien" style={INP()}/></div>
            </div>
            <div style={{marginBottom:10}}>
              <L c="MATÉRIEL"/>
              <div style={{display:"flex",gap:6,marginBottom:6}}>
                <select value={mItem.id} onChange={e=>setMItem(p=>({...p,id:e.target.value}))} style={{...INP(),flex:2}}><option value="">Choisir…</option>{BORNES.map(s=><option key={s.id} value={s.id}>{s.cat} — {s.article}</option>)}</select>
                <input type="number" min="1" value={mItem.qty} onChange={e=>setMItem(p=>({...p,qty:e.target.value}))} placeholder="Qté" style={{...INP(),width:62,textAlign:"center"}}/>
                <button onClick={()=>addMat(editModal,setEditModal)} style={BTN("#3B82F6",{padding:"10px 14px",fontSize:16})}>+</button>
              </div>
              {(editModal.materiels||[]).map(m=>{const ins=stockDispo(Number(m.id))<Number(m.qty);return<div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#070D1A",borderRadius:8,padding:"7px 10px",marginBottom:4}}><span style={{fontSize:12,color:ins?"#EF4444":"#E8F0FF"}}>{m.article}</span><div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:12,fontWeight:700,color:ins?"#EF4444":"#10B981"}}>{m.qty}×</span>{ins&&<span style={{fontSize:10,color:"#EF4444"}}>⚠️{stockDispo(Number(m.id))}</span>}<button onClick={()=>setEditModal(p=>({...p,materiels:p.materiels.filter(x=>x.id!==m.id)}))} style={{background:"#EF444420",border:"none",borderRadius:5,color:"#EF4444",cursor:"pointer",padding:"2px 8px",fontSize:12}}>✕</button></div></div>;})}
            </div>
            <div style={{marginBottom:10}}>
              <L c="CÂBLES (ML)"/>
              <div style={{display:"flex",gap:6,marginBottom:6}}>
                <select value={cItem.id} onChange={e=>setCItem(p=>({...p,id:e.target.value}))} style={{...INP(),flex:2}}><option value="">Choisir…</option>{CABLES.map(s=><option key={s.id} value={s.id}>{s.article}</option>)}</select>
                <input type="number" min="1" value={cItem.qty} onChange={e=>setCItem(p=>({...p,qty:e.target.value}))} placeholder="ml" style={{...INP(),width:62,textAlign:"center"}}/>
                <button onClick={()=>addCab(editModal,setEditModal)} style={BTN("#3B82F6",{padding:"10px 14px",fontSize:16})}>+</button>
              </div>
              {(editModal.cables||[]).map(m=><div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#070D1A",borderRadius:8,padding:"7px 10px",marginBottom:4}}><span style={{fontSize:12}}>{m.article}</span><div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:12,color:"#10B981",fontWeight:700}}>{m.qty}ml</span><button onClick={()=>setEditModal(p=>({...p,cables:p.cables.filter(x=>x.id!==m.id)}))} style={{background:"#EF444420",border:"none",borderRadius:5,color:"#EF4444",cursor:"pointer",padding:"2px 8px",fontSize:12}}>✕</button></div></div>)}
            </div>
            <div style={{background:"#070D1A",borderRadius:10,padding:"12px 14px",marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#4A6A9E",marginBottom:8,textTransform:"uppercase"}}>Checklist</div>
              {CHECKLIST_ITEMS.map(item=>(
                <div key={item.key} onClick={()=>setEditModal(p=>({...p,checklist:{...p.checklist,[item.key]:!p.checklist?.[item.key]}}))} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",cursor:"pointer",borderBottom:"1px solid #0D1828"}}>
                  <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${editModal.checklist?.[item.key]?"#10B981":"#1B2D4F"}`,background:editModal.checklist?.[item.key]?"#10B981":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{editModal.checklist?.[item.key]&&<span style={{fontSize:10,color:"#FFF",fontWeight:800}}>✓</span>}</div>
                  <span style={{fontSize:13,color:editModal.checklist?.[item.key]?"#10B981":"#7B96C8"}}>{item.label}</span>
                </div>
              ))}
            </div>
            <div style={{marginBottom:14}}><L c="NOTES"/><textarea value={editModal.notes||""} onChange={e=>setEditModal(p=>({...p,notes:e.target.value}))} style={{...INP(),height:70,resize:"none"}}/></div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setEditModal(null)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={()=>{updateChantier(editModal.id,editModal);setEditModal(null);}} style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{flex:2,padding:"12px"})}>💾 Enregistrer</button>
            </div>
          </div></div>}

          {delConf&&<div style={OVL} onClick={()=>setDelConf(null)}><div style={{...MBX,maxWidth:360,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <div style={{fontSize:44,marginBottom:10}}>🗑️</div>
            <h3 style={{margin:"0 0 8px",fontWeight:800}}>Supprimer ce chantier ?</h3>
            <p style={{color:"#4A6A9E",fontSize:13,margin:"0 0 20px"}}><strong style={{color:"#E8F0FF"}}>{delConf.client}</strong></p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setDelConf(null)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={()=>{setChantiers(p=>p.filter(ch=>ch.id!==delConf.id));setDelConf(null);}} style={BTN("#EF4444",{flex:1})}>Supprimer</button>
            </div>
          </div></div>}

          {/* LIGHTBOX PLEIN ÉCRAN */}
          {lightbox&&<div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"#000000EE",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}}>
            <img src={lightbox} style={{maxWidth:"95vw",maxHeight:"92vh",borderRadius:12,objectFit:"contain",boxShadow:"0 0 60px #000"}} onClick={e=>e.stopPropagation()}/>
            <button onClick={()=>setLightbox(null)} style={{position:"fixed",top:16,right:20,background:"#0D1828",border:"1px solid #1B2D4F",borderRadius:8,color:"#E8F0FF",padding:"8px 14px",cursor:"pointer",fontSize:16,fontWeight:700,zIndex:2001}}>✕</button>
          </div>}

          {/* MODAL PHOTOS */}
          {rapportModal&&<RapportModal
            isMobile={isMobile}
            data={rapportModal}
            onClose={()=>setRapportModal(null)}
            onSave={(rapport)=>{
              const ch=rapportModal.ch;
              const updated=chantiers.map(c2=>c2.id===ch.id?{...c2,rapport}:c2);
              setChantiers(updated);
              if(window._appState)window._appState.getChantiers&&setChantiers(updated);
              setRapportModal(null);
            }}
            onSaveAndFinish={(rapport)=>{
              const ch=rapportModal.ch;
              // Déduire stock
              const ns=stock.map(s=>{
                const u=(ch.materiels||[]).find(m=>Number(m.id)===s.id);
                const uc=(ch.cables||[]).find(m=>Number(m.id)===s.id);
                const q=(u?Number(u.qty):0)+(uc?Number(uc.qty):0);
                return q>0?{...s,stock:Math.max(0,s.stock-q)}:s;
              });
              const d=new Date().toLocaleDateString("fr-FR");
              const newHist=[
                ...(ch.materiels||[]).map(m=>({date:d,chantier:ch.client,article:m.article,cat:m.cat,unite:m.unite||"pce",qty:m.qty,par:ch.technicien||profile?.nom||""})),
                ...(ch.cables||[]).map(m=>({date:d,chantier:ch.client,article:m.article,cat:"Câble",unite:"ml",qty:m.qty,par:ch.technicien||profile?.nom||""})),
              ];
              const updated=chantiers.map(c2=>c2.id===ch.id?{...c2,statut:"termine",date_fin:d,rapport}:c2);
              setChantiers(updated);
              if(window._appState)window._appState.finishChantier(ns,newHist,updated);
              setRapportModal(null);
            }}
            uploadPhotos={uploadPhotos}
            sb={sb}
          />}
                    {photosModal&&<div style={{position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"}} onClick={()=>setPhotosModal(null)}><div style={{...MBX,width:isMobile?"100%":620}} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div>
                <h3 style={{margin:0,fontWeight:800,fontSize:17}}>📸 Photos — {photosModal.client}</h3>
                <p style={{margin:"3px 0 0",fontSize:11,color:"#4A6A9E"}}>{(photosModal.photos||[]).length} photo(s)</p>
              </div>
              <label style={{background:"linear-gradient(135deg,#3B82F6,#1D4ED8)",borderRadius:10,color:"#FFF",padding:"9px 14px",cursor:"pointer",fontWeight:700,fontSize:12,border:"none",display:"flex",alignItems:"center",gap:6}}>
                {uploading?"⏳ Envoi…":"📷 Ajouter des photos"}
                <input type="file" accept="image/*" multiple onChange={e=>uploadPhotos(photosModal,e.target.files)} style={{display:"none"}} disabled={uploading}/>
              </label>
            </div>

            {(photosModal.photos||[]).length===0
              ?<div style={{textAlign:"center",padding:"40px 0",color:"#2E4D82"}}>
                <div style={{fontSize:48,marginBottom:10}}>📷</div>
                <div style={{fontWeight:700,marginBottom:6}}>Aucune photo</div>
                <div style={{fontSize:12}}>Ajoutez des photos de fin de chantier</div>
              </div>
              :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8}}>
                {(photosModal.photos||[]).map((url,i)=>(
                  <div key={i} style={{position:"relative",borderRadius:10,overflow:"hidden",aspectRatio:"1",background:"#070D1A"}}>
                    <img src={url} onClick={()=>setLightbox(url)} style={{width:"100%",height:"100%",objectFit:"cover",cursor:"zoom-in",display:"block"}}/>
                    <button onClick={()=>deletePhoto(photosModal,url)} style={{position:"absolute",top:5,right:5,background:"#EF4444CC",border:"none",borderRadius:6,color:"#FFF",width:24,height:24,cursor:"pointer",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>✕</button>
                  </div>
                ))}
              </div>
            }

    // APPLICATION PRINCIPALE
    // ══════════════════════════════════════
    function App(){
      const isMobile=useIsMobile();
      // Auth
      const[authUser,setAuthUser]=useState(null);
      const[profile,setProfile]=useState(null);
      const[authLoading,setAuthLoading]=useState(true);
      // Data
      const[stock,setStock]=useState(INIT);
      const[orders,setOrders]=useState([]);
      const[hist,setHist]=useState([]);
      const[chantiersPipeline,setChantiersPipeline]=useState([]);
      const[acomptes,setAcomptes]=useState([]);
      const[savTickets,setSavTickets]=useState([]);
      const[objectifs,setObjectifs]=useState({});
      const[rapports,setRapports]=useState([]);
      const[sync,setSync]=useState("loading");
      const[ventes,setVentes]=useState([]);
      // UI
      const[view,setView]=useState(()=>{try{return localStorage.getItem("app_view")||"accueil";}catch(e){return "accueil";}});
      const goTo=v=>{try{localStorage.setItem("app_view",v);}catch(e){}setView(v);};
      const[fCat,setFCat]=useState("Toutes");
      const[cNom,setCNom]=useState("");
      const[cItems,setCItems]=useState([]);
      const[aItem,setAItem]=useState({id:"",qty:""});
      const[oModal,setOModal]=useState(null);
      const[oForm,setOForm]=useState({qty:"",desc:""});
      const[eComp,setEComp]=useState(null);
      const[cForm,setCForm]=useState(EC);
      const[eSId,setESId]=useState(null);
      const[eSVal,setESVal]=useState("");
      const[pSearch,setPSearch]=useState("");
      const[pCat,setPCat]=useState("Toutes");
      const[delConf,setDelConf]=useState(null);
      const[oDelConf,setODelConf]=useState(null);
      const[oEditModal,setOEditModal]=useState(null);
      const[oEditForm,setOEditForm]=useState({qty:"",desc:""});
      const timer=useRef(null);
      const firstLoad=useRef(true);

      // ── Auth ──
      useEffect(()=>{
        sb.auth.getSession().then(({data:{session}})=>{
          if(session){setAuthUser(session.user);loadProfile(session.user.id);}
          else setAuthLoading(false);
        });
        const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
          if(session){setAuthUser(session.user);loadProfile(session.user.id);}
          else{setAuthUser(null);setProfile(null);setAuthLoading(false);}
        });
        return()=>subscription.unsubscribe();
      },[]);

      const loadProfile=async(uid)=>{
        const{data}=await sb.from("profiles").select("*").eq("id",uid).single();
        if(data){
          setProfile(data);
          if(!data.actif){await sb.auth.signOut();return;}
          const tabs=ROLE_TABS[data.role]||["accueil"];
          const savedView=localStorage.getItem("app_view");
          const targetView=savedView&&tabs.includes(savedView)?savedView:tabs[0];
          try{localStorage.setItem("app_view",targetView);}catch(e){}
          setView(targetView);
        }
        setAuthLoading(false);
      };

      const logout=()=>sb.auth.signOut();

      // ── Data sync ──
      useEffect(()=>{
        if(!authUser)return;
        async function load(){
          setSyncState("loading");
          try{
            const{data,error}=await sb.from("app_data").select("*").eq("id","main").single();
            if(error)throw error;
            if(data){
              if(data.stock&&data.stock.length>0)setStock(data.stock);
              if(data.orders)setOrders(data.orders);

          </div><div style={{color:"#4A6A9E",fontSize:14}}>Chargement…</div></div>;
      if(!authUser) return <LoginScreen/>;
      if(!profile) return <div style={{background:"#070D1A",height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:20,textAlign:"center"}}><div style={{fontSize:48}}>⚠️</div><h2 style={{fontWeight:800}}>Accès non configuré</h2><p style={{color:"#4A6A9E",maxWidth:360}}>Votre compte n'a pas encore de profil. Contactez votre administrateur.</p><button onClick={logout} style={BTN("#1B2D4F",{marginTop:8})}>Se déconnecter</button></div>;

      // ── Article card mobile ──
      const ArtCard=({item})=>{
        const hasO=aOIds.has(item.id);
        const st=gS(item.stock,item.seuil,item.rupture,hasO);
        const s=SC[st];
        const aCmd=item.seuil>0&&item.stock<item.seuil?item.seuil-item.stock:0;
        return(
          <div style={{background:item.rupture?"#1A0A2A":hasO&&aCmd>0?"#0A1628":"#0D1828",borderRadius:14,border:`1px solid ${item.rupture?"#A855F740":st==="alert"&&!hasO?"#EF444440":hasO&&aCmd>0?"#1D4ED860":"#1B2D4F"}`,padding:"14px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div style={{flex:1,paddingRight:8}}>
                <span style={BDG(item.cat)}>{item.cat}</span>
                <div style={{fontWeight:800,fontSize:16,color:"#F0F6FF",marginTop:5}}>{item.article}</div>
                {hasO&&<div style={{fontSize:11,color:"#3B82F6",fontWeight:600,marginTop:3}}>🚚 {aOByA[item.id]?.reduce((x,o)=>x+o.qty,0)} {item.unite} en transit</div>}
              </div>
              <span style={{background:s.bg,color:s.color,padding:"4px 9px",borderRadius:8,fontSize:10,fontWeight:700,flexShrink:0}}>{s.icon} {s.label}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
              {[["STOCK",`${item.stock}`,st==="alert"&&!hasO?"#EF4444":st==="warn"?"#F59E0B":"#E8F0FF"],["SEUIL",`${item.seuil}`,"#7B96C8"],["PRIX",fmt(item.prix),"#10B981"],["À CMD",aCmd>0?"+"+aCmd:"—",aCmd>0?(hasO?"#3B82F6":"#EF4444"):"#2E4D82"]].map(([l,v,c])=>(
                <div key={l} style={{background:"#070D1A",borderRadius:8,padding:"8px 4px",textAlign:"center"}}>
                  <div style={{fontSize:13,fontWeight:800,color:c,lineHeight:1}}>{v}</div>
                  <div style={{fontSize:9,color:"#4A6A9E",fontWeight:600,marginTop:3}}>{l}</div>
                </div>
              ))}
            </div>
            {eSId===item.id&&(
              <div style={{display:"flex",gap:6,marginBottom:8}}>
                <input type="number" value={eSVal} onChange={e=>setESVal(e.target.value)} style={INP({flex:1})} autoFocus/>
                <button onClick={()=>{upd(item.id,"stock",Math.max(0,Number(eSVal)));setESId(null);}} style={BTN("#10B981",{padding:"11px 18px"})}>✓</button>
                <button onClick={()=>setESId(null)} style={BTN("#1B2D4F",{padding:"11px 14px"})}>✕</button>
              </div>
            )}
            <div style={{display:"flex",gap:6}}>
              {canRupture(role)&&<button onClick={()=>upd(item.id,"rupture",!item.rupture)} style={{flex:1,background:item.rupture?"#A855F720":"#0D1828",border:`1px solid ${item.rupture?"#A855F7":"#1B2D4F"}`,borderRadius:10,color:item.rupture?"#A855F7":"#4A6A9E",padding:"10px 4px",cursor:"pointer",fontSize:11,fontWeight:700}}>{item.rupture?"⛔":"Rupture"}</button>}

          </div>

      };

            <div style={{background:"#070D1A",borderRadius:10,padding:"11px 14px",marginBottom:14}}>
              <span style={BDG(oEditModal.cat)}>{oEditModal.cat}</span>
              <div style={{fontWeight:800,fontSize:15,marginTop:4}}>{oEditModal.article}</div>
              <div style={{fontSize:12,color:"#4A6A9E",marginTop:3}}>Prix unit. : <strong style={{color:"#3B82F6"}}>{fmt(oEditModal.prix_unit)}</strong> / {oEditModal.unite}</div>
            </div>
            <L c="QUANTITÉ"/>
            <input type="number" min="1" value={oEditForm.qty} onChange={e=>setOEditForm(p=>({...p,qty:e.target.value}))} style={{...INP(),marginBottom:8}}/>
            {Number(oEditForm.qty)>0&&<div style={{background:"#10B98118",border:"1px solid #10B98140",borderRadius:10,padding:"10px 14px",marginBottom:12,fontWeight:700,color:"#10B981",fontSize:15}}>💶 Nouveau total : {fmt(Number(oEditForm.qty)*oEditModal.prix_unit)}</div>}
            <L c="NOTE"/>
            <textarea value={oEditForm.desc} onChange={e=>setOEditForm(p=>({...p,desc:e.target.value}))} style={{...INP(),height:70,resize:"none",lineHeight:1.6}}/>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={()=>setOEditModal(null)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={saveOEdit} style={BTN("#3B82F6",{flex:2,padding:"13px"})}>💾 Enregistrer</button>
            </div>
          </div></div>}

          {/* MODAL SUPPRESSION COMMANDE */}

            <h3 style={{margin:"0 0 8px",fontWeight:800,fontSize:17}}>Supprimer cette commande ?</h3>
            <p style={{color:"#4A6A9E",fontSize:13,margin:"0 0 6px"}}><strong style={{color:"#E8F0FF"}}>{oDelConf.article}</strong></p>
            <p style={{color:"#4A6A9E",fontSize:12,margin:"0 0 20px"}}>{oDelConf.qty} {oDelConf.unite} · {fmt(oDelConf.total)}</p>
            {oDelConf.statut==="livré"&&<div style={{background:"#F59E0B18",border:"1px solid #F59E0B40",borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:11,color:"#F59E0B"}}>⚠️ Cette commande est déjà livrée. Le stock ne sera pas recalculé.</div>}

              <button onClick={()=>setODelConf(null)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={()=>deleteOrder(oDelConf.id)} style={BTN("#EF4444",{flex:1})}>Supprimer</button>
            </div>
          </div></div>}
