      const[problemModal,setProblemModal]=useState(null); // {ch} — modal ajout problème admin // {ch, dateStr, mode:"planifier"|"redate"}

      const uploadPhotos=async(ch,files)=>{
        if(!files||files.length===0)return;
        setUploading(true);
        const urls=[];
        for(const file of Array.from(files)){
          const ext=file.name.split(".").pop();
          const path=`chantier-${ch.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
          const{data,error}=await sb.storage.from("chantier-photos").upload(path,file,{cacheControl:"3600",upsert:false});
          if(!error){
            const{data:pub}=sb.storage.from("chantier-photos").getPublicUrl(path);
            if(pub?.publicUrl)urls.push(pub.publicUrl);
          }
        }
        if(urls.length>0){
          const updated=chantiers.map(c2=>c2.id===ch.id?{...c2,photos:[...(c2.photos||[]),...urls]}:c2);
          setChantiers(updated);
          if(photosModal?.id===ch.id)setPhotosModal(prev=>({...prev,photos:[...(prev.photos||[]),...urls]}));
        }
        setUploading(false);
      };

      const deletePhoto=async(ch,url)=>{
        // Extract path from URL
        const path=url.split("/chantier-photos/")[1];
        if(path)await sb.storage.from("chantier-photos").remove([path]);
        const updated=chantiers.map(c2=>c2.id===ch.id?{...c2,photos:(c2.photos||[]).filter(p=>p!==url)}:c2);
        setChantiers(updated);
        if(photosModal?.id===ch.id)setPhotosModal(prev=>({...prev,photos:(prev.photos||[]).filter(p=>p!==url)}));
      };

      const L=({c})=><label style={{fontSize:10,fontWeight:700,color:"#4A6A9E",display:"block",marginBottom:6,letterSpacing:"0.08em",textTransform:"uppercase"}}>{c}</label>;
      const OVL={position:"fixed",inset:0,background:"#000000BB",zIndex:999,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"};
      const MBX=isMobile?{background:"#0D1828",borderRadius:"20px 20px 0 0",padding:"8px 16px 32px",width:"100%",border:"1px solid #1B2D4F",maxHeight:"94vh",overflowY:"auto"}:{background:"#0D1828",borderRadius:16,padding:24,width:560,maxWidth:"96vw",border:"1px solid #1B2D4F",maxHeight:"92vh",overflowY:"auto"};
      const Handle=()=>isMobile?<div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"8px auto 16px"}}/>:null;
      const CABLES=stock.filter(s=>s.unite==="ml");
      const BORNES=stock.filter(s=>s.unite!=="ml");
      const emptyNew={client:"",notes:"",date_installation:"",technicien:installerName||"",materiels:[],cables:[]};

      // Liste des installateurs actifs depuis les profils
      const installers=React.useMemo(()=>{
        const fromProfiles=(allProfiles||[]).filter(p=>p.role==="installateur"||p.role==="administrateur").map(p=>p.nom).filter(Boolean);
        // Compléter avec les techniciens déjà utilisés dans les chantiers (rétrocompatibilité)
        const fromChantiers=[...new Set(chantiers.map(c=>c.technicien).filter(Boolean))];
        return [...new Set([...fromProfiles,...fromChantiers])].sort();
      },[allProfiles,chantiers]);

      // Composant select technicien réutilisable
      const TechSelect=({value,onChange,style})=>(
        <select value={value||""} onChange={e=>onChange(e.target.value)} style={{...INP(),appearance:"none",...style}}>
          <option value="">— Choisir un installateur —</option>
          {installers.map(n=><option key={n} value={n}>{n}</option>)}
        </select>
      );

      const reservations=useMemo(()=>{
        const r={};
        chantiers.filter(ch=>ch.statut!=="termine").forEach(ch=>{
          (ch.materiels||[]).forEach(m=>{const sid=Number(m.id);r[sid]=(r[sid]||0)+Number(m.qty||0);});
          (ch.cables||[]).forEach(m=>{const sid=Number(m.id);r[sid]=(r[sid]||0)+Number(m.qty||0);});
        });
        return r;
      },[chantiers]);

      const stockDispo=id=>Math.max(0,(stock.find(s=>s.id===id)?.stock||0)-(reservations[id]||0));
      const updateChantier=(id,patch)=>setChantiers(p=>p.map(ch=>ch.id===id?{...ch,...patch}:ch));

      const nextStatut=ch=>{
        const n=STATUTS_CH[ch.statut]?.next;
        if(!n)return;
        if(n==="termine"){
          const ns=stock.map(s=>{
            const u=(ch.materiels||[]).find(m=>Number(m.id)===s.id);
            const uc=(ch.cables||[]).find(m=>Number(m.id)===s.id);
            const q=(u?Number(u.qty):0)+(uc?Number(uc.qty):0);
            return q>0?{...s,stock:Math.max(0,s.stock-q)}:s;
          });
          const d=new Date().toLocaleDateString("fr-FR");
          const newHist=[
            ...(ch.materiels||[]).map(m=>({date:d,chantier:ch.client,article:m.article,cat:m.cat,unite:m.unite||"pce",qty:m.qty,par:ch.technicien||profile?.nom||""})),
            ...(ch.cables||[]).map(m=>({date:d,chantier:ch.client,article:m.article,cat:"Câble",unite:"ml",qty:m.qty,par:ch.technicien||profile?.nom||""})),
          ];
          const updated=chantiers.map(c2=>c2.id===ch.id?{...c2,statut:"termine",date_fin:d,facture:{statut:"a_facturer"}}:c2);
          setChantiers(updated);
          if(window._appState)window._appState.finishChantier(ns,newHist,updated);
        }else{
          updateChantier(ch.id,{statut:n});
        }
      };

      const addMat=(form,setForm)=>{
        if(!mItem.id||!mItem.qty)return;
        const a=stock.find(s=>s.id===Number(mItem.id));
        setForm(p=>({...p,materiels:[...p.materiels.filter(x=>x.id!==mItem.id),{id:mItem.id,article:a?.article,cat:a?.cat,unite:a?.unite||"pce",qty:Number(mItem.qty)}]}));
        setMItem({id:"",qty:""});
      };
      const addCab=(form,setForm)=>{
        if(!cItem.id||!cItem.qty)return;
        const a=stock.find(s=>s.id===Number(cItem.id));
        setForm(p=>({...p,cables:[...p.cables.filter(x=>x.id!==cItem.id),{id:cItem.id,article:a?.article,unite:"ml",qty:Number(cItem.qty)}]}));
        setCItem({id:"",qty:""});
      };

      const daysInMonth=(m,y)=>new Date(y,m+1,0).getDate();
      const firstDay=(m,y)=>(new Date(y,m,1).getDay()+6)%7;
      const chantiersInMonth=chantiers.filter(ch=>{
        if(!ch.date_installation)return false;
        const p=ch.date_installation.split("/");
        return p.length===3&&Number(p[1])-1===calMonth&&Number(p[2])===calYear;
      });
      const pipeline=s=>chantiers.filter(ch=>{
        if(ch.statut!==s) return false;
        if(!search) return true;
        const q=search.toLowerCase();
        return (ch.client||"").toLowerCase().includes(q)||(ch.technicien||"").toLowerCase().includes(q)||(ch.adresse||"").toLowerCase().includes(q);
      });
      const statOrder=["a_planifier","planifie","en_cours"];
      const insufficientChantiers=chantiers.filter(ch=>ch.statut!=="termine"&&(ch.materiels||[]).some(m=>stockDispo(Number(m.id))<Number(m.qty)));

      return(
        <div>
          {editModal&&<div style={OVL} onClick={()=>setEditModal(null)}><div style={MBX} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <h3 style={{margin:"0 0 16px",fontWeight:800,fontSize:17}}>✏️ Modifier le chantier</h3>
            <div style={{marginBottom:12}}><L c="CLIENT"/><input value={editModal.client} onChange={e=>setEditModal(p=>({...p,client:e.target.value}))} style={INP()}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div><L c="DATE D'INSTALLATION"/><input value={editModal.date_installation||""} onChange={e=>setEditModal(p=>({...p,date_installation:e.target.value}))} placeholder="JJ/MM/AAAA" style={INP()}/></div>
              <div><L c="TECHNICIEN"/><TechSelect value={editModal.technicien||""} onChange={v=>setEditModal(p=>({...p,technicien:v}))}/></div>
            </div>
            <div style={{marginBottom:10}}>
              <L c="MATÉRIEL"/>
              <div style={{display:"flex",gap:6,marginBottom:6}}>
                <select value={mItem.id} onChange={e=>setMItem(p=>({...p,id:e.target.value}))} style={{...INP(),flex:2}}><option value="">Choisir…</option>{BORNES.map(s=><option key={s.id} value={s.id}>{s.cat} — {s.article}</option>)}</select>
                <input type="number" min="1" value={mItem.qty} onChange={e=>setMItem(p=>({...p,qty:e.target.value}))} placeholder="Qté" style={{...INP(),width:62,textAlign:"center"}}/>
                <button onClick={()=>addMat(editModal,setEditModal)} style={BTN("#3B82F6",{padding:"10px 14px",fontSize:16})}>+</button>
              </div>
              {(editModal.materiels||[]).map(m=>{const ins=stockDispo(Number(m.id))<Number(m.qty);return<div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#070D1A",borderRadius:8,padding:"7px 10px",marginBottom:4}}><span style={{fontSize:12,color:ins?"#EF4444":"#E8F0FF"}}>{m.article}</span><div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:12,fontWeight:700,color:ins?"#EF4444":"#10B981"}}>{m.qty}×</span>{ins&&<span style={{fontSize:10,color:"#EF4444"}}>⚠️{stockDispo(Number(m.id))}</span>}<button onClick={()=>setEditModal(p=>({...p,materiels:p.materiels.filter(x=>x.id!==m.id)}))} style={{background:"#EF444420",border:"none",borderRadius:5,color:"#EF4444",cursor:"pointer",padding:"2px 8px",fontSize:12}}>✕</button></div></div>;})}
            </div>
            <div style={{marginBottom:10}}>
              <L c="CÂBLES (ML)"/>
              <div style={{display:"flex",gap:6,marginBottom:6}}>
                <select value={cItem.id} onChange={e=>setCItem(p=>({...p,id:e.target.value}))} style={{...INP(),flex:2}}><option value="">Choisir…</option>{CABLES.map(s=><option key={s.id} value={s.id}>{s.article}</option>)}</select>
                <input type="number" min="1" value={cItem.qty} onChange={e=>setCItem(p=>({...p,qty:e.target.value}))} placeholder="ml" style={{...INP(),width:62,textAlign:"center"}}/>
                <button onClick={()=>addCab(editModal,setEditModal)} style={BTN("#3B82F6",{padding:"10px 14px",fontSize:16})}>+</button>
              </div>
              {(editModal.cables||[]).map(m=><div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#070D1A",borderRadius:8,padding:"7px 10px",marginBottom:4}}><span style={{fontSize:12}}>{m.article}</span><div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:12,color:"#10B981",fontWeight:700}}>{m.qty}ml</span><button onClick={()=>setEditModal(p=>({...p,cables:p.cables.filter(x=>x.id!==m.id)}))} style={{background:"#EF444420",border:"none",borderRadius:5,color:"#EF4444",cursor:"pointer",padding:"2px 8px",fontSize:12}}>✕</button></div></div>)}
            </div>
            <div style={{background:"#070D1A",borderRadius:10,padding:"12px 14px",marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#4A6A9E",marginBottom:8,textTransform:"uppercase"}}>Checklist</div>
              {CHECKLIST_ITEMS.map(item=>(
                <div key={item.key} onClick={()=>setEditModal(p=>({...p,checklist:{...p.checklist,[item.key]:!p.checklist?.[item.key]}}))} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",cursor:"pointer",borderBottom:"1px solid #0D1828"}}>
                  <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${editModal.checklist?.[item.key]?"#10B981":"#1B2D4F"}`,background:editModal.checklist?.[item.key]?"#10B981":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{editModal.checklist?.[item.key]&&<span style={{fontSize:10,color:"#FFF",fontWeight:800}}>✓</span>}</div>
                  <span style={{fontSize:13,color:editModal.checklist?.[item.key]?"#10B981":"#7B96C8"}}>{item.label}</span>
                </div>
              ))}
            </div>
            <div style={{marginBottom:14}}><L c="NOTES"/><textarea value={editModal.notes||""} onChange={e=>setEditModal(p=>({...p,notes:e.target.value}))} style={{...INP(),height:70,resize:"none"}}/></div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setEditModal(null)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={()=>{updateChantier(editModal.id,editModal);setEditModal(null);}} style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{flex:2,padding:"12px"})}>💾 Enregistrer</button>
            </div>
          </div></div>}

          {delConf&&<div style={OVL} onClick={()=>setDelConf(null)}><div style={{...MBX,maxWidth:360,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <div style={{fontSize:44,marginBottom:10}}>🗑️</div>
            <h3 style={{margin:"0 0 8px",fontWeight:800}}>Supprimer ce chantier ?</h3>
            <p style={{color:"#4A6A9E",fontSize:13,margin:"0 0 20px"}}><strong style={{color:"#E8F0FF"}}>{delConf.client}</strong></p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setDelConf(null)} style={BTN("#1B2D4F",{flex:1})}>Annuler</button>
              <button onClick={()=>{const id=delConf.id;setChantiers(p=>p.filter(ch=>ch.id!==id));sb.from("chantiers").delete().eq("id",id).then(({error})=>{if(error)console.error("delete chantiers:",error.message);});setDelConf(null);}} style={BTN("#EF4444",{flex:1})}>Supprimer</button>
            </div>
          </div></div>}

          {/* LIGHTBOX PLEIN ÉCRAN */}
          {lightbox&&<div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"#000000EE",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}}>
            <img src={lightbox} style={{maxWidth:"95vw",maxHeight:"92vh",borderRadius:12,objectFit:"contain",boxShadow:"0 0 60px #000"}} onClick={e=>e.stopPropagation()}/>
            <button onClick={()=>setLightbox(null)} style={{position:"fixed",top:16,right:20,background:"#0D1828",border:"1px solid #1B2D4F",borderRadius:8,color:"#E8F0FF",padding:"8px 14px",cursor:"pointer",fontSize:16,fontWeight:700,zIndex:2001}}>✕</button>
          </div>}

          {/* MODAL PROBLÈME ADMIN */}
          {problemModal&&<div style={OVL} onClick={()=>setProblemModal(null)}><div style={{...MBX,maxWidth:400}} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <div style={{width:40,height:40,borderRadius:12,background:"#F59E0B15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>⚠️</div>
              <div>
                <div style={{fontWeight:800,fontSize:15,color:"#F0F6FF"}}>Signaler un problème</div>
                <div style={{fontSize:11,color:"#4A6A9E",marginTop:2}}>{problemModal.ch.client}</div>
              </div>
            </div>
            {/* Type */}
            <div style={{marginBottom:12}}>
              <L c="Type de problème"/>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {[["probleme","⚠️ Problème"],["urgence","🚨 Urgence"],["sav","🛠️ SAV requis"],["qualite","📋 Qualité"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setProblemModal(p=>({...p,type:k}))}
                    style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${problemModal.type===k?"#F59E0B":"#1B2D4F"}`,background:problemModal.type===k?"#F59E0B20":"#070D1A",color:problemModal.type===k?"#F59E0B":"#4A6A9E",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
            {/* Description */}
            <div style={{marginBottom:16}}>
              <L c="Description du problème"/>
              <textarea value={problemModal.desc||""} onChange={e=>setProblemModal(p=>({...p,desc:e.target.value}))}
                placeholder="Décrivez le problème observé…"
                rows={3} style={{...INP(),resize:"vertical",lineHeight:1.5}}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setProblemModal(null)} style={BTN("#1B2D4F",{flex:1,padding:"11px"})}>Annuler</button>
              <button onClick={()=>{
                if(!problemModal.desc.trim())return;
                const ch=problemModal.ch;
                const probs=[...(ch.problemes_admin||[]),{
                  id:Date.now(),
                  type:problemModal.type,
                  desc:problemModal.desc,
                  date:new Date().toLocaleDateString("fr-FR"),
                  par:profile?.nom||"Admin",
                }];
                updateChantier(ch.id,{problemes_admin:probs});
                setProblemModal(null);
              }} disabled={!problemModal.desc.trim()}
                style={BTN(problemModal.desc.trim()?"linear-gradient(135deg,#F59E0B,#D97706)":"#1B2D4F",{flex:2,padding:"11px"})}>
                ⚠️ Enregistrer le problème
              </button>
            </div>
          </div></div>}

          {/* MODAL PLANIFICATION DATE */}
          {planifModal&&<div style={OVL} onClick={()=>setPlanifModal(null)}><div style={{...MBX,maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <Handle/>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
              <div style={{width:40,height:40,borderRadius:12,background:"#0F1F3D",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>📅</div>
              <div>
                <div style={{fontWeight:800,fontSize:15,color:"#F0F6FF"}}>{planifModal.mode==="redate"?"Modifier la date":"Planifier le chantier"}</div>
                <div style={{fontSize:11,color:"#4A6A9E",marginTop:2}}>{planifModal.ch.client}</div>
              </div>
            </div>
            <L c="Date d'installation"/>
            <input
              type="date"
              value={(()=>{
                const s=planifModal.dateStr||"";
                if(!s)return "";
                const p=s.split("/");
                if(p.length===3)return `${p[2]}-${p[1]}-${p[0]}`;
                return s;
              })()}
              onChange={e=>{
                const v=e.target.value; // yyyy-mm-dd
                if(!v){setPlanifModal(p=>({...p,dateStr:""}));return;}
                const[y,m,d]=v.split("-");
                setPlanifModal(p=>({...p,dateStr:`${d}/${m}/${y}`}));
              }}
              style={{...INP(),fontSize:15,padding:"12px 14px",marginBottom:20,background:"#070D1A",border:"1px solid #1B2D4F",borderRadius:10,color:"#E8F0FF",width:"100%",boxSizing:"border-box",colorScheme:"dark"}}
            />
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{
                if(!planifModal.dateStr){return;}
                if(planifModal.mode==="planifier"){
                  // Passer en statut planifié avec la date
                  updateChantier(planifModal.ch.id,{statut:"planifie",date_installation:planifModal.dateStr});
                } else {
                  // Juste mettre à jour la date
                  updateChantier(planifModal.ch.id,{date_installation:planifModal.dateStr});
                }
                setPlanifModal(null);
              }} style={BTN("linear-gradient(135deg,#3B82F6,#1D4ED8)",{flex:2,padding:"12px",fontSize:14})}>
                {planifModal.mode==="redate"?"💾 Mettre à jour":"📅 Confirmer & planifier"}
              </button>
              <button onClick={()=>setPlanifModal(null)} style={BTN("#1B2D4F",{flex:1,padding:"12px",fontSize:13})}>Annuler</button>
            </div>
          </div></div>}

          {/* MODAL PHOTOS */}
          {rapportModal&&<RapportModal
            isMobile={isMobile}
            data={rapportModal}
            onClose={()=>setRapportModal(null)}
            onSave={(rapport)=>{
              const ch=rapportModal.ch;
              const updated=chantiers.map(c2=>c2.id===ch.id?{...c2,rapport}:c2);
              setChantiers(updated);
              // Ajouter/mettre à jour dans la table rapports
              const entry={
                id:Date.now(), chantier_id:ch.id, chantier_nom:ch.client,
                adresse:ch.adresse||"", technicien:rapport.rapport_par||ch.technicien||"",
                date:rapport.rapport_date||new Date().toLocaleDateString("fr-FR"),
                heure_debut:rapport.heures_debut||"", heure_fin:rapport.heures_fin||"",
                observations:rapport.observations||"", type_travaux:[],
                materiels_poses:[], etat_final:"ok",
                photos:rapport.photos_chantier||[], created_at:new Date().toISOString(),
              };
              if(setRapports)setRapports(p=>{const exists=p.find(r=>r.chantier_id===ch.id);return exists?p.map(r=>r.chantier_id===ch.id?{...r,...entry,id:r.id}:r):[entry,...p];});
              setRapportModal(null);
            }}
            onSaveAndFinish={(rapport)=>{
              const ch=rapportModal.ch;
              // Déduire stock
              const ns=stock.map(s=>{
                const u=(ch.materiels||[]).find(m=>Number(m.id)===s.id);
                const uc=(ch.cables||[]).find(m=>Number(m.id)===s.id);
                const q=(u?Number(u.qty):0)+(uc?Number(uc.qty):0);
                return q>0?{...s,stock:Math.max(0,s.stock-q)}:s;
              });
              const d=new Date().toLocaleDateString("fr-FR");
              const newHist=[
                ...(ch.materiels||[]).map(m=>({date:d,chantier:ch.client,article:m.article,cat:m.cat,unite:m.unite||"pce",qty:m.qty,par:ch.technicien||profile?.nom||""})),
                ...(ch.cables||[]).map(m=>({date:d,chantier:ch.client,article:m.article,cat:"Câble",unite:"ml",qty:m.qty,par:ch.technicien||profile?.nom||""})),
              ];
              const updated=chantiers.map(c2=>c2.id===ch.id?{...c2,statut:"termine",date_fin:d,rapport,facture:{statut:"a_facturer"}}:c2);
              setChantiers(updated);
              // Ajouter dans la table rapports
              const entry={
                id:Date.now(), chantier_id:ch.id, chantier_nom:ch.client,
                adresse:ch.adresse||"", technicien:rapport.rapport_par||ch.technicien||"",
                date:rapport.rapport_date||d,
                heure_debut:rapport.heures_debut||"", heure_fin:rapport.heures_fin||"",
                observations:rapport.observations||"", type_travaux:[],
                materiels_poses:[], etat_final:"ok",

      const firstLoad=React.useRef(true);

        setNotifs(p=>[{id,icon,title,msg,tab,ts:new Date(),read:false},...p].slice(0,50));

        setNotifs(p=>p.map(n=>({...n,read:true})));

        setNotifs(p=>p.filter(n=>n.id!==id));

      // Marquer comme lues les notifs d'un onglet quand on le visite
      const goTo=v=>{
        try{localStorage.setItem("app_view",v);}catch(e){}
        setView(v);
        setNotifs(p=>p.map(n=>n.tab===v?{...n,read:true}:n));
        setNotifPanel(false);
        setShowMoreMenu(false);
      };

      const unreadCount=notifs.filter(n=>!n.read).length;
      const timer=React.useRef(null);
      const logout=()=>sb.auth.signOut();

      // Auth
      React.useEffect(()=>{
        // Vérification immédiate de la session (plus rapide que d'attendre onAuthStateChange)
        const verifySession=async()=>{
          try{
            const{data:{session}}=await sb.auth.getSession();
            if(!session){
              // Pas de session valide → vider le cache et afficher login
              setAuthUser(null);
              setProfile(null);
              try{localStorage.removeItem("app_profile");}catch(e){}
              setAuthLoading(false);
              return;
            }
            setAuthUser(session.user);
            // Refresh profil en arrière-plan (silencieux si cache déjà présent)
            const hasCached=!!localStorage.getItem("app_profile");
            if(!hasCached){
              // Pas de cache : fetch bloquant
              const{data}=await sb.from("profiles").select("*").eq("id",session.user.id).single();
              if(data){setProfile(data);try{localStorage.setItem("app_profile",JSON.stringify(data));}catch(e){}}
            } else {
              // Cache présent : refresh silencieux en arrière-plan
              sb.from("profiles").select("*").eq("id",session.user.id).single().then(({data})=>{
                if(data){
                  setProfile(data);
                  try{localStorage.setItem("app_profile",JSON.stringify(data));}catch(e){}
                }
              });
            }
            setAuthLoading(false);
          }catch(e){
            console.warn("verifySession:",e.message);
            setAuthLoading(false);
          }
        };
        verifySession();

        const t=setTimeout(()=>setAuthLoading(false),4000);
        const{data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
          if(event==="SIGNED_OUT"){
            setAuthUser(null);
            setProfile(null);
            try{localStorage.removeItem("app_profile");}catch(e){}
            clearTimeout(t);
            setAuthLoading(false);
            return;
          }
          if(event==="SIGNED_IN"&&session?.user){
            setAuthUser(session.user);
            try{
              const cached=localStorage.getItem("app_profile");
              const old=cached?JSON.parse(cached):null;
              if(old&&old.role){
                // Rôle en cache dispo : refresh silencieux
                sb.from("profiles").select("*").eq("id",session.user.id).single().then(({data})=>{
                  if(data){
                    if(old.role!==data.role)try{localStorage.removeItem("app_view");}catch(e){}
                    setProfile(data);
                    try{localStorage.setItem("app_profile",JSON.stringify(data));}catch(e){}
                    try{const cur=localStorage.getItem("app_view")||"accueil";const tabs=ROLE_TABS[data.role]||["accueil"];if(!tabs.includes(cur)){localStorage.removeItem("app_view");goTo(tabs[0]);};}catch(e){}
                  }
                });
              } else {
                const{data}=await sb.from("profiles").select("*").eq("id",session.user.id).single();
                if(data){setProfile(data);try{localStorage.setItem("app_profile",JSON.stringify(data));}catch(e){}}
              }
            }catch(e){console.warn("profile fetch:",e.message);}
            clearTimeout(t);
            setAuthLoading(false);
          }
        });
        return()=>{subscription.unsubscribe();clearTimeout(t);};
      },[]);

      // Load data
      React.useEffect(()=>{
        if(!profile)return;

        // ── Helpers cache localStorage ─────────────────────────
        const CACHE_PREFIX="maborne_cache_";
        const cacheGet=(key)=>{try{const v=localStorage.getItem(CACHE_PREFIX+key);return v?JSON.parse(v):null;}catch(e){return null;}};
        const cacheSet=(key,val)=>{try{localStorage.setItem(CACHE_PREFIX+key,JSON.stringify(val));}catch(e){}};

        // 1. Charger le cache instantanément (0ms)
        const cached_stock     = cacheGet("stock");
        const cached_orders    = cacheGet("orders");
        const cached_hist      = cacheGet("historique");
        const cached_ventes    = cacheGet("ventes");
        const cached_chantiers = cacheGet("chantiers");
        const cached_acomptes  = cacheGet("acomptes");
        const cached_sav       = cacheGet("sav_tickets");
        const cached_obj       = cacheGet("objectifs");
        const cached_rapp      = cacheGet("rapports");

        if(cached_stock?.length)   setStock(cached_stock);
        if(cached_orders?.length)  setOrders(cached_orders);
        if(cached_hist?.length)    setHist(cached_hist);
        if(cached_ventes?.length)  setVentes(cached_ventes);
        if(cached_chantiers?.length) setChantiersPipeline(cached_chantiers);
        if(cached_acomptes?.length) setAcomptes(cached_acomptes);
        if(cached_sav?.length)     setSavTickets(cached_sav);
        if(cached_obj){
          const obj={};
          cached_obj.forEach(r=>{if(r.key)obj[r.key]={ca:r.ca||0,marge:r.marge||0};});
          setObjectifs(obj);
        }
        if(cached_rapp?.length)   setRapports(cached_rapp);

        // 2. Rafraîchissement Supabase en arrière-plan
        const load=async(table,orderCol)=>{
          try{
            const q=sb.from(table).select("*");
            const{data,error}=orderCol?await q.order(orderCol,{ascending:false}):await q;
            if(error){console.warn("load "+table+":",error.message);return null;}
            return data||[];
          }catch(e){console.warn("load "+table+":",e.message);return null;}
        };

        const loadAll=async()=>{
          // Priorité 1 : tables critiques en parallèle immédiat
          const[rv,rc,ra,rsav]=await Promise.all([
            load("ventes","id"),
            load("chantiers","id"),
            load("acomptes","id"),
            load("sav_tickets","id"),
          ]);
          if(rv){setVentes(rv);cacheSet("ventes",rv);}
          if(rc){setChantiersPipeline(rc);cacheSet("chantiers",rc);}
          if(ra){setAcomptes(ra);cacheSet("acomptes",ra);}
          if(rsav){setSavTickets(rsav);cacheSet("sav_tickets",rsav);}

          // Priorité 2 : reste (moins urgent)
          const[rs,ro,rh,robj,rrapp]=await Promise.all([
            load("stock","id"),
            load("orders","id"),
            load("historique","id"),
            load("objectifs",null),
            load("rapports","id"),
          ]);
          if(rs){setStock(rs);cacheSet("stock",rs);}
          if(ro){setOrders(ro);cacheSet("orders",ro);}
          if(rh){setHist(rh);cacheSet("historique",rh);}
          if(robj){
            const obj={};
            robj.forEach(r=>{if(r.key)obj[r.key]={ca:r.ca||0,marge:r.marge||0};});
            setObjectifs(obj);
            cacheSet("objectifs",robj);
          }
          if(rrapp){setRapports(rrapp);cacheSet("rapports",rrapp);}

          firstLoad.current=false;
        };
        loadAll();
        // Charger tous les profils actifs pour les sélecteurs d'installateur
        sb.from("profiles").select("id,nom,role,actif").then(({data})=>{
          if(data)setAllProfiles(data.filter(u=>u.actif!==false));
        });
      },[profile]);

      // ── REALTIME ──────────────────────────────────────────────


      React.useEffect(()=>{
        if(!profile)return;

        const LABELS={
          ventes:"💰 Ventes",chantiers:"🔧 Chantiers",acomptes:"📋 Acomptes",
          stock:"📦 Stock",orders:"🛒 Commandes",sav_tickets:"🛠️ SAV",rapports:"📄 Rapports"
        };
        const EVENTS={INSERT:"ajouté",UPDATE:"modifié",DELETE:"supprimé"};

        const handle=async(payload)=>{
          const t=payload.table;
          const ev=payload.eventType;
          const rec=payload.new||payload.old||{};

          if(t==="ventes"){
            if(ev==="INSERT")setVentes(p=>[payload.new,...p.filter(x=>x.id!==payload.new.id)]);
            else if(ev==="UPDATE")setVentes(p=>p.map(x=>x.id===payload.new.id?payload.new:x));
            else if(ev==="DELETE")setVentes(p=>p.filter(x=>x.id!==payload.old.id));
          }
          else if(t==="chantiers"){
            if(ev==="INSERT")setChantiersPipeline(p=>[payload.new,...p.filter(x=>x.id!==payload.new.id)]);
            else if(ev==="UPDATE")setChantiersPipeline(p=>p.map(x=>x.id===payload.new.id?payload.new:x));
            else if(ev==="DELETE")setChantiersPipeline(p=>p.filter(x=>x.id!==payload.old.id));
          }
          else if(t==="acomptes"){
            if(ev==="INSERT")setAcomptes(p=>[payload.new,...p.filter(x=>x.id!==payload.new.id)]);
            else if(ev==="UPDATE")setAcomptes(p=>p.map(x=>x.id===payload.new.id?payload.new:x));
            else if(ev==="DELETE")setAcomptes(p=>p.filter(x=>x.id!==payload.old.id));
          }
          else if(t==="stock"){
            if(ev==="DELETE")setStock(p=>p.filter(x=>x.id!==payload.old.id));
            else setStock(p=>{const exists=p.find(x=>x.id===payload.new.id);return exists?p.map(x=>x.id===payload.new.id?payload.new:x):[payload.new,...p];});
          }
          else if(t==="orders"){
            if(ev==="INSERT")setOrders(p=>[payload.new,...p.filter(x=>x.id!==payload.new.id)]);
            else if(ev==="UPDATE")setOrders(p=>p.map(x=>x.id===payload.new.id?payload.new:x));
            else if(ev==="DELETE")setOrders(p=>p.filter(x=>x.id!==payload.old.id));
          }
          else if(t==="sav_tickets"){
            if(ev==="INSERT")setSavTickets(p=>[payload.new,...p.filter(x=>x.id!==payload.new.id)]);
            else if(ev==="UPDATE")setSavTickets(p=>p.map(x=>x.id===payload.new.id?payload.new:x));
            else if(ev==="DELETE")setSavTickets(p=>p.filter(x=>x.id!==payload.old.id));
          }
          else if(t==="rapports"){
            if(ev==="INSERT")setRapports(p=>[payload.new,...p.filter(x=>x.id!==payload.new.id)]);
            else if(ev==="UPDATE")setRapports(p=>p.map(x=>x.id===payload.new.id?payload.new:x));
            else if(ev==="DELETE")setRapports(p=>p.filter(x=>x.id!==payload.old.id));
          }

        const TAB_MAP={
          ventes:"ventes", chantiers:"chantier", acomptes:"administratif",
          stock:"stock", orders:"commandes", sav_tickets:"sav", rapports:"rapports"
        };
        const EV_ICONS={INSERT:"🆕",UPDATE:"✏️",DELETE:"🗑️"};
        const EV_LABELS={INSERT:"Nouveau",UPDATE:"Modifié",DELETE:"Supprimé"};
        const TABLE_ICONS={ventes:"💰",chantiers:"🔧",acomptes:"📋",stock:"📦",orders:"🛒",sav_tickets:"🛠️",rapports:"📄"};
        const TABLE_LABELS={ventes:"Vente",chantiers:"Chantier",acomptes:"Acompte",stock:"Stock",orders:"Commande",sav_tickets:"Ticket SAV",rapports:"Rapport"};

          const label=LABELS[t]||t;
          const evLabel=EVENTS[ev]||ev;
          const client=rec.client||rec.article||rec.titre||"";
          // Ignorer les suppressions propres et events du propre utilisateur (même session)
          if(ev==="DELETE") return;
          addNotif(
            TABLE_ICONS[t]||"🔔",
            `${EV_LABELS[ev]||ev} — ${TABLE_LABELS[t]||t}`,
            client||label,
            TAB_MAP[t]||"accueil"
          );
        };

        const ch=sb.channel("app-realtime")
          .on("postgres_changes",{event:"*",schema:"public",table:"ventes"},handle)
          .on("postgres_changes",{event:"*",schema:"public",table:"chantiers"},handle)
          .on("postgres_changes",{event:"*",schema:"public",table:"acomptes"},handle)
          .on("postgres_changes",{event:"*",schema:"public",table:"stock"},handle)
          .on("postgres_changes",{event:"*",schema:"public",table:"orders"},handle)
          .on("postgres_changes",{event:"*",schema:"public",table:"sav_tickets"},handle)
          .on("postgres_changes",{event:"*",schema:"public",table:"rapports"},handle)
          .subscribe((status)=>{
            if(status==="SUBSCRIBED")console.log("✅ Realtime connecté");
            else if(status==="CHANNEL_ERROR")console.warn("⚠️ Realtime erreur");
          });

        return()=>{sb.removeChannel(ch);};
      },[profile,addNotif]);

      const doSave=React.useCallback(async(ns,no,nh,nv,nc,na,nsav,nobj,nrapp)=>{
        console.log("doSave called, firstLoad=",firstLoad.current);if(firstLoad.current){console.warn("saveDB blocked: firstLoad still true");return;}
        setSync("saving");
        try{
            const run=async(table,data)=>{
              if(!data)return;
              const{error}=await sb.from(table).upsert(data);
              if(error){console.error(table+":",error.message,error.details,error.hint);setSync("error");throw error;}
            };
            await run("stock",ns);
            await run("orders",no);
            await run("historique",nh);
            if(nv){
              try{
                console.log("ventes to save:",JSON.stringify(nv[0]));

                // Badge par tab
                const getBadge=t=>{
                  if(t==="factures")return{n:chantiersPipeline.filter(ch=>ch.statut==="termine"&&(ch.facture?.statut||"a_facturer")==="a_facturer").length,c:"#EF4444"};
                  if(t==="chantier")return{n:chantiersPipeline.filter(ch=>ch.statut==="a_planifier").length,c:"#F59E0B"};
                  if(t==="commandes")return{n:orders.filter(o=>o.statut==="en_attente").length,c:"#F59E0B"};
                  if(t==="sav")return{n:savTickets.filter(s=>s.statut==="ouvert").length,c:"#EF4444"};
                  if(t==="administratif")return{n:acomptes.filter(a=>a.statut==="a_envoyer").length,c:"#F59E0B"};
                  if(t==="suivi_comm")return{n:chantiersPipeline.filter(ch=>ch.statut==="termine"&&(ch.suivi_comm?.etat||"a_appeler")==="a_appeler").length,c:"#3B82F6"};
                  if(t==="ventes")return{n:ventes.filter(v=>(Date.now()-v.id)/3600000<24).length,c:"#10B981"};
                  return{n:0,c:"#EF4444"};
                };

                return(<>
                  {/* Slide-up "Plus" menu */}
                  {showMoreMenu&&<div style={{position:"fixed",inset:0,zIndex:499}} onClick={()=>setShowMoreMenu(false)}/>}
                  {showMoreMenu&&<div style={{position:"fixed",bottom:60,left:0,right:0,background:"#0A1628",borderTop:"1px solid #1B2D4F",borderRadius:"20px 20px 0 0",zIndex:500,padding:"12px 16px 20px",boxShadow:"0 -8px 40px rgba(0,0,0,0.6)",animation:"slideUp 0.25s ease"}}>
                    <div style={{width:36,height:4,background:"#1B2D4F",borderRadius:2,margin:"0 auto 14px"}}/>
                    <div style={{fontWeight:700,fontSize:11,color:"#4A6A9E",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Navigation</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                      {moreTabs.map(t=>{
                        const isAct=view===t;
                        const {n,c}=getBadge(t);
                        return(
                          <button key={t} onClick={()=>goTo(t)}
                            style={{background:isAct?"rgba(59,130,246,0.15)":"#070D1A",
                              border:`1px solid ${isAct?"#3B82F6":"#1B2D4F"}`,
                              borderRadius:12,padding:"12px 4px",cursor:"pointer",
                              display:"flex",flexDirection:"column",alignItems:"center",gap:4,
                              fontFamily:'"Outfit",sans-serif',position:"relative"}}>
                            <span style={{fontSize:22}}>{TAB_ICONS[t]||"📋"}</span>
                            <span style={{fontSize:10,fontWeight:700,color:isAct?"#60A5FA":"#7B96C8",textAlign:"center",lineHeight:1.2}}>{TAB_LABELS[t]}</span>
                            {n>0&&<span style={{position:"absolute",top:6,right:6,background:c,color:"#FFF",borderRadius:"50%",fontSize:8,fontWeight:800,width:14,height:14,display:"flex",alignItems:"center",justifyContent:"center"}}>{n>9?"9+":n}</span>}
                          </button>
                        );
                      })}
                    </div>
                    {/* Logout dans le menu plus */}
                    <button onClick={logout} style={{width:"100%",marginTop:12,background:"transparent",border:"1px solid #1B2D4F",borderRadius:10,color:"#4A6A9E",padding:"10px",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:'"Outfit",sans-serif'}}>🚪 Se déconnecter</button>
                  </div>}

                  {/* Barre principale */}
                  <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(8,16,31,0.98)",borderTop:"1px solid #1B2D4F",display:"flex",zIndex:400,paddingBottom:"env(safe-area-inset-bottom,4px)",backdropFilter:"blur(16px)"}}>
                    {primaryTabs.map(t=>{
                      const isAct=view===t;
                      const{n,c}=getBadge(t);
                      return(
                        <button key={t} onClick={()=>{goTo(t);setShowMoreMenu(false);}}
                          style={{flex:1,background:"none",border:"none",cursor:"pointer",
                            padding:"10px 2px 6px",display:"flex",flexDirection:"column",
                            alignItems:"center",gap:2,position:"relative",minWidth:0}}>
                          <span style={{fontSize:22,lineHeight:1}}>{TAB_ICONS[t]||"📋"}</span>
                          <span style={{fontSize:9,fontWeight:700,color:isAct?"#3B82F6":"#4A6A9E",letterSpacing:"0.02em"}}>{TAB_LABELS[t]}</span>
                          {isAct&&<div style={{position:"absolute",top:0,left:"25%",right:"25%",height:2,background:"#3B82F6",borderRadius:"0 0 2px 2px"}}/>}
                          {n>0&&<span style={{position:"absolute",top:6,right:"20%",background:c,color:"#FFF",borderRadius:"50%",fontSize:8,fontWeight:800,width:14,height:14,display:"flex",alignItems:"center",justifyContent:"center"}}>{n>9?"9+":n}</span>}
                        </button>
                      );
                    })}
                    {/* Bouton Plus */}
                    {moreTabs.length>0&&<button onClick={()=>setShowMoreMenu(p=>!p)}
                      style={{flex:1,background:"none",border:"none",cursor:"pointer",
                        padding:"10px 2px 6px",display:"flex",flexDirection:"column",
                        alignItems:"center",gap:2,position:"relative",minWidth:0}}>
                      <span style={{fontSize:22,lineHeight:1,color:isMoreActive||showMoreMenu?"#3B82F6":"#4A6A9E"}}>{showMoreMenu?"✕":"☰"}</span>
                      <span style={{fontSize:9,fontWeight:700,color:isMoreActive||showMoreMenu?"#3B82F6":"#4A6A9E"}}>Plus</span>
                      {isMoreActive&&!showMoreMenu&&<div style={{position:"absolute",top:0,left:"25%",right:"25%",height:2,background:"#3B82F6",borderRadius:"0 0 2px 2px"}}/>}
                      {/* Badge total pour les onglets dans Plus */}
                      {(()=>{const tot=moreTabs.reduce((s,t)=>s+getBadge(t).n,0);return tot>0&&!showMoreMenu?<span style={{position:"absolute",top:6,right:"15%",background:"#EF4444",color:"#FFF",borderRadius:"50%",fontSize:8,fontWeight:800,width:14,height:14,display:"flex",alignItems:"center",justifyContent:"center"}}>{tot>9?"9+":tot}</span>:null;})()}
                    </button>}
                  </div>
                </>);
              })()}

            </div>
          </div>
          {NotifPanel}
        </div>
      );
    }

    class ErrorBoundary extends React.Component{
      constructor(p){super(p);this.state={err:null};}
      static getDerivedStateFromError(e){return{err:e};}
      render(){
        if(this.state.err)return(
          <div style={{background:"#070D1A",height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,padding:20}}>
            <div style={{color:"#EF4444",fontSize:16,fontWeight:700}}>❌ Erreur de l'application</div>
            <div style={{color:"#4A6A9E",fontSize:12,maxWidth:500,textAlign:"center"}}>{this.state.err.message}</div>
            <button onClick={()=>window.location.reload()} style={{background:"#1B2D4F",border:"1px solid #3B82F6",borderRadius:8,color:"#60A5FA",padding:"8px 18px",cursor:"pointer",fontSize:13}}>Recharger</button>
          </div>
        );
        return this.props.children;
      }
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
  </script>
</body>
</html>
